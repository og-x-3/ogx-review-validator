<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=yes">
<title>OG.X — Rule Validator</title>
<style>
:root{--bg:#020617;--card:#0f172a;--border:#1e293b;--cyan:#22d3ee;--emerald:#34d399;--amber:#fbbf24;--rose:#fb7185;--blue:#60a5fa;--text:#e2e8f0;--muted:#94a3b8;--slate:#334155;--green-bg:#052e1611;--green-border:#16653444;--red-bg:#451a0311;--red-border:#78350f44}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono','Fira Code',monospace;min-height:100vh;display:flex;flex-direction:column}
.topbar{width:100%;padding:.5rem 1rem;display:flex;justify-content:space-between;align-items:center;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;flex-wrap:wrap;gap:.25rem}
.topbar h1{font-size:.75rem;display:flex;align-items:center;gap:.4rem}
.pulse{width:6px;height:6px;background:var(--emerald);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.counter{font-size:.6rem;color:var(--cyan);font-weight:bold}
.progress-wrap{width:100%;height:2px;background:#1e293b}
.progress-fill{height:100%;background:var(--emerald);transition:width .4s}
.card-area{flex:1;display:flex;align-items:flex-start;justify-content:center;width:100%;padding:.5rem;overflow-y:auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.75rem 1rem;width:100%;max-width:600px}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.3rem}
.card-symbol{font-size:.8rem;font-weight:bold;color:var(--blue)}
.card-price-block{text-align:right;min-width:80px}
.card-price{font-size:1rem;font-weight:bold}
.card-range{font-size:.5rem;color:var(--muted)}
.badges{display:flex;gap:.25rem;margin-bottom:.3rem;flex-wrap:wrap}
.badge{font-size:.42rem;padding:1px 4px;border-radius:2px;font-weight:bold}
.badge-high{background:#064e3b;color:var(--emerald)}
.badge-medium{background:#78350f;color:var(--amber)}
.badge-low{background:#7f1d1d;color:var(--rose)}
.badge-safety{background:#881337;color:var(--rose)}
.badge-cat{background:#1e293b;color:var(--muted)}
.editable{outline:none;border-radius:4px;padding:2px 4px;transition:all .15s}
.editable:hover{background:#1e293b44}
.editable:focus{background:#1e293b88;box-shadow:0 0 0 1px var(--cyan)}
.note-edit{font-size:.52rem;color:var(--muted);line-height:1.4;background:#0a0f1f;padding:.4rem;border-radius:5px;border:1px solid #1e293b;margin-bottom:.3rem;min-height:40px}
.pros-cons{display:grid;grid-template-columns:1fr 1fr;gap:.3rem;margin-bottom:.3rem}
.pc-box{font-size:.48rem;line-height:1.35;padding:.35rem;border-radius:5px;min-height:40px}
.pc-pros{background:var(--green-bg);border:1px solid var(--green-border);color:var(--emerald)}
.pc-cons{background:var(--red-bg);border:1px solid var(--red-border);color:var(--amber)}
.pc-label{font-size:.4rem;font-weight:bold;opacity:.7;margin-bottom:.15rem;display:block}
.actions{display:flex;gap:.4rem;justify-content:center;flex-wrap:wrap;margin-top:.3rem}
.btn{padding:.35rem .7rem;border-radius:6px;border:1px solid var(--border);cursor:pointer;font-size:.52rem;font-weight:bold;font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:.2rem;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.btn-flag{background:#451a03;color:var(--amber);border-color:#78350f}
.btn-flag:active{background:#78350f;color:#fcd34d}
.btn-skip{background:#1e293b;color:var(--muted)}
.btn-skip:active{background:#334155;color:var(--text)}
.btn-help{background:#1e1b4b;color:var(--violet);border-color:#4c1d95}
.btn-help:active{background:#4c1d95;color:#c4b5fd}
.btn-validate{background:#052e16;color:var(--emerald);border-color:#166534}
.btn-validate:active{background:#166534;color:#6ee7b7}
.btn-save{background:#0f172a;color:var(--cyan);border-color:var(--cyan)}
.btn-delete{background:#450a0a;color:var(--rose);border-color:#7f1d1d}
.btn-delete:active{background:#7f1d1d;color:#fda4af}
.btn-grok{background:#0a1628;color:#60a5fa;border-color:#1e3a5f}
.btn-grok:active{background:#1e3a5f;color:#93c5fd}
.key-hint{font-size:.35rem;opacity:.3}
.overlay{display:none;position:fixed;inset:0;background:#000000e6;z-index:999;align-items:center;justify-content:center;padding:.5rem}
.overlay.active{display:flex}
.popup{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1rem;max-width:560px;max-height:85vh;overflow-y:auto;width:95%}
.popup h3{font-size:.7rem;color:var(--cyan);margin-bottom:.4rem}
.popup .info-edit{font-size:.5rem;color:var(--muted);line-height:1.5;white-space:pre-line;min-height:60px}
.popup .close-btn{float:right;background:none;border:none;color:var(--muted);font-size:1rem;cursor:pointer;padding:.2rem .4rem}
.popup h4{font-size:.5rem;margin-bottom:.15rem;margin-top:.4rem}
.done-screen{text-align:center;padding:1.5rem}
.done-screen h2{font-size:1rem;margin-bottom:.4rem}
.done-screen .big-num{font-size:2.5rem;font-weight:bold;color:var(--emerald)}
.stat-row{display:flex;gap:1.5rem;justify-content:center;margin:.75rem 0;flex-wrap:wrap}
.stat-box{text-align:center}
.stat-box .num{font-size:1rem;font-weight:bold}
.stat-box .label{font-size:.42rem;color:var(--muted)}
.btn-restart{background:var(--cyan);color:#020617;border:none;padding:.4rem 1rem;border-radius:6px;cursor:pointer;font-weight:bold;font-family:inherit;font-size:.6rem;margin-top:.5rem}
.btn-export{background:var(--violet);color:#fff;border:none;padding:.4rem 1rem;border-radius:6px;cursor:pointer;font-weight:bold;font-family:inherit;font-size:.55rem;margin-top:.3rem}
.btn-restore{background:var(--amber);color:#020617;border:none;padding:.4rem 1rem;border-radius:6px;cursor:pointer;font-weight:bold;font-family:inherit;font-size:.55rem;margin-top:.3rem}
.keybar{padding:.2rem .75rem;font-size:.38rem;color:var(--muted);display:flex;gap:.6rem;justify-content:center;border-top:1px solid var(--border);width:100%;flex-wrap:wrap}
.keybar kbd{background:#1e293b;padding:1px 3px;border-radius:2px;border:1px solid var(--border);font-family:inherit;font-size:.38rem}
details{margin-top:.4rem}details summary{font-size:.45rem;color:var(--amber);cursor:pointer}
@media (max-width:480px){.card{padding:.5rem .6rem}.btn{padding:.3rem .5rem;font-size:.48rem}.card-symbol{font-size:.7rem}.card-price{font-size:.9rem}.pros-cons{grid-template-columns:1fr}}
</style></head><body>
<div class="topbar"><h1><span class="pulse"></span>OG.X Validator</h1><div class="counter"><span id="done-count">0</span>/<span id="total-count">283</span> <span style="font-size:.48rem;color:var(--muted);">💧77 ⚡142 🌱64</span></div><div style="font-size:.42rem;color:var(--muted);">✏️ all editable · 🗑️ delete · 🔍 Grok · <span onclick="setSyncUrl()" style="color:var(--cyan);cursor:pointer;text-decoration:underline;">📤 sync</span></div></div>
<div class="progress-wrap"><div class="progress-fill" id="progress"></div></div>
<div class="card-area" id="card-area"><div style="text-align:center;padding:3rem;color:var(--muted);font-size:.7rem;">⏳ Loading 283 rules...</div></div>
<div class="overlay" id="overlay"><div class="popup" id="popup"></div></div>
<div class="keybar"><span><kbd>→</kbd> Validate</span><span><kbd>←</kbd> Flag</span><span><kbd>↓</kbd> Skip</span><span><kbd>?</kbd> Info</span><span><kbd>Del</kbd> Delete</span><span><kbd>G</kbd> Grok</span><span><kbd>Z</kbd> Undo</span></div>
<script src="data.v2.js"></script>
<script src="app.v2.js"></script>
</body></html>
