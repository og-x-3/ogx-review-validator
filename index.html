 "note": "PVC Schedule 40 conduit per 10ft: 3/4\" ~$6-9, 1\" ~$8-13. Schedule 80 (thicker wall): 1\" ~$14-20. PVC is corrosion-proof — better than EMT for coastal/humid environments like Panama. Can be direct-buried (18\" minimum cover). PVC cement joins sections. MUST include expansion joints on long runs (>25ft", "fullNote": "PVC Schedule 40 conduit per 10ft: 3/4\" ~$6-9, 1\" ~$8-13. Schedule 80 (thicker wall): 1\" ~$14-20. PVC is corrosion-proof — better than EMT for coastal/humid environments like Panama. Can be direct-buried (18\" minimum cover). PVC cement joins sections. MUST include expansion joints on long runs (>25ft) — PVC expands 3.6mm per 10°C per 30m. Use PVC-compatible fittings only."}, {"sym": "LIQUID_TIGHT", "price": 2, "range": "$1.5-2.5", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Liquid-tight flexible conduit ~$1.50-2.50/ft. Non-metallic (LFNC) or metallic (LFMC). Used for final connections to equipment that may vibrate (inverter, generator). Not for long runs — maximum 6ft per NEC for LFNC. Waterproof with proper liquid-tight connectors. Essential for connecting fixed condu", "fullNote": "Liquid-tight flexible conduit ~$1.50-2.50/ft. Non-metallic (LFNC) or metallic (LFMC). Used for final connections to equipment that may vibrate (inverter, generator). Not for long runs — maximum 6ft per NEC for LFNC. Waterproof with proper liquid-tight connectors. Essential for connecting fixed conduit to battery enclosures, inverter cabinets, and generators."}, {"sym": "WIRING_SERIES", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "SERIES PANEL WIRING: Connect positive of panel 1 to negative of panel 2, etc. Voltage adds (N × Vmp), current stays same as single panel. Ampacity (wire size) determined by single-panel current — NOT total. Advantages: higher voltage = lower current = less I²R loss in cables (power loss = I²×R). Exa", "fullNote": "SERIES PANEL WIRING: Connect positive of panel 1 to negative of panel 2, etc. Voltage adds (N × Vmp), current stays same as single panel. Ampacity (wire size) determined by single-panel current — NOT total. Advantages: higher voltage = lower current = less I²R loss in cables (power loss = I²×R). Example: 4×100W panels. All parallel: 18V @ 22A → 10 AWG wire at 30ft has 4.4V drop (24% loss!). All series: 72V @ 5.5A → same 10 AWG at 30ft has 0.5V drop (0.7% loss). MPPT controllers LOVE higher voltage (wider buck range). Disadvantages: partial shading kills entire string (bypass diodes help but can't fully compensate — shaded panel's bypass diode activates, dropping that panel's contribution but allowing current to flow). One failed panel = whole string dead. Cold-weather Voc must stay under controller max. Best for: MPPT controllers, wire runs >30ft, unshaded arrays. Source: my-new-project research synthesis + MPPT vs PWM report."}, {"sym": "WIRING_PARALLEL", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "PARALLEL PANEL WIRING: Connect all positives together, all negatives together. Voltage stays same, current adds (N × Imp). Advantages: shading-tolerant (shaded panel doesn't drag others down), lower voltages safer to work with. Disadvantages: higher current = thicker wire needed, more I²R loss. Each", "fullNote": "PARALLEL PANEL WIRING: Connect all positives together, all negatives together. Voltage stays same, current adds (N × Imp). Advantages: shading-tolerant (shaded panel doesn't drag others down), lower voltages safer to work with. Disadvantages: higher current = thicker wire needed, more I²R loss. Each parallel string of 2+ panels in a parallel array needs its own fuse at the combiner. REQUIRED for PWM controllers (must match panel Vmp to battery voltage). MC4 branch connectors (1F-2M Y-adapters) simplify parallel."}, {"sym": "WIRING_SERIES_PARALLEL", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "SERIES-PARALLEL (Ns×Np): Panels in series strings, then those strings paralleled at combiner. Example 2S2P (4 panels): 2 in series creates 40V@5A string, 2 such strings paralleled = 40V@10A. Example 3S2P (6 panels): 3 in series = 90V@8.3A, 2 strings = 90V@16.6A. This balances voltage and current — t", "fullNote": "SERIES-PARALLEL (Ns×Np): Panels in series strings, then those strings paralleled at combiner. Example 2S2P (4 panels): 2 in series creates 40V@5A string, 2 such strings paralleled = 40V@10A. Example 3S2P (6 panels): 3 in series = 90V@8.3A, 2 strings = 90V@16.6A. This balances voltage and current — the most common topology for MPPT systems. Each parallel string needs individual fuse. Design rule: max series number keeps Voc × 1.19 (cold factor) under controller limit."}, {"sym": "WIRE_GAUGE_12V", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "WIRE GAUGE TABLE for 12V DC at 3% voltage drop (one-way distance in feet). 5A: 14 AWG=11ft, 12 AWG=18ft, 10 AWG=28ft, 8 AWG=45ft, 6 AWG=72ft. 10A: 14 AWG not recommended, 12 AWG=9ft, 10 AWG=14ft, 8 AWG=22ft, 6 AWG=36ft, 4 AWG=57ft. 20A: 10 AWG=7ft, 8 AWG=11ft, 6 AWG=18ft, 4 AWG=28ft, 2 AWG=45ft. 30A", "fullNote": "WIRE GAUGE TABLE for 12V DC at 3% voltage drop (one-way distance in feet). 5A: 14 AWG=11ft, 12 AWG=18ft, 10 AWG=28ft, 8 AWG=45ft, 6 AWG=72ft. 10A: 14 AWG not recommended, 12 AWG=9ft, 10 AWG=14ft, 8 AWG=22ft, 6 AWG=36ft, 4 AWG=57ft. 20A: 10 AWG=7ft, 8 AWG=11ft, 6 AWG=18ft, 4 AWG=28ft, 2 AWG=45ft. 30A: 8 AWG=7ft, 6 AWG=12ft, 4 AWG=19ft, 2 AWG=30ft. 50A: 6 AWG=7ft, 4 AWG=11ft, 2 AWG=18ft, 1/0 AWG=29ft. This is why 12V systems need FAT wires. Double the distance for 24V, quadruple for 48V."}, {"sym": "WIRE_GAUGE_24V", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "WIRE GAUGE TABLE for 24V DC at 3% voltage drop (one-way distance in feet). 10A: 14 AWG=23ft, 12 AWG=36ft, 10 AWG=57ft, 8 AWG=91ft, 6 AWG=145ft. 20A: 12 AWG=18ft, 10 AWG=28ft, 8 AWG=45ft, 6 AWG=72ft, 4 AWG=115ft. 30A: 10 AWG=19ft, 8 AWG=30ft, 6 AWG=48ft, 4 AWG=76ft, 2 AWG=121ft. 50A: 8 AWG=18ft, 6 AW", "fullNote": "WIRE GAUGE TABLE for 24V DC at 3% voltage drop (one-way distance in feet). 10A: 14 AWG=23ft, 12 AWG=36ft, 10 AWG=57ft, 8 AWG=91ft, 6 AWG=145ft. 20A: 12 AWG=18ft, 10 AWG=28ft, 8 AWG=45ft, 6 AWG=72ft, 4 AWG=115ft. 30A: 10 AWG=19ft, 8 AWG=30ft, 6 AWG=48ft, 4 AWG=76ft, 2 AWG=121ft. 50A: 8 AWG=18ft, 6 AWG=29ft, 4 AWG=46ft, 2 AWG=73ft, 1/0 AWG=116ft. 24V is the sweet spot: manageable wire sizes for most home-scale off-grid."}, {"sym": "WIRE_GAUGE_48V", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "WIRE GAUGE TABLE for 48V DC at 3% voltage drop (one-way distance in feet). 10A: 14 AWG=46ft, 12 AWG=73ft, 10 AWG=115ft, 8 AWG=182ft, 6 AWG=290ft. 20A: 12 AWG=36ft, 10 AWG=57ft, 8 AWG=91ft, 6 AWG=145ft, 4 AWG=230ft. 30A: 10 AWG=38ft, 8 AWG=60ft, 6 AWG=96ft, 4 AWG=153ft. 50A: 8 AWG=36ft, 6 AWG=58ft, 4", "fullNote": "WIRE GAUGE TABLE for 48V DC at 3% voltage drop (one-way distance in feet). 10A: 14 AWG=46ft, 12 AWG=73ft, 10 AWG=115ft, 8 AWG=182ft, 6 AWG=290ft. 20A: 12 AWG=36ft, 10 AWG=57ft, 8 AWG=91ft, 6 AWG=145ft, 4 AWG=230ft. 30A: 10 AWG=38ft, 8 AWG=60ft, 6 AWG=96ft, 4 AWG=153ft. 50A: 8 AWG=36ft, 6 AWG=58ft, 4 AWG=92ft, 2 AWG=146ft. 48V systems run on much thinner (cheaper) wire — the #1 cost advantage of higher voltage."}, {"sym": "VOLTAGE_DROP_FORMULA", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "VOLTAGE DROP FORMULA: V_drop = 2 × R_per_1000ft × (L/1000) × I. Where R_per_1000ft at 20°C: 10 AWG=1.0Ω, 8 AWG=0.63Ω, 6 AWG=0.40Ω, 4 AWG=0.25Ω, 2 AWG=0.16Ω, 1/0 AWG=0.10Ω, 2/0 AWG=0.08Ω. Multiply by 2 for round-trip. Add 20% for 50°C conductor temp. Target: <3% voltage drop for feeders, <2% for batt", "fullNote": "VOLTAGE DROP FORMULA: V_drop = 2 × R_per_1000ft × (L/1000) × I. Where R_per_1000ft at 20°C: 10 AWG=1.0Ω, 8 AWG=0.63Ω, 6 AWG=0.40Ω, 4 AWG=0.25Ω, 2 AWG=0.16Ω, 1/0 AWG=0.10Ω, 2/0 AWG=0.08Ω. Multiply by 2 for round-trip. Add 20% for 50°C conductor temp. Target: <3% voltage drop for feeders, <2% for battery-inverter. Example: 20A on 10 AWG, 50ft one-way: 2 × 1.0/1000 × 50 × 20 = 2.0V. On 12V system = 16.7% — UNACCEPTABLE. Same on 48V = 4.2% — marginal. High voltage wins."}, {"sym": "LEAD_ACID_BATTERY", "price": 130, "range": "$100-180", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Flooded deep-cycle lead-acid battery. Crown CR-100 (100Ah, $130, 12V, 63 lbs). Trojan T-105 (225Ah 6V, $160-200 each, need 2 for 12V = $320-400 for 225Ah). Rolls/Surrette (premium, 4000 series, $300-400 per 6V 225Ah — 15-20 year life). Technology: liquid sulfuric acid electrolyte, thick lead plates ", "fullNote": "Flooded deep-cycle lead-acid battery. Crown CR-100 (100Ah, $130, 12V, 63 lbs). Trojan T-105 (225Ah 6V, $160-200 each, need 2 for 12V = $320-400 for 225Ah). Rolls/Surrette (premium, 4000 series, $300-400 per 6V 225Ah — 15-20 year life). Technology: liquid sulfuric acid electrolyte, thick lead plates for deep cycling (vs thin plates in starter batteries). Requires: regular watering with DISTILLED water only (minerals in tap water poison the chemistry), equalization charging monthly (controlled overcharge at 15.5-16.5V for 12V nominal — stirs electrolyte, removes sulfation), ventilation (produces hydrogen gas — explosion risk if enclosed). DoD limit: 50% max (discharging below kills battery — sulfation hardens on plates, permanent capacity loss). Cycle life: 300-500 cycles at 50% DoD. Advantage: cheapest upfront ($1.00-1.80/Ah), proven technology (150+ years), recyclable (99% recycling rate — highest of any product), forgiving of charge voltage variations. Disadvantage: HIGHEST lifetime cost (replace 4-6× more often than LiFePO4), maintenance burden, cannot be installed indoors without ventilation, heavy (63+ lbs per 100Ah), temperature-sensitive (capacity drops in cold). Panama: flooded batteries work fine but need DISTILLED water — source reliably (auto parts stores, pharmacies, or DIY solar still). Check water level monthly, more in hot weather. Use only distilled — tap water minerals permanently reduce capacity."}, {"sym": "AGM_BATTERY", "price": 200, "range": "$170-260", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "AGM (Absorbent Glass Mat) sealed lead-acid battery. UPG 100Ah ($200, 12V, 66 lbs). VMAXTANKS 100Ah ($220-260, military-grade). Renogy 100Ah AGM ($190-210). Technology: fiberglass mat between lead plates absorbs electrolyte (starved electrolyte design) — no free liquid acid. Valve-regulated (VRLA): p", "fullNote": "AGM (Absorbent Glass Mat) sealed lead-acid battery. UPG 100Ah ($200, 12V, 66 lbs). VMAXTANKS 100Ah ($220-260, military-grade). Renogy 100Ah AGM ($190-210). Technology: fiberglass mat between lead plates absorbs electrolyte (starved electrolyte design) — no free liquid acid. Valve-regulated (VRLA): pressure relief valve releases gas only if overcharged (normally sealed). Advantages vs flooded: no watering, no acid spills, can mount in any orientation (except upside down), lower self-discharge (1-3%/month vs 3-20% flooded), better vibration resistance, faster charging (lower internal resistance). Disadvantages vs flooded: more expensive per Ah ($1.70-2.60/Ah vs $1.00-1.80/Ah for flooded), still limited to 50% DoD (400-600 cycles), shorter lifespan than LiFePO4, heavy (66 lbs per 100Ah). Charge profile: bulk 14.4-14.6V, absorption 14.2-14.4V, float 13.5-13.8V. DO NOT EQUALIZE (sealed — equalization over-pressurizes and vents gas permanently reducing capacity). Temperature compensation: -4mV/°C/cell recommended. Life: 4-7 years depending on depth of discharge and temperature. Best for: indoor installations (no hydrogen venting), RVs, boats, backup power where maintenance access is difficult. Panama: good indoor option for battery bank in living space. In coastal salt air: terminals corrode faster — use dielectric grease, inspect quarterly."}, {"sym": "LIFEPO4_DROPIN", "price": 350, "range": "$250-380", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Pre-assembled LiFePO4 (Lithium Iron Phosphate) battery — the modern standard for off-grid. Renogy 100Ah ($350, 12.8V, 1280Wh, 26 lbs, Group 24 size). LiTime/Ampere Time 100Ah ($250-280, Amazon bestseller). Battle Born 100Ah ($800, made in USA, 10yr warranty — premium). SOK 100Ah ($400, metal case, s", "fullNote": "Pre-assembled LiFePO4 (Lithium Iron Phosphate) battery — the modern standard for off-grid. Renogy 100Ah ($350, 12.8V, 1280Wh, 26 lbs, Group 24 size). LiTime/Ampere Time 100Ah ($250-280, Amazon bestseller). Battle Born 100Ah ($800, made in USA, 10yr warranty — premium). SOK 100Ah ($400, metal case, serviceable). Cycle life: 2000-5000 cycles to 80% capacity (vs 300-500 for lead-acid). Usable capacity: 80-100% of rated Ah (vs 50% for lead-acid) — a 100Ah LiFePO4 delivers 80-100Ah usable vs 50Ah for lead-acid. Internal BMS protects: over-voltage (3.65V/cell), under-voltage (2.5V/cell), over-current, short circuit, temperature. Weight: 23-28 lbs — 1/3 the weight of equivalent lead-acid. Charge: CC-CV to 14.2-14.6V, float 13.5-13.8V. NO equalization. CANNOT charge below 0°C (32°F) — permanent damage. CAN discharge below freezing. Bluetooth models (LiTime BT, $300) show cell voltages and SOC on phone. Parallel: up to 4 in parallel without issues. Series: check manufacturer — some support 4S for 48V. Panama: the heat is fine (operating range up to 45°C), but DO NOT store in direct sun. Install in shaded, ventilated enclosure. Ideal charge rate: 0.2-0.5C (20-50A per 100Ah). Can accept 1C (100A) briefly. Pair with MPPT_LITHIUM controller preset."}, {"sym": "LIFEPO4_DIY", "price": 200, "range": "$140-240", "unit": "USD", "conf": "medium", "safety": false, "cat": "⚡ Electricity", "note": "Build your own LiFePO4 battery from prismatic cells + BMS. Cells: EVE LF100 (100Ah, $55-70 each), CALB CA100 (100Ah, $60-80), Lishen 272Ah ($110-140 each from China). Need 4 cells in series for 12V (12.8V nominal). Total cell cost: $220-320 for 100Ah, $440-560 for 272Ah. BMS (Battery Management Syst", "fullNote": "Build your own LiFePO4 battery from prismatic cells + BMS. Cells: EVE LF100 (100Ah, $55-70 each), CALB CA100 (100Ah, $60-80), Lishen 272Ah ($110-140 each from China). Need 4 cells in series for 12V (12.8V nominal). Total cell cost: $220-320 for 100Ah, $440-560 for 272Ah. BMS (Battery Management System): DALY 4S 100A ($50-80, basic), JBD Smart BMS 4S 120A with Bluetooth ($80-120), JK BMS 4S 150A with active balancing ($100-150, best). BMS protects: overcharge (3.65V/cell), over-discharge (2.5V/cell), over-current, short circuit, cell imbalance. Assembly: compress cells with threaded rod + plywood end plates (cells expand during charge — uncompressed cells lose capacity faster). Torque terminals to mfr spec (4-6 Nm — aluminum strips easily!). Use busbars supplied with cells. Balance cells before assembly: connect all in parallel, charge to 3.6V, let sit 24 hours. Top-balance is critical for first assembly. Total cost for 100Ah/12V: $270-400 (cells + BMS + hardware) vs $350 for drop-in. BUT you get: better cells (often EV-grade), serviceable (replace individual cells), active balancing (if you choose JK BMS), full control over charge parameters. Risk: no warranty, incorrect assembly can destroy cells or cause fire. For experienced DIYers only. Success rate: 90%+ if you follow instructions. Panama: ship cells via sea freight (slow but cheap), or buy from US stock (faster but $20-30 more per cell)."}, {"sym": "SODIUM_ION", "price": 400, "range": "$300-600", "unit": "USD", "conf": "medium", "safety": false, "cat": "⚡ Electricity", "note": "Sodium-ion (Na-ion) battery — emerging 2025-2026 technology. Chemistry: uses abundant sodium instead of scarce lithium (sodium is 1000× more abundant in earth's crust). No cobalt, no nickel, no lithium — supply chain independent. Energy density: 100-160 Wh/kg (vs LiFePO4 90-172 Wh/kg — comparable). ", "fullNote": "Sodium-ion (Na-ion) battery — emerging 2025-2026 technology. Chemistry: uses abundant sodium instead of scarce lithium (sodium is 1000× more abundant in earth's crust). No cobalt, no nickel, no lithium — supply chain independent. Energy density: 100-160 Wh/kg (vs LiFePO4 90-172 Wh/kg — comparable). Cycle life: 2,000-4,000 cycles (less than LiFePO4's 3,000-5,000 but far better than lead-acid). KEY ADVANTAGE: excellent LOW-TEMPERATURE performance — operates at -20°C (-4°F) without capacity loss, charges safely at -10°C (14°F). LiFePO4 CANNOT charge below 0°C. This is game-changing for cold-climate off-grid. Voltage: 2.0-3.9V per cell (wider than LiFePO4's 2.5-3.65V) — needs different BMS parameters. Manufacturers: CATL (world's largest battery maker, mass-producing Na-ion since 2024), BYD, HiNa Battery. Current availability: limited — mostly in China, just entering Western markets in 2026. Pricing: targeting $40-60/kWh at scale (vs LiFePO4 $80-120/kWh). For off-grid: promising but not yet widely available in Western retail channels. Watch for: Bluetti, EcoFlow, and other power station brands adopting Na-ion in 2026-2027. Panama: cold performance is irrelevant (no freezing), but sodium abundance means potentially cheaper batteries long-term. Hold off buying until widely available and tested."}, {"sym": "BATTERY_CABLE", "price": 8, "range": "$5-25", "unit": "USD", "conf": "high", "safety": true, "cat": "⚡ Electricity", "note": "Fine-stranded welding/battery cable per foot. 2 AWG ~$5/ft, 1/0 AWG ~$8/ft, 2/0 AWG ~$10/ft, 4/0 AWG ~$15/ft. Use Class K or M stranding for flexibility. THHN is too stiff for battery connections. Size for inverter SURGE current (3000W inverter at 24V: 278A surge needs 2/0 AWG for <6ft run). Keep ba", "fullNote": "Fine-stranded welding/battery cable per foot. 2 AWG ~$5/ft, 1/0 AWG ~$8/ft, 2/0 AWG ~$10/ft, 4/0 AWG ~$15/ft. Use Class K or M stranding for flexibility. THHN is too stiff for battery connections. Size for inverter SURGE current (3000W inverter at 24V: 278A surge needs 2/0 AWG for <6ft run). Keep battery cables as short as physically possible (max 10ft one-way). Color code: red=positive, black=negative. NEVER use black for positive."}, {"sym": "BATTERY_SERIES_WIRING", "price": 30, "range": "$20-60", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Series jumper cables: 2 AWG custom-cut interconnects ~$15-30/pair. Wiring batteries in series: positive of battery 1 to negative of battery 2. Voltage adds (12V+12V=24V, 4x12V=48V), Ah stays same. All batteries MUST be identical: chemistry, capacity, age, brand. Tighten terminals to 6-8 Nm (50-70 in", "fullNote": "Series jumper cables: 2 AWG custom-cut interconnects ~$15-30/pair. Wiring batteries in series: positive of battery 1 to negative of battery 2. Voltage adds (12V+12V=24V, 4x12V=48V), Ah stays same. All batteries MUST be identical: chemistry, capacity, age, brand. Tighten terminals to 6-8 Nm (50-70 in-lb). Label each battery position (B1, B2...). Torque specs: flooded lead-acid 6-8 Nm, AGM 8-10 Nm, LiFePO4 follow manufacturer spec precisely."}, {"sym": "BATTERY_PARALLEL_WIRING", "price": 50, "range": "$30-100", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Parallel cables + busbar setup. Amp-hours add, voltage stays same. Use BUS BAR topology (each battery wired independently to common busbars, equal cable lengths) — NOT daisy-chain (causes unequal current sharing, end batteries fail first). Cable size per battery: total load amps ÷ number of batterie", "fullNote": "Parallel cables + busbar setup. Amp-hours add, voltage stays same. Use BUS BAR topology (each battery wired independently to common busbars, equal cable lengths) — NOT daisy-chain (causes unequal current sharing, end batteries fail first). Cable size per battery: total load amps ÷ number of batteries × 1.25 safety. Fuse each battery at positive terminal (MRBF recommended). Max 4 parallel strings recommended without active balancing."}, {"sym": "BATTERY_ENCLOSURE", "price": 150, "range": "$40-500", "unit": "USD", "conf": "high", "safety": true, "cat": "⚡ Electricity", "note": "Battery enclosure/protection. Flooded lead-acid: MUST have vented enclosure — hydrogen gas is lighter than air and explosive at 4-75% concentration. Vents at top of enclosure to outside. NOCO battery boxes ($30-55, Group 24-31 size): vented, acid-resistant plastic, strap-down base. For larger banks:", "fullNote": "Battery enclosure/protection. Flooded lead-acid: MUST have vented enclosure — hydrogen gas is lighter than air and explosive at 4-75% concentration. Vents at top of enclosure to outside. NOCO battery boxes ($30-55, Group 24-31 size): vented, acid-resistant plastic, strap-down base. For larger banks: build plywood box with passive roof vent or 12V fan (spark-proof marine bilge fan, $25-40) on timer. LiFePO4: sealed, no hydrogen — simpler enclosure. Needs: protection from physical damage, temperature management (0-40°C operating, 15-35°C optimal), rodent protection (mice chew wires — use 1/4\" hardware cloth). NEMA enclosures: 3R (outdoor rain-shedding, $250-450 for 24×24×8\"), 4X (fiberglass, coastal corrosion-proof, $350-550). INDOOR: install near charge controller/inverter, accessible for maintenance, on non-flammable surface (concrete board or metal). OUTDOOR: shade from direct sun (heat reduces life), elevated above flood level, secure against theft. Panama: outdoor enclosures must be NEMA 4X or marine-grade for coastal salt air. Install temperature monitoring (wireless sensor to phone). Fire safety: smoke detector above battery bank, Class D fire extinguisher nearby, clear escape path. Label enclosure: 'BATTERY BANK — DC VOLTAGE — DATE INSTALLED'."}, {"sym": "BATTERY_HEATER", "price": 45, "range": "$25-120", "unit": "USD", "conf": "medium", "safety": false, "cat": "⚡ Electricity", "note": "Battery warming system for LiFePO4. CRITICAL: LiFePO4 cells are PERMANENTLY DAMAGED if charged below 0°C (32°F) — lithium ions plate onto anode as metal instead of intercalating, reducing capacity and creating internal short risk. Can DISCHARGE safely down to -20°C (-4°F). System components: silicon", "fullNote": "Battery warming system for LiFePO4. CRITICAL: LiFePO4 cells are PERMANENTLY DAMAGED if charged below 0°C (32°F) — lithium ions plate onto anode as metal instead of intercalating, reducing capacity and creating internal short risk. Can DISCHARGE safely down to -20°C (-4°F). System components: silicone heating pad (Kat's 24150, 150W, 11×15\", $45-60), temperature controller (Inkbird ITC-1000 12V, $15-25), insulation wrap (reflective foam, $15-25). Controller settings: ON at 5°C (41°F), OFF at 10°C (50°F). Power draw: heater runs intermittently — in well-insulated enclosure, may run 25-50% duty cycle (36-72 Wh/day per 100Ah battery). Alternative: battery warming mat inside insulated box, thermostat outlet. Integrated heaters: Battle Born BBEBH external heater kit ($80-120), Relion Low-Temperature series (built-in heater), Discover AES rackmount (built-in). Panama: NOT NEEDED below 2000m elevation — temperatures never approach freezing. Only needed for highland installations >2000m in Chiriqui province (Boquete, Volcan, Cerro Punta areas) where overnight temps occasionally drop to 5-10°C (still above freezing but approaching). For Panama lowlands: skip this — spend budget on cooling/ventilation instead (batteries degrade faster in sustained heat >35°C)."}, {"sym": "TEMP_CONTROLLER", "price": 25, "range": "$10-45", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Inkbird ITC-1000 12V/24V digital thermostat ~$15-25. Bayite BTC211 12V thermostat ~$10-18. Turns battery heater on below setpoint (typically 5°C/41°F), off above (typically 10°C/50°F). Dual-output models can also control cooling fans for hot climates. Place temperature probe on battery case, not amb", "fullNote": "Inkbird ITC-1000 12V/24V digital thermostat ~$15-25. Bayite BTC211 12V thermostat ~$10-18. Turns battery heater on below setpoint (typically 5°C/41°F), off above (typically 10°C/50°F). Dual-output models can also control cooling fans for hot climates. Place temperature probe on battery case, not ambient air. Inkbird ITC-308 for 110V AC heater control ~$35-45."}, {"sym": "BMS_UNIT", "price": 80, "range": "$50-150", "unit": "USD", "conf": "medium", "safety": true, "cat": "⚡ Electricity", "note": "Battery Management System (BMS) — ESSENTIAL for LiFePO4 battery protection. Functions: (1) Over-voltage protection: disconnects charging if any cell exceeds 3.65V (damage threshold). (2) Under-voltage protection: disconnects load if any cell drops below 2.5V. (3) Over-current/short circuit: disconne", "fullNote": "Battery Management System (BMS) — ESSENTIAL for LiFePO4 battery protection. Functions: (1) Over-voltage protection: disconnects charging if any cell exceeds 3.65V (damage threshold). (2) Under-voltage protection: disconnects load if any cell drops below 2.5V. (3) Over-current/short circuit: disconnects in microseconds. (4) Cell balancing: passive (burns excess voltage from highest cell as heat — common in budget BMS) or active (transfers charge from high cells to low cells — JK BMS, $100-150). (5) Temperature protection: disconnects if battery temp exceeds safe range. BMS sizing: rated current must handle your MAX continuous load × 1.25. 1000W inverter at 12V = 83A × 1.25 = 104A → use 120A BMS. DALY 4S 100A ($50-80): popular budget option, reliable, passive balancing, no Bluetooth. JBD/Overkill Solar 4S 120A ($110-140): tested in US market, Bluetooth app shows cell voltages, configurable parameters. JK BMS 4S 150A ($100-150): active balancing, Bluetooth, best value. Wiring: BMS connects between battery negative and system negative (common port design). POSITIVE stays direct. NEVER bypass BMS for high-current loads — that's the protection you're paying for. Mount BMS on non-flammable surface (aluminum plate as heatsink). Panama: JBD with Bluetooth recommended — monitor cell balance from phone without opening enclosure."}, {"sym": "PWM_CONTROLLER", "price": 25, "range": "$15-40", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "PWM (Pulse Width Modulation) charge controller. Renogy Wanderer 20A ($30). How it works: electronic switch rapidly connects/disconnects panel to battery — as battery nears full, pulse width shortens to limit average current. No voltage conversion — panel voltage pulled down to battery voltage, exces", "fullNote": "PWM (Pulse Width Modulation) charge controller. Renogy Wanderer 20A ($30). How it works: electronic switch rapidly connects/disconnects panel to battery — as battery nears full, pulse width shortens to limit average current. No voltage conversion — panel voltage pulled down to battery voltage, excess voltage dissipated as heat. Efficiency: 70-80% (vs 95-99% MPPT). When PWM makes sense: systems under 200W, panel Vmp closely matches battery voltage (18V panel on 12V battery), budget primary constraint ($15-40 vs $100+), consistently hot climates (heat reduces panel voltage, shrinking MPPT advantage), simple applications (garden lights, small sheds, trickle charging). When PWM is WRONG: >400W systems, modern residential panels (Vmp 30-40V on 12V battery = 40%+ losses), cold climates (higher panel voltage = more wasted), lithium batteries (need precise multi-stage charging). Using a 24V panel on 12V PWM: panel pulled to 14V, 30V-14V=16V wasted = ~53% efficiency — you're throwing away half your power. Source: 35KB research synthesis (my-new-project), SRNE/SolaX/DIY Solar Forum consensus."}, {"sym": "MPPT_CONTROLLER", "price": 130, "range": "$100-180", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Victron SmartSolar MPPT 75/15 ($120). MPPT technology: DC-DC buck converter with microprocessor that continuously hunts Maximum Power Point on PV I-V curve. Efficiency: 98% peak (Victron documented), 95-99% typical for quality MPPT. Harvests 15-30% MORE energy vs PWM from same array. How: PWM direct", "fullNote": "Victron SmartSolar MPPT 75/15 ($120). MPPT technology: DC-DC buck converter with microprocessor that continuously hunts Maximum Power Point on PV I-V curve. Efficiency: 98% peak (Victron documented), 95-99% typical for quality MPPT. Harvests 15-30% MORE energy vs PWM from same array. How: PWM directly connects panel to battery — panel voltage pulled down to battery voltage, excess lost as heat (70-80% efficient). MPPT converts excess voltage into additional charging current via buck converter. Real example: 100W panel Vmp=18V charging 12V battery at 14V. PWM: 14V×5.55A=77.7W (22% lost). MPPT: 18V×5.55A=99.9W input → converts to 14V×6.4A=89.6W (10% conversion loss, net 15% GAIN over PWM). MPPT advantages: accepts higher PV voltage (75-450V) → series-wire panels → lower current → smaller wire gauge → cost savings. Cold climates: panels produce higher voltage in cold — MPPT captures surplus, PWM wastes it. Partial shading: MPPT can find secondary power peak. PWM only acceptable: <200W systems, budget under $500, '12V nominal' panels only, no expansion planned. Source: 35KB research synthesis (my-new-project), Victron specs, cross-referenced Leonics/SRNE/SolaX."}, {"sym": "MPPT_100_20", "price": 145, "range": "$120-180", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Victron SmartSolar 100/20 ~$140-160. 100V max PV input, 20A charge. Pairs: 290W at 12V, 580W at 24V, 1160W at 48V. Ideal for 2x 100W panels in series (40-44V Vmp) on 12V battery. Or 1x large 350W residential panel (40V Vmp) on 12V. 5-year warranty. VE.Smart Networking — wireless sync with other Vict", "fullNote": "Victron SmartSolar 100/20 ~$140-160. 100V max PV input, 20A charge. Pairs: 290W at 12V, 580W at 24V, 1160W at 48V. Ideal for 2x 100W panels in series (40-44V Vmp) on 12V battery. Or 1x large 350W residential panel (40V Vmp) on 12V. 5-year warranty. VE.Smart Networking — wireless sync with other Victron devices."}, {"sym": "MPPT_100_30", "price": 255, "range": "$200-320", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Victron SmartSolar MPPT 100/30 ($255). THE most popular off-grid controller. Specs: 100V max PV input, 30A max charge current. Power rating: 440W at 12V, 880W at 24V, 1760W at 48V. 98% peak efficiency. Built-in Bluetooth — VictronConnect app shows real-time: PV voltage/current/power, battery voltage", "fullNote": "Victron SmartSolar MPPT 100/30 ($255). THE most popular off-grid controller. Specs: 100V max PV input, 30A max charge current. Power rating: 440W at 12V, 880W at 24V, 1760W at 48V. 98% peak efficiency. Built-in Bluetooth — VictronConnect app shows real-time: PV voltage/current/power, battery voltage/current, daily yield (kWh), historical data (30 days). Features: automatic battery voltage detection (12/24/48V), LiFePO4 preset (14.2V absorb, 13.6V float), programmable streetlight function (load output turns on at dusk, off at dawn or timer), VE.Smart Networking (wireless sync with BMV-712 for temperature and voltage compensation). Installation: mount vertically on non-flammable surface, leave 4\" clearance top/bottom for cooling. Wire: 6 AWG from controller to battery (30A at 10ft). 10 AWG PV input (up to 35A Isc). PV terminals accept up to 6 AWG. Fuse: 40A on battery side. Dimensions: 5.1×7.3×2.4\", 2.9 lbs. 5-year warranty. Over-panel safely by 30% — controller current-limits. Pair with: 4×100W panels (2S2P, 400W) on 12V battery. Or 2×350W residential panels in series on 24V."}, {"sym": "MPPT_100_50", "price": 320, "range": "$270-380", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Victron SmartSolar 1 0W (350V), 8× 400W (400V — near limit), 10× 100W (220V), 6× 450W (300V). Each tracker independent — can have different string lengths and orientations. For 5kW+ systems. Wire gauge: 12 AWG sufficient for 10A at 400V over 300ft. Requires professional install — high voltage DC is lethal."}, {"sym": "PAIR_12V_100W", "price": 120, "range": "$100-150", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "PAIRING: 1x100W panel + Victron 75/15 MPPT + 12V 100Ah LiFePO4 battery. Panel Vmp~18V, controller min input 17V — works. Daily harvest: 300-500 Wh. Wire: 10 AWG PV wire for <30ft run. Fuse: 15A between controller and battery. Good for: LED lights, phone charging, small DC fan. Entry-level off-grid s", "fullNote": "PAIRING: 1x100W panel + Victron 75/15 MPPT + 12V 100Ah LiFePO4 battery. Panel Vmp~18V, controller min input 17V — works. Daily harvest: 300-500 Wh. Wire: 10 AWG PV wire for <30ft run. Fuse: 15A between controller and battery. Good for: LED lights, phone charging, small DC fan. Entry-level off-grid starter. Total cost (panel+controller+battery): ~$580."}, {"sym": "PAIR_12V_400W", "price": 255, "range": "$200-320", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "PAIRING: 4x100W panels (2S2P, 40V@10A) + Victron 100/30 MPPT + 12V 200Ah LiFePO4 bank. Controller sees 40V Vmp, easily > 17V minimum. Daily harvest: 1.2-2.0 kWh. Wire: 10 AWG from array to controller (<50ft). Fuse: 40A between controller and battery. Battery: 2x 100Ah in parallel via busbar (not dai", "fullNote": "PAIRING: 4x100W panels (2S2P, 40V@10A) + Victron 100/30 MPPT + 12V 200Ah LiFePO4 bank. Controller sees 40V Vmp, easily > 17V minimum. Daily harvest: 1.2-2.0 kWh. Wire: 10 AWG from array to controller (<50ft). Fuse: 40A between controller and battery. Battery: 2x 100Ah in parallel via busbar (not daisy-chain). Runs: DC fridge, lights, laptop, water pump. Classic small-cabin setup."}, {"sym": "PAIR_24V_800W", "price": 320, "range": "$270 roller (RS 450/100 takes 4 inputs). Multiple orientations possible with RS model's 4 trackers. ", "fullNote": "PAIRING: 16x350W panels (8S2P or 4S4P) + Victron RS 450/100 or 2x 150/85 in parallel + 48V 400Ah LiFePO4 bank. 5600W array. Daily harvest: 22-35 kWh. Wire: 10 AWG per string to combiner, then 4 AWG to controller (RS 450/100 takes 4 inputs). Multiple orientations possible with RS model's 4 trackers. Fuse: 125A Class-T on battery. Runs: large home, workshop, well pump, all appliances. True energy independence."}, {"sym": "BUSBAR_KIT", "price": 35, "range": "$20-60", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Blue Sea safety hub 150A busbar + fuse holders ~$30-$50. Central power distribution point for all 12V/24V DC circuits. Marine-grade tinned copper resists corrosion. Prevents loose connections that cause fires (the #1 cause of off-grid electrical fires). Add ANL/MEGA fuses on each branch at 125% of e", "fullNote": "Blue Sea safety hub 150A busbar + fuse holders ~$30-$50. Central power distribution point for all 12V/24V DC circuits. Marine-grade tinned copper resists corrosion. Prevents loose connections that cause fires (the #1 cause of off-grid electrical fires). Add ANL/MEGA fuses on each branch at 125% of expected load. Use color-coded wiring (red=positive, black=negative)."}, {"sym": "DC_LOAD_CENTER", "price": 80, "range": "$50-150", "unit": "USD", "conf": "medium", "safety": false, "cat": "⚡ Electricity", "note": "Blue Sea 5025 ST Blade Fuse Block 6-circuit ~$40-50. Blue Sea 5026 12-circuit ~$55-70. DIN rail enclosure with DC breakers ~$100-150. Central panel for DC branch circuits. Each circuit: own fuse/breaker sized at 125% of load. Typical layout: LED lights (15A, 14 AWG), USB outlets (20A, 12 AWG), water", "fullNote": "Blue Sea 5025 ST Blade Fuse Block 6-circuit ~$40-50. Blue Sea 5026 12-circuit ~$55-70. DIN rail enclosure with DC breakers ~$100-150. Central panel for DC branch circuits. Each circuit: own fuse/breaker sized at 125% of load. Typical layout: LED lights (15A, 14 AWG), USB outlets (20A, 12 AWG), water pump (20A, 12 AWG), DC fridge (30A, 10 AWG), fans (15A, 14 AWG). Positive busbar feeds breakers; negative returns to common negative busbar."}, {"sym": "DCDC_CONVERTER", "price": 75, "range": "$50-140", "unit": "USD", "conf": "medium", "safety": false, "cat": "⚡ Electricity", "note": "Victron Orion-Tr isolated DC-DC converter ~$130. Converts one DC voltage to another (e.g., 12V to 24V, 24V to 12V, or 12V to 5V USB). Isolated models protect sensitive equipment from ground loops. Non-isolated are cheaper but less safe. Critical for vehicle charging (alternator to house battery) — p", "fullNote": "Victron Orion-Tr isolated DC-DC converter ~$130. Converts one DC voltage to another (e.g., 12V to 24V, 24V to 12V, or 12V to 5V USB). Isolated models protect sensitive equipment from ground loops. Non-isolated are cheaper but less safe. Critical for vehicle charging (alternator to house battery) — prevents overcharging and provides proper charge profile."}, {"sym": "DC_CIRCUIT_LED", "price": 30, "range": "$15-50", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "12V LED lighting circuit: 14-16 AWG wire, 15A fuse, DC-rated switch. LED lights draw minimal current (0.1-0.5A per fixture) — voltage drop is the real concern. Keep under 3% drop: 14 AWG max 23ft at 5A (24V) or 11ft (12V). Use DC-rated switches ONLY — AC switches arc and weld on DC. PWM dimmers are ", "fullNote": "12V LED lighting circuit: 14-16 AWG wire, 15A fuse, DC-rated switch. LED lights draw minimal current (0.1-0.5A per fixture) — voltage drop is the real concern. Keep under 3% drop: 14 AWG max 23ft at 5A (24V) or 11ft (12V). Use DC-rated switches ONLY — AC switches arc and weld on DC. PWM dimmers are DC-compatible. Wire in parallel (not series) so each light operates independently."}, {"sym": "DC_CIRCUIT_USB", "price": 25, "range": "$15-40", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "12V USB charging circuit: 12 AWG wire, 20A fuse, quality USB outlet panel ~$15-25. Internal buck converter drops 12V to 5V USB. BEWARE: cheap USB outlets draw 20-50mA constantly (vampire load = 5-12 Wh/day). Quality units (Blue Sea, Scanstrut) draw <5mA standby. Wire each outlet location as a home r", "fullNote": "12V USB charging circuit: 12 AWG wire, 20A fuse, quality USB outlet panel ~$15-25. Internal buck converter drops 12V to 5V USB. BEWARE: cheap USB outlets draw 20-50mA constantly (vampire load = 5-12 Wh/day). Quality units (Blue Sea, Scanstrut) draw <5mA standby. Wire each outlet location as a home run back to the DC load center. Multiple outlets can share a circuit if total load < 80% of fuse rating."}, {"sym": "DC_CIRCUIT_PUMP", "price": 35, "range": "$20-60", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "12V water pump circuit: 12 AWG minimum wire, 20-30A fuse/breaker. Pump surge current 2-3x running — size wire for surge, not running. Wire pump as close to battery/distribution as practical (shortest run). Pressure switch wiring must handle pump inrush. Example: Shurflo 12V pump draws 4-8A running, ", "fullNote": "12V water pump circuit: 12 AWG minimum wire, 20-30A fuse/breaker. Pump surge current 2-3x running — size wire for surge, not running. Wire pump as close to battery/distribution as practical (shortest run). Pressure switch wiring must handle pump inrush. Example: Shurflo 12V pump draws 4-8A running, 12-20A surge — 12 AWG handles 20A up to 18ft at 12V. For longer runs, go to 10 AWG."}, {"sym": "INVERTER_12V_LIMIT", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "INVERTER CURRENT AT 12V — why you shouldn't go past 2000W on 12V. 1000W inverter draws 100A at 12V (83A with 90% eff). 2000W draws 200A. 3000W draws 300A — needs 4/0 AWG cable (thick as your thumb) and massive battery bank. The voltage drop on cables becomes unmanageable. Rule: inverters >2000W shou", "fullNote": "INVERTER CURRENT AT 12V — why you shouldn't go past 2000W on 12V. 1000W inverter draws 100A at 12V (83A with 90% eff). 2000W draws 200A. 3000W draws 300A — needs 4/0 AWG cable (thick as your thumb) and massive battery bank. The voltage drop on cables becomes unmanageable. Rule: inverters >2000W should use 24V battery minimum; >4000W should use 48V. This is the single most important voltage decision in system design."}, {"sym": "INVERTER_1500W", "price": 320, "range": "$250-450", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "1500W pure sine wave inverter. Samlex PST-1500-12 ($350-400): premium, 1500W continuous / 3000W surge, 12V input, 90% efficiency, 8W idle draw, remote on/off included, hardwire terminals. Giandel 1500W ($200-250): budget, 3000W surge, 12V, remote control. Krieger 1500W ($180-220): budget, 3000W surg", "fullNote": "1500W pure sine wave inverter. Samlex PST-1500-12 ($350-400): premium, 1500W continuous / 3000W surge, 12V input, 90% efficiency, 8W idle draw, remote on/off included, hardwire terminals. Giandel 1500W ($200-250): budget, 3000W surge, 12V, remote control. Krieger 1500W ($180-220): budget, 3000W surge, LCD display. What 1500W runs: full-size refrigerator (600-800W starting surge, 150W running), LED lights (50W), laptop (65W), TV (100W), phone chargers (25W). NOT simultaneously: microwave (1000W), coffee maker (1200W), toaster (1500W) — any single large load is fine, multiple large loads trip overload. Cable size at 12V: 1500W/12V/0.85 = 147A draw. 2 AWG minimum for <6 ft run, 1/0 AWG for 6-10 ft. Fuse: 175A ANL or 200A Class-T on battery positive. Idle draw matters: Samlex 8W = 192 Wh/day wasted, Giandel 25W = 600 Wh/day. Pay more for low idle draw — it pays back in smaller solar array/battery. PURE SINE vs MODIFIED SINE: anything with a motor (fridge, pump, fan), digital display, or sensitive electronics NEEDS pure sine. Modified sine causes buzzing, overheating, reduced motor life. Just pay for pure sine — it's not that much more and prevents equipment damage."}, {"sym": "INVERTER_3000W", "price": 600, "range": "$450-900", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "3000W pure sine wave inverter. Growatt SPF 3000TL LVM-ES ($650-750): 3000W continuous, 6000W surge, 24V or 48V models, built-in MPPT (120A solar charging), AC charger (60A), transfer switch — an all-in-one unit that replaces separate inverter + controller + charger. Samlex EVO-3012 ($1,200): premium", "fullNote": "3000W pure sine wave inverter. Growatt SPF 3000TL LVM-ES ($650-750): 3000W continuous, 6000W surge, 24V or 48V models, built-in MPPT (120A solar charging), AC charger (60A), transfer switch — an all-in-one unit that replaces separate inverter + controller + charger. Samlex EVO-3012 ($1,200): premium, 3000W 12V, 120A charger. Victron MultiPlus 3000 ($950-1,100): inverter/charger combo with 20ms transfer time. Giandel 3000W ($350-450): budget pure sine, no charger. What 3000W runs SIMULTANEOUSLY: well pump (1500W surge), fridge (600W surge), LED lights (50W), laptop (65W), TV (100W). Peak surge (6000W) handles motor startup. Cable size: 2/0 AWG minimum for 12V (3000W/12V = 250A × 1.25 = 313A). 24V systems: 1 AWG (3000/24 = 125A × 1.25 = 156A). 48V: 4 AWG. Idle consumption: budget inverters 25-40W (600-960 Wh/day WASTED). Premium (Samlex/Victron) 8-20W. This matters — over a year, 30W idle = 262 kWh. Check idle draw specs before buying. Install: within 10ft of batteries (voltage drop), on non-flammable wall, ventilated (some have fans). Remote on/off switch recommended. Panama: protect from humidity and salt air — NEMA 3R enclosure if outdoor, conformal coating on circuit boards recommended for coastal locations."}, {"sym": "INVERTER_CHARGER", "price": 900, "range": "$600-1,500", "unit": "USD", "conf": "medium", "safety": false, "cat": "⚡ Electricity", "note": "Inverter/charger combo unit — the heart of a serious off-grid system. Victron MultiPlus 3000 ($950-1,100): 3000W inverter + 120A charger + automatic transfer switch. Transfer time: <20ms (fast enough computers don't notice). Functions: (1) Inverter mode: DC→AC from batteries. (2) Charger mode: AC→DC", "fullNote": "Inverter/charger combo unit — the heart of a serious off-grid system. Victron MultiPlus 3000 ($950-1,100): 3000W inverter + 120A charger + automatic transfer switch. Transfer time: <20ms (fast enough computers don't notice). Functions: (1) Inverter mode: DC→AC from batteries. (2) Charger mode: AC→DC from grid/generator to charge batteries. (3) PowerAssist: supplements weak grid/generator with battery power during peak loads (unique Victron feature — if generator can only supply 15A but you need 25A momentarily, MultiPlus adds 10A from battery). (4) UPS mode: seamless failover if grid drops. Programmability: configure via VEConfigure software — set charge voltages, input current limit, relay functions, assist boost factors. Generator compatibility: limit AC input to prevent generator overload (crucial — most generators hate being pushed to max). Parallel capable: stack multiple MultiPlus units for 2×/3× power with 3-phase option. Monitoring: add Cerbo GX ($300) for VRM portal access. Compare: Growatt SPF 3000TL LVM ($650-750): all-in-one with MPPT, cheaper, less polished software. Samlex EVO-3012 ($1,200): premium standalone. For off-grid: MultiPlus is the gold standard — reliable, feature-rich, excellent generator integration. Panama: coastal installations use MultiPlus in NEMA 4X enclosure for salt protection."}, {"sym": "MANUAL_TRANSFER", "price": 60, "range": "$25-350", "unit": "USD", "conf": "high", "safety": true, "cat": "⚡ Electricity", "note": "Baomain 63A 2-pole rotary changeover switch ~$25-40 (budget off-grid). Blue Sea 9010 65A AC rotary ~$65-85 (marine-grade). Reliance Controls 310CRK 30A 10-circuit ~$280-350 (whole-house). Manual transfer switches safely isolate inverter and generator/grid — prevents backfeed which can KILL line work", "fullNote": "Baomain 63A 2-pole rotary changeover switch ~$25-40 (budget off-grid). Blue Sea 9010 65A AC rotary ~$65-85 (marine-grade). Reliance Controls 310CRK 30A 10-circuit ~$280-350 (whole-house). Manual transfer switches safely isolate inverter and generator/grid — prevents backfeed which can KILL line workers. Must be break-before-make. Clearly label positions: 'INVERTER' / 'OFF' / 'GENERATOR'. For simple systems, a single-load rotary switch works; for whole-house, use a multi-circuit panel."}, {"sym": "AUTO_TRANSFER", "price": 500, "range": "$120-800", "unit": "USD", "conf": "medium", "safety": true, "cat": "⚡ Electricity", "note": "Generac RXSW100A3 100A automatic transfer switch ~$400-550. Tigo TSS-200-US 200A ATS ~$1,833. Automatically switches from inverter to generator/grid when voltage drops. Includes delay timers to prevent nuisance switching. Required for unattended systems. MOES 50A dual-power ATS ~$80-120 for smaller ", "fullNote": "Generac RXSW100A3 100A automatic transfer switch ~$400-550. Tigo TSS-200-US 200A ATS ~$1,833. Automatically switches from inverter to generator/grid when voltage drops. Includes delay timers to prevent nuisance switching. Required for unattended systems. MOES 50A dual-power ATS ~$80-120 for smaller off-grid/RV use. Must be listed for the application. Some inverter-chargers (Victron MultiPlus) have built-in transfer — no external ATS needed."}, {"sym": "GEN_AUTOSTART", "price": 250, "range": "$200-400", "unit": "USD", "conf": "medium", "safety": false, "cat": "⚡ Electricity", "note": "Magnum ME-AGS-N Automatic Generator Start ~$257. Atkinson GSCM-Mini ~$200-260. Deep Sea DSE 7310 ~$300-400. Automatically starts generator when battery voltage drops below setpoint (and stops when charged). Requires generator with electric start and autochoke. Install CO detector in generator enclos", "fullNote": "Magnum ME-AGS-N Automatic Generator Start ~$257. Atkinson GSCM-Mini ~$200-260. Deep Sea DSE 7310 ~$300-400. Automatically starts generator when battery voltage drops below setpoint (and stops when charged). Requires generator with electric start and autochoke. Install CO detector in generator enclosure. Configure: low-voltage start (e.g., 24.0V for 24V LiFePO4), high-voltage stop (e.g., 28.0V), minimum run time (30 min), cool-down period. Monthly test recommended."}, {"sym": "BATTERY_MONITOR", "price": 110, "range": "$50-130", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Victron BMV-712 SmartShunt ~$120. Precision shunt-based battery monitor: measures voltage, current (A), power (kW), consumed Ah, state of charge (%). Essential for LiFePO4 — voltage alone is a poor indicator of SOC (flat voltage curve). Tracks energy in/out over time. Bluetooth to phone for real-tim", "fullNote": "Victron BMV-712 SmartShunt ~$120. Precision shunt-based battery monitor: measures voltage, current (A), power (kW), consumed Ah, state of charge (%). Essential for LiFePO4 — voltage alone is a poor indicator of SOC (flat voltage curve). Tracks energy in/out over time. Bluetooth to phone for real-time monitoring. Must correctly set battery Ah capacity and Peukert exponent."}, {"sym": "SMART_SHUNT", "price": 135, "range": "$110-160", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Victron SmartShunt 500A ~$130-150. Compact shunt-based monitor without display — all data via Bluetooth phone app. 500A continuous, excellent for larger systems. Also available in 1000A and 2000A versions. Tracks: state of charge, time-to-go, historical data (deepest discharge, last full charge). Op", "fullNote": "Victron SmartShunt 500A ~$130-150. Compact shunt-based monitor without display — all data via Bluetooth phone app. 500A continuous, excellent for larger systems. Also available in 1000A and 2000A versions. Tracks: state of charge, time-to-go, historical data (deepest discharge, last full charge). Optional: add temperature sensor for battery temp monitoring. Simpler than BMV-712 (no display to mount) but same accuracy."}, {"sym": "SYSTEM_MONITOR", "price": 300, "range": "$200-500", "unit": "USD", "conf": "medium", "safety": false, "cat": "⚡ Electricity", "note": "Victron Cerbo GX ~$300. Central communication hub: connects all Victron devices (MPPTs, inverters, BMV) and presents unified dashboard via VRM online portal. Touchscreen optional (GX Touch 50 ~$190). Internet-connected via WiFi or cellular — monitor your system from anywhere. Tracks: solar yield, co", "fullNote": "Victron Cerbo GX ~$300. Central communication hub: connects all Victron devices (MPPTs, inverters, BMV) and presents unified dashboard via VRM online portal. Touchscreen optional (GX Touch 50 ~$190). Internet-connected via WiFi or cellular — monitor your system from anywhere. Tracks: solar yield, consumption, battery SOC, generator runtime, historical graphs. Can send email alerts for low battery, overload, or fault conditions. Competitor: MidNite Solar Birmingham ~$175."}, {"sym": "AC_CHARGER", "price": 150, "range": "$100-220", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "NOCO Genius GEN5X2 dual bank charger ~$150. Charges 12V batteries from grid/generator AC. Smart charger: multi-stage (bulk, absorption, float, maintenance) prevents overcharging. Temperature compensation adjusts voltage. Can recover sulfated lead-acid batteries in some cases. Important to match char", "fullNote": "NOCO Genius GEN5X2 dual bank charger ~$150. Charges 12V batteries from grid/generator AC. Smart charger: multi-stage (bulk, absorption, float, maintenance) prevents overcharging. Temperature compensation adjusts voltage. Can recover sulfated lead-acid batteries in some cases. Important to match charger type to battery chemistry — LiFePO4 needs a specific LiFePO4 profile."}, {"sym": "ALTERNATOR_CHARGER", "price": 180, "range": "$130-260", "unit": "USD", "conf": "medium", "safety": false, "cat": "⚡ Electricity", "note": "Victron Orion-Tr Smart DC-DC charger ~$200. Charges house battery from vehicle alternator while driving. Most alternators don't output proper charging voltage for house batteries (especially LiFePO4 which needs 14.2-14.6V). This unit: boosts alternator voltage, provides proper charge profile, and pr", "fullNote": "Victron Orion-Tr Smart DC-DC charger ~$200. Charges house battery from vehicle alternator while driving. Most alternators don't output proper charging voltage for house batteries (especially LiFePO4 which needs 14.2-14.6V). This unit: boosts alternator voltage, provides proper charge profile, and prevents alternator overheating (current limiting). 12V/12V or 24V/12V models."}, {"sym": "GFPD", "price": 60, "range": "$40-100", "unit": "USD", "conf": "high", "safety": true, "cat": "⚡ Electricity", "note": "Ground Fault Protection Device (GFPD). Many MPPT controllers have built-in (MidNite Classic, Outback FlexMax). External unit ~$60-100 if controller lacks it. A 0.5-1A fuse connects negative busbar to earth ground. Normal: no current flows. Ground fault: current flows through fault to ground, through", "fullNote": "Ground Fault Protection Device (GFPD). Many MPPT controllers have built-in (MidNite Classic, Outback FlexMax). External unit ~$60-100 if controller lacks it. A 0.5-1A fuse connects negative busbar to earth ground. Normal: no current flows. Ground fault: current flows through fault to ground, through fuse, completing circuit — fuse blows and LED/alarm activates. Does NOT clear the fault — array may still be energized. Required by NEC 690.41(B) for roof-mounted systems. Test annually."}, {"sym": "AFCI", "price": 150, "range": "$100-250", "unit": "USD", "conf": "medium", "safety": true, "cat": "⚡ Electricity", "note": "Arc-Fault Circuit Interrupter. Required by NEC 690.11 when DC voltage >80V on/penetrating a building. Detects series arcs (loose connection) and parallel arcs (shorted conductors) by their unique frequency signatures. Built into MidNite Classic controllers. External AFCI devices ~$150-250 for system", "fullNote": "Arc-Fault Circuit Interrupter. Required by NEC 690.11 when DC voltage >80V on/penetrating a building. Detects series arcs (loose connection) and parallel arcs (shorted conductors) by their unique frequency signatures. Built into MidNite Classic controllers. External AFCI devices ~$150-250 for systems using controllers without integrated AFCI. Much more common in grid-tie residential; off-grid ground-mount may be exempt depending on AHJ."}, {"sym": "DISCONNECT_DC", "price": 80, "range": "$65-350", "unit": "USD", "conf": "high", "safety": true, "cat": "⚡ Electricity", "note": "IMO DC disconnect 600VDC 32A rotary switch ~$65-95. Square D HU361RB 30A 600VDC fused disconnect ~$250-350. MUST be DC-rated — AC disconnects don't extinguish DC arcs. Place: between PV array and charge controller (lockable for maintenance). Label clearly: 'PV ARRAY DISCONNECT'. Lockable in OFF posi", "fullNote": "IMO DC disconnect 600VDC 32A rotary switch ~$65-95. Square D HU361RB 30A 600VDC fused disconnect ~$250-350. MUST be DC-rated — AC disconnects don't extinguish DC arcs. Place: between PV array and charge controller (lockable for maintenance). Label clearly: 'PV ARRAY DISCONNECT'. Lockable in OFF position. At eye level, accessible, not obstructed. Required by NEC 690.13 for all PV systems."}, {"sym": "DISCONNECT_AC", "price": 20, "range": "$15-30", "unit": "USD", "conf": "high", "safety": true, "cat": "⚡ Electricity", "note": "Eaton DG221NGB 30A AC disconnect ~$15-25 (Home Depot). Standard pull-out or lever-type disconnect between inverter AC output and the house AC distribution panel. Required for safe inverter maintenance. Fused or non-fused. Weatherproof NEMA 3R enclosure for outdoor mounting. Label: 'INVERTER AC DISCO", "fullNote": "Eaton DG221NGB 30A AC disconnect ~$15-25 (Home Depot). Standard pull-out or lever-type disconnect between inverter AC output and the house AC distribution panel. Required for safe inverter maintenance. Fused or non-fused. Weatherproof NEMA 3R enclosure for outdoor mounting. Label: 'INVERTER AC DISCONNECT'. Also serves as a rapid shutdown initiation point per NEC 690.12."}, {"sym": "FIRE_EXTINGUISHER", "price": 50, "range": "$35-75", "unit": "USD", "conf": "medium", "safety": true, "cat": "⚡ Electricity", "note": "Automatic fire extinguisher ball (Elide Fire ball) ~$50 — activates by heat (deploys dry powder in 3 seconds). Also: standard ABC-rated 5lb extinguisher for battery area. Lithium battery fires require Class D or specific Li-ion extinguishers (water is dangerous on electrical fires). Mount within arm", "fullNote": "Automatic fire extinguisher ball (Elide Fire ball) ~$50 — activates by heat (deploys dry powder in 3 seconds). Also: standard ABC-rated 5lb extinguisher for battery area. Lithium battery fires require Class D or specific Li-ion extinguishers (water is dangerous on electrical fires). Mount within arm's reach of battery bank and charge controller. Critical: lithium fires burn at >600°C and produce HF gas."}, {"sym": "PANEL_CLEANING", "price": 50, "range": "$30-120", "unit": "USD", "conf": "medium", "safety": false, "cat": "⚡ Electricity", "note": "Solar panel cleaning kit: extension pole (6-24ft) ~$40-55, soft brush head ~$15-25, squeegee ~$10-20. Use distilled water (mineral-free) to prevent spotting. Clean when panels are cool (early morning). Dirty panels lose 5-25% output — more in dusty/dry climates. Panama: frequent rain helps self-clea", "fullNote": "Solar panel cleaning kit: extension pole (6-24ft) ~$40-55, soft brush head ~$15-25, squeegee ~$10-20. Use distilled water (mineral-free) to prevent spotting. Clean when panels are cool (early morning). Dirty panels lose 5-25% output — more in dusty/dry climates. Panama: frequent rain helps self-cleaning but algae/mold can grow on edges (tropics). Clean every 3-6 months or when output drops below expected. Do NOT use abrasive cleaners, pressure washers, or walk on panels."}, {"sym": "SNOW_REMOVAL", "price": 50, "range": "$25-65", "unit": "USD", "conf": "medium", "safety": false, "cat": "⚡ Electricity", "note": "Snow Joe SJBLZD 24' roof rake ~$40-65. SnoBrum snow rake ~$25-35. Avalanche! roof rake ~$40-55. Soft foam head won't scratch panels. Snow = zero production. At tilt angles >30°, snow slides off naturally. Heated panel de-icing cables ~$60-100 exist but consume energy you're trying to produce — manua", "fullNote": "Snow Joe SJBLZD 24' roof rake ~$40-65. SnoBrum snow rake ~$25-35. Avalanche! roof rake ~$40-55. Soft foam head won't scratch panels. Snow = zero production. At tilt angles >30°, snow slides off naturally. Heated panel de-icing cables ~$60-100 exist but consume energy you're trying to produce — manual removal is better. Panama relevance: low (tropics) — but applies to highland installations above 2000m."}, {"sym": "TORQUE_WRENCH", "price": 40, "range": "$25-80", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Inch-pound torque wrench 1/4\" drive ~$25-40. Essential for proper terminal tightening. Solar electrical connections have specific torque specs: battery terminals 6-10 Nm (50-90 in-lb), busbar connections 4-6 Nm (35-50 in-lb), circuit breaker terminals per manufacturer. Under-torque causes arcing and", "fullNote": "Inch-pound torque wrench 1/4\" drive ~$25-40. Essential for proper terminal tightening. Solar electrical connections have specific torque specs: battery terminals 6-10 Nm (50-90 in-lb), busbar connections 4-6 Nm (35-50 in-lb), circuit breaker terminals per manufacturer. Under-torque causes arcing and heat; over-torque strips threads or crushes terminals. Re-torque all connections after 24 hours and first full charge cycle, then every 6 months."}, {"sym": "THERMAL_CAMERA", "price": 200, "range": "$150-400", "unit": "USD", "conf": "medium", "safety": false, "cat": "⚡ Electricity", "note": "FLIR ONE smartphone thermal camera ~$200-300. THE best diagnostic tool for off-grid electrical systems. Scan all connections, breakers, fuses, and MC4 connectors under load — hot spots (>few degrees above ambient) indicate loose/corroded connections. Scan panels for hot spots (microcracks). Scan bat", "fullNote": "FLIR ONE smartphone thermal camera ~$200-300. THE best diagnostic tool for off-grid electrical systems. Scan all connections, breakers, fuses, and MC4 connectors under load — hot spots (>few degrees above ambient) indicate loose/corroded connections. Scan panels for hot spots (microcracks). Scan battery terminals for imbalance. Annual thermal inspection catches problems before they become fires. Budget option: infrared thermometer gun ~$25-50 (less detailed but still useful for spot checks)."}, {"sym": "SIZING_SOLAR_ARRAY", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "SOLAR ARRAY SIZING RULE: Daily Wh needed ÷ peak sun hours ÷ 0.7 (system losses). Example: 5000 Wh/day in Panama (4.5 PSH) = 5000 ÷ 4.5 ÷ 0.7 = 1587W array. Round up to nearest panel count. Losses: wire (3%), controller (2-5%), battery round-trip (5-10% for LiFePO4, 15-20% for lead-acid), inverter (5", "fullNote": "SOLAR ARRAY SIZING RULE: Daily Wh needed ÷ peak sun hours ÷ 0.7 (system losses). Example: 5000 Wh/day in Panama (4.5 PSH) = 5000 ÷ 4.5 ÷ 0.7 = 1587W array. Round up to nearest panel count. Losses: wire (3%), controller (2-5%), battery round-trip (5-10% for LiFePO4, 15-20% for lead-acid), inverter (5-10%), dirt (2-5%), temperature derating (5-15%). Total system losses typically 20-30% — the 0.7 factor accounts for this. Add 20% for rainy season autonomy."}, {"sym": "SIZING_BATTERY_BANK", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "BATTERY BANK SIZING: Daily Wh × autonomy days ÷ DoD ÷ system voltage. Example: 5000 Wh/day, 3-day autonomy, 80% DoD LiFePO4, 48V system = 5000 × 3 ÷ 0.8 ÷ 48 = 390 Ah. Round up to 400Ah at 48V = 19.2 kWh storage. Lead-acid at 50% DoD: 5000 × 3 ÷ 0.5 ÷ 48 = 625 Ah (50% larger). Autonomy days: 3 for g", "fullNote": "BATTERY BANK SIZING: Daily Wh × autonomy days ÷ DoD ÷ system voltage. Example: 5000 Wh/day, 3-day autonomy, 80% DoD LiFePO4, 48V system = 5000 × 3 ÷ 0.8 ÷ 48 = 390 Ah. Round up to 400Ah at 48V = 19.2 kWh storage. Lead-acid at 50% DoD: 5000 × 3 ÷ 0.5 ÷ 48 = 625 Ah (50% larger). Autonomy days: 3 for grid-backup, 3-5 for off-grid with generator, 5-7 for pure off-grid no generator. Tropical location (Panama): consider rainy season duration when setting autonomy."}, {"sym": "SIZING_CHARGE_RATE", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "CHARGE RATE SIZING: Controller amps = Array watts ÷ Battery voltage × 1.25. Example: 2100W ÷ 48V × 1.25 = 55A → Victron 150/60 or larger. Minimum charge rate for battery health: lead-acid needs C/10 to C/8 (10-12.5A per 100Ah) to prevent stratification. LiFePO4 can accept C/2 (50A per 100Ah) but C/5", "fullNote": "CHARGE RATE SIZING: Controller amps = Array watts ÷ Battery voltage × 1.25. Example: 2100W ÷ 48V × 1.25 = 55A → Victron 150/60 or larger. Minimum charge rate for battery health: lead-acid needs C/10 to C/8 (10-12.5A per 100Ah) to prevent stratification. LiFePO4 can accept C/2 (50A per 100Ah) but C/5 (20A per 100Ah) is gentler. Undersized array = chronically undercharged batteries = premature failure. Oversize the array — you can always shed excess to dump load."}, {"sym": "SIZING_CABLE", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "CABLE SIZING DECISION TREE: (1) Determine max current (Isc × 1.56 for PV, surge amps for inverter). (2) Measure one-way distance. (3) Calculate minimum AWG for ampacity (NEC 310.16, 75°C column). (4) Calculate AWG for <3% voltage drop. (5) Use the LARGER of the two. (6) Derate for temperature: above", "fullNote": "CABLE SIZING DECISION TREE: (1) Determine max current (Isc × 1.56 for PV, surge amps for inverter). (2) Measure one-way distance. (3) Calculate minimum AWG for ampacity (NEC 310.16, 75°C column). (4) Calculate AWG for <3% voltage drop. (5) Use the LARGER of the two. (6) Derate for temperature: above 30°C, multiply ampacity by 0.91 at 40°C, 0.82 at 50°C. (7) Derate for conduit fill: 4-6 conductors = 80%, 7-9 = 70%. (8) When in doubt, go one size larger — copper is cheaper than replacing burned insulation or lost kWh."}, {"sym": "SOIL_TEST_KIT", "price": 25, "range": "$15-50", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Soil test kit: pH, N-P-K, micronutrients. Test BEFORE planting — don't guess. Ideal vegetable soil: pH 6.0-7.0. Nitrogen (N) = leaf growth, Phosphorus (P) = roots/flowers, Potassium (K) = fruit/health. Panama soils: often acidic (volcanic) and low in phosphorus. Send sample to IDIAP (Panama ag resea", "fullNote": "Soil test kit: pH, N-P-K, micronutrients. Test BEFORE planting — don't guess. Ideal vegetable soil: pH 6.0-7.0. Nitrogen (N) = leaf growth, Phosphorus (P) = roots/flowers, Potassium (K) = fruit/health. Panama soils: often acidic (volcanic) and low in phosphorus. Send sample to IDIAP (Panama ag research) for lab analysis ~$30. Test each garden zone separately. Retest every 2-3 years."}, {"sym": "COMPOST_SYSTEM", "price": 100, "range": "$50-200", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "3-bin compost system — the engine of any productive garden. Bins: 3×3×3 ft each (1 cubic yard — ideal hot compost volume). Materials: 4 pallets per bin (free from hardware stores/shipping), wire mesh, or wood. Bin 1: fresh additions (kitchen scraps, garden waste, grass clippings). Bin 2: active comp", "fullNote": "3-bin compost system — the engine of any productive garden. Bins: 3×3×3 ft each (1 cubic yard — ideal hot compost volume). Materials: 4 pallets per bin (free from hardware stores/shipping), wire mesh, or wood. Bin 1: fresh additions (kitchen scraps, garden waste, grass clippings). Bin 2: active composting (turn weekly with pitchfork). Bin 3: finished compost (dark, crumbly, earthy smell — ready to use). RECIPE: 3 parts BROWN (carbon): dry leaves, straw, shredded cardboard, wood chips, sawdust. 1 part GREEN (nitrogen): grass clippings, kitchen scraps, coffee grounds, manure, fresh garden waste. Moisture: like a wrung-out sponge — grab a handful, squeeze, 1-2 drops of water should come out. Temperature: 130-150°F (55-65°C) in center — kills weed seeds and pathogens. Turn when temp drops to reactivate. WHAT NOT TO COMPOST: meat, dairy, oils (attracts pests, smells), diseased plants (pathogens survive), weeds with seeds (unless hot compost reaches 150°F), dog/cat manure (pathogens), glossy paper (chemicals). Panama: rainy season leaches nutrients — cover bins with tarp or roof. Add extra browns during rains (nitrogen washes out). Dry season: water pile to maintain moisture. Finished compost in 3-6 months (hot) or 6-12 months (cold/passive). Use: 1-2\" layer on garden beds, work into soil before planting, or brew compost tea. Free fertilizer you made yourself from waste."}, {"sym": "VERMICOMPOST", "price": 60, "range": "$30-120", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Worm composting (vermicomposting). Worms: Eisenia fetida (red wigglers) — NOT earthworms (they're soil dwellers, not composters). Buy 1 lb ($25-40) to start. Bin: plastic storage tote (10-20 gallon), drill 1/4\" holes in lid and upper sides for aeration, 1/8\" holes in bottom for drainage. Bedding: sh", "fullNote": "Worm composting (vermicomposting). Worms: Eisenia fetida (red wigglers) — NOT earthworms (they're soil dwellers, not composters). Buy 1 lb ($25-40) to start. Bin: plastic storage tote (10-20 gallon), drill 1/4\" holes in lid and upper sides for aeration, 1/8\" holes in bottom for drainage. Bedding: shredded newspaper/cardboard + coco coir + handful of soil (grit for worm digestion). Feed: fruit/vegetable scraps (no citrus/onion/garlic in large amounts), coffee grounds + filter, crushed eggshells (calcium, pH buffer), tea bags. NO: meat, dairy, oil, pet waste, glossy paper. 1 lb worms eats ~0.5 lb food/day → produces ~0.3 lb castings/day. Harvest castings every 2-3 months: push finished castings to one side, add fresh bedding+food to other side → worms migrate → harvest finished side. Vermicast: 5× richer in nitrogen, 7× in phosphorus, 11× in potassium vs topsoil. Worm tea: steep 1 cup castings in 1 gallon water for 24 hours, use as foliar spray or soil drench. Indoor bin: no smell if managed properly (smell = overfeeding or anaerobic). Panama: keep bin in shade — worms die above 85°F (29°C). Place frozen water bottle in bin on hot days. Feed less in dry season (worms slow down). Harvest castings monthly during rainy season (peak worm activity)."}, {"sym": "COVER_CROP", "price": 20, "range": "$10-40", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Cover crop (green manure) — planted between main crops or during off-season to protect and improve soil. Legumes (clover, cowpea, vetch, pigeon pea): fix atmospheric nitrogen (add 50-150 lbs N/acre/year) through rhizobia bacteria symbiosis. Cut before flowering for maximum nitrogen in plant tissue. ", "fullNote": "Cover crop (green manure) — planted between main crops or during off-season to protect and improve soil. Legumes (clover, cowpea, vetch, pigeon pea): fix atmospheric nitrogen (add 50-150 lbs N/acre/year) through rhizobia bacteria symbiosis. Cut before flowering for maximum nitrogen in plant tissue. Grasses (rye, oats, buckwheat, sorghum-sudan): deep roots break up compaction, add massive organic matter, suppress weeds. Brassicas (mustard, oilseed radish, rapeseed): biofumigants — glucosinolates break down into compounds that suppress soil pathogens and nematodes. Multi-species mix: combine all 3 types for synergistic benefits. HOW TO USE: Broadcast seed onto prepared bed, rake in lightly, water. Grow for 4-8 weeks (or full off-season). Cut and drop as mulch (chop-and-drop) OR till in as green manure 2-3 weeks before planting (allow decomposition — fresh green matter ties up nitrogen temporarily). Panama: cowpea (frijol de vaca, Vigna unguiculata) is THE nitrogen-fixer for tropical soils — heat and drought tolerant, fast growing. Pigeon pea (guandú, Cajanus cajan): perennial legume, edible peas, excellent chop-and-drop mulch, deep taproot breaks hardpan. Mexican sunflower (Tithonia diversifolia): biomass champion in tropics, high phosphorus accumulator, grows 10+ ft tall. Cost: $2-10/lb seed depending on species. Never leave soil bare in tropics — sun bakes it, rain leaches it, weeds colonize it."}, {"sym": "MULCH", "price": 30, "range": "$15-60", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Organic mulch for garden beds. MATERIALS: straw ($8-12 per bale, covers 50-80 sq ft at 3\" depth), wood chips (FREE from arborists — call local tree services, they need dump sites), leaves (FREE — collect in fall, shred with mower for faster breakdown), grass clippings (FREE — dry first or apply thin", "fullNote": "Organic mulch for garden beds. MATERIALS: straw ($8-12 per bale, covers 50-80 sq ft at 3\" depth), wood chips (FREE from arborists — call local tree services, they need dump sites), leaves (FREE — collect in fall, shred with mower for faster breakdown), grass clippings (FREE — dry first or apply thin layers, fresh clippings mat and stink), cardboard (FREE — appliance boxes, remove tape, wet thoroughly, excellent weed barrier under other mulch). APPLICATION: 3-4\" depth for first application, 2-3\" for replenishment. Keep 2\" gap from plant stems and tree trunks (prevents collar rot). Replace every 3-6 months in tropics (fast decomposition in heat/humidity). BENEFITS: reduces watering 50-70% (blocks evaporation), suppresses weeds (light exclusion), moderates soil temperature (cooler in day, warmer at night), adds organic matter as it decomposes (feeds soil life), prevents soil compaction from rain impact, reduces erosion on slopes. WHAT NOT TO MULCH: fresh wood chips (tie up nitrogen as they decompose — compost them first or add extra nitrogen fertilizer), diseased plant material (spreads pathogens). Panama: HEAVY mulch is essential for dry season survival. Straw bales available at agricultural supply stores. Wood chips from local tree services. Living mulch alternative: sweet potato or perennial peanut as ground cover between crops."}, {"sym": "BROADFORK", "price": 80, "range": "$50-150", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Broadfork (U-bar digger). Manual tool for aerating soil without inverting layers (preserves soil structure and microbes). Step on crossbar, tines penetrate 8-12\", pull handles back to loosen. No-till essential tool. Prepares beds in minutes. Much less labor than double-digging. 14-18\" wide. Steel ti", "fullNote": "Broadfork (U-bar digger). Manual tool for aerating soil without inverting layers (preserves soil structure and microbes). Step on crossbar, tines penetrate 8-12\", pull handles back to loosen. No-till essential tool. Prepares beds in minutes. Much less labor than double-digging. 14-18\" wide. Steel tines, ash handles. Lasts decades. Alternative to rototiller (which destroys soil structure, kills worms)."}, {"sym": "SEED_STARTER", "price": 80, "range": "$40-200", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Seed starting kit: 1020 trays, cell inserts, humidity dome, heat mat (speeds germination 30-50%), grow lights (LED shop light works), seed starting mix (sterile — not garden soil). Start seeds 6-8 weeks before transplant date. Seeds need: warmth (65-75°F), moisture (not wet), light (after germinatio", "fullNote": "Seed starting kit: 1020 trays, cell inserts, humidity dome, heat mat (speeds germination 30-50%), grow lights (LED shop light works), seed starting mix (sterile — not garden soil). Start seeds 6-8 weeks before transplant date. Seeds need: warmth (65-75°F), moisture (not wet), light (after germination). Harden off seedlings 1 week before transplant (gradually expose to outdoor conditions). Saves 80% vs buying seedlings."}, {"sym": "SEED_SAVING", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Seed saving for self-sufficiency. Easiest crops (self-pollinating): tomatoes, beans, peas, lettuce, peppers, eggplant — save from best plants. Tomatoes: squeeze seeds + gel into jar, add water, ferment 2-3 days (removes germination-inhibiting gel coating), strain, dry on coffee filter. Beans/peas: l", "fullNote": "Seed saving for self-sufficiency. Easiest crops (self-pollinating): tomatoes, beans, peas, lettuce, peppers, eggplant — save from best plants. Tomatoes: squeeze seeds + gel into jar, add water, ferment 2-3 days (removes germination-inhibiting gel coating), strain, dry on coffee filter. Beans/peas: let pods dry fully brown on plant, shell, freeze for 48 hours (kills weevil eggs), store. Cross-pollinators (need isolation or hand-pollination): squash, cucumber, melon, corn, brassicas (cabbage, broccoli, kale). Squash: hand-pollinate (tape female flower closed before opening, hand-pollinate with male next morning, re-tape). Corn: wind-pollinated, needs 100+ ft isolation or time-staggering. Biennials (seed in second year): carrots, beets, onions, cabbage — leave a few plants in ground over winter (vernalization), they flower and set seed next spring. NOT applicable in Panama lowlands (no winter chill). Instead: buy fresh seed for biennials. Storage: cool, dark, DRY. Add silica gel packets to jars. Label with variety + date. Viability: tomatoes 4-6 years, beans 3-5 years, peppers 2-4 years, lettuce 2-3 years, onions/carrots 1-2 years. Germination test: 10 seeds on damp paper towel in baggie — count sprouts after expected days. Panama: high humidity kills seeds fast. Store in airtight jars with desiccant in coolest room, or in refrigerator (but keep dry!). Buy new seed every 2-3 years for anything critical."}, {"sym": "SEED_BANK", "price": 50, "range": "$30-100", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Personal seed bank: 15-20 open-pollinated (not hybrid) varieties of staple vegetables + herbs. Store: cool (refrigerator ideal), dark, dry, in sealed jars with silica gel. Rotate: plant some, save new seeds every 2-3 years (viability declines). Essential varieties: beans, tomatoes, peppers, squash, ", "fullNote": "Personal seed bank: 15-20 open-pollinated (not hybrid) varieties of staple vegetables + herbs. Store: cool (refrigerator ideal), dark, dry, in sealed jars with silica gel. Rotate: plant some, save new seeds every 2-3 years (viability declines). Essential varieties: beans, tomatoes, peppers, squash, corn, lettuce, radish, cucumber, basil, cilantro. Panama: store seeds in airtight containers in coolest room — fridge is best but keep dry."}, {"sym": "CROP_ROTATION", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "CROP ROTATION — 4-year cycle: Year 1: Legumes (beans, peas → fix nitrogen). Year 2: Leaf crops (lettuce, cabbage, spinach → use nitrogen). Year 3: Fruit crops (tomatoes, peppers, squash → heavy feeders). Year 4: Root crops (carrots, beets, potatoes → break soil). Never plant same family in same spot", "fullNote": "CROP ROTATION — 4-year cycle: Year 1: Legumes (beans, peas → fix nitrogen). Year 2: Leaf crops (lettuce, cabbage, spinach → use nitrogen). Year 3: Fruit crops (tomatoes, peppers, squash → heavy feeders). Year 4: Root crops (carrots, beets, potatoes → break soil). Never plant same family in same spot 2 years in a row (tomatoes after potatoes = blight). Rotation breaks pest/disease cycles and balances soil nutrients. In tropics: add cover crop rotation during rainy season."}, {"sym": "COMPANION_PLANTING", "price": 0, "range": "$0-0", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "Companion planting — strategic plant pairings that benefit each other. THREE SISTERS (Native American): Corn (provides structure) + pole beans (climb corn, fix nitrogen) + squash (shades soil, suppresses weeds) — plant all 3 in same mound, traditional for centuries. TOMATO ALLIES: basil (repels aphi", "fullNote": "Companion planting — strategic plant pairings that benefit each other. THREE SISTERS (Native American): Corn (provides structure) + pole beans (climb corn, fix nitrogen) + squash (shades soil, suppresses weeds) — plant all 3 in same mound, traditional for centuries. TOMATO ALLIES: basil (repels aphids, whitefly, hornworms — and improves flavor!), marigolds (repels nematodes, whitefly), borage (attracts pollinators, repels tomato hornworm), garlic/chives (repels spider mites). TOMATO ENEMIES: fennel (inhibits growth), dill (attracts hornworm in flower stage — plant dill AWAY from tomatoes), potatoes (same family — share blight). CARROT ALLIES: onions, leeks, chives (repel carrot fly), rosemary, sage. CABBAGE FAMILY ALLIES: dill (attracts beneficial wasps that parasitize cabbage worms), chamomile (improves flavor), nasturtium (trap crop for aphids). MARIGOLDS EVERYWHERE: French marigolds (Tagetes patula) release thiopene from roots — kills nematodes in soil. Plant as border around every bed. NASTURTIUM: trap crop for aphids — they prefer nasturtium over vegetables. Plant at garden edges. MINT: aggressive spreader — ALWAYS in container, never in ground. Place containers near cabbage to repel cabbage moth. Panama specific: lemongrass border around garden deters snakes and many insects. Basil thrives year-round in tropics. Mexican sunflower (Tithonia) attracts pollinators and provides chop-and-drop mulch. Never monocrop — diversity = resilience."}, {"sym": "GUILD_DESIGN", "price": 0, "range": "$0-0", "unit": "USD", "conf": "medium", "sa
