<style>
:root{--bg:#020617;--card:#0f172a;--border:#1e293b;--cyan:#22d3ee;--emerald:#34d399;--amber:#fbbf24;--rose:#fb7185;--blue:#60a5fa;--text:#e2e8f0;--muted:#94a3b8;--slate:#334155;--green-bg:#052e1611;--green-border:#16653444;--red-bg:#451a0311;--red-border:#78350f44}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono','Fira Code',monospace;min-height:100vh;display:flex;flex-direction:column}
.topbar{width:100%;padding:.5rem 1rem;display:flex;justify-content:space-between;align-items:center;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;flex-wrap:wrap;gap:.25rem}
.topbar h1{font-size:.75rem;display:flex;align-items:center;gap:.4rem}
.pulse{width:6px;height:6px;background:var(--emerald);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.progress-fill{height:100%;background:var(--emerald);transition:width .4s}
.card-area{flex:1;display:flex;align-items:flex-start;justify-content:center;width:100%;padding:.5rem;overflow-y:auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.75rem 1rem;width:100%;max-width:600px}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.3rem}
.card-symbol{font-size:.8rem;font-weight:bold;color:var(--blue)}
.card-price-block{text-align:right;min-width:80px}
.card-price{font-size:1rem;font-weight:bold}
.card-range{font-size:.5rem;color:var(--muted)}
.badges{display:flex;gap:.25rem;margin-bottom:.3rem;flex-wrap:wrap}
.badge{font-size:.42rem;padding:1px 4px;border-radius:2px;font-weight:bold}
.badge-high{background:#064e3b;color:var(--emerald)}
.badge-medium{background:#78350f;color:var(--amber)}
.badge-low{background:#7f1d1d;color:var(--rose)}
.badge-safety{background:#881337;color:var(--rose)}
.badge-cat{background:#1e293b;color:var(--muted)}
.editable{outline:none;border-radius:4px;padding:2px 4px;transition:all .15s}
.editable:hover{background:#1e293b44}
.editable:focus{background:#1e293b88;box-shadow:0 0 0 1px var(--cyan)}
.note-edit{font-size:.52rem;color:var(--muted);line-height:1.4;background:#0a0f1f;padding:.4rem;border-radius:5px;border:1px solid #1e293b;margin-bottom:.3rem;min-height:40px;max-height:200px;overflow-y:auto}
.pros-cons{display:grid;grid-template-columns:1fr 1fr;gap:.3rem;margin-bottom:.3rem}
.pc-box{font-size:.48rem;line-height:1.35;padding:.35rem;border-radius:5px;min-height:40px}
.pc-pros{background:var(--green-bg);border:1px solid var(--green-border);color:var(--emerald)}

.actions{display:flex;gap:.4rem;justify-content:center;flex-wrap:wrap;margin-top:.3rem}
.btn{padding:.35rem .7rem;border-radius:6px;border:1px solid var(--border);cursor:pointer;font-size:.52rem;font-weight:bold;font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:.2rem;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.btn-flag{background:#451a03;color:var(--amber);border-color:#78350f}

.btn-skip{background:#1e293b;color:var(--muted)}
.btn-skip:active{background:#334155;color:var(--text)}
.btn-help{background:#1e1b4b;color:var(--violet);border-color:#4c1d95}

.btn-validate{background:#052e16;color:var(--emerald);border-color:#166534}
.btn-validate:active{background:#166534;color:#6ee7b7}
.btn-save{background:#0f172a;color:var(--cyan);border-color:var(--cyan)}
.btn-delete{background:#450a0a;color:var(--rose);border-color:#7f1d1d}
.btn-delete:active{background:#7f1d1d;color:#fda4af}
.btn-grok{background:#0a1628;color:#60a5fa;border-color:#1e3a5f}
.btn-grok:active{background:#1e3a5f;color:#93c5fd}
.key-hint{font-size:.35rem;opacity:.3}
.overlay{display:none;position:fixed;inset:0;background:#000000e6;z-index:999;align-items:center;justify-content:center;padding:.5rem}
.overlay.active{display:flex}
.popup{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1rem;max-width:560px;max-height:85vh;overflow-y:auto;width:95%}
.popup h3{font-size:.7rem;color:var(--cyan);margin-bottom:.4rem}
.popup .info-edit{font-size:.5rem;color:var(--muted);line-height:1.5;white-space:pre-line;min-height:60px}
.popup .close-btn{float:right;background:none;border:none;color:var(--muted);font-size:1rem;cursor:pointer;padding:.2rem .4rem}
.popup h4{font-size:.5rem;margin-bottom:.15rem;margin-top:.4rem}
.done-screen{text-align:center;padding:1.5rem}
.done-screen h2{font-size:1rem;margin-bottom:.4rem}
.done-screen .big-num{font-size:2.5rem;font-weight:bold;color:var(--emerald)}
.stat-row{display:flex;gap:1.5rem;justify-content:center;margin:.75rem 0;flex-wrap:wrap}
.stat-box{text-align:center}
.stat-box .num{font-size:1rem;font-weight:bold}
.stat-box .label{font-size:.42rem;color:var(--muted)}
.btn-restart{background:var(--cyan);color:#020617;border:none;padding:.4rem 1rem;border-radius:6px;cursor:pointer;font-weight:bold;font-family:inherit;font-size:.6rem;margin-top:.5rem}
.btn-export{background:var(--violet);color:#fff;border:none;padding:.4rem 1rem;border-radius:6px;cursor:pointer;font-weight:bold;font-family:inherit;font-size:.55rem;margin-top:.3rem}
.btn-restore{background:var(--amber);color:#020617;border:none;padding:.4rem 1rem;border-radius:6px;cursor:pointer;font-weight:bold;font-family:inherit;font-size:.55rem;margin-top:.3rem}
.keybar{padding:.2rem .75rem;font-size:.38rem;color:var(--muted);display:flex;gap:.6rem;justify-content:center;border-top:1px solid var(--border);width:100%;flex-wrap:wrap}
.keybar kbd{background:#1e293b;padding:1px 3px;border-radius:2px;border:1px solid var(--border);font-family:inherit;font-size:.38rem}
details{margin-top:.4rem}details summary{font-size:.45rem;color:var(--amber);cursor:pointer}
@media (max-width:480px){.card{padding:.5rem .6rem}.btn{padding:.3rem .5rem;font-size:.48rem}.card-symbol{font-size:.7rem}.card-price{font-size:.9rem}.pros-cons{grid-template-columns:1fr}}
</style></head><body>

<script id="rules-data" type="application/json">[{"sym": "STREAM_INTAKE_BOX", "price": 250, "range": "$150-400", "unit": "USD", "conf": "medium", "safety": false, "cat": "💧 Water", "note": "Stream intake box: concrete or HDPE box buried at stream edge, gravity-feeds pipe to home. Brands: DIY concrete ($150-250 materials), pre-cast concrete box ($300-400). Must include: coarse screen (1/2\" stainless), fine screen (window screen mesh), overflow pipe, cleanout access. Size: 2×2×2 ft minim", "fullNote": "Stream intake box: concrete or HDPE box buried at stream edge, gravity-feeds pipe to home. Brands: DIY concrete ($150-250 materials), pre-cast concrete box ($300-400). Must include: coarse screen (1/2\" stainless), fine screen (window screen mesh), overflow pipe, cleanout access. Size: 2×2×2 ft minimum for single home. Locate above flood level. Panama: during heavy rains, streams carry sediment — clean screens weekly in rainy season. Add a settling basin before the intake to reduce screen clogging. Fence livestock 100ft away. Multiple springs can be collected into one box via manifold. Pair with RAM_PUMP if stream has sufficient fall."}, {"sym": "STREAM_DIRECT_PIPE", "price": 80, "range": "$50-150", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "Stream direct pipe intake: simple screened intake (1/2\" stainless mesh) submerged in stream, connected to HDPE or PEX pipe running downhill to storage/point of use. Cheapest surface water option at $50-150 total materials. Requires: >15 ft elevation drop (head) for adequate gravity pressure (2.3 ft ", "fullNote": "Stream direct pipe intake: simple screened intake (1/2\" stainless mesh) submerged in stream, connected to HDPE or PEX pipe running downhill to storage/point of use. Cheapest surface water option at $50-150 total materials. Requires: >15 ft elevation drop (head) for adequate gravity pressure (2.3 ft = 1 PSI, need 20-40 PSI for fixtures). Screen must be cleaned regularly — in Panama rainy season, check daily during high water (leaves, sediment). Install above flood level. Anchor pipe to bank with stakes or concrete. Add a simple settling basin (55-gal drum with baffles) before storage to trap sediment. Vulnerable to: drought (stream dries up), contamination from upstream (agriculture, animals), debris damage during floods. Add a foot valve at intake to maintain prime. Use dark-colored pipe or bury to prevent algae growth inside. Annual: replace screen if corroded, flush pipe, check for cracks at fittings."}, {"sym": "SPRING_BOX_DESIGN", "price": 250, "range": "$150-500", "unit": "USD", "conf": "medium", "safety": false, "cat": "💧 Water", "note": "Spring box design: concrete or plastic box buried at spring source. Components: gravel pack around spring eye (filters sediment), collection chamber, overflow pipe (maintains constant level), screened outlet to delivery pipe, animal-proof lid. Size: 2×2×2 ft minimum for household. Must be above floo", "fullNote": "Spring box design: concrete or plastic box buried at spring source. Components: gravel pack around spring eye (filters sediment), collection chamber, overflow pipe (maintains constant level), screened outlet to delivery pipe, animal-proof lid. Size: 2×2×2 ft minimum for household. Must be above flood level. Fence livestock out (50 ft minimum). Clean annually (remove silt, check screens). Multiple springs can be collected into one box. Panama highlands: common and reliable water source."}, {"sym": "SHALLOW_WELL", "price": 200, "range": "$150-300", "unit": "USD", "conf": "medium", "safety": false, "cat": "💧 Water", "note": "Drive-point (sand-point) well: 1-1/4\" or 2\" galvanized steel pipe with hardened steel drive point, manually hammered into water-bearing sand/gravel layers. Depth: typically 15-25 ft (hand-drive limit). Can also be jetted in with water pressure. Well point ($30-50), pipe couplings ($5 each), drive ca", "fullNote": "Drive-point (sand-point) well: 1-1/4\" or 2\" galvanized steel pipe with hardened steel drive point, manually hammered into water-bearing sand/gravel layers. Depth: typically 15-25 ft (hand-drive limit). Can also be jetted in with water pressure. Well point ($30-50), pipe couplings ($5 each), drive cap ($15), pitcher pump or shallow well jet pump. Requires sandy/gravel soil — WILL NOT WORK in clay, hardpan, or bedrock. Test soil by digging a test hole first. Yield: 3-10 GPM depending on aquifer. Installation: assemble point + 5ft pipe sections, drive with post driver or sledgehammer (heavy work — 2 people, 2-4 hours). Add pipe sections as you go. Listen for change in sound when you hit water. Once at desired depth, connect pitcher pump and pump until water runs clear (removes drilling fines). Must be >50ft from any septic system, >100ft from livestock. Test water for coliform (shallow wells more vulnerable to surface contamination). Panama: viable in coastal sandy soils, river valleys. NOT in volcanic clay soils of Chiriqui highlands. Cost: $150-300 complete. Can be DIY installed in a day."}, {"sym": "BOREWELL", "price": 3500, "range": "$3000-5,000", "unit": "USD", "conf": "medium", "safety": false, "cat": "💧 Water", "note": "Machine-drilled well, 50-300 ft deep, cased with 4-6\" steel or Schedule 80 PVC, plus submersible pump. Drillers charge $10-30/ft in Panama depending on geology (volcanic rock is harder, costs more). A 150ft well in Chiriqui highlands may cost $3,000-4,500 total. Well components: casing (prevents col", "fullNote": "Machine-drilled well, 50-300 ft deep, cased with 4-6\" steel or Schedule 80 PVC, plus submersible pump. Drillers charge $10-30/ft in Panama depending on geology (volcanic rock is harder, costs more). A 150ft well in Chiriqui highlands may cost $3,000-4,500 total. Well components: casing (prevents collapse), well screen (filters sand), sanitary seal (20ft grout minimum), pitless adapter (below frost line — not needed in Panama lowlands). Yield: 5-30 GPM typical. MUST be >50ft from septic, >100ft from livestock. Test water for arsenic (volcanic areas), coliform, hardness. Before buying land: check well logs at MIDA, ask neighbors about depth and quality. A dry hole is a $2,000+ mistake. Budget: 20% contingency for deeper-than-expected drilling."}, {"sym": "WELL_YIELD_TEST", "price": 0, "range": "$0-0", "unit": "USD", "conf": "medium", "safety": false, "cat": "💧 Water", "note": "WELL YIELD TESTING: 1) Bailer test: remove water rapidly, measure recovery rate. 2) Pump test: run pump at known GPM for 4+ hours, measure drawdown. 3) Specific capacity: GPM ÷ drawdown (ft). Good well: specific capacity >5 GPM/ft. Adequate: 2-5. Poor: <2. Required yield: household needs 5 GPM for 2", "fullNote": "WELL YIELD TESTING: 1) Bailer test: remove water rapidly, measure recovery rate. 2) Pump test: run pump at known GPM for 4+ hours, measure drawdown. 3) Specific capacity: GPM ÷ drawdown (ft). Good well: specific capacity >5 GPM/ft. Adequate: 2-5. Poor: <2. Required yield: household needs 5 GPM for 2 hours peak. Storage tank compensates for low-yield wells (pump runs longer, slower). Panama: most wells in volcanic/alluvial soils yield 5-30 GPM."}, {"sym": "WELL_SEAL_DEPTH", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": true, "cat": "💧 Water", "note": "WELL SANITARY SEAL: Minimum 20 ft of sealed casing (grout/concrete between casing and borehole) to prevent surface contamination from entering aquifer. Shallower wells (<50ft) are more vulnerable to surface runoff and septic contamination. MUST be >50 ft from septic systems, >100 ft from livestock a", "fullNote": "WELL SANITARY SEAL: Minimum 20 ft of sealed casing (grout/concrete between casing and borehole) to prevent surface contamination from entering aquifer. Shallower wells (<50ft) are more vulnerable to surface runoff and septic contamination. MUST be >50 ft from septic systems, >100 ft from livestock areas. Panama: tropical rains + thin soils = high contamination risk for shallow wells. Annual shock chlorination recommended. Well cap must be vermin-proof."}, {"sym": "RAINWATER_KIT", "price": 300, "range": "$150-500", "unit": "USD", "conf": "medium", "safety": false, "cat": "💧 Water", "note": "Complete rainwater collection system: gutters (seamless aluminum $3-6/ft or PVC $1-2/ft), downspouts, first-flush diverter (discards initial 10-15 gallons of dirty roof runoff — essential for removing bird droppings, dust, pollen), screened inlet to tank (prevents mosquitoes and debris), tank overfl", "fullNote": "Complete rainwater collection system: gutters (seamless aluminum $3-6/ft or PVC $1-2/ft), downspouts, first-flush diverter (discards initial 10-15 gallons of dirty roof runoff — essential for removing bird droppings, dust, pollen), screened inlet to tank (prevents mosquitoes and debris), tank overflow pipe. 1\" rain on 1,000 sq ft metal roof = 600 gallons harvested. Multiple tanks can be daisy-chained. First-flush sizing: 1 gallon per 100 sq ft roof. Brands: RainHarvest Systems, BlueBarrel DIY, Wisy. Panama tips: install gutter guards (leaf screens) — tropical leaves clog fast. Paint gutters dark to match roof. Slope gutters 1/4\" per 10 ft toward downspout. Multiple downspouts reduce overflow risk during tropical downpours. Pair with POLY_TANK or FERRO_CISTERN for storage."}, {"sym": "RAIN_HARVEST_CALC", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "RAINWATER HARVESTING MATH: Annual collection (gal) = roof area (sq ft) × annual rainfall (inches) × 0.623 × 0.85 efficiency. Efficiency loss: 15% for evaporation, first-flush diversion, gutter splash-out. Example: 1,000 sq ft roof in Bocas (120\" rain) = 1,000 × 120 × 0.623 × 0.85 = 63,546 gallons/ye", "fullNote": "RAINWATER HARVESTING MATH: Annual collection (gal) = roof area (sq ft) × annual rainfall (inches) × 0.623 × 0.85 efficiency. Efficiency loss: 15% for evaporation, first-flush diversion, gutter splash-out. Example: 1,000 sq ft roof in Bocas (120\" rain) = 1,000 × 120 × 0.623 × 0.85 = 63,546 gallons/year. Same roof in Azuero (50\" rain) = 1,000 × 50 × 0.623 × 0.85 = 26,478 gallons/year. Monthly collection = annual/12. Size cistern for longest dry period, not annual total."}, {"sym": "ROOF_MATERIAL_WATER", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "ROOF MATERIALS FOR RAINWATER: BEST: Metal (zinc/aluminum/galvalume) — clean, smooth, no leaching. Enameled metal is ideal. GOOD: Clay/concrete tile — clean but porous (more evaporation). OK: Asphalt shingle — acceptable for non-potable (garden, toilet). Leaches some hydrocarbons. AVOID: Treated wood", "fullNote": "ROOF MATERIALS FOR RAINWATER: BEST: Metal (zinc/aluminum/galvalume) — clean, smooth, no leaching. Enameled metal is ideal. GOOD: Clay/concrete tile — clean but porous (more evaporation). OK: Asphalt shingle — acceptable for non-potable (garden, toilet). Leaches some hydrocarbons. AVOID: Treated wood shingles (preservatives toxic), lead flashing (poisonous), copper (leaches into water — toxic to plants in greywater). Paint: use non-toxic, water-based paint only. First-flush diverter essential regardless of roof type."}, {"sym": "SOLAR_STILL", "price": 120, "range": "$50-200", "unit": "USD", "conf": "low", "safety": false, "cat": "💧 Water", "note": "Solar still: uses solar energy to evaporate water and condense it as pure distillate. Basic design: dark basin (painted black) filled with contaminated/saltwater, covered with glass or clear plastic at an angle. Sun heats water → evaporates → condenses on underside of cover → drips down to collectio", "fullNote": "Solar still: uses solar energy to evaporate water and condense it as pure distillate. Basic design: dark basin (painted black) filled with contaminated/saltwater, covered with glass or clear plastic at an angle. Sun heats water → evaporates → condenses on underside of cover → drips down to collection trough. Output: 0.5-2 gallons/day per square meter in full sun. Produces distilled-quality water (removes ALL salts, heavy metals, pathogens). Zero energy cost, no moving parts. For emergency or remote survival: dig a pit, place container in center, cover with plastic sheet, place small rock in center (creates drip point). Larger multi-effect stills: use waste heat from one stage to power next (3-5× output vs single stage). Limitations: very low output per area, only works in direct sun, labor to refill raw water daily. NOT practical for daily household use (family of 4 needs 20-80 gal/day = 10-40 m² of still area). Best use: emergency backup, remote survival, or producing small amounts of drinking water from seawater while primary source provides bulk water. Panama: useful as emergency backup during extended dry season."}, {"sym": "FOG_CATCHER", "price": 500, "range": "$200-1,000", "unit": "USD", "conf": "low", "safety": false, "cat": "💧 Water", "note": "Fog catcher: vertical mesh nets (Raschel mesh, 35-50% shade coefficient) suspended between posts that capture water droplets from fog. Fog passes through mesh → droplets coalesce on fibers → drip into collection gutter → pipe to storage. Viable ONLY in foggy coastal/mountain regions. One 40m² net ca", "fullNote": "Fog catcher: vertical mesh nets (Raschel mesh, 35-50% shade coefficient) suspended between posts that capture water droplets from fog. Fog passes through mesh → droplets coalesce on fibers → drip into collection gutter → pipe to storage. Viable ONLY in foggy coastal/mountain regions. One 40m² net can yield 100-400 L/day in consistent fog. Requires: frequent fog (>180 fog days/year), moderate wind (moves fog through mesh), regular cleaning (dust reduces efficiency). Locations: Chilean coastal desert (Atacama), Peruvian lomas, California coastal ranges, Canary Islands, Namib Desert, Panama Caribbean highlands (Boquete area gets mist/fog). Materials: 4×4m Raschel mesh ($50-80), 2 posts (wood or galvanized pipe), collection gutter (PVC), storage tank. Maintenance: clean mesh monthly with mild soap solution, check for UV degradation (replace every 3-5 years). Niche technology — check fog frequency data before investing. Not a primary source for most locations."}, {"sym": "AWG", "price": 1200, "range": "$800-2,000", "unit": "USD", "conf": "medium", "safety": false, "cat": "💧 Water", "note": "Atmospheric Water Generator (AWG): condenses humidity from air (like a dehumidifier) into liquid water. Compressor-based: refrigeration cycle cools air below dew point → water condenses on cold coils → collected in tank → filtered (carbon + UV). Output: 3-8 gallons/day at 60-80% relative humidity. D", "fullNote": "Atmospheric Water Generator (AWG): condenses humidity from air (like a dehumidifier) into liquid water. Compressor-based: refrigeration cycle cools air below dew point → water condenses on cold coils → collected in tank → filtered (carbon + UV). Output: 3-8 gallons/day at 60-80% relative humidity. Drops dramatically below 50% RH. Energy consumption: 350-700 Wh/gallon — ENERGY INTENSIVE (requires substantial solar array). For comparison: pumping from a well uses 1-5 Wh/gallon. Only makes sense where: humidity is consistently high (>60% RH), no surface water or groundwater available, you have excess solar capacity. Panama: Caribbean coast (Bocas) has ideal humidity but ALSO abundant rainfall and surface water — AWG is overkill. Pacific dry side (Azuero) might justify during dry season. Brands: Watergen ($1,200-2,000), Tsunami ($800-1,500), Ecoloblue ($1,000-1,800). Maintenance: clean condenser coils monthly, replace air filter, sanitize water tank with hydrogen peroxide. IF you have ANY other water source (well, stream, rain, trucked), use that instead. AWG is the last resort — expensive both upfront and ongoing."}, {"sym": "PANAMA_RAINFALL", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "PANAMA RAINFALL BY REGION: Bocas del Toro (Caribbean): 3,000-4,000 mm/year (118-157\"), rain year-round, no real dry season. Chiriqui highlands (Boquete): 2,000-3,000 mm, dry Dec-Apr but mist/fog provides moisture. Panama City/Pacific: 1,900-2,500 mm, distinct dry Dec-Apr. Azuero Peninsula: 1,000-1,5", "fullNote": "PANAMA RAINFALL BY REGION: Bocas del Toro (Caribbean): 3,000-4,000 mm/year (118-157\"), rain year-round, no real dry season. Chiriqui highlands (Boquete): 2,000-3,000 mm, dry Dec-Apr but mist/fog provides moisture. Panama City/Pacific: 1,900-2,500 mm, distinct dry Dec-Apr. Azuero Peninsula: 1,000-1,500 mm, driest region, 5-month dry season. Darien: 2,500-3,500 mm, rain year-round. For rainwater harvesting: 1\" rain on 1,000 sq ft roof = 600 gallons. Azuero needs largest cisterns."}, {"sym": "PANAMA_WATER_TABLE", "price": 0, "range": "$0-0", "unit": "USD", "conf": "medium", "safety": false, "cat": "💧 Water", "note": "PANAMA WATER TABLE DEPTHS (approximate): Coastal lowlands: 10-30 ft (hand-dug wells feasible). Inland valleys: 30-80 ft. Highlands: 80-200+ ft (need drilled well). Volcanic areas (Chiriqui): variable, some areas have deep water. Limestone/karst (parts of Colon, Bocas): unpredictable — water flows th", "fullNote": "PANAMA WATER TABLE DEPTHS (approximate): Coastal lowlands: 10-30 ft (hand-dug wells feasible). Inland valleys: 30-80 ft. Highlands: 80-200+ ft (need drilled well). Volcanic areas (Chiriqui): variable, some areas have deep water. Limestone/karst (parts of Colon, Bocas): unpredictable — water flows through caves/fissures. Before buying land: check well logs at MIDA (Ministry of Agriculture), ask neighbors about well depth, hire a hydrogeologist for large investments."}, {"sym": "WATER_RIGHTS_PANAMA", "price": 0, "range": "$0-0", "unit": "USD", "conf": "medium", "safety": false, "cat": "💧 Water", "note": "WATER RIGHTS IN PANAMA: Surface water (rivers, streams) is public domain — you can use it but cannot exclusively claim it. Groundwater (wells): you own what's under your land but may need ANAM (environmental authority) permit for large extraction (>10,000 L/day). Rainwater: no restrictions — collect", "fullNote": "WATER RIGHTS IN PANAMA: Surface water (rivers, streams) is public domain — you can use it but cannot exclusively claim it. Groundwater (wells): you own what's under your land but may need ANAM (environmental authority) permit for large extraction (>10,000 L/day). Rainwater: no restrictions — collect all you want. Community water systems (acueductos rurales): common in Panama — shared spring/stream with neighbors. Check with local municipality before drilling or diverting."}, {"sym": "GRAVITY_FEED", "price": 100, "range": "$50-300", "unit": "USD", "conf": "medium", "safety": false, "cat": "💧 Water", "note": "Pipe and fittings routed from a water source at higher elevation than the dwelling. Zero operating energy — pure gravity provides pressure. Rule of thumb: 2.3ft elevation = 1 PSI; need 20-40 PSI for normal household fixtures (~50-100ft elevation drop). Use HDPE or PEX pipe (won't burst if frozen lik", "fullNote": "Pipe and fittings routed from a water source at higher elevation than the dwelling. Zero operating energy — pure gravity provides pressure. Rule of thumb: 2.3ft elevation = 1 PSI; need 20-40 PSI for normal household fixtures (~50-100ft elevation drop). Use HDPE or PEX pipe (won't burst if frozen like PVC). The gold standard for off-grid water pressure."}, {"sym": "RAM_PUMP", "price": 250, "range": "$150-400", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "Hydraulic ram pump: uses water hammer effect — NO electricity, NO fuel. Physics: flowing water from source through drive pipe builds momentum → waste valve slams shut → water hammer creates high-pressure pulse → forces small portion (10-15%) up delivery pipe to elevation 10× the drive head. Requires", "fullNote": "Hydraulic ram pump: uses water hammer effect — NO electricity, NO fuel. Physics: flowing water from source through drive pipe builds momentum → waste valve slams shut → water hammer creates high-pressure pulse → forces small portion (10-15%) up delivery pipe to elevation 10× the drive head. Requires: continuous water flow (3+ GPM minimum), vertical fall (drive head) of 2-3 ft minimum, rigid drive pipe (galvanized steel or Sch 80 PVC — flexible pipe ABSORBS water hammer, killing efficiency). Performance: Q_delivered = Q_input × (drive_head / delivery_head) × 0.6 efficiency. Example: 10 GPM input, 3 ft fall → 1 GPM delivered to 30 ft height. Papa Pump (UK made, $800-1200), DIY kits ($150-400). Installation: drive pipe ≥20 ft long, straight, rigid, not kinked; waste valve must drain freely; air chamber (snifter valve) above delivery valve smooths pressure pulses. Maintenance: clean waste valve seat annually (debris from stream), check air chamber pressure (waterlogging reduces efficiency), replace rubber flapper every 2-3 years. Source: my-new-project research synthesis (5.4KB) + Papa Pump manufacturer specs. Panama: excellent for highland streams — runs 24/7/365 without any electricity. Build settling basin before intake to reduce sediment fouling."}, {"sym": "HAND_PUMP_SHALLOW", "price": 200, "range": "$69-297", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "Manual pitcher pump for wells ≤25 ft depth. Bison 1118-25 ($297): cast iron, made in USA, rebuildable, 50+ year lifespan with maintenance. Bison 1900 ($199): economy model, same mechanism. Flotec FP4200 ($69): budget option, plastic body. Simple Pump shallow version ($189). Output: 2-5 GPM depending", "fullNote": "Manual pitcher pump for wells ≤25 ft depth. Bison 1118-25 ($297): cast iron, made in USA, rebuildable, 50+ year lifespan with maintenance. Bison 1900 ($199): economy model, same mechanism. Flotec FP4200 ($69): budget option, plastic body. Simple Pump shallow version ($189). Output: 2-5 GPM depending on effort and depth. All include: brass cylinder, leather cups (need occasional oiling/replacement), cast iron base plate. Installation: bolt to well cap or concrete pad. Requires 1-1/4\" or 2\" well casing. Maintenance: oil leathers monthly with food-grade mineral oil, replace every 2-5 years ($15-25 kit). Prime with water if sitting dry. Panama: the ultimate backup — works when electricity fails, lightning strikes, or pump burns out. Install alongside electric pump in same casing. Keep spare leather cups stored in oiled bag. Test monthly to verify function."}, {"sym": "HAND_PUMP_DEEP", "price": 700, "range": "$500-1,200", "unit": "USD", "conf": "medium", "safety": false, "cat": "💧 Water", "note": "Deep-well hand pump for wells 25-200ft. Simple Pump 1115 ($1,095) or Bison 1145-200 ($679). More effort required per gallon. Essential backup when electric submersible pump fails. Must match well casing diameter.", "fullNote": "Deep-well hand pump for wells 25-200ft. Simple Pump 1115 ($1,095) or Bison 1145-200 ($679). More effort required per gallon. Essential backup when electric submersible pump fails. Must match well casing diameter."}, {"sym": "FOOT_PUMP", "price": 80, "range": "$50-150", "unit": "USD", "conf": "medium", "safety": false, "cat": "💧 Water", "note": "Treadle/foot-operated pump. Uses leg power (stronger than arms) to lift water. Mechanism: twin pistons in cylinders, operated by alternating foot pressure on treadles. Output: 5-15 GPM with moderate effort — significantly more than hand pump. Lift capacity: 10-30 ft (suction), can push higher with m", "fullNote": "Treadle/foot-operated pump. Uses leg power (stronger than arms) to lift water. Mechanism: twin pistons in cylinders, operated by alternating foot pressure on treadles. Output: 5-15 GPM with moderate effort — significantly more than hand pump. Lift capacity: 10-30 ft (suction), can push higher with modifications. Brands: KickStart MoneyMaker (Africa-designed, $100-200, deep-lift version to 25m), Full Belly Project treadle pump ($150-250), DIY versions ($50-100 in materials — PVC pipes, wooden treadles, rubber seals). Advantages: higher output than hand pump (legs > arms), can irrigate 1-2 acres, maintainable with basic tools. Components: two cylinders with leather or rubber cup seals, connecting rods, treadle platform with pivot, suction pipe with foot valve. Maintenance: oil leather seals monthly (food-grade mineral oil), replace every 2-3 years, grease pivot points. For garden irrigation: pump from shallow well or stream to elevated tank, gravity-feed to drip irrigation. Panama: excellent for small farm irrigation without electricity. Place on concrete pad or compacted earth. Shade the operator — pumping in tropical sun is hard work. Community sharing: one pump serves multiple families (located at shared water point)."}, {"sym": "PUMP_12V", "price": 150, "range": "$100-200", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "12V DC diaphragm pump for direct solar or battery power. Shurflo 4008 series (3 GPM, 45 PSI, $80-120) — the standard RV/marine pump. Shurflo 2088 (2.8 GPM, 45 PSI, $70-90). SeaFlo 33-series (3.3 GPM, 45 PSI, $50-70) — budget alternative. Features: self-priming (up to 6 ft vertical), built-in pressur", "fullNote": "12V DC diaphragm pump for direct solar or battery power. Shurflo 4008 series (3 GPM, 45 PSI, $80-120) — the standard RV/marine pump. Shurflo 2088 (2.8 GPM, 45 PSI, $70-90). SeaFlo 33-series (3.3 GPM, 45 PSI, $50-70) — budget alternative. Features: self-priming (up to 6 ft vertical), built-in pressure switch (cycles on at 25-35 PSI, off at 45-55 PSI), thermal overload protection. Current draw: 4-8A at 12V (48-96W). Add accumulator tank ($30-60) to reduce cycling. Install: flexible hose connections to reduce vibration noise. Mount on rubber grommets. Must never run dry (burns diaphragm). Protect from freezing. Panama: install under cover (sun/rain protection). Filter input with 50-mesh screen. Life: 3-5 years with regular use. Keep a spare diaphragm kit ($15-25)."}, {"sym": "PUMP_AC", "price": 300, "range": "$200-400", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "AC jet/shallow well pump. Brands: Goulds J5S (1/2 HP, $250-350), Red Lion RJS-100 (1 HP, $200-300), Wayne SWS50 (1/2 HP, $150-250). Jet pump operation: impeller creates pressure differential → venturi effect pulls water up suction pipe. Max suction lift: 25 ft (atmospheric pressure limit). For deepe", "fullNote": "AC jet/shallow well pump. Brands: Goulds J5S (1/2 HP, $250-350), Red Lion RJS-100 (1 HP, $200-300), Wayne SWS50 (1/2 HP, $150-250). Jet pump operation: impeller creates pressure differential → venturi effect pulls water up suction pipe. Max suction lift: 25 ft (atmospheric pressure limit). For deeper wells: convertible jet pump with deep-well ejector kit (lifts from 25-90 ft). Flow: 5-15 GPM depending on HP and lift. Pressure: 30-50 PSI standard. MUST have: pressure tank (20-52 gal, $150-250) to prevent short-cycling (motor burnout), pressure switch (30/50 or 40/60 PSI), check valve at pump intake. Installation: prime pump with water before starting (running dry destroys seals in seconds). Protect from freezing (drain or heat if needed — Panama lowlands: not a concern). Electrical: 120V or 240V, needs pure sine wave inverter if off-grid (or grid connection). Draws 800-1500W starting, 600-1000W running. Noise: 60-70 dB (louder than submersible). Life: 8-12 years with maintenance. Replace impeller every 5-7 years. Panama: good for shallow wells (<25 ft) where you have inverter power. For deep wells, use submersible instead."}, {"sym": "DEMAND_PUMP", "price": 200, "range": "$150-300", "unit": "USD", "conf": "medium", "safety": false, "cat": "💧 Water", "note": "On-demand diaphragm pump (Flojet style). Brands: Flojet 03526 (3.3 GPM, 45 PSI, $150-200), SeaFlo 33-series (3.0 GPM, 45 PSI, $70-100), Shurflo 4008 (3.0 GPM, 45 PSI, $80-120). Operation: positive displacement diaphragm pump with built-in pressure switch. Activates automatically when faucet opens (p", "fullNote": "On-demand diaphragm pump (Flojet style). Brands: Flojet 03526 (3.3 GPM, 45 PSI, $150-200), SeaFlo 33-series (3.0 GPM, 45 PSI, $70-100), Shurflo 4008 (3.0 GPM, 45 PSI, $80-120). Operation: positive displacement diaphragm pump with built-in pressure switch. Activates automatically when faucet opens (pressure drops below cut-in, typically 25-35 PSI), shuts off when faucet closes (pressure reaches cut-out, 45-55 PSI). Self-priming up to 6 ft vertical. Can run dry briefly without damage (unlike centrifugal pumps). Current draw: 4-8A at 12V = 48-96W. Features: thermal overload protection, built-in check valve, adjustable pressure switch on some models. Installation: flexible hose connections (reduces vibration and noise), mount on rubber grommets, install accumulator tank ($30-60, 0.5-2 gal) to reduce cycling (extending pump life). Inlet: 1/2\" or 3/4\" hose barb. Outlet: 1/2\" hose barb or 3/8\" NPT. Filter inlet with 50-mesh screen to protect valves. Life: 3-5 years continuous use. Keep spare: diaphragm kit ($15-25), pressure switch ($20-30). Panama: excellent for cabin/RV/boat where 12V power is native. Pair with DC fridge and LED lights for a full 12V system. NOT for deep wells (max suction 6 ft)."}, {"sym": "PUMP_SIZING_GPM", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "PUMP SIZING BY FLOW RATE: Calculate your required GPM before buying a pump. Household: 5 GPM minimum for simultaneous use (sink 2 GPM + shower 2.5 GPM + toilet 0.5 GPM). Garden: 5-10 GPM per irrigation zone. Livestock: 1-2 GPM per 10 cattle, 0.5 GPM per 100 chickens. Sizing formula: total daily gall", "fullNote": "PUMP SIZING BY FLOW RATE: Calculate your required GPM before buying a pump. Household: 5 GPM minimum for simultaneous use (sink 2 GPM + shower 2.5 GPM + toilet 0.5 GPM). Garden: 5-10 GPM per irrigation zone. Livestock: 1-2 GPM per 10 cattle, 0.5 GPM per 100 chickens. Sizing formula: total daily gallons ÷ available pumping hours ÷ 60 = GPM. Example: need 500 gal/day, pump runs 4 hours/day (solar direct). 500 ÷ 4 ÷ 60 = 2.1 GPM — a 3 GPM pump is sufficient. BUT: if you have a 2.5 GPM shower, you need 5+ GPM for house alone. The pump serves PEAK demand, not average. Hand pump: 2-5 GPM. 12V diaphragm: 2-4 GPM at 40-60 PSI. AC jet pump: 5-15 GPM. Submersible deep well: 5-30 GPM. Rule: size pump for peak simultaneous demand (all fixtures that might run at once) × 1.25 safety factor. Oversize pump slightly and use pressure tank to buffer — undersized pump means shower pressure drops when toilet flushes."}, {"sym": "PUMP_HEAD_CALC", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "TOTAL DYNAMIC HEAD = Static head (vertical lift in ft) + friction loss (pipe length, fittings, elevation changes). Rule of thumb: add 20% to static head for friction in typical residential setup. 1 PSI = 2.31 ft of head. Typical household: 40-60 PSI = 92-138 ft of head. Gravity feed: 2.3 ft elevatio", "fullNote": "TOTAL DYNAMIC HEAD = Static head (vertical lift in ft) + friction loss (pipe length, fittings, elevation changes). Rule of thumb: add 20% to static head for friction in typical residential setup. 1 PSI = 2.31 ft of head. Typical household: 40-60 PSI = 92-138 ft of head. Gravity feed: 2.3 ft elevation = 1 PSI (need 50-100 ft drop for normal fixtures). Shallow well pumps max 25 ft suction lift. Deep well submersibles push from bottom — no suction limit."}, {"sym": "PUMP_CURVE_MATCH", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "PUMP CURVE MATCHING — critical for system design. Every pump has a performance curve (flow rate vs total head). Study the manufacturer's curve before buying. Problem: pump rated '5 GPM' only delivers that at MINIMAL head — at 100 ft of head, that same pump might deliver only 1-2 GPM. Steps: (1) Calc", "fullNote": "PUMP CURVE MATCHING — critical for system design. Every pump has a performance curve (flow rate vs total head). Study the manufacturer's curve before buying. Problem: pump rated '5 GPM' only delivers that at MINIMAL head — at 100 ft of head, that same pump might deliver only 1-2 GPM. Steps: (1) Calculate your total dynamic head = static lift + friction loss (use online calculator or add 20% buffer to static). (2) Find pump curves online (manufacturer PDFs). (3) Your required flow rate (GPM) AT your total head must fall ON or BELOW the pump curve. (4) If point is above curve, step up to next pump size. (5) Efficiency varies across curve — aim for middle-third where pumps are most efficient. Example: need 5 GPM at 120 ft head. Grundfos 5SQ05-180 curve: at 120 ft, delivers 5 GPM (perfect). Shurflo 12V: at 92 ft (40 PSI), delivers only 2 GPM — not enough. Mismatched pump = poor performance OR short motor life (overloading). Always oversize 10-15% — you can throttle flow with a valve but can't increase it. Keep pump curve printout with system documentation for future troubleshooting."}, {"sym": "PRESSURE_TANK", "price": 150, "range": "$100-250", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "Well-X-Trol or equivalent pressure tank. Sizes: 20 gal ($100-150), 35 gal ($150-200), 52 gal ($200-250). Prevents pump short-cycling (motor burnout). Stores pressurized water so pump doesn't run every time you open a faucet. Rule: tank drawdown should be 25% of pump capacity for <1.5 HP motors. Pre-", "fullNote": "Well-X-Trol or equivalent pressure tank. Sizes: 20 gal ($100-150), 35 gal ($150-200), 52 gal ($200-250). Prevents pump short-cycling (motor burnout). Stores pressurized water so pump doesn't run every time you open a faucet. Rule: tank drawdown should be 25% of pump capacity for <1.5 HP motors. Pre-charged bladder type is standard — check air pressure annually (should be 2 PSI below cut-in pressure)."}, {"sym": "DRUM_TANK", "price": 50, "range": "$30-100", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "55-gallon blue HDPE (High-Density Polyethylene) food-grade drums — the cheapest off-grid storage. Price: used food-grade drums $15-25 each (from food processors, juice manufacturers, olive importers). New drums $40-60 each. CRITICAL: must be FOOD-GRADE only — never use drums that held chemicals, pes", "fullNote": "55-gallon blue HDPE (High-Density Polyethylene) food-grade drums — the cheapest off-grid storage. Price: used food-grade drums $15-25 each (from food processors, juice manufacturers, olive importers). New drums $40-60 each. CRITICAL: must be FOOD-GRADE only — never use drums that held chemicals, pesticides, or petroleum (residue leaches into water forever). Blue or white color blocks algae (clear/translucent = algae growth). Standard dimensions: 23\" diameter × 35\" tall. Fittings: 2\" bung opening (fine thread), can add 3/4\" spigot at bottom ($8-15 bulkhead fitting). Stackable on pallets. Connect multiple drums in parallel via manifold at bottom — all fill/drain equally. Elevate on concrete blocks or pallets for gravity feed (2 ft = 1 PSI). Add screened overflow. Cover with dark tarp if in sun. Life: 10-15 years (HDPE eventually becomes brittle in UV). Panama: source used drums from fruit juice processors, cooking oil importers. Clean new drums: rinse with baking soda solution, then vinegar, then water. Never use soap (flavor/foam lingers). A single drum (55 gal) supports 1 person for 5-10 days at conservative usage."}, {"sym": "POLY_TANK", "price": 300, "range": "$200-400", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "Rotationally-molded polyethylene tank, UV-stabilized, food-grade (NSF/ANSI 61 certified). Sizes: 100 gal ($120-180), 250 gal ($200-400), 500 gal ($400-700), 1000 gal ($700-1100), 2500 gal ($1500-2200). Best $/gallon at 1000+ gal sizes. Dark green or black color blocks algae. Place on level, compacte", "fullNote": "Rotationally-molded polyethylene tank, UV-stabilized, food-grade (NSF/ANSI 61 certified). Sizes: 100 gal ($120-180), 250 gal ($200-400), 500 gal ($400-700), 1000 gal ($700-1100), 2500 gal ($1500-2200). Best $/gallon at 1000+ gal sizes. Dark green or black color blocks algae. Place on level, compacted gravel pad (4-6\" crushed stone). MUST be at least 2 ft above highest fixture for gravity feed. Install: bulkhead fitting at bottom for outlet, screened overflow, manway for cleaning access. Connect multiple tanks in parallel (not series) for equal filling. Panama: secure tank against wind (empty tanks blow away in tropical storms). In full sun, paint exterior white or build shade structure (reduces algae and keeps water cooler). Life: 20-30 years. Annual inspection: check for cracks, algae, sediment buildup. Drain and scrub every 3-5 years."}, {"sym": "BLADDER_TANK", "price": 350, "range": "$200-500", "unit": "USD", "conf": "medium", "safety": false, "cat": "💧 Water", "note": "Collapsible water bladder (pillow tank). Flexible reinforced fabric (PVC/nylon or polyurethane) that lies flat when empty and expands as it fills. Sizes: 25 gal ($50-80, emergency), 100 gal ($150-250), 500 gal ($300-500), 1000 gal ($500-800), 2500 gal ($800-1200). Uses: seasonal/emergency storage, r", "fullNote": "Collapsible water bladder (pillow tank). Flexible reinforced fabric (PVC/nylon or polyurethane) that lies flat when empty and expands as it fills. Sizes: 25 gal ($50-80, emergency), 100 gal ($150-250), 500 gal ($300-500), 1000 gal ($500-800), 2500 gal ($800-1200). Uses: seasonal/emergency storage, rainwater collection during wet season for dry season use, temporary water supply during well drilling, portable water for remote work sites. MUST be placed on FLAT, smooth surface free of sharp objects (rocks, sticks, glass will puncture). Lay down geotextile fabric or old carpet as base. Protect from: UV (cover with tarp or shade — fabric degrades in sun), rodents (they chew — surround with wire mesh or keep in enclosure), vehicles (don't drive over). Fittings: standard 1\" or 2\" NPT bulkhead, fill from top, draw from bottom. NOT for permanent installation — life 5-8 years, then replace. Annual: inspect for leaks (soap bubble test on seams), check fittings for cracks. Panama: useful for dry season buffer — deploy December, fill during late rainy season, use through April. Roll up and store during rainy season. Cheaper than rigid tanks per gallon but shorter life."}, {"sym": "FERRO_CISTERN", "price": 500, "range": "$300-800", "unit": "USD", "conf": "low", "safety": false, "cat": "💧 Water", "note": "DIY ferrocement (ferro-cement) cistern. Construction: chicken wire + rebar frame plastered with cement-sand mortar (1:3 ratio). Built over form (inflatable, earth mound, or removable wood). Thickness: 1-2\" for walls, 2-3\" for floor. Much stronger than plain concrete — wire reinforcement distributes ", "fullNote": "DIY ferrocement (ferro-cement) cistern. Construction: chicken wire + rebar frame plastered with cement-sand mortar (1:3 ratio). Built over form (inflatable, earth mound, or removable wood). Thickness: 1-2\" for walls, 2-3\" for floor. Much stronger than plain concrete — wire reinforcement distributes loads. Cost: $0.15-0.30/gallon (cheapest large storage). Labor: 40-80 hours for 2000-gallon cistern (2-person team). Must include: waterproofing admixture in mortar (Xypex, Kryton, or acrylic bonding agent), manhole with locked cover (safety + access), screened overflow, screened vent, internal ladder. Waterproof interior with: parge coat + waterproofing paint (two coats), or EPDM pond liner (more expensive but guaranteed). MUST be below frost line if buried (not needed Panama lowlands). Above-ground: add shade roof (tropical sun heats water, promotes algae). Curing: keep moist for 7-14 days (spray water, cover with wet burlap — curing is critical for strength and waterproofness). Fill slowly first time (structural settling). Life: 50+ years if built correctly. Panama: traditional technology, local masons familiar with technique. Shape: round (strongest, self-reinforcing from hoop stress) or rectangular (easier to build but needs thicker walls)."}, {"sym": "BRICK_CISTERN", "price": 1500, "range": "$1000-2,000", "unit": "USD", "conf": "medium", "safety": false, "cat": "💧 Water", "note": "Professionally built brick or concrete cistern. Usually 2000-5000 gallons. Most expensive but longest-lasting water storage. Requires proper rebar reinforcement, waterproof parging/sealant, and overflow pipe. Can be part of the building foundation. Common in arid regions (Caribbean, Mediterranean). ", "fullNote": "Professionally built brick or concrete cistern. Usually 2000-5000 gallons. Most expensive but longest-lasting water storage. Requires proper rebar reinforcement, waterproof parging/sealant, and overflow pipe. Can be part of the building foundation. Common in arid regions (Caribbean, Mediterranean). Add a manhole for cleaning."}, {"sym": "PLYWOOD_TANK", "price": 350, "range": "$200-500", "unit": "USD", "conf": "low", "safety": false, "cat": "💧 Water", "note": "DIY plywood tank lined with pond liner or fiberglassed interior. Lower cost but only 3-5 year lifespan before plywood rots (even with marine-grade). Use exterior-grade ply + epoxy coating and a food-grade liner. Best as an intermediate solution. Foam-core panels (like SIPs) used for the same approac", "fullNote": "DIY plywood tank lined with pond liner or fiberglassed interior. Lower cost but only 3-5 year lifespan before plywood rots (even with marine-grade). Use exterior-grade ply + epoxy coating and a food-grade liner. Best as an intermediate solution. Foam-core panels (like SIPs) used for the same approach last longer."}, {"sym": "SS_TANK", "price": 1000, "range": "$500-1,500", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "Stainless steel water tank. Most hygienic option — non-reactive surface, won't leach chemicals, easy to sterilize, resists corrosion and UV indefinitely. Grades: 304 SS (standard, adequate for potable water), 316 SS (marine grade, higher corrosion resistance — recommended for Panama coastal/salt air", "fullNote": "Stainless steel water tank. Most hygienic option — non-reactive surface, won't leach chemicals, easy to sterilize, resists corrosion and UV indefinitely. Grades: 304 SS (standard, adequate for potable water), 316 SS (marine grade, higher corrosion resistance — recommended for Panama coastal/salt air). Sizes: 50 gal ($300-500), 100 gal ($500-800), 200 gal ($1,000-1,500), 500 gal ($2,000-3,000). Cost: $5-10/gallon — most expensive per gallon. Best use: dedicated DRINKING WATER only (too expensive for whole-house storage). Install above ground on level concrete pad. Direct sun exposure: SS reflects heat better than plastic but still insulate if in full tropical sun. Fittings: welded or threaded bulkhead. Clean: drain and scrub with baking soda annually, sanitize with hydrogen peroxide (not chlorine — can pit stainless over time). Check welds for pinhole leaks annually. Life: 30-50+ years (effectively lifetime). Pair with: large plastic cistern for bulk storage + small SS tank for drinking water polishing. Restaurant/brewery/wine applications common. Panama: 316 SS for coastal (Bocas, Colon, San Blas) — 304 will pit in salt air within 5-10 years."}, {"sym": "TANK_COST_PER_GALLON", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "WATER STORAGE COST PER GALLON: 55-gal blue HDPE drum (used food-grade): $0.27-0.45/gal — CHEAPEST option for small storage. 55-gal new drum: $0.73-1.09/gal. 250-gal poly tank: $0.80-1.60/gal. 500-gal poly: $0.80-1.40/gal. 1000-gal poly: $0.70-1.10/gal — BEST $/GALLON VALUE. 2500-gal poly: $0.60-0.88", "fullNote": "WATER STORAGE COST PER GALLON: 55-gal blue HDPE drum (used food-grade): $0.27-0.45/gal — CHEAPEST option for small storage. 55-gal new drum: $0.73-1.09/gal. 250-gal poly tank: $0.80-1.60/gal. 500-gal poly: $0.80-1.40/gal. 1000-gal poly: $0.70-1.10/gal — BEST $/GALLON VALUE. 2500-gal poly: $0.60-0.88/gal. 5000-gal poly: $0.50-0.70/gal (bulk pricing). Ferrocement DIY cistern: $0.15-0.30/gal — cheapest large storage (labor-intensive, 40-80 hours for 2000 gal). Stainless steel 200-gal: $5.00-10.00/gal (lifetime, drinking only). Bladder/pillow tank: $0.50-1.00/gal (temporary, 5-8 year life). Cost includes tank only — add: concrete pad ($200-500), plumbing connections ($50-150), level indicator ($50-150), overflow piping, screening. Bulk buying: multiple tanks from same supplier = 10-20% discount. Panama: poly tanks available at agricultural supply stores (Agrocentro, Melo). Ferrocement: hire local mason ($15-25/day labor). Shipping: tanks are bulky — buy locally when possible. Best strategy: one large tank (1000-2500 gal) for bulk storage + one smaller SS tank (50-100 gal) at house for drinking water."}, {"sym": "STORAGE_PER_PERSON", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "WATER STORAGE PER PERSON: Minimum survival (drinking only): 1 gal/person/day (WHO standard). Basic off-grid (drinking + cooking + sponge bath): 5-10 gal/person/day. Comfortable (showers, laundry, garden): 20-30 gal/person/day. US average household: 80-100 gal/person/day (luxurious by off-grid standa", "fullNote": "WATER STORAGE PER PERSON: Minimum survival (drinking only): 1 gal/person/day (WHO standard). Basic off-grid (drinking + cooking + sponge bath): 5-10 gal/person/day. Comfortable (showers, laundry, garden): 20-30 gal/person/day. US average household: 80-100 gal/person/day (luxurious by off-grid standards). Off-grid target: 20-30 gal/person/day × household size × longest dry period (days) = total storage needed. Example: 3 people × 25 gal/day × 90-day dry season (Panama Pacific side) = 6,750 gallons. That's one 2,500-gal cistern + two 1,500-gal tanks + 500 gal buffer. Reduce by: rainwater harvesting (gallon collected = gallon not drawn from storage), conservation (mist shower saves 50%), composting toilet (saves 5-10 gal/day vs flush toilet). Panama: Azuero Peninsula (driest region) needs largest storage — 5 months dry = 150 days. Caribbean coast (Bocas): year-round rain, 30-day buffer sufficient. Size storage for WORST CASE, not average year."}, {"sym": "CISTERN_SIZING", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "CISTERN SIZING FORMULA: Household daily usage (gal) × longest dry period (days) × 1.3 safety factor. Panama dry season: Dec-Apr (~120-150 days depending on region). Pacific side (Azuero): 5 months dry, needs larger storage. Caribbean side (Bocas): year-round rain, smaller storage OK. Cistern dimensi", "fullNote": "CISTERN SIZING FORMULA: Household daily usage (gal) × longest dry period (days) × 1.3 safety factor. Panama dry season: Dec-Apr (~120-150 days depending on region). Pacific side (Azuero): 5 months dry, needs larger storage. Caribbean side (Bocas): year-round rain, smaller storage OK. Cistern dimensions: 1 cubic ft = 7.48 gallons. 8×8×8 ft cistern = 512 cf = 3,830 gallons. 10×10×10 ft = 1,000 cf = 7,480 gallons."}, {"sym": "LEVEL_INDICATOR", "price": 100, "range": "$50-150", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "Tank water level monitoring — KNOWING IS BETTER THAN GUESSING. Mechanical sight tube: clear PVC pipe connected to tank bottom, water level equals tank level, $15-30, zero electronics, never fails. Float gauge: mechanical float + cable + external dial indicator, $40-80, reads from ground level. Ultra", "fullNote": "Tank water level monitoring — KNOWING IS BETTER THAN GUESSING. Mechanical sight tube: clear PVC pipe connected to tank bottom, water level equals tank level, $15-30, zero electronics, never fails. Float gauge: mechanical float + cable + external dial indicator, $40-80, reads from ground level. Ultrasonic sensor: mounts on tank top, sends sound pulse, measures echo return time, $50-100 (basic), $150-300 (IoT with WiFi). Hydrostatic pressure sensor: submerged at tank bottom, measures water column pressure, $60-120, most accurate. WiFi tank monitor (YoLink, $50-80): sends level to phone app, low-level alerts. Essential for off-grid — running out of water in dry season is a crisis. Install on every tank. At minimum: sight tube on each tank. Best: ultrasonic with low-level alarm. Panama: during dry season, check level weekly. When storage drops below 50%: stop irrigation. 25%: drinking only. 10%: emergency rationing."}, {"sym": "CATCHMENT_CLEANING", "price": 0, "range": "$0-0", "unit": "USD", "conf": "medium", "safety": false, "cat": "💧 Water", "note": "CATCHMENT MAINTENANCE: Gutters: clean 2×/year (more if under trees) — leaf guards reduce frequency. Roof: sweep before rainy season (remove accumulated dust/bird droppings). First-flush diverter: empty after each rain, clean screen monthly. Tank: inspect annually for sediment buildup, algae, cracks.", "fullNote": "CATCHMENT MAINTENANCE: Gutters: clean 2×/year (more if under trees) — leaf guards reduce frequency. Roof: sweep before rainy season (remove accumulated dust/bird droppings). First-flush diverter: empty after each rain, clean screen monthly. Tank: inspect annually for sediment buildup, algae, cracks. Drain and scrub every 3-5 years. Inlet screen: check monthly (mosquito breeding risk!). Panama: rapid algae growth in sunlight — tanks must be opaque or shaded."}, {"sym": "PREFILTER", "price": 60, "range": "$30-100", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "Gravel/sand/charcoal prefilter (slow sand filter variant). Removes sediment, turbidity, and some pathogens before main filtration. Extends life of expensive filter elements. A layered system: coarse gravel (bottom) -> fine gravel -> coarse sand -> fine sand -> activated charcoal (top). Can treat tho", "fullNote": "Gravel/sand/charcoal prefilter (slow sand filter variant). Removes sediment, turbidity, and some pathogens before main filtration. Extends life of expensive filter elements. A layered system: coarse gravel (bottom) -> fine gravel -> coarse sand -> fine sand -> activated charcoal (top). Can treat thousands of gallons before media needs replacement."}, {"sym": "CLAY_FILTER", "price": 50, "range": "$30-100", "unit": "USD", "conf": "low", "safety": false, "cat": "💧 Water", "note": "Ceramic water filter (clay pot): pore size 0.2-1.0 microns. Removes 99.9% bacteria (E. coli, cholera), 100% protozoa (Giardia cysts 8-15μm, Crypto oocysts 4-6μm — far larger than pores). Does NOT remove viruses (0.02-0.1 microns pass through) unless silver-impregnated. Silver (colloidal or nanoparti", "fullNote": "Ceramic water filter (clay pot): pore size 0.2-1.0 microns. Removes 99.9% bacteria (E. coli, cholera), 100% protozoa (Giardia cysts 8-15μm, Crypto oocysts 4-6μm — far larger than pores). Does NOT remove viruses (0.02-0.1 microns pass through) unless silver-impregnated. Silver (colloidal or nanoparticle): provides bacteriostatic action (kills bacteria on contact), prevents biofilm, inhibits mold. Flow rate: single candle 0.5-1.5 L/hr, 2-candle 1-3 L/hr, 4-candle 2-4 L/hr. Flow degrades as pores clog — scrub outer surface with Scotch-Brite to restore (removes trapped sediment layer). Field effectiveness: 80-99% (lower than 99.9% lab due to user factors — improper cleaning, recontamination, seal bypass). Health impact: 60-70% reduction in diarrheal disease in households using ceramic filters (CDC, WHO studies). Manufacturing: clay + burnout material (rice husks, sawdust) fired at 850-1000°C. Brands: Potters for Peace ($25-40), Doulton ceramic candles ($20-40 each), Berkey Black elements ($60/pair). Panama: excellent for rural off-grid — low cost, no electricity, locally maintainable. Scrub weekly, replace elements every 1-2 years. Pair with UV or chlorine for virus protection. Source: 37KB research synthesis (my-new-project), cross-referenced CDC/WHO field studies."}, {"sym": "BERKEY", "price": 330, "range": "$250-350", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "Big Berkey gravity-fed countertop filter. 2-4 Black Berkey ceramic/carbon composite elements per unit. Removes >99.9% bacteria, viruses, parasites, plus heavy metals (lead, mercury), chemicals (chlorine, VOCs, pharmaceuticals), and sediment. Flow rate: 3.5 GPH with 2 elements, 7 GPH with 4 (large Be", "fullNote": "Big Berkey gravity-fed countertop filter. 2-4 Black Berkey ceramic/carbon composite elements per unit. Removes >99.9% bacteria, viruses, parasites, plus heavy metals (lead, mercury), chemicals (chlorine, VOCs, pharmaceuticals), and sediment. Flow rate: 3.5 GPH with 2 elements, 7 GPH with 4 (large Berkey). Filter life: 3,000 gallons per pair of Black Berkey elements ($120 replacement pair). Ceramic pore size ~0.2 microns, carbon block adsorbs chemicals. Models: Travel Berkey 1.5 gal ($250), Big Berkey 2.25 gal ($330), Royal 3.25 gal ($360), Imperial 4.5 gal ($420). Add PF-2 fluoride filters ($65/pair): activated alumina removes fluoride and arsenic. Silver impregnation provides bacteriostatic protection. Red dye food coloring test: if color passes through, elements compromised — replace. Clean elements when flow slows: scrub with Scotch-Brite pad under running water (removes biofilm/trapped sediment). Do NOT use soap. Store dry if not used >3 days (prevents mold). 60-70% diarrheal disease reduction in field studies (Guatemala 18-month study). Source: my-new-project research synthesis + manufacturer specs + CDC field data."}, {"sym": "ULTRAFILTER", "price": 300, "range": "$150-500", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "Under-sink RO or UF (ultrafiltration) system. UF pore size ~0.01-0.05 microns — removes bacteria, protozoa, and most viruses. RO goes further (0.0001 micron) removing dissolved salts, heavy metals, and all pathogens. RO produces ~90% pure water but wastes 3-4 gallons per gallon filtered. UF wastes n", "fullNote": "Under-sink RO or UF (ultrafiltration) system. UF pore size ~0.01-0.05 microns — removes bacteria, protozoa, and most viruses. RO goes further (0.0001 micron) removing dissolved salts, heavy metals, and all pathogens. RO produces ~90% pure water but wastes 3-4 gallons per gallon filtered. UF wastes none and doesn't remove beneficial minerals."}, {"sym": "STRAW_FILTER", "price": 40, "range": "$20-60", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "Personal water filter (LifeStraw, Sawyer, Katadyn BeFree). Hollow-fiber membrane with 0.1-0.2 micron pores. Squeeze/sip style: filters 1000+ gallons from any freshwater source. Removes 99.9999% of bacteria and 99.9% of protozoa. Does NOT remove viruses, heavy metals, or chemicals. Critical emergency", "fullNote": "Personal water filter (LifeStraw, Sawyer, Katadyn BeFree). Hollow-fiber membrane with 0.1-0.2 micron pores. Squeeze/sip style: filters 1000+ gallons from any freshwater source. Removes 99.9999% of bacteria and 99.9% of protozoa. Does NOT remove viruses, heavy metals, or chemicals. Critical emergency/survival item for every kit."}, {"sym": "UV_PURIFIER", "price": 200, "range": "$100-300", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "UV-C light purifier kills 99.99% of bacteria, viruses, and protozoa by disrupting DNA (254nm wavelength). Works only on clear water — sediment blocks UV light so pre-filtration is essential. SteriPEN (battery-powered) treats 1L in 90 seconds; inline units treat continuous flow. Zero chemicals, no ta", "fullNote": "UV-C light purifier kills 99.99% of bacteria, viruses, and protozoa by disrupting DNA (254nm wavelength). Works only on clear water — sediment blocks UV light so pre-filtration is essential. SteriPEN (battery-powered) treats 1L in 90 seconds; inline units treat continuous flow. Zero chemicals, no taste alteration. Requires electricity or batteries."}, {"sym": "SODIS", "price": 5, "range": "$0-10", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "Solar disinfection (SODIS): fill clean PET plastic bottles with clear water and place in full sun for 6+ hours (or 2 days if cloudy). UV-A radiation and heat (to 50°C+) inactivate pathogens. Proven effective against bacteria and viruses. No cost. Widely promoted by WHO in developing countries. Needs", "fullNote": "Solar disinfection (SODIS): fill clean PET plastic bottles with clear water and place in full sun for 6+ hours (or 2 days if cloudy). UV-A radiation and heat (to 50°C+) inactivate pathogens. Proven effective against bacteria and viruses. No cost. Widely promoted by WHO in developing countries. Needs pre-filtered water (sediment blocks UV). Doesn't remove chemicals."}, {"sym": "BOIL_POT", "price": 20, "range": "$10-50", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "Simple pot for boiling water — the oldest and most reliable purification method. Boiling at rolling boil for 1 minute (3 min above 6500ft elevation) kills >99.9% of all pathogens including bacteria, viruses, and protozoan cysts (Giardia, Cryptosporidium). Requires fuel/energy. Doesn't remove chemica", "fullNote": "Simple pot for boiling water — the oldest and most reliable purification method. Boiling at rolling boil for 1 minute (3 min above 6500ft elevation) kills >99.9% of all pathogens including bacteria, viruses, and protozoan cysts (Giardia, Cryptosporidium). Requires fuel/energy. Doesn't remove chemicals, sediment, or improve taste (but aeration after boiling helps)."}, {"sym": "RO_DESAL", "price": 3000, "range": "$2000-4,000", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "Small marine reverse osmosis desalinator (Spectra/Katadyn). Produces drinkable water from saltwater, brackish water, or contaminated sources. RO removes 95-99% of total dissolved solids including salts, heavy metals, and most pathogens. Requires 50-80 psi feed pressure (usually a booster pump), prod", "fullNote": "Small marine reverse osmosis desalinator (Spectra/Katadyn). Produces drinkable water from saltwater, brackish water, or contaminated sources. RO removes 95-99% of total dissolved solids including salts, heavy metals, and most pathogens. Requires 50-80 psi feed pressure (usually a booster pump), produces 4-20 GPH. Wastes 1-3 gallons of brine per gallon of fresh water produced."}, {"sym": "WATER_TEST_KIT", "price": 30, "range": "$15-100", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "Water test kit: basic bacteria/coliform test strips ~$15-30. Comprehensive lab test (send sample): $50-100 tests for bacteria, nitrates, lead, arsenic, pH, hardness, TDS. Panama: MIDA and IDAAN offer water testing. Test: new well/source before using, annually for existing sources, after heavy rains ", "fullNote": "Water test kit: basic bacteria/coliform test strips ~$15-30. Comprehensive lab test (send sample): $50-100 tests for bacteria, nitrates, lead, arsenic, pH, hardness, TDS. Panama: MIDA and IDAAN offer water testing. Test: new well/source before using, annually for existing sources, after heavy rains (surface water), if taste/color/odor changes. Critical contaminants: coliform (sewage contamination), arsenic (volcanic regions), nitrates (agricultural runoff), salt (coastal intrusion)."}, {"sym": "WATER_TREATMENT_COMPARE", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "WATER TREATMENT COMPARISON: Boiling: kills >99.9% pathogens, $0 (fuel cost), 0 chemicals, doesn't remove sediment/chemicals. Berkey: removes >99.9% bacteria/virus + heavy metals/chemicals, $330, 3-4 GPH, no power. UF: 0.01-0.05 micron, removes bacteria/protozoa/most viruses, $150-500, wastes no wate", "fullNote": "WATER TREATMENT COMPARISON: Boiling: kills >99.9% pathogens, $0 (fuel cost), 0 chemicals, doesn't remove sediment/chemicals. Berkey: removes >99.9% bacteria/virus + heavy metals/chemicals, $330, 3-4 GPH, no power. UF: 0.01-0.05 micron, removes bacteria/protozoa/most viruses, $150-500, wastes no water. RO: 0.0001 micron, removes everything including salts/minerals, $200-500, wastes 3-4 gal per gal produced. UV: kills >99.99% pathogens (DNA disruption), $100-300, needs clear water + electricity. SODIS: free, 6hrs sun, PET bottles, WHO-backed, no chemicals removed. Clay filter: $50, 1-3 L/hr, bacteria only, no viruses."}, {"sym": "WATER_PH_CORRECT", "price": 50, "range": "$30-150", "unit": "USD", "conf": "medium", "safety": false, "cat": "💧 Water", "note": "pH correction system. Rainwater is naturally acidic (pH 5.0-5.5 from dissolved CO₂). Ideal drinking water: pH 6.5-8.5. Acidic water corrodes copper pipes and leaches metals. Correction: calcite neutralizer tank ($50-100) raises pH by dissolving calcium carbonate. For severe acidity: soda ash injecti", "fullNote": "pH correction system. Rainwater is naturally acidic (pH 5.0-5.5 from dissolved CO₂). Ideal drinking water: pH 6.5-8.5. Acidic water corrodes copper pipes and leaches metals. Correction: calcite neutralizer tank ($50-100) raises pH by dissolving calcium carbonate. For severe acidity: soda ash injection system ($100-150). Test pH quarterly. Panama: volcanic soils can also make groundwater acidic."}, {"sym": "UV_VS_CHLORINE", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "UV vs CHLORINE DISINFECTION: UV: instant (no contact time), no chemicals, no taste, kills ALL pathogens (bacteria/virus/protozoa), needs electricity + clear water, $100-300. Chlorine: residual protection (keeps water safe in pipes), cheap ($5/month), needs 30 min contact time, taste/odor, produces d", "fullNote": "UV vs CHLORINE DISINFECTION: UV: instant (no contact time), no chemicals, no taste, kills ALL pathogens (bacteria/virus/protozoa), needs electricity + clear water, $100-300. Chlorine: residual protection (keeps water safe in pipes), cheap ($5/month), needs 30 min contact time, taste/odor, produces disinfection byproducts, doesn't kill Crypto reliably. For off-grid: UV for daily use (instant, clean), chlorine tablets as backup (storable, no power needed)."}, {"sym": "FILTER_PAIR_STREAM", "price": 60, "range": "$30-330", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "FILTER PAIRING — Surface water. Streams/rivers/lakes have the HIGHEST pathogen load of any source. Turbidity varies wildly (crystal clear in dry season, chocolate milk in flood). TREATMENT TRAIN (minimum): (1) Coarse screen at intake (1/4-1/2\" mesh — stops leaves, twigs, fish). (2) Settling basin (5", "fullNote": "FILTER PAIRING — Surface water. Streams/rivers/lakes have the HIGHEST pathogen load of any source. Turbidity varies wildly (crystal clear in dry season, chocolate milk in flood). TREATMENT TRAIN (minimum): (1) Coarse screen at intake (1/4-1/2\" mesh — stops leaves, twigs, fish). (2) Settling basin (55-gal drum or concrete tank — water sits 4+ hours, heavy sediment drops out). (3) Sand/gravel prefilter ($30-100, slow sand filter or rapid sand filter — removes remaining sediment and some pathogens). (4) Main filter: Berkey ($250-350, gravity, no power) OR UF ($150-500, needs pressure) OR RO ($200-500, wastes water). (5) Disinfection: UV ($100-300, needs power + clear water) OR chlorine (cheap but taste). TRIPLE BARRIER recommended: prefilter + main filter + disinfection = 99.999% pathogen removal. COST: minimum $360 (prefilter + Berkey), best $510 (prefilter + UF + UV). Panama rainy season: surface water turbidity spikes — prefilter clogs faster, clean weekly. If water runs brown after heavy rain: let settle 24 hrs, draw from top (clear water), boil if no filter. Test quarterly for coliform (indicator of fecal contamination). Never drink untreated surface water — even 'clean-looking' mountain streams can have Giardia from wildlife upstream."}, {"sym": "FILTER_PAIR_WELL", "price": 60, "range": "$30-300", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "FILTER PAIRING — Deep well (>50 ft). Deep groundwater is naturally filtered through soil/rock layers — generally safest source. TREATMENT: often NONE needed for drinking (test first!). Prefilter for sediment only if pump pulls sand. No UV needed unless coliform test positive (>0 CFU/100mL = contamin", "fullNote": "FILTER PAIRING — Deep well (>50 ft). Deep groundwater is naturally filtered through soil/rock layers — generally safest source. TREATMENT: often NONE needed for drinking (test first!). Prefilter for sediment only if pump pulls sand. No UV needed unless coliform test positive (>0 CFU/100mL = contamination — shocking well with chlorine bleach may resolve). IRON/MANGANESE: common in well water — stains fixtures brown/black, metallic taste. Iron filter (greensand or Birm media, $200-500) oxidizes dissolved iron into filterable particles. MANGANESE: similar treatment but needs higher pH. HARDNESS: calcium/magnesium >120 ppm — water softener ($400-800 ion exchange, salt-regenerated) OR accept hard water (not harmful, just annoying — soap doesn't lather, scale builds up on fixtures). ARSENIC: test in volcanic areas (Chiriqui, Panama — arsenic naturally occurs in volcanic rock). Arsenic removal: activated alumina or reverse osmosis (only RO for drinking, whole-house is expensive). SALT INTRUSION: coastal wells near ocean — chloride test. RO only solution for desalination. TEST: new well — full panel (coliform, nitrates, arsenic, lead, hardness, pH, TDS, chloride). Annually: coliform + nitrates. Every 3-5 years: full panel. After heavy rains: coliform test (surface water may infiltrate shallow casing). Panama: MIDA and IDAAN offer water testing services. Private labs in Panama City."}, {"sym": "FILTER_PAIR_RAIN", "price": 60, "range": "$30-330", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "FILTER PAIRING — Rainwater harvesting. Rainwater is naturally DISTILLED quality (evaporated from ocean, condensed in clouds) — no minerals, no pathogens, no chemicals. BUT: picks up contamination from roof: bird/bat droppings (bacteria, histoplasmosis), dust, pollen, leaf tannins, dead insects. TREA", "fullNote": "FILTER PAIRING — Rainwater harvesting. Rainwater is naturally DISTILLED quality (evaporated from ocean, condensed in clouds) — no minerals, no pathogens, no chemicals. BUT: picks up contamination from roof: bird/bat droppings (bacteria, histoplasmosis), dust, pollen, leaf tannins, dead insects. TREATMENT TRAIN: (1) Gutter screens (keep out leaves, large debris). (2) First-flush diverter (discards first 10-15 gallons per 1,000 sq ft roof — washes off accumulated contaminants). (3) Tank inlet screen (1mm mesh — mosquitoes, debris). (4) Prefilter (sediment filter, 20-50 micron). (5) Carbon filter (removes taste, odor, tannins, VOCs from roof materials). (6) Berkey or UF for drinking (polishing). (7) UV OPTIONAL (rainwater is clean enough if catchment is well-maintained — UV adds protection but needs power). NO water softener needed (rainwater is naturally soft — 0 ppm hardness). pH: rainwater is acidic (pH 5.0-5.5 from dissolved CO2 in atmosphere). ACIDITY EFFECTS: can corrode copper pipes (blue-green stains on fixtures). Raise pH with: calcite neutralizer tank ($50-100, calcium carbonate media dissolves into water, raises pH to 7.0), or soda ash injection for more severe acidity. TEST: pH, coliform (bird droppings = possible contamination), heavy metals (roof material may leach), TDS (should be very low — <20 ppm). Panama: rainwater is excellent source in all regions. Bocas del Toro: 157\" rain/year — rainwater alone can supply everything. Azuero: 40-60\" — rainwater supplements well water. Clean gutters 2×/year, tank annually."}, {"sym": "FILTER_PAIR_SALT", "price": 3000, "range": "$2000-4,000", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "FILTER PAIRING — Saltwater/brackish: ONLY Reverse Osmosis (RO) works. Standard filters (Berkey, UF, UV) do NOT remove salt. Marine RO desalinator (Spectra/Katadyn) $2000-4000. Produces 4-20 GPH. Wastes 1-3 gallons brine per gallon fresh. Energy-intensive: 15-30 Wh/gallon. For oceanfront Panama prope", "fullNote": "FILTER PAIRING — Saltwater/brackish: ONLY Reverse Osmosis (RO) works. Standard filters (Berkey, UF, UV) do NOT remove salt. Marine RO desalinator (Spectra/Katadyn) $2000-4000. Produces 4-20 GPH. Wastes 1-3 gallons brine per gallon fresh. Energy-intensive: 15-30 Wh/gallon. For oceanfront Panama properties — essential if no freshwater source. Solar-powered RO systems available ($3000-6000 complete)."}, {"sym": "SOLAR_HOT_WATER", "price": 400, "range": "$200-800", "unit": "USD", "conf": "low", "safety": false, "cat": "💧 Water", "note": "Solar thermal water heating — DIFFERENT from PV electric panels. Types: Batch/ICS (Integrated Collector Storage): black tank in insulated glass box, simplest, $100-300 DIY, 30-50 gallon, reaches 90-120°F, good for preheating. Thermosiphon: tank above collector, natural convection circulates (hot ris", "fullNote": "Solar thermal water heating — DIFFERENT from PV electric panels. Types: Batch/ICS (Integrated Collector Storage): black tank in insulated glass box, simplest, $100-300 DIY, 30-50 gallon, reaches 90-120°F, good for preheating. Thermosiphon: tank above collector, natural convection circulates (hot rises, cold sinks), no pump, $300-600, 40-80 gallon, reaches 120-160°F. Evacuated tube: vacuum-sealed glass tubes (like thermos), most efficient — works in cold/cloudy conditions, $600-1200, reaches 140-180°F. DIY batch build: 30-50 gal tank painted flat black, 2\" polyiso foam insulation, double-pane glass or twinwall polycarbonate glazing, south-facing (north in southern hemisphere), tilt = latitude + 15° (winter bias for hot water). MUST include: tempering/mixing valve ($30-60, prevents scalding — water can reach 160°F+), pressure relief valve, drain valve (freeze protection — not needed Panama lowlands). Annual maintenance: check glazing seal, anode rod in metal tank (replace every 3-5 years), flush sediment. Pair with on-demand propane or electric backup for cloudy stretches. Panama: 4-5 PSH year-round = excellent solar thermal. Batch heater preheats water to 100°F, backup gas only needs to add 20°F. Pair with MIST_SHOWER for ultra-efficient hot water system. Source: my-new-project research synthesis + manufacturer specs."}, {"sym": "ROCKET_HOT_WATER", "price": 100, "range": "$50-200", "unit": "USD", "conf": "low", "safety": false, "cat": "💧 Water", "note": "Rocket stove water heater: high-efficiency wood-burning stove with water jacket or coil inside the exhaust pipe. Uses 80% less wood than an open fire. The 'rocket' design (L-tube with insulated riser) ensures complete combustion and high heat transfer. Can heat 5+ gallons in 15 minutes. Requires per", "fullNote": "Rocket stove water heater: high-efficiency wood-burning stove with water jacket or coil inside the exhaust pipe. Uses 80% less wood than an open fire. The 'rocket' design (L-tube with insulated riser) ensures complete combustion and high heat transfer. Can heat 5+ gallons in 15 minutes. Requires periodic cleaning of soot from the water jacket."}, {"sym": "PLUMBING_PEX", "price": 0.5, "range": "$0.3-1.0", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "PEX pipe per foot. The modern standard for off-grid plumbing. Flexible (bends around corners — fewer fittings). Freeze-resistant (expands without bursting). No corrosion. Fast installation (crimp or clamp connections). Color-coded: red=hot, blue=cold, white=either. 1/2\" for fixtures, 3/4\" for mains,", "fullNote": "PEX pipe per foot. The modern standard for off-grid plumbing. Flexible (bends around corners — fewer fittings). Freeze-resistant (expands without bursting). No corrosion. Fast installation (crimp or clamp connections). Color-coded: red=hot, blue=cold, white=either. 1/2\" for fixtures, 3/4\" for mains, 1\" for supply lines. PEX-A (expansion) is premium; PEX-B (crimp) is standard. Do NOT expose to UV (must be buried or indoors). Fittings: brass or plastic, ~$2-5 each."}, {"sym": "PLUMBING_GRAVITY", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "GRAVITY PLUMBING DESIGN: Source elevation must be higher than highest fixture. Minimum: 35 ft (15 PSI) for basic flow. Good: 70 ft (30 PSI) for normal fixtures. Best: 115 ft (50 PSI) for good shower pressure. Pipe sizing: larger diameter = less friction loss. 1\" pipe for main line, 3/4\" branches, 1/", "fullNote": "GRAVITY PLUMBING DESIGN: Source elevation must be higher than highest fixture. Minimum: 35 ft (15 PSI) for basic flow. Good: 70 ft (30 PSI) for normal fixtures. Best: 115 ft (50 PSI) for good shower pressure. Pipe sizing: larger diameter = less friction loss. 1\" pipe for main line, 3/4\" branches, 1/2\" to fixtures. Slope: 1/4\" per 10 ft minimum for drainage. Air gap at tank overflow. Check valves prevent backflow. Pressure-reducing valve if elevation >150 ft (too much pressure damages fixtures)."}, {"sym": "PIPE_INSULATION", "price": 1, "range": "$0.5-2.0", "unit": "USD", "conf": "medium", "safety": false, "cat": "💧 Water", "note": "Pipe insulation per foot. Foam tube insulation for indoor/cold protection. In Panama (tropics): insulation mainly prevents condensation (sweating pipes cause mold). Hot water pipes should be insulated (reduce heat loss 50-70%). Outdoor exposed pipes: insulate AND bury or shade (UV degrades plastic).", "fullNote": "Pipe insulation per foot. Foam tube insulation for indoor/cold protection. In Panama (tropics): insulation mainly prevents condensation (sweating pipes cause mold). Hot water pipes should be insulated (reduce heat loss 50-70%). Outdoor exposed pipes: insulate AND bury or shade (UV degrades plastic). Freeze protection: not needed below 2,000m in Panama. Above 2,000m (Chiriqui highlands): insulate + heat tape for rare frost nights."}, {"sym": "BACKFLOW_PREVENTER", "price": 25, "range": "$15-50", "
