unit": "USD", "conf": "high", "safety": true, "cat": "💧 Water", "note": "Backflow preventer (check valve). Prevents contaminated water from flowing backward into your clean water supply. Required by code for: hose bibs, irrigation connections, boiler connections. Spring-loaded check valve ~$15-25. Dual check valve ~$30-50 for higher protection. Install on pump discharge,", "fullNote": "Backflow preventer (check valve). Prevents contaminated water from flowing backward into your clean water supply. Required by code for: hose bibs, irrigation connections, boiler connections. Spring-loaded check valve ~$15-25. Dual check valve ~$30-50 for higher protection. Install on pump discharge, tank inlet, hose connections. Test annually. Panama: required where pump draws from potentially contaminated source."}, {"sym": "MIST_SHOWER", "price": 80, "range": "$50-150", "unit": "USD", "conf": "medium", "safety": false, "cat": "💧 Water", "note": "Ultra-low-flow shower system. Saturn low-flow showerhead (0.5 GPM, $15-25) vs standard 2.5 GPM — uses 80% less water. Oxygenics showerhead (1.5 GPM, $30-40) adds air for pressure feel. Navy shower technique: 30 seconds wet down → water off → soap up → 60 seconds rinse = 1.5-3 gallons total vs 15-30 ", "fullNote": "Ultra-low-flow shower system. Saturn low-flow showerhead (0.5 GPM, $15-25) vs standard 2.5 GPM — uses 80% less water. Oxygenics showerhead (1.5 GPM, $30-40) adds air for pressure feel. Navy shower technique: 30 seconds wet down → water off → soap up → 60 seconds rinse = 1.5-3 gallons total vs 15-30 gallons conventional. Compressed air mist shower (advanced): air+water mixing creates fine mist, uses 0.5-1 GPM, feels like full shower, $80-150 for mist head + small air compressor or pressure tank. Shower timer ($15-25): visual sand timer, 4-5 minutes, keeps showers short. Solar shower bag ($15-25): 5-gallon black PVC bag, heats in sun, hung from tree/hook. Good for camping or backup. Install an inline shutoff at shower head (push-button valve, $5-10) to pause flow without losing temperature setting. Panama: solar shower bag reaches 100-110°F in 2-3 hours of tropical sun. Pair with SOLAR_HOT_WATER for warm showers using no electricity. Tile/stone shower floor directs water to GREYWATER system."}, {"sym": "LOW_FLOW_FIXTURES", "price": 15, "range": "$5-50", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "Low-flow fixtures per unit. Aerator for sink faucet: 0.5-1.5 GPM vs standard 2.2 GPM ($5-15). Low-flow showerhead: 1.5-2.0 GPM vs standard 2.5 GPM ($10-30). Dual-flush toilet converter: 0.8/1.6 GPF vs standard 3.5 GPF ($20-50). Composting toilet: 0 GPF ($800-1200 — see ch05). Savings: family of 3 sa", "fullNote": "Low-flow fixtures per unit. Aerator for sink faucet: 0.5-1.5 GPM vs standard 2.2 GPM ($5-15). Low-flow showerhead: 1.5-2.0 GPM vs standard 2.5 GPM ($10-30). Dual-flush toilet converter: 0.8/1.6 GPF vs standard 3.5 GPF ($20-50). Composting toilet: 0 GPF ($800-1200 — see ch05). Savings: family of 3 saves 15,000-30,000 gallons/year with full low-flow conversion. Payback: <1 year in reduced pumping/purchasing costs."}, {"sym": "WATER_METER", "price": 40, "range": "$25-80", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "Inline water meter for off-grid system. Measures total gallons used — critical for water budgeting when you have finite storage. Digital or mechanical. Install on main line after pump/tank. Knowing your consumption = knowing your autonomy remaining. Without a meter, you're guessing. Basic mechanical", "fullNote": "Inline water meter for off-grid system. Measures total gallons used — critical for water budgeting when you have finite storage. Digital or mechanical. Install on main line after pump/tank. Knowing your consumption = knowing your autonomy remaining. Without a meter, you're guessing. Basic mechanical meter ~$25-40. Digital with flow rate ~$50-80. Pair with tank level indicator for complete water awareness."}, {"sym": "LEAK_DETECTION", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "LEAK DETECTION: A 1/16\" (1.6mm) leak wastes 900+ gallons/month. Check: read water meter, don't use water for 2 hours, re-read. Any change = leak. Common leaks: toilet flapper ($5 fix), dripping faucet (washer $2), hose bib, pressure tank bladder. In off-grid: leaks drain your stored water and run yo", "fullNote": "LEAK DETECTION: A 1/16\" (1.6mm) leak wastes 900+ gallons/month. Check: read water meter, don't use water for 2 hours, re-read. Any change = leak. Common leaks: toilet flapper ($5 fix), dripping faucet (washer $2), hose bib, pressure tank bladder. In off-grid: leaks drain your stored water and run your pump unnecessarily. Fix leaks immediately — they're the cheapest 'water source' you can add. Listen for hissing at night when quiet. Use food coloring in toilet tank to test flapper."}, {"sym": "DRIP_IRRIGATION", "price": 100, "range": "$50-300", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "Drip irrigation kit for garden. 1/2\" main line + 1/4\" drip emitters. Uses 50-70% less water than sprinklers. Delivers water directly to plant roots — no evaporation. Runs on low pressure (10-30 PSI) — gravity tank works. Timer ($30-50) automates watering. Emitter spacing: 12\" for vegetables, 18-24\" ", "fullNote": "Drip irrigation kit for garden. 1/2\" main line + 1/4\" drip emitters. Uses 50-70% less water than sprinklers. Delivers water directly to plant roots — no evaporation. Runs on low pressure (10-30 PSI) — gravity tank works. Timer ($30-50) automates watering. Emitter spacing: 12\" for vegetables, 18-24\" for shrubs/trees. Flow rate: 0.5-2 GPH per emitter. Filter REQUIRED before drip line (emitters clog). Panama: essential for dry season gardening. Pair with greywater system."}, {"sym": "LIVESTOCK_WATER", "price": 100, "range": "$50-200", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "LIVESTOCK WATERING SYSTEM: Cattle: 10-20 gal/head/day. Pigs: 3-5 gal/head/day. Chickens: 0.5 gal/10 birds/day. Automatic waterers (float valve) ~$30-60 each reduce waste 50% vs open troughs. Frost-free hydrants if applicable (not Panama lowlands). Ram pump can lift water from stream to pasture witho", "fullNote": "LIVESTOCK WATERING SYSTEM: Cattle: 10-20 gal/head/day. Pigs: 3-5 gal/head/day. Chickens: 0.5 gal/10 birds/day. Automatic waterers (float valve) ~$30-60 each reduce waste 50% vs open troughs. Frost-free hydrants if applicable (not Panama lowlands). Ram pump can lift water from stream to pasture without electricity. Solar pump + small tank at pasture = off-grid livestock water. Fence animals away from water source (50-100ft buffer) to prevent contamination."}, {"sym": "GREYWATER", "price": 100, "range": "$50-200", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "Greywater system: routes sink, shower, and laundry water to landscape irrigation. NOT toilet water (blackwater — needs septic). Components: 3-way diverter valve ($30-60) switches between septic and greywater, 1\" HDPE or PVC pipe to landscape, mulch basin (3×3 ft, 8\" deep, filled with wood chips) at ", "fullNote": "Greywater system: routes sink, shower, and laundry water to landscape irrigation. NOT toilet water (blackwater — needs septic). Components: 3-way diverter valve ($30-60) switches between septic and greywater, 1\" HDPE or PVC pipe to landscape, mulch basin (3×3 ft, 8\" deep, filled with wood chips) at each outlet. Flow: gravity works best, pump if uphill. Soap: use only biodegradable, salt-free, boron-free soaps (Oasis, ECOS, Dr. Bronner's). Avoid: bleach (kills soil biology), fabric softener (clogs soil), harsh cleaners. Plants: fruit trees, ornamentals, berries. NOT root vegetables or leafy greens (pathogen risk). Code: many jurisdictions allow simple greywater without permit if: <400 GPD, no pumps, subsurface disposal, no blackwater mixing. Panama: greywater keeps fruit trees productive through dry season. Maintenance: clean diverter filter monthly, flush pipes with water annually, rotate mulch basin locations every 2 years. Never store greywater (>24 hrs = anaerobic, smelly, pathogen bloom). Direct-to-landscape ONLY."}, {"sym": "SEASONAL_ADJUST", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "SEASONAL WATER BUDGET: Rainy season (May-Nov Panama): water is abundant — fill ALL storage, run irrigation freely, recharge groundwater. Dry season (Dec-Apr): switch to conservation mode. Reduce garden watering (mulch heavily), shower shorter, laundry less frequent. Monitor tank levels weekly. When ", "fullNote": "SEASONAL WATER BUDGET: Rainy season (May-Nov Panama): water is abundant — fill ALL storage, run irrigation freely, recharge groundwater. Dry season (Dec-Apr): switch to conservation mode. Reduce garden watering (mulch heavily), shower shorter, laundry less frequent. Monitor tank levels weekly. When storage drops to 50%: stop all irrigation. At 25%: drinking + cooking only, no showers. At 10%: emergency rationing. Install tank level gauge now — don't guess in a drought."}, {"sym": "DRY_SEASON_AUTONOMY", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "DRY SEASON WATER AUTONOMY CALCULATION: Storage needed (gal) = daily usage × longest dry period (days) × 1.3 buffer. Azuero (worst case): 5 months = 150 days. 3 people × 25 gal/day × 150 × 1.3 = 14,625 gallons. That's a 10,000-gal cistern + supplementary source. Bocas (best case): no real dry season,", "fullNote": "DRY SEASON WATER AUTONOMY CALCULATION: Storage needed (gal) = daily usage × longest dry period (days) × 1.3 buffer. Azuero (worst case): 5 months = 150 days. 3 people × 25 gal/day × 150 × 1.3 = 14,625 gallons. That's a 10,000-gal cistern + supplementary source. Bocas (best case): no real dry season, 30-day buffer sufficient. 3 people × 25 gal × 30 × 1.3 = 2,925 gallons (manageable with 3,000-gal setup). Rainwater alone works in Bocas; Azuero needs well or stream."}, {"sym": "BUNDLE_WATER_STARTER", "price": 800, "range": "$600-1,000", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "WATER BUNDLE — Starter (Weekend Cabin): 2× 55-gal blue drums ($100) + Shurflo 12V pump ($150) + Berkey Travel ($250) + basic plumbing kit ($100) + rainwater gutter kit ($200). Total: ~$800. Supplies 2 people for weekends. Gravity-fed from drums to sink. Berkey for drinking water. Good for: weekend c", "fullNote": "WATER BUNDLE — Starter (Weekend Cabin): 2× 55-gal blue drums ($100) + Shurflo 12V pump ($150) + Berkey Travel ($250) + basic plumbing kit ($100) + rainwater gutter kit ($200). Total: ~$800. Supplies 2 people for weekends. Gravity-fed from drums to sink. Berkey for drinking water. Good for: weekend cabin, tiny home, starter setup. Limitations: no hot water, no shower, manual drum refilling."}, {"sym": "BUNDLE_WATER_FAMILY", "price": 3500, "range": "$2500-5,000", "unit": "USD", "conf": "medium", "safety": false, "cat": "💧 Water", "note": "WATER BUNDLE — Family (Full-Time): 500-gal poly tank ($600) + Flojet demand pump ($200) + Berkey Big ($330) + under-sink UF ($300) + solar hot water DIY ($400) + mist shower ($80) + greywater system ($100) + first-flush rainwater kit ($300) + plumbing full house ($500). Total: ~$2,800-3,500. Supplie", "fullNote": "WATER BUNDLE — Family (Full-Time): 500-gal poly tank ($600) + Flojet demand pump ($200) + Berkey Big ($330) + under-sink UF ($300) + solar hot water DIY ($400) + mist shower ($80) + greywater system ($100) + first-flush rainwater kit ($300) + plumbing full house ($500). Total: ~$2,800-3,500. Supplies 3-4 people full-time. Hot showers. Drinking + household water. Greywater to garden. Good for: family homestead, full-time off-grid. Add deep well (+$3,500) if no surface water."}, {"sym": "BUNDLE_WATER_HOMESTEAD", "price": 8000, "range": "$6000-12,000", "unit": "USD", "conf": "medium", "safety": false, "cat": "💧 Water", "note": "WATER BUNDLE — Homestead (Generational): Drilled well 100-200ft with submersible pump ($5,500) + 2,500-gal poly cistern ($2,200) + pressure tank ($200) + whole-house UF + UV ($600) + solar hot water system ($800) + greywater to orchard ($200) + rainwater backup system ($500) + water quality test lab", "fullNote": "WATER BUNDLE — Homestead (Generational): Drilled well 100-200ft with submersible pump ($5,500) + 2,500-gal poly cistern ($2,200) + pressure tank ($200) + whole-house UF + UV ($600) + solar hot water system ($800) + greywater to orchard ($200) + rainwater backup system ($500) + water quality test lab kit ($100) + backup hand pump ($700). Total: ~$8,000-10,000. Year-round water independence. Redundant sources. Hot water. Garden irrigation ready. Good for: permanent homestead, family compound."}, {"sym": "EMERGENCY_WATER_PLAN", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": true, "cat": "💧 Water", "note": "EMERGENCY WATER PLAN: Minimum 3 days stored drinking water per person (3 gallons total). 2-week supply ideal (14 gallons/person). Store in: sealed blue HDPE containers with bleach (8 drops unscented bleach per gallon, rotate annually). Backup purification: LifeStraw/Sawyer ($20-40) or iodine tablets", "fullNote": "EMERGENCY WATER PLAN: Minimum 3 days stored drinking water per person (3 gallons total). 2-week supply ideal (14 gallons/person). Store in: sealed blue HDPE containers with bleach (8 drops unscented bleach per gallon, rotate annually). Backup purification: LifeStraw/Sawyer ($20-40) or iodine tablets ($10). Know nearest surface water source. Have a way to carry water (buckets, cart). If primary pump fails: hand pump backup or generator to run pump. Panama: earthquake/landslide can disrupt water infrastructure. Be self-sufficient."}, {"sym": "BACKUP_HAND_PUMP", "price": 200, "range": "$69-700", "unit": "USD", "conf": "high", "safety": true, "cat": "💧 Water", "note": "Backup hand pump for well. Shallow (<25ft): Bison 1118-25 ($297) or Flotec FP4200 ($69). Deep (25-200ft): Simple Pump 1115 ($1,095) or Bison 1145-200 ($679). Essential redundancy — electric pump WILL fail eventually (lightning, motor burnout, controller failure). Hand pump gives you water regardless", "fullNote": "Backup hand pump for well. Shallow (<25ft): Bison 1118-25 ($297) or Flotec FP4200 ($69). Deep (25-200ft): Simple Pump 1115 ($1,095) or Bison 1145-200 ($679). Essential redundancy — electric pump WILL fail eventually (lightning, motor burnout, controller failure). Hand pump gives you water regardless. Install alongside electric pump in same well casing if possible. Test monthly. Keep spare leathers/cups for rebuild."}, {"sym": "SOLAR_PANEL", "price": 110, "range": "$90-150", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Standard solar panel — monocrystalline, aluminum frame, tempered glass. Renogy RNG-100D-SS 100W ($100, 42.2×19.6×1.4\", 14.1 lbs). Rich Solar MEGA 100 ($80, 41.5×21.0\"). HQST HSP100D-L ($75). Eco-Worthy 100W ($70). 36-cell (12V nominal): Voc=22V, Vmp=18.6V, Imp=5.4A. BEST VALUE: buy 4-packs ($260-320", "fullNote": "Standard solar panel — monocrystalline, aluminum frame, tempered glass. Renogy RNG-100D-SS 100W ($100, 42.2×19.6×1.4\", 14.1 lbs). Rich Solar MEGA 100 ($80, 41.5×21.0\"). HQST HSP100D-L ($75). Eco-Worthy 100W ($70). 36-cell (12V nominal): Voc=22V, Vmp=18.6V, Imp=5.4A. BEST VALUE: buy 4-packs ($260-320 for 400W total). Cell types: Monocrystalline (black, 18-24% efficient, now standard). Polycrystalline (blue, 15-18%, being phased out). N-Type TOPCon (19-24%, better temp coefficient, premium). Half-cell: split cells reduce resistive losses, better shade tolerance. PERC: passivated emitter, +1-2% efficiency. Panama: mono PERC panels perform better in tropical heat (lower temp coefficient). 25-year output warranty (80% at year 25). Degradation: 2-3% first year (LID), then 0.5-0.7%/year. Panel life: 25-30+ years (they don't suddenly die — output slowly declines)."}, {"sym": "PANEL_MONO_VS_POLY", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "MONOCRYSTALLINE: 18-24% efficiency, uniform black appearance, better low-light/high-heat performance, 5-10% more expensive, NOW STANDARD (>90% of new panels). POLYCRYSTALLINE: 15-18% efficiency, blue marbled appearance, cheaper but phasing out, still found in budget/used markets. For off-grid: pay t", "fullNote": "MONOCRYSTALLINE: 18-24% efficiency, uniform black appearance, better low-light/high-heat performance, 5-10% more expensive, NOW STANDARD (>90% of new panels). POLYCRYSTALLINE: 15-18% efficiency, blue marbled appearance, cheaper but phasing out, still found in budget/used markets. For off-grid: pay the mono premium — the space savings and better cloudy-day production pay back fast. THIN-FILM (CdTe, CIGS): 10-13% efficiency, needs 2× space, flexible options exist, niche use only."}, {"sym": "PANEL_CELL_COUNT", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "CELL COUNT VOLTAGE REFERENCE: 36-cell = '12V nominal' (Voc~22V, Vmp~18V) — standard for 50W-200W panels, pairs with PWM on 12V. 60-cell = '24V nominal' (Voc~37-40V, Vmp~30-33V) — 250W-300W residential, needs MPPT for 12V battery. 72-cell = '24V nominal' large format (Voc~45-50V, Vmp~37-42V) — 300W-4", "fullNote": "CELL COUNT VOLTAGE REFERENCE: 36-cell = '12V nominal' (Voc~22V, Vmp~18V) — standard for 50W-200W panels, pairs with PWM on 12V. 60-cell = '24V nominal' (Voc~37-40V, Vmp~30-33V) — 250W-300W residential, needs MPPT for 12V battery. 72-cell = '24V nominal' large format (Voc~45-50V, Vmp~37-42V) — 300W-400W, same voltage range as 60-cell but higher current. 120 half-cell = 60-cell equivalent, better shade tolerance. 144 half-cell = 72-cell equivalent, now standard for 400W+."}, {"sym": "PANEL_TEMP_COEFF", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "PANEL TEMPERATURE COEFFICIENT (Pmax) — how much power is lost per °C above 25°C (77°F) Standard Test Conditions. Standard mono PERC: -0.35 to -0.37%/°C. Premium N-Type TOPCon: -0.29 to -0.30%/°C. WHAT THIS MEANS: on a 40°C (104°F) day, panel temperature reaches 55-60°C (131-140°F) — 30-35°C above ST", "fullNote": "PANEL TEMPERATURE COEFFICIENT (Pmax) — how much power is lost per °C above 25°C (77°F) Standard Test Conditions. Standard mono PERC: -0.35 to -0.37%/°C. Premium N-Type TOPCon: -0.29 to -0.30%/°C. WHAT THIS MEANS: on a 40°C (104°F) day, panel temperature reaches 55-60°C (131-140°F) — 30-35°C above STC. PERC loses: 30 × 0.35% = 10.5% power loss. N-Type loses: 30 × 0.29% = 8.7% power loss. Difference: N-Type saves 1.8% power in hot conditions. PANAMA RELEVANCE: tropical climate means panels run hot year-round. A 400W PERC panel in Panama midday sun may produce 350-360W (derated for heat). A 400W N-Type panel may produce 358-365W. Over 25 years of daily production, N-Type's temperature advantage compounds. Voc TEMPERATURE COEFFICIENT: -0.28 to -0.32%/°C — Voc DROPS in heat (marginally safer for controller limits), RISES in cold (can exceed controller max — always calculate cold-weather Voc). Is N-Type worth the premium in Panama? YES for primary system where every watt matters. NO for supplementary/experimental arrays where budget is priority. MIXING: you can mix PERC and N-Type on separate MPPT inputs (different Vmp points), never on same string."}, {"sym": "PANEL_DEGRADATION", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "PANEL DEGRADATION OVER TIME. Year 1: LID (Light Induced Degradation) — 2-3% initial power loss as boron-oxygen complexes form in P-Type silicon when first exposed to sunlight. N-Type silicon has no boron → no LID → only 0.5-1% first-year loss. Years 2-25: PERC: 0.5-0.7%/year. N-Type: 0.3-0.4%/year. ", "fullNote": "PANEL DEGRADATION OVER TIME. Year 1: LID (Light Induced Degradation) — 2-3% initial power loss as boron-oxygen complexes form in P-Type silicon when first exposed to sunlight. N-Type silicon has no boron → no LID → only 0.5-1% first-year loss. Years 2-25: PERC: 0.5-0.7%/year. N-Type: 0.3-0.4%/year. STANDARD WARRANTY (PERC): 80-85% output at year 25. PREMIUM WARRANTY (REC, SunPower, Panasonic): 92% at year 25. AFTER 25 YEARS: panels don't suddenly fail — output continues declining at similar rate. A 30-year-old PERC panel may produce 72-78% of original rating. A 30-year-old N-Type premium panel may produce 82-88%. USED PANEL MATH: 10-year-old PERC panel: 100% - 2.5% LID - (9×0.6%) = 92.1% of rated output remaining. Paying 30-50% of new price for 92% output = excellent deal. 15-year-old: 100-2.5-(14×0.6) = 89.1% — still good. AFTER 20 YEARS: 86% remaining — diminishing returns on used purchase. Panama: solar panels don't degrade faster in tropics — UV exposure is similar (sun is sun). HEAT accelerates some degradation modes but modern panels are designed for it. Keep panels clean and cool (air gap mounting) for longest life."}, {"sym": "PANEL_50W", "price": 75, "range": "$60-90", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Rich Solar MEGA 50 ONYX ~$70, Renogy RNG-50D-SS ~$90, Eco-Worthy 50W ~$60. 36-cell mono. Voc~22V, Vmp~18V, Imp~2.7A. 7-10 lbs. For trickle charging, small 12V battery maintenance, gate openers, trail cameras. $1.20-1.80/watt — highest $/W of any tier. Series fuse: 10A. Pairs with: Victron 75/15 (1-3", "fullNote": "Rich Solar MEGA 50 ONYX ~$70, Renogy RNG-50D-SS ~$90, Eco-Worthy 50W ~$60. 36-cell mono. Voc~22V, Vmp~18V, Imp~2.7A. 7-10 lbs. For trickle charging, small 12V battery maintenance, gate openers, trail cameras. $1.20-1.80/watt — highest $/W of any tier. Series fuse: 10A. Pairs with: Victron 75/15 (1-3 in series)."}, {"sym": "PANEL_100W", "price": 85, "range": "$70-100", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "100W monocrystalline panel — THE standard small panel. Renogy RNG-100D-SS ($100): 36-cell, Voc=22.3V, Vmp=18.6V, Imp=5.38A, 42.2×19.6×1.38\", 14.1 lbs, aluminum frame, tempered glass, IP67 junction box with MC4 connectors. Rich Solar MEGA 100 ($80): 36-cell, similar specs. HQST HSP100D-L ($75): 36-ce", "fullNote": "100W monocrystalline panel — THE standard small panel. Renogy RNG-100D-SS ($100): 36-cell, Voc=22.3V, Vmp=18.6V, Imp=5.38A, 42.2×19.6×1.38\", 14.1 lbs, aluminum frame, tempered glass, IP67 junction box with MC4 connectors. Rich Solar MEGA 100 ($80): 36-cell, similar specs. HQST HSP100D-L ($75): 36-cell. Eco-Worthy 100W ($70): budget option. BEST VALUE: buy 4-packs ($260-320 for 400W = $0.65-0.80/watt). Single panel: $0.70-1.00/watt. COMPATIBILITY: 36-cell panels have Voc~22V — safe for ANY charge controller (lowest Victron is 75V max). Can wire 2 in series (44V) on any controller. Can wire 3 in series (66V) on 100V+ controllers. PWM OK: Vmp=18.6V matches 12V battery — PWM efficiency ~77%. MPPT BETTER: extracts full 100W, especially in cold or low light. PHYSICAL: 42×20\" — fits on RV roofs, small sheds, boats. 14 lbs — manageable solo. Mounting: 4 Z-brackets or bolt through frame holes. Wind loading: secure well — 42×20\" catches wind. WARRANTY: 25-year output (80% at year 25), 5-year materials. Amazon: read recent reviews — panel quality varies by batch. Buy from Renogy direct for better QC. Panama: shipping cost significant for single panels. Buy locally if possible (Panama City solar suppliers) or combine with larger order."}, {"sym": "PANEL_200W", "price": 190, "range": "$170-220", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "200W solar panel — popular RV/van size. Rich Solar MEGA 200 ($180): single 200W panel, Voc=24.3V, Vmp=20.4V, Imp=9.80A, 58.0×26.0×1.4\", 27.6 lbs. Renogy RNG-200D ($220): 2×100W cells in one frame, Voc=22.3V, Vmp=18.6V (similar to 100W panel voltage), Imp=10.75A, 63.8×25.9×1.4\", 26.5 lbs. TWO TYPES: ", "fullNote": "200W solar panel — popular RV/van size. Rich Solar MEGA 200 ($180): single 200W panel, Voc=24.3V, Vmp=20.4V, Imp=9.80A, 58.0×26.0×1.4\", 27.6 lbs. Renogy RNG-200D ($220): 2×100W cells in one frame, Voc=22.3V, Vmp=18.6V (similar to 100W panel voltage), Imp=10.75A, 63.8×25.9×1.4\", 26.5 lbs. TWO TYPES: single-cell 200W (higher voltage ~24V Voc) or dual-100W (standard 22V Voc). Check specs — the voltage difference affects controller choice. Single 200W on 100/20 controller: 200W÷12V=16.7A → 20A controller is fine. Two 200W in series on 100/30: 400W, Voc=44-49V → safe for 100V controller. BEST FOR: RVs (covers most of roof width, 58-64\" wide matches RV width), vans, small cabins. PHYSICAL: 60×26\" — large for solo handling. 27 lbs — manageable but awkward alone. Series fuse: 15A (Renogy) or 20A (Rich Solar). MOUNTING: Z-brackets or rail mount. 4 mounting points (one per corner). WIND: large surface area — secure mounting critical for highway speeds (RV) or tropical storms. TILT: if flat-mounted on RV roof, loses 10-20% vs optimal tilt — acceptable trade for simplicity. VALUE: $0.85-1.10/watt — slightly more than 100W panels in 4-pack. Amazon multi-pack deals sometimes better than single 200W. Renogy vs Rich Solar: Renogy slightly more expensive but better warranty support."}, {"sym": "PANEL_250W", "price": 225, "range": "$190-260", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "250W residential panel — aging stock, excellent USED MARKET value. Canadian Solar CS6P-250P ($199-249 new, $50-80 used): 60-cell polycrystalline, Voc=37.2V, Vmp=30.1V, Imp=8.31A, 64.5×38.7×1.57\", 40.1 lbs. Trina TSM-250PA05 ($189-239). LONGi LR6-60HPH-250M ($210-260, mono version). PHASING OUT: most", "fullNote": "250W residential panel — aging stock, excellent USED MARKET value. Canadian Solar CS6P-250P ($199-249 new, $50-80 used): 60-cell polycrystalline, Voc=37.2V, Vmp=30.1V, Imp=8.31A, 64.5×38.7×1.57\", 40.1 lbs. Trina TSM-250PA05 ($189-239). LONGi LR6-60HPH-250M ($210-260, mono version). PHASING OUT: most manufacturers stopped making 250W panels (replaced by 300-400W). New old stock still available at distributors clearing inventory. USED MARKET: 250W panels from residential decommissions (homeowners upgrading to larger panels) — $0.20-0.32/watt used. 60-cell design: Voc=37-40V. On 100V controller: 2 in series (74-80V) — safe. 3 in series (111-120V) — EXCEEDS 100V controller limit. On 150V controller: 3 in series (111-120V) — safe. PHYSICAL: 65×39\" — large panels, 40 lbs each, awkward to handle solo. Racking: standard residential rails (IronRidge, Unirac). Series fuse: 15A. OUTPUT WARRANTY: 25 years (80% at year 25). DEGRADATION: a 10-year-old 250W panel likely produces 225-240W. AT 15 YEARS: 210-225W. For a $50 used panel producing 225W: $0.22/watt — best value in solar. Panama: check local solar installers for used panel inventory. Test used panels: Voc within 5% of label, no snail trails, no burnt junction box, frame straight. Used panels are ideal for ground-mount experimental arrays, workshop power, water pumping. Not recommended for primary home system (mix of used panels = uneven performance)."}, {"sym": "PANEL_300W", "price": 250, "range": "$215-290", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "300W residential panel — 120 half-cell mono PERC design. Canadian Solar CS6K-300MS ($215-265): 120 half-cell, Voc=39.9V, Vmp=32.5V, Imp=9.23A, 65.9×39.1×1.38\", 39.7 lbs. LONGi LR6-60HPH-300M ($240-290). Trina TSM-300DD05A ($225-275). HALF-CELL ADVANTAGE: splitting full cells in half → lower current ", "fullNote": "300W residential panel — 120 half-cell mono PERC design. Canadian Solar CS6K-300MS ($215-265): 120 half-cell, Voc=39.9V, Vmp=32.5V, Imp=9.23A, 65.9×39.1×1.38\", 39.7 lbs. LONGi LR6-60HPH-300M ($240-290). Trina TSM-300DD05A ($225-275). HALF-CELL ADVANTAGE: splitting full cells in half → lower current per cell → lower resistive losses → 2-3% efficiency gain. Better shade tolerance: each half of panel operates independently (bypass diodes isolate shaded half). 120 half-cell is equivalent to 60 full-cell panel in voltage/current. MPPT PAIRING: 2 in series (80V) → 150/35 controller. 3 in series (120V) → 150/60. GOOD VALUE: $0.72-0.97/watt. Good balance of size (still manageable at 40 lbs) and power. Popular for DIY residential installs. WARRANTY: 25-year linear output, 10-12 year product. Panama: available from solar distributors in Panama City. Combine with 150V controller for 2-3 panel strings. Transport: 66×39\" fits in pickup truck bed (diagonal). Freight shipping expensive for small quantities — group buy with neighbors."}, {"sym": "PANEL_350W", "price": 275, "range": "$245-330", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "350W residential panel — 120 half-cell mono PERC peak mainstream. Canadian Solar HiKu CS3L-350MS ($245-295): 120 half-cell, Voc=41.5V, Vmp=34.6V, Imp=10.12A, 69.1×40.9\", 44.1 lbs. Q Cells Q.PEAK DUO BLK-G6+ 350 ($260-310): premium German engineering, excellent low-light performance. REC REC350AA ($2", "fullNote": "350W residential panel — 120 half-cell mono PERC peak mainstream. Canadian Solar HiKu CS3L-350MS ($245-295): 120 half-cell, Voc=41.5V, Vmp=34.6V, Imp=10.12A, 69.1×40.9\", 44.1 lbs. Q Cells Q.PEAK DUO BLK-G6+ 350 ($260-310): premium German engineering, excellent low-light performance. REC REC350AA ($280-330): premium Norwegian, 92% output at year 25 warranty. Trina, Jinko, LONGi equivalents in similar price range. MPPT PAIRING: 2 in series (83V) → 150/35 or 100/50 (at limit). 3 in series (125V) → 150/60. PHYSICAL: 69×41\" — large, 44 lbs — heavy for solo roof work. TILT: optimal tilt = latitude (Panama 8°N = nearly flat). 10-15° tilt provides self-cleaning without significant production loss. Rain washes off dust at moderate tilt. INSTALLATION: aluminum rails, shared across multiple panels. Ground mount: 2-3 panels per row, tilt frame. WIND: >40 sq ft surface area — secure mounting critical. VALUE: $0.70-0.94/watt. Widely available from distributors. This is the sweet spot for serious home systems — enough power per panel to reduce installation labor, still manageable for 2-person install. Future-proof: 350W panels will be available for years (not being phased out like 250W)."}, {"sym": "PANEL_400W", "price": 290, "range": "$260-360", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "400W residential panel — the 2026 standard. Jinko JKM400M-72HL-V ($260-310): 144 half-cell mono PERC, Voc=49.8V, Vmp=41.7V, Imp=9.60A, 79.1×39.4\", 49.6 lbs. Canadian Solar HiKu6 CS6R-400MS ($275-325). REC REC400AA PURE 2 ($310-360, premium, 92% output warranty at year 25). LONGi LR5-72HPH-400M ($250", "fullNote": "400W residential panel — the 2026 standard. Jinko JKM400M-72HL-V ($260-310): 144 half-cell mono PERC, Voc=49.8V, Vmp=41.7V, Imp=9.60A, 79.1×39.4\", 49.6 lbs. Canadian Solar HiKu6 CS6R-400MS ($275-325). REC REC400AA PURE 2 ($310-360, premium, 92% output warranty at year 25). LONGi LR5-72HPH-400M ($250-300). BEST $/WATT: $0.65-0.90/watt vs $0.70-1.00 for 100W panels. Large format = lower installation cost per watt (fewer panels to mount). Half-cell design: splits full cells in half → lower internal resistance → less mismatch loss → better shade tolerance (bypass diodes per half-panel). MPPT pairings: 1 panel on 100/20 (49.8V Voc, check cold factor). 2S on 150/35 (100V). 3S on 150/60 or 250/60 (150V — CHECK COLD: 3×49.8×1.15=172V >150V! For cold climates, max 2S on 150V controllers). 4S on 250/100. Shipping: freight only for pallets. Source: NAZ Solar Electric verified pricing + manufacturer datasheets."}, {"sym": "PANEL_450W", "price": 330, "range": "$295-365", "unit": "USD", "conf": "medium", "safety": false, "cat": "⚡ Electricity", "note": "450W N-Type TOPCon panel — next-generation technology. Canadian Solar HiKu7 CS7N-450 ($295-350): N-Type TOPCon cells, Voc=50.2V, Vmp=42.1V, Imp=10.69A, 82.0×40.9\", 52.5 lbs, -0.29%/°C temperature coefficient. Trina Vertex S TSM-450DE09 ($305-360). LONGi LR5-72HPH-450M ($310-365). N-TYPE ADVANTAGE ov", "fullNote": "450W N-Type TOPCon panel — next-generation technology. Canadian Solar HiKu7 CS7N-450 ($295-350): N-Type TOPCon cells, Voc=50.2V, Vmp=42.1V, Imp=10.69A, 82.0×40.9\", 52.5 lbs, -0.29%/°C temperature coefficient. Trina Vertex S TSM-450DE09 ($305-360). LONGi LR5-72HPH-450M ($310-365). N-TYPE ADVANTAGE over standard P-Type PERC: lower temperature coefficient (-0.29 vs -0.35%/°C) — at 45°C panel temp, N-Type loses 5.8% vs PERC's 7.0%. Lower degradation: 0.3-0.4%/year vs 0.5-0.7% for PERC → after 25 years, N-Type retains 85-90% vs PERC's 80-85%. Better low-light performance. Higher efficiency: 21-23% vs 19-21% for PERC. PRICE PREMIUM: ~10-15% more than equivalent PERC. WORTH IT?: in HOT climates (Panama) — YES, the better temperature coefficient matters. In temperate climates — marginal. MPPT PAIRING: 2 in series (100V) → 150/35. 3 in series (150V) → 150/100 or 250/60. PHYSICAL: 82×41\" — very large, 52 lbs — 2-person lift. BIFACIAL variants available: add 10-25% rear-side gain on ground mount. WARRANTY: 25-30 year linear output, 15-20 year product (N-Type commands longer warranties). Panama: N-Type panels particularly valuable — tropical sun heats panels to 45-55°C, and N-Type's temperature coefficient advantage grows with temperature. REC Alpha Pure series also N-Type, 400-430W, premium pricing but best warranty (92% at 25 years)."}, {"sym": "PANEL_500W", "price": 375, "range": "$340-440", "unit": "USD", "conf": "medium", "safety": false, "cat": "⚡ Electricity", "note": "500W+ large-format panel — utility/commercial scale. Canadian Solar BiHiKu CS3W-545MB-AG (545W bifacial, $340-400): bifacial with up to 25% rear gain, Voc=49.6V, Vmp=41.8V, Imp=13.04A, 89.7×44.6\", 61.7 lbs. Trina Vertex TSM-DE21 545W ($350-410). REC REC460AA-PURE-RX ($350-420, 460W premium compact).", "fullNote": "500W+ large-format panel — utility/commercial scale. Canadian Solar BiHiKu CS3W-545MB-AG (545W bifacial, $340-400): bifacial with up to 25% rear gain, Voc=49.6V, Vmp=41.8V, Imp=13.04A, 89.7×44.6\", 61.7 lbs. Trina Vertex TSM-DE21 545W ($350-410). REC REC460AA-PURE-RX ($350-420, 460W premium compact). MPPT PAIRING: 1-2 panels on 150V controllers. 3 panels (150V) → 150/100 with careful cold-temp check. 4-5 on 250/60 or 250/100. 7-9 on RS 450. HIGH CURRENT: Imp=13A — check controller max input current (Victron 150V series: 50A Isc max — fine for 2 strings parallel). PHYSICAL: 89×45\" — enormous, 62 lbs — requires mechanical lift or 3-person crew. These are commercial panels designed for ground-mount utility installations. Not practical for DIY residential unless you have equipment and space. SHIPPING: freight in pallets of 25-30. Single panels: expensive freight, hard to find. VALUE: $0.62-0.78/watt — cheapest per watt. But higher installation cost offsets panel savings for small systems. BEST USE CASE: large ground-mount array (10+ kW) where per-panel installation cost is spread over many panels. Panama: if building a large homestead system (10 kW+), these panels offer best $/watt. Otherwise, stick with 400W panels — sweet spot of power per panel vs handling weight."}, {"sym": "RIGID_PANEL", "price": 105, "range": "$85-140", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "New aluminum-frame rigid 100W panel with tempered glass. Most durable and best long-term value. Standard 25-year performance warranty (80% output at year 25). Mount on ground racks (adjustable tilt) or roof mounts. 36-cell (12V nominal) or 60/72-cell (24V/48V nominal). Aluminum frame dissipates heat", "fullNote": "New aluminum-frame rigid 100W panel with tempered glass. Most durable and best long-term value. Standard 25-year performance warranty (80% output at year 25). Mount on ground racks (adjustable tilt) or roof mounts. 36-cell (12V nominal) or 60/72-cell (24V/48V nominal). Aluminum frame dissipates heat better than frameless panels."}, {"sym": "FLEX_PANEL", "price": 150, "range": "$120-200", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Renogy 100W flexible/lightweight panel ~$149. Bendable (up to 30°) for curved surfaces: RV roofs, boats, van conversions, tents. Lighter than rigid (3-5 lbs vs 15-20 lbs). Shorter lifespan (5-10 years) due to polymer degradation. Lower efficiency than rigid (typically 15-18% vs 19-22%). More expensi", "fullNote": "Renogy 100W flexible/lightweight panel ~$149. Bendable (up to 30°) for curved surfaces: RV roofs, boats, van conversions, tents. Lighter than rigid (3-5 lbs vs 15-20 lbs). Shorter lifespan (5-10 years) due to polymer degradation. Lower efficiency than rigid (typically 15-18% vs 19-22%). More expensive per watt. Prone to hot spots if partially shaded."}, {"sym": "PANEL_BIFACIAL", "price": 400, "range": "$330-440", "unit": "USD", "conf": "medium", "safety": false, "cat": "⚡ Electricity", "note": "Bifacial solar panels — produce power from BOTH sides. Front captures direct sunlight (like normal). Rear captures reflected light (albedo) from ground. Typical rear gain: white gravel/white roofing = 20-25% extra. Light concrete = 15-20%. Green grass = 10-15%. Dark asphalt = 5% (not worth it). Snow", "fullNote": "Bifacial solar panels — produce power from BOTH sides. Front captures direct sunlight (like normal). Rear captures reflected light (albedo) from ground. Typical rear gain: white gravel/white roofing = 20-25% extra. Light concrete = 15-20%. Green grass = 10-15%. Dark asphalt = 5% (not worth it). Snow = 25-30% (not Panama). Premium vs monofacial: +11-15% cost. Models: Canadian Solar BiHiKu CS3W-545MB-AG (545W, ~$380-440). LONGi Hi-MO5 540W bifacial (~$340-400). Jinko Tiger Neo 480W N-Type bifacial (~$310-370). MUST be mounted with clearance behind panel — 3-4 ft minimum above ground for rear light access. Roof-mounted bifacial: minimal gain (roof blocks light) unless white roof. Ground-mount on white gravel or light concrete: excellent. Bifacial + tracker: the ultimate (tracker follows sun, bifacial captures reflected light all day). Not recommended for: flush roof mount, dark roofs, shaded ground. Panama recommendation: ground-mount bifacial on white gravel in open field = maximum kWh per panel. Add 20-25% to rated wattage for system sizing."}, {"sym": "SALVAGED_PANEL", "price": 40, "range": "$25-70", "unit": "USD", "conf": "medium", "safety": false, "cat": "⚡ Electricity", "note": "Used/blemished solar panels from classifieds (Craigslist, Facebook Marketplace) or solar farm decommissions. Per 100W, typically 60-80% of new price. Check for microcracks (hot spots), delamination, and junction box condition. Panels typically degrade 0.5-1%/year, so a 10-year-old panel still produc", "fullNote": "Used/blemished solar panels from classifieds (Craigslist, Facebook Marketplace) or solar farm decommissions. Per 100W, typically 60-80% of new price. Check for microcracks (hot spots), delamination, and junction box condition. Panels typically degrade 0.5-1%/year, so a 10-year-old panel still produces 90-95% of rated power. Best budget option."}, {"sym": "PANEL_USED_GRADE_A", "price": 150, "range": "$100-200", "unit": "USD", "conf": "medium", "safety": false, "cat": "⚡ Electricity", "note": "Used Grade A: removed from residential, <5yr old, >=90% rated output. Typically 250-330W older models at $0.35-0.50/watt. Example: used Canadian Solar 300W Grade A ~$105-150. Source: SanTan Solar, local solar installers, eBay. Best value in solar — half the price of new, 90%+ the performance. Check:", "fullNote": "Used Grade A: removed from residential, <5yr old, >=90% rated output. Typically 250-330W older models at $0.35-0.50/watt. Example: used Canadian Solar 300W Grade A ~$105-150. Source: SanTan Solar, local solar installers, eBay. Best value in solar — half the price of new, 90%+ the performance. Check: frame straight, glass intact, junction box sealed, no snail trails. Verify output with multimeter (Voc within 5% of label)."}, {"sym": "PANEL_USED_GRADE_B", "price": 80, "range": "$50-120", "unit": "USD", "conf": "medium", "safety": false, "cat": "⚡ Electricity", "note": "Used Grade B: minor cosmetic (scratches on frame, small glass marks), 80-90% rated output. ~$0.25-0.38/watt. Example: 250W Grade B ~$62-95. Source: SanTan Solar overstock, Craigslist, solar farm decommissions. Good for ground-mount experimental arrays, workshop power, water pumping. Test each panel ", "fullNote": "Used Grade B: minor cosmetic (scratches on frame, small glass marks), 80-90% rated output. ~$0.25-0.38/watt. Example: 250W Grade B ~$62-95. Source: SanTan Solar overstock, Craigslist, solar farm decommissions. Good for ground-mount experimental arrays, workshop power, water pumping. Test each panel individually — performance varies more than Grade A. Don't use for roof-mount where aesthetics/longevity matter."}, {"sym": "PANEL_USED_GRADE_C", "price": 45, "range": "$30-75", "unit": "USD", "conf": "low", "safety": false, "cat": "⚡ Electricity", "note": "Used Grade C: visible wear, snail trails possible, 70-80% output. ~$0.15-0.25/watt. Example: 250W Grade C ~$37-63. Snail trails = micro-cracks visible as dark lines — indicate cell damage, performance degrades over time. High risk of hot spots. Do NOT use for primary system. OK for: experimental, te", "fullNote": "Used Grade C: visible wear, snail trails possible, 70-80% output. ~$0.15-0.25/watt. Example: 250W Grade C ~$37-63. Snail trails = micro-cracks visible as dark lines — indicate cell damage, performance degrades over time. High risk of hot spots. Do NOT use for primary system. OK for: experimental, temporary, non-critical loads (outdoor lighting, tool charging shed). Always fuse individually and check with thermal camera under load."}, {"sym": "PANEL_PORTABLE_50W", "price": 120, "range": "$90-150", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Renogy 50W Foldable briefcase ~$120. Jackery SolarSaga 50W ~$150. Voc~22V, Vmp~18V. Foldable with built-in kickstand and carrying case. 10-12 lbs. $2.40-3.00/watt — 3× rigid panel cost. For: camping, emergency kits, portable battery charging. Includes charge controller sometimes. Fabric/vinyl hinge ", "fullNote": "Renogy 50W Foldable briefcase ~$120. Jackery SolarSaga 50W ~$150. Voc~22V, Vmp~18V. Foldable with built-in kickstand and carrying case. 10-12 lbs. $2.40-3.00/watt — 3× rigid panel cost. For: camping, emergency kits, portable battery charging. Includes charge controller sometimes. Fabric/vinyl hinge wears after 2-3 years of heavy use. MC4 or barrel connector output."}, {"sym": "PANEL_PORTABLE_100W", "price": 220, "range": "$170-300", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "100W portable/foldable solar panel. Renogy 100W Foldable ($170): briefcase style, 2×50W panels hinged, Voc=22.3V, Vmp=18.6V, Imp=5.38A. Folded: 24.4×20.5×2.2\", 19.8 lbs. Jackery SolarSaga 100W ($300): lightweight foldable (not briefcase), 10.3 lbs, USB-C + USB-A outputs built-in (charge phone/tablet", "fullNote": "100W portable/foldable solar panel. Renogy 100W Foldable ($170): briefcase style, 2×50W panels hinged, Voc=22.3V, Vmp=18.6V, Imp=5.38A. Folded: 24.4×20.5×2.2\", 19.8 lbs. Jackery SolarSaga 100W ($300): lightweight foldable (not briefcase), 10.3 lbs, USB-C + USB-A outputs built-in (charge phone/tablet directly). EcoFlow 110W Portable ($249): 13.2 lbs, IP67 water-resistant. Bluetti PV120 ($299): 120W, 12.8 lbs. PRICE PREMIUM: $1.70-3.00/watt — 2-3× rigid panel cost. You're paying for: portability, foldability, built-in kickstand, carrying case, and sometimes built-in charge controller/USB outputs. BEST FOR: camping (charge portable power station), emergency preparedness (store in closet, deploy when needed), RV/van where roof mount isn't possible, apartment dwellers (set up on balcony). NOT for: permanent installation (rigid panels are 1/3 the price and more durable). DURABILITY: fabric hinges wear after 2-3 years of frequent folding. Solar cells in foldable panels are thinner/more fragile than rigid — cracks from repeated folding are common failure mode. Don't fold/unfold in cold weather (cells become brittle). MC4 output standard (connect to charge controller). Some have built-in PWM controller (bypass it and use your own MPPT for better efficiency). Kickstand: set angle for optimal sun. Panama: portable panels useful for camping on islands (San Blas, Bocas). Not for permanent off-grid (rigid panels + ground mount = better investment)."}, {"sym": "PANEL_PORTABLE_200W", "price": 300, "range": "$250-500", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Renogy 200W Foldable briefcase ~$300. Bluetti PV200 ~$499. Voc~24-26V, Vmp~20V, Imp~10A. Two 100W panels hinged. 30-35 lbs. $1.50-2.50/watt. Larger/heavier — best for base camp, not backpacking. Can charge a portable power station in 4-6 hours of good sun. Requires MPPT controller — PWM wastes too m", "fullNote": "Renogy 200W Foldable briefcase ~$300. Bluetti PV200 ~$499. Voc~24-26V, Vmp~20V, Imp~10A. Two 100W panels hinged. 30-35 lbs. $1.50-2.50/watt. Larger/heavier — best for base camp, not backpacking. Can charge a portable power station in 4-6 hours of good sun. Requires MPPT controller — PWM wastes too much power at this scale. MC4 connectors. Carrying case doubles as protective storage."}, {"sym": "SUN_TRACKER", "price": 350, "range": "$200-600", "unit": "USD", "conf": "low", "safety": false, "cat": "⚡ Electricity", "note": "Single-axis solar tracker for one panel. Follows the sun east-to-west, increasing daily yield by 25-35%. Dual-axis adds 35-45% gain (also adjusts for seasonal altitude). Payback: adds significant complexity and maintenance (motor, controller, moving parts). Best value in high latitudes (long summer ", "fullNote": "Single-axis solar tracker for one panel. Follows the sun east-to-west, increasing daily yield by 25-35%. Dual-axis adds 35-45% gain (also adjusts for seasonal altitude). Payback: adds significant complexity and maintenance (motor, controller, moving parts). Best value in high latitudes (long summer days) or for small arrays where maximizing every watt matters."}, {"sym": "PANEL_COOLING", "price": 80, "range": "$30-150", "unit": "USD", "conf": "low", "safety": false, "cat": "⚡ Electricity", "note": "DIY passive or active water cooling. Solar panels lose 0.3-0.5% efficiency per °C above 25°C. On a 40°C roof, panels may lose 15-20% rated output to heat. Active cooling (water spray) is complex, uses water, and risks mineral deposits. Passive cooling (mounting with air gap behind panel, or aluminum", "fullNote": "DIY passive or active water cooling. Solar panels lose 0.3-0.5% efficiency per °C above 25°C. On a 40°C roof, panels may lose 15-20% rated output to heat. Active cooling (water spray) is complex, uses water, and risks mineral deposits. Passive cooling (mounting with air gap behind panel, or aluminum heat sinks) is simpler and more reliable."}, {"sym": "WIND_TURBINE", "price": 750, "range": "$500-1,200", "unit": "USD", "conf": "medium", "safety": false, "cat": "⚡ Electricity", "note": "Primus 400W wind turbine ~$850, generic kits $500-$700. Wind turbines complement solar well (wind blows at night, winter; solar peaks midday, summer). Rated power at 28 mph; actual output is a cubic function of wind speed (1/8 at half speed). Need average >10 mph wind speed for viability. Tower heig", "fullNote": "Primus 400W wind turbine ~$850, generic kits $500-$700. Wind turbines complement solar well (wind blows at night, winter; solar peaks midday, summer). Rated power at 28 mph; actual output is a cubic function of wind speed (1/8 at half speed). Need average >10 mph wind speed for viability. Tower height doubles output vs. half-height (less turbulence higher up)."}, {"sym": "MICRO_HYDRO", "price": 1500, "range": "$800-2,500", "unit": "USD", "conf": "medium", "safety": false, "cat": "⚡ Electricity", "note": "WaterLily ~$400 (portable turbine, ~100W), ESandD LH1000 ~$2000 (permanent installation, ~1kW). Most efficient renewable: 50-70% conversion vs 15-24% for solar. Runs 24/7 regardless of weather. Requires: head (vertical drop) x flow (GPM) = power. Formula: Watts = Head(ft) x Flow(GPM) / 10. Even a sm", "fullNote": "WaterLily ~$400 (portable turbine, ~100W), ESandD LH1000 ~$2000 (permanent installation, ~1kW). Most efficient renewable: 50-70% conversion vs 15-24% for solar. Runs 24/7 regardless of weather. Requires: head (vertical drop) x flow (GPM) = power. Formula: Watts = Head(ft) x Flow(GPM) / 10. Even a small stream can power a homestead."}, {"sym": "FUEL_GENERATOR", "price": 550, "range": "$400-800", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Champion 2000W inverter generator ~$550. Inverter generators produce clean sine wave power safe for electronics (unlike conventional generators). 2000W runs fridge + lights + phone charging. Burns ~0.4 gal/hr of gasoline. Essential backup for off-grid systems but don't plan on running 24/7 — fuel st", "fullNote": "Champion 2000W inverter generator ~$550. Inverter generators produce clean sine wave power safe for electronics (unlike conventional generators). 2000W runs fridge + lights + phone charging. Burns ~0.4 gal/hr of gasoline. Essential backup for off-grid systems but don't plan on running 24/7 — fuel storage and engine maintenance are ongoing costs."}, {"sym": "GROUND_MOUNT_RACK", "price": 75, "range": "$50-140", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "IronRidge ground mount hardware per panel: rail connectors ($42/pair), module clamps ($18/4x), end clamps ($9/2x) = ~$69-80/panel excluding pipe/footings. Eco-Worthy adjustable ground rack $55-75/panel (Amazon). Wood post + unistrut DIY $30-50/panel. Ground mounts allow optimal tilt and easy cleanin", "fullNote": "IronRidge ground mount hardware per panel: rail connectors ($42/pair), module clamps ($18/4x), end clamps ($9/2x) = ~$69-80/panel excluding pipe/footings. Eco-Worthy adjustable ground rack $55-75/panel (Amazon). Wood post + unistrut DIY $30-50/panel. Ground mounts allow optimal tilt and easy cleaning. Must be anchored against wind uplift — concrete footings or helical ground screws."}, {"sym": "GROUND_SCREW", "price": 80, "range": "$60-120", "unit": "USD", "conf": "medium", "safety": false, "cat": "⚡ Electricity", "note": "American Ground Screw Model 3 (76mm x 2000mm) helical ground screw. No concrete needed — screws directly into soil with hydraulic drive head. Faster than concrete footings (hours vs days). Removable and reusable. Requires soil without large rocks. Per-screw cost; 4-6 screws per ground mount frame. A", "fullNote": "American Ground Screw Model 3 (76mm x 2000mm) helical ground screw. No concrete needed — screws directly into soil with hydraulic drive head. Faster than concrete footings (hours vs days). Removable and reusable. Requires soil without large rocks. Per-screw cost; 4-6 screws per ground mount frame. Alternative: concrete sono-tube footings ~$30-50 each."}, {"sym": "ROOF_MOUNT_RAIL", "price": 65, "range": "$50-80", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Rail-based roof mount system. IronRidge XR100 rails ($55-80/panel installed): aluminum rails run vertically on roof, L-feet attach rails to roof, flashing at each penetration, module clamps hold panels. Unirac SolarMount ($50-75/panel): similar system, widely available. SnapNrack Series 100 ($50-70/", "fullNote": "Rail-based roof mount system. IronRidge XR100 rails ($55-80/panel installed): aluminum rails run vertically on roof, L-feet attach rails to roof, flashing at each penetration, module clamps hold panels. Unirac SolarMount ($50-75/panel): similar system, widely available. SnapNrack Series 100 ($50-70/panel). Components per panel: 2 short rails (or share longer rails across panels), 4 L-feet with flashing, 4 mid/end clamps. Tools: socket wrench, torque wrench (tighten to spec — loose = arcing, tight = panel stress), chalk line for straight rail alignment. FLASHING: most critical step — each roof penetration needs aluminum flashing with EPDM/butyl seal. Slide flashing under shingle above, seal screw with roofing mastic. CHECK FOR LEAKS after first heavy rain. Rail spacing: match panel mounting holes (typically 36-40\" apart). Grounding: bond all rails with ground lugs, connect to system ground. Panama: use stainless steel hardware (not zinc-plated — corrodes in tropical humidity). Consider rail-less systems (IronRidge HUG, $35-50/panel) for fewer roof penetrations. Aluminum rails act as heatsink — leave air gap under panels for cooling."}, {"sym": "ROOF_ZBRACKET", "price": 20, "range": "$15-30", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Z-bracket mounting system. Simple aluminum L/Z-shaped brackets, 4 per panel. Screw directly into roof surface with lag bolts + sealant. Best for: RV roofs, metal sheds, container tops, flat surfaces. NOT for: composition shingle roofs (leak risk — needs flashing which Z-brackets don't provide), tile", "fullNote": "Z-bracket mounting system. Simple aluminum L/Z-shaped brackets, 4 per panel. Screw directly into roof surface with lag bolts + sealant. Best for: RV roofs, metal sheds, container tops, flat surfaces. NOT for: composition shingle roofs (leak risk — needs flashing which Z-brackets don't provide), tile roofs (difficult to find solid anchor), any roof where leaks would damage living space. Brands: Renogy Z-Bracket Kit ($18-25, 4 brackets), Eco-Worthy ($15-22), WindyNation adjustable ($22-30). Installation: mark hole positions through bracket holes, drill pilot holes, fill holes with marine sealant (3M 5200 or Sikaflex), insert stainless lag bolts, tighten until sealant squeezes out around bolt head. Add dicor lap sealant over bolt heads. Spacing: match panel mounting holes (check panel spec sheet). Height: Z-brackets provide 1-2\" air gap (adequate for cooling). No tilt adjustment — panel sits flat or slightly angled. For tilt: use tilt mount kit instead (Renogy $40-55). Grounding: run ground wire from each panel frame to common ground busbar. Brazil/Panama: intense sun + humidity = check sealant annually for cracking. Re-seal every 3-5 years preventatively."}, {"sym": "TILT_LEGS", "price": 45, "range": "$35-80", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Adjustable tilt leg mounting. Allows seasonal angle changes for maximum solar harvest. Fixed tilt: loses 10-20% annually vs tracked. Adjustable: change angle 2-4×/year, recovers most of that loss. Angles: summer = latitude − 15°, winter = latitude + 15°, spring/fall = latitude. Panama (8°N latitude)", "fullNote": "Adjustable tilt leg mounting. Allows seasonal angle changes for maximum solar harvest. Fixed tilt: loses 10-20% annually vs tracked. Adjustable: change angle 2-4×/year, recovers most of that loss. Angles: summer = latitude − 15°, winter = latitude + 15°, spring/fall = latitude. Panama (8°N latitude): summer angle = −7° (essentially flat, slight north tilt), winter angle = 23° (moderate south tilt). At near-equatorial latitude, the difference is small — adjustable tilt adds ~5-8% annual yield vs flat. Brands: Renogy tilt mount ($40-55, 0-45° adjustable), Eco-Worthy ($35-50), Tamarack Solar fixed tilt legs ($60-80, non-adjustable but specific angle). Installation: attach to Z-bracket or rail system. Adjust angle by repositioning bolts in slotted legs. Ground clearance: higher tilt = more clearance = better self-cleaning (rain washes dust off). In Panama tropics: moderate tilt (10-15°) provides good self-cleaning without significant production loss. Very steep tilt only useful in rainy season for leaf/debris shedding. Consider wind load — higher tilt catches more wind. Anchor accordingly for tropical storm winds."}, {"sym": "ROOF_FLASHING", "price": 15, "range": "$12-25", "unit": "USD", "conf": "high", "safety": true, "cat": "⚡ Electricity", "note": "Roof flashing for solar mounts — THE MOST IMPORTANT COMPONENT for roof-mounted systems. IronRidge FlashFoot ($12-18 each): aluminum base with EPDM rubber seal, slides under existing shingles, self-sealing around lag bolt. Quick Mount PV QBase ($15-25): similar design, integrated seal. Installation: ", "fullNote": "Roof flashing for solar mounts — THE MOST IMPORTANT COMPONENT for roof-mounted systems. IronRidge FlashFoot ($12-18 each): aluminum base with EPDM rubber seal, slides under existing shingles, self-sealing around lag bolt. Quick Mount PV QBase ($15-25): similar design, integrated seal. Installation: lift shingle tab above mounting point, slide flashing under until top edge is under shingle, align with rafter (use stud finder or look for nail lines — MUST hit rafter center, not just decking). Drill pilot hole through flashing and into rafter (not just decking — 3\" minimum penetration into rafter). Apply roofing mastic in pilot hole. Insert stainless lag bolt with washer, tighten until sealant squeezes out. Do NOT overtighten (strips wood). After all flashings installed: spray with water hose, check attic for leaks. Apply additional sealant at any seepage. Common mistakes: missing the rafter (screwing into decking only — will pull out in wind), no sealant, overtightening (strips rafter threads), using wrong flashing for roof type. Panama: tropical downpours test every penetration. Use premium sealant (3M 5200 marine grade). Inspect after first rainy season and annually thereafter."}, {"sym": "COMBINER_BOX", "price": 125, "range": "$85-250", "unit": "USD", "conf": "high", "safety": true, "cat": "⚡ Electricity", "note": "PV combiner box — central junction where parallel strings join before feeding charge controller. MidNite Solar MNPV6 ($123, NEMA 3R, 150VDC, 6 circuits). MNPV6-250 ($159, 250VDC). Eco-Worthy 6-string ($85-110, budget). REQUIRED when 3+ parallel strings (NEC 690.9). Each string: its own fuse or break", "fullNote": "PV combiner box — central junction where parallel strings join before feeding charge controller. MidNite Solar MNPV6 ($123, NEMA 3R, 150VDC, 6 circuits). MNPV6-250 ($159, 250VDC). Eco-Worthy 6-string ($85-110, budget). REQUIRED when 3+ parallel strings (NEC 690.9). Each string: its own fuse or breaker (sized at 1.56 × Isc). Components: busbar for positive conductors, separate busbar for negative, DIN rail for breakers or fuse holders, NEMA-rated enclosure (3R outdoor, 4X coastal). DC disconnect option: MNPV6-DISCO has integrated disconnect switch. Place between array and charge controller — as close to array as practical. Wire: PV wire from panels to combiner, THHN from combiner to controller (in conduit if indoors). Ground: bond combiner box to system ground. Label each string clearly. Annual inspection: check for corrosion (Panama humidity), tightness of connections, signs of water ingress (replace gaskets if hardened). Surge protection: add MidNite SPD inside combiner for lightning protection. For single-string systems: combiner not needed — use inline fuse at array disconnect instead."}, {"sym": "PV_FUSE", "price": 12, "range": "$8-18", "unit": "USD", "conf": "high", "safety": true, "cat": "⚡ Electricity", "note": "MidNite Solar MNEPV series DC breaker ~$28-35 (1-pole, 300VDC). Sizing: 1.56 × Isc of the string, not exceeding panel's max series fuse rating (typically 15-20A). Available in 15A, 20A, 30A, 40A, 50A, 60A, 63A. MidNite MNEPV15-600-1PP for 600VDC systems ~$35. Fuses per string: Littelfuse KLKD series", "fullNote": "MidNite Solar MNEPV series DC breaker ~$28-35 (1-pole, 300VDC). Sizing: 1.56 × Isc of the string, not exceeding panel's max series fuse rating (typically 15-20A). Available in 15A, 20A, 30A, 40A, 50A, 60A, 63A. MidNite MNEPV15-600-1PP for 600VDC systems ~$35. Fuses per string: Littelfuse KLKD series DC midget fuses ~$8-12 each. Every parallel string MUST be individually fused."}, {"sym": "DC_BREAKER_PV", "price": 30, "range": "$25-35", "unit": "USD", "conf": "high", "safety": true, "cat": "⚡ Electricity", "note": "MidNite Solar MNEPV20-300-1PP (20A, 300VDC, DIN rail) ~$29. Serves dual purpose: overcurrent protection AND disconnect switch for PV array. Place between PV combiner and charge controller input. Must be DC-rated — AC breakers arc-weld on DC and cause fires. DIN rail mount fits in standard electrical", "fullNote": "MidNite Solar MNEPV20-300-1PP (20A, 300VDC, DIN rail) ~$29. Serves dual purpose: overcurrent protection AND disconnect switch for PV array. Place between PV combiner and charge controller input. Must be DC-rated — AC breakers arc-weld on DC and cause fires. DIN rail mount fits in standard electrical enclosures. 1-pole for single-string; 2-pole for ungrounded arrays."}, {"sym": "SURGE_PROTECTOR", "price": 90, "range": "$55-115", "unit": "USD", "conf": "high", "safety": true, "cat": "⚡ Electricity", "note": "Surge Protection Device (SPD) — protects solar electronics from lightning-induced voltage spikes. MidNite Solar MNSPD-300-DC ($83-95): Type 2, 300VDC, 50kA surge rating, DIN rail mount. MNSPD-300-AC ($83-95): for inverter AC side. MNSPD-600 ($95-115): for higher-voltage strings. Delta LA-602DC ($55-", "fullNote": "Surge Protection Device (SPD) — protects solar electronics from lightning-induced voltage spikes. MidNite Solar MNSPD-300-DC ($83-95): Type 2, 300VDC, 50kA surge rating, DIN rail mount. MNSPD-300-AC ($83-95): for inverter AC side. MNSPD-600 ($95-115): for higher-voltage strings. Delta LA-602DC ($55-75): spark gap type, 600VDC, heavy-duty. How it works: Metal Oxide Varistor (MOV) normally high resistance → when voltage spike exceeds threshold → MOV conducts, shunting surge to ground. After surge: MOV degrades. SPDs have limited life — replace after any nearby lightning strike. Installation: at array combiner box (DC side) AND at inverter AC input (AC side). Connect with SHORTEST possible wire to ground busbar (long ground wire = high impedance = SPD less effective). Indicator: green LED = good, red/flashing = replace. REQUIREMENTS: lightning-prone areas (Florida, Texas, Panama — tropical storms). NEC 2023 increasingly requires SPD in residential solar. Coordination: Type 1 at service entrance, Type 2 at distribution panels, Type 3 at sensitive equipment. For off-grid: Type 2 at combiner + Type 2 at inverter AC side is sufficient. Annual: check indicator LEDs, replace any showing fault. Panama: the isthmus gets intense electrical storms May-November. SPDs are cheap insurance — a direct lightning strike without SPD will destroy every piece of electronics in the system."}, {"sym": "DC_BREAKER_BATT", "price": 50, "range": "$35-65", "unit": "USD", "conf": "high", "safety": true, "cat": "⚡ Electricity", "note": "Blue Sea Systems 7186 100A DC breaker ~$55. Bussmann CB185 series 50-150A ~$35-65. Place between charge controller output and battery busbar. Sizing: 125% of controller rated output current. Also serves as battery disconnect for maintenance. Must be as close to battery as practical (within 7\" per AB", "fullNote": "Blue Sea Systems 7186 100A DC breaker ~$55. Bussmann CB185 series 50-150A ~$35-65. Place between charge controller output and battery busbar. Sizing: 125% of controller rated output current. Also serves as battery disconnect for maintenance. Must be as close to battery as practical (within 7\" per ABYC standards). T-Tocas 250A surface-mount breaker ~$25-40 for budget option."}, {"sym": "ANL_FUSE", "price": 15, "range": "$12-22", "unit": "USD", "conf": "high", "safety": true, "cat": "⚡ Electricity", "note": "Blue Sea 5007 series ANL fuses: 100A=$12-15, 150A=$14-18, 200A=$15-20, 250A=$16-22. 32V DC rated, AIC 2,700-6,000A. Good for 12V/24V battery main protection on smaller banks. Requires ANL fuse holder ($25-30). Victron ANL fuse 5-pack ~$41. Place on positive battery cable within 7\" of battery termina", "fullNote": "Blue Sea 5007 series ANL fuses: 100A=$12-15, 150A=$14-18, 200A=$15-20, 250A=$16-22. 32V DC rated, AIC 2,700-6,000A. Good for 12V/24V battery main protection on smaller banks. Requires ANL fuse holder ($25-30). Victron ANL fuse 5-pack ~$41. Place on positive battery cable within 7\" of battery terminal. NOT sufficient for large LiFePO4 banks — use Class-T instead."}, {"sym": "MEGA_FUSE", "price": 12, "range": "$8-15", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Victron MEGA fuses: 100A-300A, 32V DC. Victron 6-way MEGA fuse holder ~$36. Good for branch circuit protection (charge controller output, DC-DC converter input). Lower AIC than ANL or Class-T — only use where battery fault current is limited. Littelfuse 298 series ~$8-12 each from Mouser/DigiKey. Co", "fullNote": "Victron MEGA fuses: 100A-300A, 32V DC. Victron 6-way MEGA fuse holder ~$36. Good for branch circuit protection (charge controller output, DC-DC converter input). Lower AIC than ANL or Class-T — only use where battery fault current is limited. Littelfuse 298 series ~$8-12 each from Mouser/DigiKey. Color-coded by amperage for easy identification."}, {"sym": "MRBF_FUSE", "price": 18, "range": "$12-25", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Blue Sea 5191-5194 MRBF (Marine Rated Battery Fuse): 100A=$12-16, 200A=$16-22, 300A=$20-25. 58V DC, AIC 10,000A. Mounts DIRECTLY on battery terminal — no cable between battery and fuse. Terminal fuse block ~$20-25. Best for individual battery protection in parallel banks. Each parallel battery shoul", "fullNote": "Blue Sea 5191-5194 MRBF (Marine Rated Battery Fuse): 100A=$12-16, 200A=$16-22, 300A=$20-25. 58V DC, AIC 10,000A. Mounts DIRECTLY on battery terminal — no cable between battery and fuse. Terminal fuse block ~$20-25. Best for individual battery protection in parallel banks. Each parallel battery should have its own MRBF at the positive terminal. Compact and ignition-protected."}, {"sym": "CLASS_T_FUSE", "price": 45, "range": "$35-65", "unit": "USD", "conf": "high", "safety": true, "cat": "⚡ Electricity", "note": "Class-T fuse — REQUIRED for LiFePO4 battery banks. Littelfuse JLLN series. Sizes: 200A ($35-45), 300A ($40-55), 400A ($50-65). 125V DC rating. AIC (Ampere Interrupting Capacity): 20,000-50,000A — this is CRITICAL. LiFePO4 batteries can deliver 5,000-10,000A into a dead short. ANL fuses (AIC 2,700-6,", "fullNote": "Class-T fuse — REQUIRED for LiFePO4 battery banks. Littelfuse JLLN series. Sizes: 200A ($35-45), 300A ($40-55), 400A ($50-65). 125V DC rating. AIC (Ampere Interrupting Capacity): 20,000-50,000A — this is CRITICAL. LiFePO4 batteries can deliver 5,000-10,000A into a dead short. ANL fuses (AIC 2,700-6,000A) may not interrupt this — they can ARC OVER and continue conducting. Class-T is fast-acting with sand-filled ceramic body that extinguishes the arc. Installation: as close to battery positive terminal as possible (within 7\" per ABYC). Use Class-T fuse holder/block ($55-80) — do NOT jury-rig. Cable: size for inverter surge current. One Class-T per battery bank (not per battery — individual batteries use MRBF terminal fuses). Also recommended for large lead-acid banks (>400Ah). Panama: the humidity accelerates terminal corrosion — use dielectric grease on all connections and inspect quarterly. If a Class-T fuse blows, FIND THE FAULT before replacing — it blew for a reason. Keep a spare onboard."}, {"sym": "GROUND_ROD", "price": 20, "range": "$14-65", "unit": "USD", "conf": "high", "safety": true, "cat": "⚡ Electricity", "note": "Copper-clad steel ground rod, 5/8\" diameter × 8 ft length ($18-25). Solid copper rod ($45-65, better conductivity but more expensive). NEC requires: 8 ft minimum driven vertically into earth, top flush or below grade. If rock prevents full depth: bury horizontally at 30\" depth in 30\" deep trench (2.", "fullNote": "Copper-clad steel ground rod, 5/8\" diameter × 8 ft length ($18-25). Solid copper rod ($45-65, better conductivity but more expensive). NEC requires: 8 ft minimum driven vertically into earth, top flush or below grade. If rock prevents full depth: bury horizontally at 30\" depth in 30\" deep trench (2.5 ft × rod length). Ground rod clamp: bronze acorn clamp ($5-8) attaches copper ground wire to rod. Two rods 6 ft+ apart recommended for lower resistance (NEC 250.53: if single rod >25 ohms, must add second). Testing resistance: 3-point fall-of-potential test (requires special meter, $50-150) or cheat by driving second rod if soil is dry/sandy. Panama: coastal sandy soils have high resistance — use longer rods, chemical ground rods, or ground enhancement material (bentonite clay). In volcanic soils (Chiriqui): better conductivity, standard rod may suffice. Connection: #6 AWG bare copper wire minimum (NEC Table 250.66). Protect wire from physical damage (in conduit where exposed). Ground rod location: near electrical equipment, accessible for inspection, avoid underground utilities (call before digging)."}, {"sym": "GROUNDING_WIRE", "price": 1.5, "range": "$1.2-3.0", "unit": "USD", "conf": "high", "safety": true, "cat": "⚡ Electricity", "note": "Equipment grounding conductor — bonds all metal components to earth. Bare copper, stranded or solid. Sizing: NEC Table 250.122 based on overcurrent device rating. 15A breaker → 14 AWG, 20A → 12 AWG, 30-60A → 10 AWG, 100A → 8 AWG, 200A → 6 AWG, 300A → 4 AWG. Grounding electrode conductor (to ground r", "fullNote": "Equipment grounding conductor — bonds all metal components to earth. Bare copper, stranded or solid. Sizing: NEC Table 250.122 based on overcurrent device rating. 15A breaker → 14 AWG, 20A → 12 AWG, 30-60A → 10 AWG, 100A → 8 AWG, 200A → 6 AWG, 300A → 4 AWG. Grounding electrode conductor (to ground rod): NEC Table 250.66, based on largest service conductor. For typical off-grid with 2/0-3/0 copper: 4 AWG minimum. Installation: continuous wire from each metal component back to ground busbar — no splices in grounding conductors. Bond: panel frames (each panel has ground lug), aluminum rails, inverter chassis, charge controller chassis, battery enclosure (if metal), conduit, junction boxes. Color: green or bare (NEVER use green for current-carrying). Single-point ground: ALL grounds converge at ONE ground busbar, which connects to ground rod via grounding electrode conductor. Multiple ground rods = OK. Multiple ground connections to earth at DIFFERENT points = NOT OK (creates ground loops, potential differences, noise, shock hazard). Panama: tropical humidity → use tinned copper wire for corrosion resistance at connections. Inspect ground connections annually — clean corrosion, re-tighten, apply dielectric grease."}, {"sym": "GROUND_BUSBAR", "price": 40, "range": "$28-55", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Blue Sea 2304 20-terminal ground busbar ~$45-55. Blue Sea 2301 10-terminal ~$28-35. Central point where all equipment grounds and the grounding electrode conductor connect. Use separate busbars for DC negative and equipment ground — do NOT use the negative busbar as the ground busbar. Mount in acces", "fullNote": "Blue Sea 2304 20-terminal ground busbar ~$45-55. Blue Sea 2301 10-terminal ~$28-35. Central point where all equipment grounds and the grounding electrode conductor connect. Use separate busbars for DC negative and equipment ground — do NOT use the negative busbar as the ground busbar. Mount in accessible location inside power center. Label clearly: 'EQUIPMENT GROUND — DO NOT DISCONNECT'."}, {"sym": "PANEL_GROUNDING", "price": 8, "range": "$5-10", "unit": "USD", "conf": "high", "safety": true, "cat": "⚡ Electricity", "note": "Panel frame grounding — bonds each solar panel's aluminum frame to the system ground. IronRidge XR-LUG-04-A1 ground lug ($7): mounts on panel frame or rail. WEEB (Washer Electrical Equipment Bond) clips: pierce anodized coating to make electrical connection between rail and panel frame — no separate", "fullNote": "Panel frame grounding — bonds each solar panel's aluminum frame to the system ground. IronRidge XR-LUG-04-A1 ground lug ($7): mounts on panel frame or rail. WEEB (Washer Electrical Equipment Bond) clips: pierce anodized coating to make electrical connection between rail and panel frame — no separate ground wire per panel needed. Each panel MUST be grounded — anodized aluminum is an insulator, and frame can become energized if internal fault occurs. Ground wire: #10 AWG bare copper minimum, continuous from first panel to last, then to ground busbar. Rail-based systems: bond first and last rail to ground busbar (WEEB clips bond panels to rails). Multiple arrays: each array's grounding conductor converges at combiner box, then single conductor to ground busbar. Common failure: corrosion at lug-to-frame connection → use antioxidant paste, inspect annually. Panama tropical tip: stainless steel hardware for ground lugs (not zinc-plated). Copper-to-aluminum connections need antioxidant (galvanic corrosion in humidity). Test: continuity meter between panel frame and ground rod — should read <1 ohm."}, {"sym": "PV_WIRE_10AWG", "price": 0.8, "range": "$0.65-0.9", "unit": "USD", "conf": "high", "safety": true, "cat": "⚡ Electricity", "note": "10 AWG PV Wire (USE-2/Photovoltaic) — REQUIRED for all exposed outdoor solar array wiring. Specs: stranded copper, XLPE (cross-linked polyethylene) insulation, rated 90°C wet/105°C dry, 600V or 1000V/2000V depending on manufacturer. UV-resistant (critical — THHN WILL degrade in sun within 1-2 years)", "fullNote": "10 AWG PV Wire (USE-2/Photovoltaic) — REQUIRED for all exposed outdoor solar array wiring. Specs: stranded copper, XLPE (cross-linked polyethylene) insulation, rated 90°C wet/105°C dry, 600V or 1000V/2000V depending on manufacturer. UV-resistant (critical — THHN WILL degrade in sun within 1-2 years). Direct burial rated. Ampacity: 40A at 30°C (derate: 36A at 40°C, 32A at 50°C rooftop). Price: $0.65-0.90/ft by the foot, $50-80 for 100ft spool. Brands: Southwire, Temco, WindyNation, BougeRV. Colors: black (most common), red. Use black for negative, red for positive (or black with red tape on both ends). SIZE CHECK: 10 AWG handles most small-medium arrays. For 30A+, or runs >100ft, upgrade to 8 AWG. MC4 connectors: pre-crimped MC4 leads available ($8-12/pair) if you don't want to crimp yourself. Buy extra length — you WILL need more than you think. Add 10% to measured distance for slack, curves, and future repositioning. Panama: the intense UV degrades cheap wire fast — buy from reputable brands. Inspect annually for insulation cracking, especially near MC4 connectors where wire flexes. Replace any wire showing cracks or discoloration."}, {"sym": "PV_WIRE_8AWG", "price": 1.5, "range": "$1.2-1.8", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "8 AWG PV Wire ~$1.20-1.80/ft. For larger arrays or long combiner-to-controller runs. Ampacity: 55A at 30°C. Use when 10 AWG voltage drop exceeds 3%. Example: 30A at 100ft one-way on 10 AWG drops 6V — upgrade to 8 AWG for 3.8V drop. Also used as battery cable for small inverters (<1000W at 12V).", "fullNote": "8 AWG PV Wire ~$1.20-1.80/ft. For larger arrays or long combiner-to-controller runs. Ampacity: 55A at 30°C. Use when 10 AWG voltage drop exceeds 3%. Example: 30A at 100ft one-way on 10 AWG drops 6V — upgrade to 8 AWG for 3.8V drop. Also used as battery cable for small inverters (<1000W at 12V)."}, {"sym": "THHN_WIRE", "price": 1.2, "range": "$0.8-4.5", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "THHN/THWN-2 stranded copper per foot, inside conduit only. 8 AWG ~$0.98/ft, 6 AWG ~$1.20-1.50/ft, 4 AWG ~$2.00-2.50/ft, 2 AWG THHN ~$4.50/ft. NOT rated for direct sun — must be in conduit or indoors. 90°C dry, 75°C wet. Standard for interior wiring, conduit runs, and AC circuits. Color code: black/r", "fullNote": "THHN/THWN-2 stranded copper per foot, inside conduit only. 8 AWG ~$0.98/ft, 6 AWG ~$1.20-1.50/ft, 4 AWG ~$2.00-2.50/ft, 2 AWG THHN ~$4.50/ft. NOT rated for direct sun — must be in conduit or indoors. 90°C dry, 75°C wet. Standard for interior wiring, conduit runs, and AC circuits. Color code: black/red for hot, white for neutral (AC), green for ground. MTW (Machine Tool Wire) variant has finer stranding."}, {"sym": "MC4_CONNECTOR", "price": 2.5, "range": "$2.0-5.0", "unit": "USD", "conf": "high", "safety": true, "cat": "⚡ Electricity", "note": "Per connector (male or female). Staubli MC4 ~$2.38 at NAZ Solar Electric. BougeRV 10-pair kit ~$25-35. Rated 30A, 1000V DC (IEC). Contact resistance <0.5 mΩ when properly crimped. CRITICAL: use MC4-specific crimping tool — generic crimpers create poor connections that overheat. Never mix brands (int", "fullNote": "Per connector (male or female). Staubli MC4 ~$2.38 at NAZ Solar Electric. BougeRV 10-pair kit ~$25-35. Rated 30A, 1000V DC (IEC). Contact resistance <0.5 mΩ when properly crimped. CRITICAL: use MC4-specific crimping tool — generic crimpers create poor connections that overheat. Never mix brands (intermateability not guaranteed). UV-stabilized housing but inspect annually for cracking. MC4 unlocking tool ~$4-5 required to disconnect."}, {"sym": "MC4_CRIMPER", "price": 45, "range": "$35-55", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "iCrimp IWS-254B MC4 crimping tool ~$35-50. BougeRV MC4 crimper kit ~$40-55. Dedicated dies for 14, 12, and 10 AWG PV wire. Professional Staubli PV-CZM-64100 ~$769 (overkill for DIY). Crimp inspection: no exposed strands, crimp centered on barrel, no insulation in crimp zone. After crimping: tug test", "fullNote": "iCrimp IWS-254B MC4 crimping tool ~$35-50. BougeRV MC4 crimper kit ~$40-55. Dedicated dies for 14, 12, and 10 AWG PV wire. Professional Staubli PV-CZM-64100 ~$769 (overkill for DIY). Crimp inspection: no exposed strands, crimp centered on barrel, no insulation in crimp zone. After crimping: tug test (firm pull — shouldn't release), then insert into MC4 housing until click, tighten compression nut."}, {"sym": "CABLE_ENTRY", "price": 25, "range": "$15-55", "unit": "USD", "conf": "medium", "safety": false, "cat": "⚡ Electricity", "note": "SolaDeck 0799 roof junction box ~$35-55. Heyco Solar Junction Box ~$15-25. Waterproof cable entry point where PV wires enter the building. Must be flashed and sealed like any roof penetration. Includes strain relief for cables and terminals for transitioning from PV wire to indoor-rated wire. One pe", "fullNote": "SolaDeck 0799 roof junction box ~$35-55. Heyco Solar Junction Box ~$15-25. Waterproof cable entry point where PV wires enter the building. Must be flashed and sealed like any roof penetration. Includes strain relief for cables and terminals for transitioning from PV wire to indoor-rated wire. One per array string group. Minimum NEMA 3R rating."}, {"sym": "CONDUIT_EMT", "price": 10, "range": "$8-30", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "EMT (Electrical Metallic Tubing) per 10ft stick: 3/4\" ~$8-12, 1\" ~$12-18, 1-1/2\" ~$22-30 (Home Depot). Steel conduit for indoor and protected outdoor runs. Requires connectors, couplings, and bends. Must be properly grounded (bonded at each end). Use rain-tight fittings for outdoor EMT. Conduit fill", "fullNote": "EMT (Electrical Metallic Tubing) per 10ft stick: 3/4\" ~$8-12, 1\" ~$12-18, 1-1/2\" ~$22-30 (Home Depot). Steel conduit for indoor and protected outdoor runs. Requires connectors, couplings, and bends. Must be properly grounded (bonded at each end). Use rain-tight fittings for outdoor EMT. Conduit fill: max 40% for 3+ wires (NEC Chapter 9). For PV circuits, transition from PV wire to THHN inside conduit at junction box."}, {"sym": "CONDUIT_PVC", "price": 8, "range": "$6-20", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity",
