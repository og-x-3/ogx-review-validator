<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=yes">
<title>OG.X — Rule Validator</title>
<style>
:root{--bg:#020617;--card:#0f172a;--border:#1e293b;--cyan:#22d3ee;--emerald:#34d399;--amber:#fbbf24;--rose:#fb7185;--blue:#60a5fa;--text:#e2e8f0;--muted:#94a3b8;--slate:#334155;--green-bg:#052e1611;--green-border:#16653444;--red-bg:#451a0311;--red-border:#78350f44}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono','Fira Code',monospace;min-height:100vh;display:flex;flex-direction:column}
.topbar{width:100%;padding:.5rem 1rem;display:flex;justify-content:space-between;align-items:center;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;flex-wrap:wrap;gap:.25rem}
.topbar h1{font-size:.75rem;display:flex;align-items:center;gap:.4rem}
.pulse{width:6px;height:6px;background:var(--emerald);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.counter{font-size:.6rem;color:var(--cyan);font-weight:bold}
.progress-wrap{width:100%;height:2px;background:#1e293b}
.progress-fill{height:100%;background:var(--emerald);transition:width .4s}
.card-area{flex:1;display:flex;align-items:flex-start;justify-content:center;width:100%;padding:.5rem;overflow-y:auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.75rem 1rem;width:100%;max-width:600px}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.3rem}
.card-symbol{font-size:.8rem;font-weight:bold;color:var(--blue)}
.card-price-block{text-align:right;min-width:80px}
.card-price{font-size:1rem;font-weight:bold}
.card-range{font-size:.5rem;color:var(--muted)}
.badges{display:flex;gap:.25rem;margin-bottom:.3rem;flex-wrap:wrap}
.badge{font-size:.42rem;padding:1px 4px;border-radius:2px;font-weight:bold}
.badge-high{background:#064e3b;color:var(--emerald)}
.badge-medium{background:#78350f;color:var(--amber)}
.badge-low{background:#7f1d1d;color:var(--rose)}
.badge-safety{background:#881337;color:var(--rose)}
.badge-cat{background:#1e293b;color:var(--muted)}
.editable{outline:none;border-radius:4px;padding:2px 4px;transition:all .15s}
.editable:hover{background:#1e293b44}
.editable:focus{background:#1e293b88;box-shadow:0 0 0 1px var(--cyan)}
.note-edit{font-size:.52rem;color:var(--muted);line-height:1.4;background:#0a0f1f;padding:.4rem;border-radius:5px;border:1px solid #1e293b;margin-bottom:.3rem;min-height:40px}
.pros-cons{display:grid;grid-template-columns:1fr 1fr;gap:.3rem;margin-bottom:.3rem}
.pc-box{font-size:.48rem;line-height:1.35;padding:.35rem;border-radius:5px;min-height:40px}
.pc-pros{background:var(--green-bg);border:1px solid var(--green-border);color:var(--emerald)}
.pc-cons{background:var(--red-bg);border:1px solid var(--red-border);color:var(--amber)}
.pc-label{font-size:.4rem;font-weight:bold;opacity:.7;margin-bottom:.15rem;display:block}
.actions{display:flex;gap:.4rem;justify-content:center;flex-wrap:wrap;margin-top:.3rem}
.btn{padding:.35rem .7rem;border-radius:6px;border:1px solid var(--border);cursor:pointer;font-size:.52rem;font-weight:bold;font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:.2rem;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.btn-flag{background:#451a03;color:var(--amber);border-color:#78350f}
.btn-flag:active{background:#78350f;color:#fcd34d}
.btn-skip{background:#1e293b;color:var(--muted)}
.btn-skip:active{background:#334155;color:var(--text)}
.btn-help{background:#1e1b4b;color:var(--violet);border-color:#4c1d95}
.btn-help:active{background:#4c1d95;color:#c4b5fd}
.btn-validate{background:#052e16;color:var(--emerald);border-color:#166534}
.btn-validate:active{background:#166534;color:#6ee7b7}
.btn-save{background:#0f172a;color:var(--cyan);border-color:var(--cyan)}
.btn-delete{background:#450a0a;color:var(--rose);border-color:#7f1d1d}
.btn-delete:active{background:#7f1d1d;color:#fda4af}
.btn-grok{background:#0a1628;color:#60a5fa;border-color:#1e3a5f}
.btn-grok:active{background:#1e3a5f;color:#93c5fd}
.key-hint{font-size:.35rem;opacity:.3}

.overlay{display:none;position:fixed;inset:0;background:#000000e6;z-index:999;align-items:center;justify-content:center;padding:.5rem}
.overlay.active{display:flex}
.popup{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1rem;max-width:560px;max-height:85vh;overflow-y:auto;width:95%}
.popup h3{font-size:.7rem;color:var(--cyan);margin-bottom:.4rem}
.popup .info-edit{font-size:.5rem;color:var(--muted);line-height:1.5;white-space:pre-line;min-height:60px}
.popup .close-btn{float:right;background:none;border:none;color:var(--muted);font-size:1rem;cursor:pointer;padding:.2rem .4rem}
.popup h4{font-size:.5rem;margin-bottom:.15rem;margin-top:.4rem}

.done-screen{text-align:center;padding:1.5rem}
.done-screen h2{font-size:1rem;margin-bottom:.4rem}
.done-screen .big-num{font-size:2.5rem;font-weight:bold;color:var(--emerald)}
.stat-row{display:flex;gap:1.5rem;justify-content:center;margin:.75rem 0;flex-wrap:wrap}
.stat-box{text-align:center}
.stat-box .num{font-size:1rem;font-weight:bold}
.stat-box .label{font-size:.42rem;color:var(--muted)}
.btn-restart{background:var(--cyan);color:#020617;border:none;padding:.4rem 1rem;border-radius:6px;cursor:pointer;font-weight:bold;font-family:inherit;font-size:.6rem;margin-top:.5rem}
.btn-export{background:var(--violet);color:#fff;border:none;padding:.4rem 1rem;border-radius:6px;cursor:pointer;font-weight:bold;font-family:inherit;font-size:.55rem;margin-top:.3rem}
.btn-restore{background:var(--amber);color:#020617;border:none;padding:.4rem 1rem;border-radius:6px;cursor:pointer;font-weight:bold;font-family:inherit;font-size:.55rem;margin-top:.3rem}
.keybar{padding:.2rem .75rem;font-size:.38rem;color:var(--muted);display:flex;gap:.6rem;justify-content:center;border-top:1px solid var(--border);width:100%;flex-wrap:wrap}
.keybar kbd{background:#1e293b;padding:1px 3px;border-radius:2px;border:1px solid var(--border);font-family:inherit;font-size:.38rem}
details{margin-top:.4rem}details summary{font-size:.45rem;color:var(--amber);cursor:pointer}

@media (max-width:480px){
  .card{padding:.5rem .6rem} .btn{padding:.3rem .5rem;font-size:.48rem} 
  .card-symbol{font-size:.7rem} .card-price{font-size:.9rem}
  .pros-cons{grid-template-columns:1fr}
}
</style></head><body>

ing on aquifer. Must be >50ft from septic systems."}, {"sym": "BOREWELL", "price": 3500, "range": "$3000-5,000", "unit": "USD", "conf": "medium", "safety": false, "cat": "💧 Water", "note": "Machine-drilled well, 50-300ft deep, cased with steel/PVC, plus submersible pump. Most reliable off-grid water source and adds property value. Drillers charge $10-30/foot. Well depth depends on local geology — check state well logs before buying land", "fullNote": "Machine-drilled well, 50-300ft deep, cased with steel/PVC, plus submersible pump. Most reliable off-grid water source and adds property value. Drillers charge $10-30/foot. Well depth depends on local geology — check state well logs before buying land. Typically yields 5-30 GPM."}, {"sym": "RAINWATER_KIT", "price": 300, "range": "$150-500", "unit": "USD", "conf": "medium", "safety": false, "cat": "💧 Water", "note": "Gutters + downspouts + first-flush diverter (discards initial dirty runoff) + screened inlet to barrel/tank. 1 inch of rain on 1000 sq ft roof = ~600 gallons harvested. Rainwater is naturally soft (low mineral content) but must be filtered for drinki", "fullNote": "Gutters + downspouts + first-flush diverter (discards initial dirty runoff) + screened inlet to barrel/tank. 1 inch of rain on 1000 sq ft roof = ~600 gallons harvested. Rainwater is naturally soft (low mineral content) but must be filtered for drinking. Best paired with a large cistern for year-round supply."}, {"sym": "RO_DESAL", "price": 3000, "range": "$2000-4,000", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "Small marine reverse osmosis desalinator (Spectra/Katadyn). Produces drinkable water from saltwater, brackish water, or contaminated sources. RO removes 95-99% of total dissolved solids including salts, heavy metals, and most pathogens. Requires 50-8", "fullNote": "Small marine reverse osmosis desalinator (Spectra/Katadyn). Produces drinkable water from saltwater, brackish water, or contaminated sources. RO removes 95-99% of total dissolved solids including salts, heavy metals, and most pathogens. Requires 50-80 psi feed pressure (usually a booster pump), produces 4-20 GPH. Wastes 1-3 gallons of brine per gallon of fresh water produced."}, {"sym": "SOLAR_STILL", "price": 120, "range": "$50-200", "unit": "USD", "conf": "low", "safety": false, "cat": "💧 Water", "note": "DIY solar still: glass/plastic cover over dark basin traps evaporated water. Very low output (~0.5-2 gallons/day in full sun). Works for emergency purification or remote survival but impractical for daily household use. No moving parts, zero energy c", "fullNote": "DIY solar still: glass/plastic cover over dark basin traps evaporated water. Very low output (~0.5-2 gallons/day in full sun). Works for emergency purification or remote survival but impractical for daily household use. No moving parts, zero energy cost. Produces distilled-quality water from any source including saltwater."}, {"sym": "FOG_CATCHER", "price": 500, "range": "$200-1,000", "unit": "USD", "conf": "low", "safety": false, "cat": "💧 Water", "note": "Vertical mesh nets (Raschel mesh or similar) that capture water droplets from fog. Viable only in foggy coastal/mountain regions (e.g., Chilean deserts, coastal California). One large net (40m²) can yield 100-400 L/day in foggy conditions. Requires r", "fullNote": "Vertical mesh nets (Raschel mesh or similar) that capture water droplets from fog. Viable only in foggy coastal/mountain regions (e.g., Chilean deserts, coastal California). One large net (40m²) can yield 100-400 L/day in foggy conditions. Requires regular cleaning. Niche option — location-dependent."}, {"sym": "AWG", "price": 1200, "range": "$800-2,000", "unit": "USD", "conf": "medium", "safety": false, "cat": "💧 Water", "note": "Atmospheric Water Generator: condenses humidity from air (like a dehumidifier) and collects the water. Output depends on humidity and temperature: 3-8 gallons/day at 60-80% RH. Energy-intensive (350-700 Wh/gallon) — requires substantial solar or grid", "fullNote": "Atmospheric Water Generator: condenses humidity from air (like a dehumidifier) and collects the water. Output depends on humidity and temperature: 3-8 gallons/day at 60-80% RH. Energy-intensive (350-700 Wh/gallon) — requires substantial solar or grid power. Best for humid climates where surface water is scarce."}, {"sym": "GRAVITY_FEED", "price": 100, "range": "$50-300", "unit": "USD", "conf": "medium", "safety": false, "cat": "💧 Water", "note": "Pipe and fittings routed from a water source at higher elevation than the dwelling. Zero operating energy — pure gravity provides pressure. Rule of thumb: 2.3ft elevation = 1 PSI; need 20-40 PSI for normal household fixtures (~50-100ft elevation drop", "fullNote": "Pipe and fittings routed from a water source at higher elevation than the dwelling. Zero operating energy — pure gravity provides pressure. Rule of thumb: 2.3ft elevation = 1 PSI; need 20-40 PSI for normal household fixtures (~50-100ft elevation drop). Use HDPE or PEX pipe (won't burst if frozen like PVC). The gold standard for off-grid water pressure."}, {"sym": "RAM_PUMP", "price": 250, "range": "$150-400", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "Hydraulic ram pump: uses the kinetic energy of flowing water to pump a portion of it uphill. Requires a stream with at least 2-3ft of fall (drive head) and continuous flow. Can pump water 10x higher than the fall (e.g., 3ft fall can pump to 30ft heig", "fullNote": "Hydraulic ram pump: uses the kinetic energy of flowing water to pump a portion of it uphill. Requires a stream with at least 2-3ft of fall (drive head) and continuous flow. Can pump water 10x higher than the fall (e.g., 3ft fall can pump to 30ft height). No electricity or fuel needed. Runs 24/7 indefinitely. Must have a waste valve and air chamber."}, {"sym": "HAND_PUMP_SHALLOW", "price": 200, "range": "$69-297", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "Manual pitcher pump for shallow wells ≤25ft. Bison 1118-25 ($297) is the gold standard: cast iron, rebuildable, lasts 50+ years. Flotec FP4200 ($69) is budget alternative. Zero energy. Output ~2-5 GPM depending on depth. Essential backup. OG Shop win", "fullNote": "Manual pitcher pump for shallow wells ≤25ft. Bison 1118-25 ($297) is the gold standard: cast iron, rebuildable, lasts 50+ years. Flotec FP4200 ($69) is budget alternative. Zero energy. Output ~2-5 GPM depending on depth. Essential backup. OG Shop winner: Bison 1118-25."}, {"sym": "HAND_PUMP_DEEP", "price": 700, "range": "$500-1,200", "unit": "USD", "conf": "medium", "safety": false, "cat": "💧 Water", "note": "Deep-well hand pump for wells 25-200ft. Simple Pump 1115 ($1,095) or Bison 1145-200 ($679). More effort required per gallon. Essential backup when electric submersible pump fails. Must match well casing diameter.", "fullNote": "Deep-well hand pump for wells 25-200ft. Simple Pump 1115 ($1,095) or Bison 1145-200 ($679). More effort required per gallon. Essential backup when electric submersible pump fails. Must match well casing diameter."}, {"sym": "PUMP_12V", "price": 150, "range": "$100-200", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "DC diaphragm pump (Shurflo RV style): self-priming, low current draw (~4-8A at 12V). Ideal for direct solar-powered water systems. Delivers 2-4 GPM at 40-60 PSI. Built-in pressure switch cycles pump on demand. Must never run dry. Pumps degrade if wat", "fullNote": "DC diaphragm pump (Shurflo RV style): self-priming, low current draw (~4-8A at 12V). Ideal for direct solar-powered water systems. Delivers 2-4 GPM at 40-60 PSI. Built-in pressure switch cycles pump on demand. Must never run dry. Pumps degrade if water freezes in the head. Common in RVs, cabins, and tiny homes."}, {"sym": "PUMP_AC", "price": 300, "range": "$200-400", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "AC jet/shallow well pump. Higher flow (5-15 GPM) than DC pumps but requires inverter or grid AC power. Jet pumps can lift from ~25ft; convertible jet pumps from deeper wells. More efficient for pressurizing large storage tanks. Cast iron body lasts l", "fullNote": "AC jet/shallow well pump. Higher flow (5-15 GPM) than DC pumps but requires inverter or grid AC power. Jet pumps can lift from ~25ft; convertible jet pumps from deeper wells. More efficient for pressurizing large storage tanks. Cast iron body lasts longer than plastic. Pair with a pressure tank for stable delivery."}, {"sym": "DRUM_TANK", "price": 50, "range": "$30-100", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "Used 55-gallon blue HDPE drums — the original off-grid water storage. Stackable, durable, UV-resistant (blue blocks algae growth). Must have been food-grade only (not chemical). Fit on pallets for easy handling. Add a spigot and overflow. Good starte", "fullNote": "Used 55-gallon blue HDPE drums — the original off-grid water storage. Stackable, durable, UV-resistant (blue blocks algae growth). Must have been food-grade only (not chemical). Fit on pallets for easy handling. Add a spigot and overflow. Good starter storage; expand with multiple drums plumbed in series."}, {"sym": "POLY_TANK", "price": 300, "range": "$200-400", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "250-gallon polyethylene tank: rotationally molded, UV-stabilized, lightweight. The most common off-grid tank. Sizes range 100-2500 gallons. Dark color prevents algae; translucent allows sight-level check. Place on compacted gravel pad at least 2ft ab", "fullNote": "250-gallon polyethylene tank: rotationally molded, UV-stabilized, lightweight. The most common off-grid tank. Sizes range 100-2500 gallons. Dark color prevents algae; translucent allows sight-level check. Place on compacted gravel pad at least 2ft above grade for gravity feed. NSF/ANSI Standard 61 certified for potable water."}, {"sym": "BLADDER_TANK", "price": 350, "range": "$200-500", "unit": "USD", "conf": "medium", "safety": false, "cat": "💧 Water", "note": "Collapsible water bladder (Pillow-style): stores flat when empty, expands when filled. Best seasonal or emergency/temporary storage. Sizes 100-2500 gallons. Must be on flat, debris-free surface. Vulnerable to rodents and UV degradation unless shaded.", "fullNote": "Collapsible water bladder (Pillow-style): stores flat when empty, expands when filled. Best seasonal or emergency/temporary storage. Sizes 100-2500 gallons. Must be on flat, debris-free surface. Vulnerable to rodents and UV degradation unless shaded. Not for permanent installation but excellent for portable water supply."}, {"sym": "FERRO_CISTERN", "price": 500, "range": "$300-800", "unit": "USD", "conf": "low", "safety": false, "cat": "💧 Water", "note": "DIY ferrocement cistern: chicken wire + mortar over a form. Strong, durable, relatively cheap but labor-intensive. Can be built to any shape/size. Requires proper waterproofing (hydraulic cement or safe sealer). Must be below the frost line if buried", "fullNote": "DIY ferrocement cistern: chicken wire + mortar over a form. Strong, durable, relatively cheap but labor-intensive. Can be built to any shape/size. Requires proper waterproofing (hydraulic cement or safe sealer). Must be below the frost line if buried. Lasts 50+ years if built correctly. The classic homestead option."}, {"sym": "BRICK_CISTERN", "price": 1500, "range": "$1000-2,000", "unit": "USD", "conf": "medium", "safety": false, "cat": "💧 Water", "note": "Professionally built brick or concrete cistern. Usually 2000-5000 gallons. Most expensive but longest-lasting water storage. Requires proper rebar reinforcement, waterproof parging/sealant, and overflow pipe. Can be part of the building foundation. C", "fullNote": "Professionally built brick or concrete cistern. Usually 2000-5000 gallons. Most expensive but longest-lasting water storage. Requires proper rebar reinforcement, waterproof parging/sealant, and overflow pipe. Can be part of the building foundation. Common in arid regions (Caribbean, Mediterranean). Add a manhole for cleaning."}, {"sym": "PLYWOOD_TANK", "price": 350, "range": "$200-500", "unit": "USD", "conf": "low", "safety": false, "cat": "💧 Water", "note": "DIY plywood tank lined with pond liner or fiberglassed interior. Lower cost but only 3-5 year lifespan before plywood rots (even with marine-grade). Use exterior-grade ply + epoxy coating and a food-grade liner. Best as an intermediate solution. Foam", "fullNote": "DIY plywood tank lined with pond liner or fiberglassed interior. Lower cost but only 3-5 year lifespan before plywood rots (even with marine-grade). Use exterior-grade ply + epoxy coating and a food-grade liner. Best as an intermediate solution. Foam-core panels (like SIPs) used for the same approach last longer."}, {"sym": "SS_TANK", "price": 1000, "range": "$500-1,500", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "100-200 gallon stainless steel tank. Most sanitary option — non-reactive, won't leach chemicals, easy to sterilize. Resists corrosion and UV damage indefinitely. Expensive per-gallon but lasts a lifetime. Ideal for drinking water only (too costly for", "fullNote": "100-200 gallon stainless steel tank. Most sanitary option — non-reactive, won't leach chemicals, easy to sterilize. Resists corrosion and UV damage indefinitely. Expensive per-gallon but lasts a lifetime. Ideal for drinking water only (too costly for whole-house storage). Common in commercial kitchens and wineries."}, {"sym": "LEVEL_INDICATOR", "price": 100, "range": "$50-150", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "Electronic water level gauge or mechanical sight tube for tanks. Essential for managing water budgeting — knowing how much you have prevents surprise outages. Options: ultrasonic (non-contact), float switch (simple/cheap), pressure transducer (accura", "fullNote": "Electronic water level gauge or mechanical sight tube for tanks. Essential for managing water budgeting — knowing how much you have prevents surprise outages. Options: ultrasonic (non-contact), float switch (simple/cheap), pressure transducer (accurate), or clear sight tube (free, visual). Electronic versions can trigger alarms at low levels."}, {"sym": "PREFILTER", "price": 60, "range": "$30-100", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "Gravel/sand/charcoal prefilter (slow sand filter variant). Removes sediment, turbidity, and some pathogens before main filtration. Extends life of expensive filter elements. A layered system: coarse gravel (bottom) -> fine gravel -> coarse sand -> fi", "fullNote": "Gravel/sand/charcoal prefilter (slow sand filter variant). Removes sediment, turbidity, and some pathogens before main filtration. Extends life of expensive filter elements. A layered system: coarse gravel (bottom) -> fine gravel -> coarse sand -> fine sand -> activated charcoal (top). Can treat thousands of gallons before media needs replacement."}, {"sym": "BERKEY", "price": 330, "range": "$250-350", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "Big Berkey gravity-fed countertop filter: two stainless steel chambers with Black Berkey filter elements. Uses gravity (no power). Black Berkey elements remove >99.9% of bacteria, viruses, and parasites plus heavy metals, chemicals, and sediment usin", "fullNote": "Big Berkey gravity-fed countertop filter: two stainless steel chambers with Black Berkey filter elements. Uses gravity (no power). Black Berkey elements remove >99.9% of bacteria, viruses, and parasites plus heavy metals, chemicals, and sediment using a proprietary carbon/ceramic composite. Flow rate ~3-4 GPH. Filter elements last 3000 gallons per pair."}, {"sym": "CLAY_FILTER", "price": 50, "range": "$30-100", "unit": "USD", "conf": "low", "safety": false, "cat": "💧 Water", "note": "Clay pot (ceramic) filter infused with colloidal silver: traditional technology from developing countries. The porous ceramic pores (0.6-3 microns) physically strain out bacteria and protozoa; silver inhibits microbial growth. Flow rate ~1-3 L/hour. ", "fullNote": "Clay pot (ceramic) filter infused with colloidal silver: traditional technology from developing countries. The porous ceramic pores (0.6-3 microns) physically strain out bacteria and protozoa; silver inhibits microbial growth. Flow rate ~1-3 L/hour. Removes 99%+ of bacteria (E. coli, cholera) but NOT viruses. Requires weekly cleaning by scrubbing."}, {"sym": "ULTRAFILTER", "price": 300, "range": "$150-500", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "Under-sink RO or UF (ultrafiltration) system. UF pore size ~0.01-0.05 microns — removes bacteria, protozoa, and most viruses. RO goes further (0.0001 micron) removing dissolved salts, heavy metals, and all pathogens. RO produces ~90% pure water but w", "fullNote": "Under-sink RO or UF (ultrafiltration) system. UF pore size ~0.01-0.05 microns — removes bacteria, protozoa, and most viruses. RO goes further (0.0001 micron) removing dissolved salts, heavy metals, and all pathogens. RO produces ~90% pure water but wastes 3-4 gallons per gallon filtered. UF wastes none and doesn't remove beneficial minerals."}, {"sym": "STRAW_FILTER", "price": 40, "range": "$20-60", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "Personal water filter (LifeStraw, Sawyer, Katadyn BeFree). Hollow-fiber membrane with 0.1-0.2 micron pores. Squeeze/sip style: filters 1000+ gallons from any freshwater source. Removes 99.9999% of bacteria and 99.9% of protozoa. Does NOT remove virus", "fullNote": "Personal water filter (LifeStraw, Sawyer, Katadyn BeFree). Hollow-fiber membrane with 0.1-0.2 micron pores. Squeeze/sip style: filters 1000+ gallons from any freshwater source. Removes 99.9999% of bacteria and 99.9% of protozoa. Does NOT remove viruses, heavy metals, or chemicals. Critical emergency/survival item for every kit."}, {"sym": "UV_PURIFIER", "price": 200, "range": "$100-300", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "UV-C light purifier kills 99.99% of bacteria, viruses, and protozoa by disrupting DNA (254nm wavelength). Works only on clear water — sediment blocks UV light so pre-filtration is essential. SteriPEN (battery-powered) treats 1L in 90 seconds; inline ", "fullNote": "UV-C light purifier kills 99.99% of bacteria, viruses, and protozoa by disrupting DNA (254nm wavelength). Works only on clear water — sediment blocks UV light so pre-filtration is essential. SteriPEN (battery-powered) treats 1L in 90 seconds; inline units treat continuous flow. Zero chemicals, no taste alteration. Requires electricity or batteries."}, {"sym": "SODIS", "price": 5, "range": "$0-10", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "Solar disinfection (SODIS): fill clean PET plastic bottles with clear water and place in full sun for 6+ hours (or 2 days if cloudy). UV-A radiation and heat (to 50°C+) inactivate pathogens. Proven effective against bacteria and viruses. No cost. Wid", "fullNote": "Solar disinfection (SODIS): fill clean PET plastic bottles with clear water and place in full sun for 6+ hours (or 2 days if cloudy). UV-A radiation and heat (to 50°C+) inactivate pathogens. Proven effective against bacteria and viruses. No cost. Widely promoted by WHO in developing countries. Needs pre-filtered water (sediment blocks UV). Doesn't remove chemicals."}, {"sym": "BOIL_POT", "price": 20, "range": "$10-50", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "Simple pot for boiling water — the oldest and most reliable purification method. Boiling at rolling boil for 1 minute (3 min above 6500ft elevation) kills >99.9% of all pathogens including bacteria, viruses, and protozoan cysts (Giardia, Cryptosporid", "fullNote": "Simple pot for boiling water — the oldest and most reliable purification method. Boiling at rolling boil for 1 minute (3 min above 6500ft elevation) kills >99.9% of all pathogens including bacteria, viruses, and protozoan cysts (Giardia, Cryptosporidium). Requires fuel/energy. Doesn't remove chemicals, sediment, or improve taste (but aeration after boiling helps)."}, {"sym": "DEMAND_PUMP", "price": 200, "range": "$150-300", "unit": "USD", "conf": "medium", "safety": false, "cat": "💧 Water", "note": "Flojet-style demand pump: positive displacement diaphragm pump with built-in pressure switch. Activates when a faucet opens and shuts off when closed. Provides steady 40-60 PSI. Quieter than centrifugal pumps. Must be protected from freezing. Install", "fullNote": "Flojet-style demand pump: positive displacement diaphragm pump with built-in pressure switch. Activates when a faucet opens and shuts off when closed. Provides steady 40-60 PSI. Quieter than centrifugal pumps. Must be protected from freezing. Install an accumulator tank to reduce cycling and smooth pressure delivery."}, {"sym": "FOOT_PUMP", "price": 80, "range": "$50-150", "unit": "USD", "conf": "medium", "safety": false, "cat": "💧 Water", "note": "Treadle or foot-operated pump: uses leg strength rather than arms — less tiring for sustained use. Can lift water 10-30ft. Output 5-15 GPM with moderate effort. Ideal for garden irrigation or filling tanks from a cistern. No electricity needed. Simpl", "fullNote": "Treadle or foot-operated pump: uses leg strength rather than arms — less tiring for sustained use. Can lift water 10-30ft. Output 5-15 GPM with moderate effort. Ideal for garden irrigation or filling tanks from a cistern. No electricity needed. Simple mechanism (piston/cylinder) that users can maintain/repair with basic tools."}, {"sym": "SOLAR_HOT_WATER", "price": 400, "range": "$200-800", "unit": "USD", "conf": "low", "safety": false, "cat": "💧 Water", "note": "DIY solar water heater: black absorber plate in an insulated box with glass glazing (batch heater or thermosiphon design). Batch heaters (breadbox): simple tank-in-a-box, heats water in the tank directly. Thermosiphon: water circulates naturally (hot", "fullNote": "DIY solar water heater: black absorber plate in an insulated box with glass glazing (batch heater or thermosiphon design). Batch heaters (breadbox): simple tank-in-a-box, heats water in the tank directly. Thermosiphon: water circulates naturally (hot rises, cold sinks) without a pump. Can reach 120-160°F on sunny days. Use with a mixing valve to prevent scalding."}, {"sym": "ROCKET_HOT_WATER", "price": 100, "range": "$50-200", "unit": "USD", "conf": "low", "safety": false, "cat": "💧 Water", "note": "Rocket stove water heater: high-efficiency wood-burning stove with water jacket or coil inside the exhaust pipe. Uses 80% less wood than an open fire. The 'rocket' design (L-tube with insulated riser) ensures complete combustion and high heat transfe", "fullNote": "Rocket stove water heater: high-efficiency wood-burning stove with water jacket or coil inside the exhaust pipe. Uses 80% less wood than an open fire. The 'rocket' design (L-tube with insulated riser) ensures complete combustion and high heat transfer. Can heat 5+ gallons in 15 minutes. Requires periodic cleaning of soot from the water jacket."}, {"sym": "MIST_SHOWER", "price": 80, "range": "$50-150", "unit": "USD", "conf": "medium", "safety": false, "cat": "💧 Water", "note": "Low-flow mist shower head and valve system. Uses only 0.5-2 gallons per shower (vs 15-30 for a conventional shower). Compressed air+water mixing creates a fine mist that feels like a regular shower. Ideal for water-scarce off-grid setups. Requires a ", "fullNote": "Low-flow mist shower head and valve system. Uses only 0.5-2 gallons per shower (vs 15-30 for a conventional shower). Compressed air+water mixing creates a fine mist that feels like a regular shower. Ideal for water-scarce off-grid setups. Requires a pressure tank or pump. Pairs well with a small solar water heater."}, {"sym": "PUMP_SIZING_GPM", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "PUMP SIZING BY FLOW RATE: Hand pump 2-5 GPM (manual effort). 12V diaphragm 2-4 GPM at 40-60 PSI (RV/cabin). AC jet pump 5-15 GPM (household). Submersible deep well 5-30 GPM (full home). Rule: household needs ~5 GPM minimum for simultaneous use (sink ", "fullNote": "PUMP SIZING BY FLOW RATE: Hand pump 2-5 GPM (manual effort). 12V diaphragm 2-4 GPM at 40-60 PSI (RV/cabin). AC jet pump 5-15 GPM (household). Submersible deep well 5-30 GPM (full home). Rule: household needs ~5 GPM minimum for simultaneous use (sink + shower). Garden irrigation needs 5-10 GPM per zone. Livestock: 1-2 GPM per 10 animals. Sizing formula: total daily gallons ÷ available pumping hours ÷ 60 = GPM needed."}, {"sym": "PUMP_HEAD_CALC", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "TOTAL DYNAMIC HEAD = Static head (vertical lift in ft) + friction loss (pipe length, fittings, elevation changes). Rule of thumb: add 20% to static head for friction in typical residential setup. 1 PSI = 2.31 ft of head. Typical household: 40-60 PSI ", "fullNote": "TOTAL DYNAMIC HEAD = Static head (vertical lift in ft) + friction loss (pipe length, fittings, elevation changes). Rule of thumb: add 20% to static head for friction in typical residential setup. 1 PSI = 2.31 ft of head. Typical household: 40-60 PSI = 92-138 ft of head. Gravity feed: 2.3 ft elevation = 1 PSI (need 50-100 ft drop for normal fixtures). Shallow well pumps max 25 ft suction lift. Deep well submersibles push from bottom — no suction limit."}, {"sym": "PRESSURE_TANK", "price": 150, "range": "$100-250", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "Well-X-Trol or equivalent pressure tank. Sizes: 20 gal ($100-150), 35 gal ($150-200), 52 gal ($200-250). Prevents pump short-cycling (motor burnout). Stores pressurized water so pump doesn't run every time you open a faucet. Rule: tank drawdown shoul", "fullNote": "Well-X-Trol or equivalent pressure tank. Sizes: 20 gal ($100-150), 35 gal ($150-200), 52 gal ($200-250). Prevents pump short-cycling (motor burnout). Stores pressurized water so pump doesn't run every time you open a faucet. Rule: tank drawdown should be 25% of pump capacity for <1.5 HP motors. Pre-charged bladder type is standard — check air pressure annually (should be 2 PSI below cut-in pressure)."}, {"sym": "PUMP_CURVE_MATCH", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "PUMP CURVE MATCHING: Every pump has a curve (GPM vs head). You need a pump that delivers your required GPM AT your total head. Example: need 5 GPM at 100 ft head — check manufacturer curve. Shurflo 12V delivers 2 GPM at 40 PSI (92 ft). Grundfos SQ su", "fullNote": "PUMP CURVE MATCHING: Every pump has a curve (GPM vs head). You need a pump that delivers your required GPM AT your total head. Example: need 5 GPM at 100 ft head — check manufacturer curve. Shurflo 12V delivers 2 GPM at 40 PSI (92 ft). Grundfos SQ submersible delivers 10 GPM at 200 ft. Mismatched pump = poor performance or burnout. Always oversize slightly (10-15%) — you can throttle flow but can't increase it."}, {"sym": "STORAGE_PER_PERSON", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "WATER STORAGE PER PERSON: Minimal survival: 1 gallon/person/day (drinking only). Basic off-grid: 5-10 gal/person/day (drinking, cooking, hygiene). Comfortable: 20-30 gal/person/day (showers, laundry, garden). US average: 80-100 gal/person/day. Off-gr", "fullNote": "WATER STORAGE PER PERSON: Minimal survival: 1 gallon/person/day (drinking only). Basic off-grid: 5-10 gal/person/day (drinking, cooking, hygiene). Comfortable: 20-30 gal/person/day (showers, laundry, garden). US average: 80-100 gal/person/day. Off-grid target: 20-30 gal/person/day × household size × dry season days = total storage needed. Example: 3 people × 25 gal × 90 dry days = 6,750 gallons. Round up to nearest tank size."}, {"sym": "CISTERN_SIZING", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "CISTERN SIZING FORMULA: Household daily usage (gal) × longest dry period (days) × 1.3 safety factor. Panama dry season: Dec-Apr (~120-150 days depending on region). Pacific side (Azuero): 5 months dry, needs larger storage. Caribbean side (Bocas): ye", "fullNote": "CISTERN SIZING FORMULA: Household daily usage (gal) × longest dry period (days) × 1.3 safety factor. Panama dry season: Dec-Apr (~120-150 days depending on region). Pacific side (Azuero): 5 months dry, needs larger storage. Caribbean side (Bocas): year-round rain, smaller storage OK. Cistern dimensions: 1 cubic ft = 7.48 gallons. 8×8×8 ft cistern = 512 cf = 3,830 gallons. 10×10×10 ft = 1,000 cf = 7,480 gallons."}, {"sym": "TANK_COST_PER_GALLON", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "COST PER GALLON COMPARISON: 55-gal blue HDPE drum ~$0.90-1.80/gal (cheapest small storage). 250-gal poly tank ~$1.20-1.60/gal. 500-gal poly tank ~$1.00-1.40/gal. 1000-gal poly ~$0.80-1.10/gal (best $/gal value). 2500-gal poly ~$0.70-0.90/gal. Ferroce", "fullNote": "COST PER GALLON COMPARISON: 55-gal blue HDPE drum ~$0.90-1.80/gal (cheapest small storage). 250-gal poly tank ~$1.20-1.60/gal. 500-gal poly tank ~$1.00-1.40/gal. 1000-gal poly ~$0.80-1.10/gal (best $/gal value). 2500-gal poly ~$0.70-0.90/gal. Ferrocement DIY cistern ~$0.15-0.30/gal (cheapest large storage, labor-intensive). Stainless steel 200-gal ~$5.00-7.50/gal (lifetime, drinking only). Bladder/pillow tank ~$0.50-1.00/gal (temporary, vulnerable to rodents)."}, {"sym": "FILTER_PAIR_STREAM", "price": 60, "range": "$30-330", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "FILTER PAIRING — Surface water (stream, river, lake): Start with prefilter (gravel/sand/charcoal, $30-100) to remove sediment. Then UF or RO ($150-500) for pathogens. Finish with UV purifier ($100-300) or Berkey ($250-350) for final barrier. Surface ", "fullNote": "FILTER PAIRING — Surface water (stream, river, lake): Start with prefilter (gravel/sand/charcoal, $30-100) to remove sediment. Then UF or RO ($150-500) for pathogens. Finish with UV purifier ($100-300) or Berkey ($250-350) for final barrier. Surface water has the most pathogens — triple barrier recommended. Minimum: prefilter + Berkey ($360 total). Best: prefilter + UF + UV ($510 total)."}, {"sym": "FILTER_PAIR_WELL", "price": 60, "range": "$30-300", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "FILTER PAIRING — Deep well water: Generally clean (filtered by earth). Prefilter for sediment only (sand from aquifer). No UV needed unless tested positive for coliform. Berkey ($330) as drinking water polish. Iron/manganese filter ($200-500) if wate", "fullNote": "FILTER PAIRING — Deep well water: Generally clean (filtered by earth). Prefilter for sediment only (sand from aquifer). No UV needed unless tested positive for coliform. Berkey ($330) as drinking water polish. Iron/manganese filter ($200-500) if water stains fixtures brown. Water softener ($400-800) if hardness >120 ppm. Test well water annually — quality changes with seasons. Shallow wells (<25ft) treat like surface water."}, {"sym": "FILTER_PAIR_RAIN", "price": 60, "range": "$30-330", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "FILTER PAIRING — Rainwater: Naturally soft (no minerals) but picks up roof contaminants (bird droppings, dust, tannins from leaves). First-flush diverter essential ($30-60 part of rainwater kit). Prefilter for debris. Carbon filter for taste/odor/che", "fullNote": "FILTER PAIRING — Rainwater: Naturally soft (no minerals) but picks up roof contaminants (bird droppings, dust, tannins from leaves). First-flush diverter essential ($30-60 part of rainwater kit). Prefilter for debris. Carbon filter for taste/odor/chemicals. Berkey for drinking. UV optional (rainwater is generally pathogen-free unless stored poorly). No water softener needed (rain is naturally soft). Acidic in some regions — pH correction may be needed."}, {"sym": "FILTER_PAIR_SALT", "price": 3000, "range": "$2000-4,000", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "FILTER PAIRING — Saltwater/brackish: ONLY Reverse Osmosis (RO) works. Standard filters (Berkey, UF, UV) do NOT remove salt. Marine RO desalinator (Spectra/Katadyn) $2000-4000. Produces 4-20 GPH. Wastes 1-3 gallons brine per gallon fresh. Energy-inten", "fullNote": "FILTER PAIRING — Saltwater/brackish: ONLY Reverse Osmosis (RO) works. Standard filters (Berkey, UF, UV) do NOT remove salt. Marine RO desalinator (Spectra/Katadyn) $2000-4000. Produces 4-20 GPH. Wastes 1-3 gallons brine per gallon fresh. Energy-intensive: 15-30 Wh/gallon. For oceanfront Panama properties — essential if no freshwater source. Solar-powered RO systems available ($3000-6000 complete)."}, {"sym": "PANAMA_RAINFALL", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "PANAMA RAINFALL BY REGION: Bocas del Toro (Caribbean): 3,000-4,000 mm/year (118-157\"), rain year-round, no real dry season. Chiriqui highlands (Boquete): 2,000-3,000 mm, dry Dec-Apr but mist/fog provides moisture. Panama City/Pacific: 1,900-2,500 mm,", "fullNote": "PANAMA RAINFALL BY REGION: Bocas del Toro (Caribbean): 3,000-4,000 mm/year (118-157\"), rain year-round, no real dry season. Chiriqui highlands (Boquete): 2,000-3,000 mm, dry Dec-Apr but mist/fog provides moisture. Panama City/Pacific: 1,900-2,500 mm, distinct dry Dec-Apr. Azuero Peninsula: 1,000-1,500 mm, driest region, 5-month dry season. Darien: 2,500-3,500 mm, rain year-round. For rainwater harvesting: 1\" rain on 1,000 sq ft roof = 600 gallons. Azuero needs largest cisterns."}, {"sym": "PANAMA_WATER_TABLE", "price": 0, "range": "$0-0", "unit": "USD", "conf": "medium", "safety": false, "cat": "💧 Water", "note": "PANAMA WATER TABLE DEPTHS (approximate): Coastal lowlands: 10-30 ft (hand-dug wells feasible). Inland valleys: 30-80 ft. Highlands: 80-200+ ft (need drilled well). Volcanic areas (Chiriqui): variable, some areas have deep water. Limestone/karst (part", "fullNote": "PANAMA WATER TABLE DEPTHS (approximate): Coastal lowlands: 10-30 ft (hand-dug wells feasible). Inland valleys: 30-80 ft. Highlands: 80-200+ ft (need drilled well). Volcanic areas (Chiriqui): variable, some areas have deep water. Limestone/karst (parts of Colon, Bocas): unpredictable — water flows through caves/fissures. Before buying land: check well logs at MIDA (Ministry of Agriculture), ask neighbors about well depth, hire a hydrogeologist for large investments."}, {"sym": "DRY_SEASON_AUTONOMY", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "DRY SEASON WATER AUTONOMY CALCULATION: Storage needed (gal) = daily usage × longest dry period (days) × 1.3 buffer. Azuero (worst case): 5 months = 150 days. 3 people × 25 gal/day × 150 × 1.3 = 14,625 gallons. That's a 10,000-gal cistern + supplement", "fullNote": "DRY SEASON WATER AUTONOMY CALCULATION: Storage needed (gal) = daily usage × longest dry period (days) × 1.3 buffer. Azuero (worst case): 5 months = 150 days. 3 people × 25 gal/day × 150 × 1.3 = 14,625 gallons. That's a 10,000-gal cistern + supplementary source. Bocas (best case): no real dry season, 30-day buffer sufficient. 3 people × 25 gal × 30 × 1.3 = 2,925 gallons (manageable with 3,000-gal setup). Rainwater alone works in Bocas; Azuero needs well or stream."}, {"sym": "BUNDLE_WATER_STARTER", "price": 800, "range": "$600-1,000", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "WATER BUNDLE — Starter (Weekend Cabin): 2× 55-gal blue drums ($100) + Shurflo 12V pump ($150) + Berkey Travel ($250) + basic plumbing kit ($100) + rainwater gutter kit ($200). Total: ~$800. Supplies 2 people for weekends. Gravity-fed from drums to si", "fullNote": "WATER BUNDLE — Starter (Weekend Cabin): 2× 55-gal blue drums ($100) + Shurflo 12V pump ($150) + Berkey Travel ($250) + basic plumbing kit ($100) + rainwater gutter kit ($200). Total: ~$800. Supplies 2 people for weekends. Gravity-fed from drums to sink. Berkey for drinking water. Good for: weekend cabin, tiny home, starter setup. Limitations: no hot water, no shower, manual drum refilling."}, {"sym": "BUNDLE_WATER_FAMILY", "price": 3500, "range": "$2500-5,000", "unit": "USD", "conf": "medium", "safety": false, "cat": "💧 Water", "note": "WATER BUNDLE — Family (Full-Time): 500-gal poly tank ($600) + Flojet demand pump ($200) + Berkey Big ($330) + under-sink UF ($300) + solar hot water DIY ($400) + mist shower ($80) + greywater system ($100) + first-flush rainwater kit ($300) + plumbin", "fullNote": "WATER BUNDLE — Family (Full-Time): 500-gal poly tank ($600) + Flojet demand pump ($200) + Berkey Big ($330) + under-sink UF ($300) + solar hot water DIY ($400) + mist shower ($80) + greywater system ($100) + first-flush rainwater kit ($300) + plumbing full house ($500). Total: ~$2,800-3,500. Supplies 3-4 people full-time. Hot showers. Drinking + household water. Greywater to garden. Good for: family homestead, full-time off-grid. Add deep well (+$3,500) if no surface water."}, {"sym": "BUNDLE_WATER_HOMESTEAD", "price": 8000, "range": "$6000-12,000", "unit": "USD", "conf": "medium", "safety": false, "cat": "💧 Water", "note": "WATER BUNDLE — Homestead (Generational): Drilled well 100-200ft with submersible pump ($5,500) + 2,500-gal poly cistern ($2,200) + pressure tank ($200) + whole-house UF + UV ($600) + solar hot water system ($800) + greywater to orchard ($200) + rainw", "fullNote": "WATER BUNDLE — Homestead (Generational): Drilled well 100-200ft with submersible pump ($5,500) + 2,500-gal poly cistern ($2,200) + pressure tank ($200) + whole-house UF + UV ($600) + solar hot water system ($800) + greywater to orchard ($200) + rainwater backup system ($500) + water quality test lab kit ($100) + backup hand pump ($700). Total: ~$8,000-10,000. Year-round water independence. Redundant sources. Hot water. Garden irrigation ready. Good for: permanent homestead, family compound."}, {"sym": "WATER_TEST_KIT", "price": 30, "range": "$15-100", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "Water test kit: basic bacteria/coliform test strips ~$15-30. Comprehensive lab test (send sample): $50-100 tests for bacteria, nitrates, lead, arsenic, pH, hardness, TDS. Panama: MIDA and IDAAN offer water testing. Test: new well/source before using,", "fullNote": "Water test kit: basic bacteria/coliform test strips ~$15-30. Comprehensive lab test (send sample): $50-100 tests for bacteria, nitrates, lead, arsenic, pH, hardness, TDS. Panama: MIDA and IDAAN offer water testing. Test: new well/source before using, annually for existing sources, after heavy rains (surface water), if taste/color/odor changes. Critical contaminants: coliform (sewage contamination), arsenic (volcanic regions), nitrates (agricultural runoff), salt (coastal intrusion)."}, {"sym": "WATER_TREATMENT_COMPARE", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "WATER TREATMENT COMPARISON: Boiling: kills >99.9% pathogens, $0 (fuel cost), 0 chemicals, doesn't remove sediment/chemicals. Berkey: removes >99.9% bacteria/virus + heavy metals/chemicals, $330, 3-4 GPH, no power. UF: 0.01-0.05 micron, removes bacter", "fullNote": "WATER TREATMENT COMPARISON: Boiling: kills >99.9% pathogens, $0 (fuel cost), 0 chemicals, doesn't remove sediment/chemicals. Berkey: removes >99.9% bacteria/virus + heavy metals/chemicals, $330, 3-4 GPH, no power. UF: 0.01-0.05 micron, removes bacteria/protozoa/most viruses, $150-500, wastes no water. RO: 0.0001 micron, removes everything including salts/minerals, $200-500, wastes 3-4 gal per gal produced. UV: kills >99.99% pathogens (DNA disruption), $100-300, needs clear water + electricity. SODIS: free, 6hrs sun, PET bottles, WHO-backed, no chemicals removed. Clay filter: $50, 1-3 L/hr, bacteria only, no viruses."}, {"sym": "WATER_PH_CORRECT", "price": 50, "range": "$30-150", "unit": "USD", "conf": "medium", "safety": false, "cat": "💧 Water", "note": "pH correction system. Rainwater is naturally acidic (pH 5.0-5.5 from dissolved CO₂). Ideal drinking water: pH 6.5-8.5. Acidic water corrodes copper pipes and leaches metals. Correction: calcite neutralizer tank ($50-100) raises pH by dissolving calci", "fullNote": "pH correction system. Rainwater is naturally acidic (pH 5.0-5.5 from dissolved CO₂). Ideal drinking water: pH 6.5-8.5. Acidic water corrodes copper pipes and leaches metals. Correction: calcite neutralizer tank ($50-100) raises pH by dissolving calcium carbonate. For severe acidity: soda ash injection system ($100-150). Test pH quarterly. Panama: volcanic soils can also make groundwater acidic."}, {"sym": "PLUMBING_PEX", "price": 0.5, "range": "$0.3-1.0", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "PEX pipe per foot. The modern standard for off-grid plumbing. Flexible (bends around corners — fewer fittings). Freeze-resistant (expands without bursting). No corrosion. Fast installation (crimp or clamp connections). Color-coded: red=hot, blue=cold", "fullNote": "PEX pipe per foot. The modern standard for off-grid plumbing. Flexible (bends around corners — fewer fittings). Freeze-resistant (expands without bursting). No corrosion. Fast installation (crimp or clamp connections). Color-coded: red=hot, blue=cold, white=either. 1/2\" for fixtures, 3/4\" for mains, 1\" for supply lines. PEX-A (expansion) is premium; PEX-B (crimp) is standard. Do NOT expose to UV (must be buried or indoors). Fittings: brass or plastic, ~$2-5 each."}, {"sym": "PLUMBING_GRAVITY", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "GRAVITY PLUMBING DESIGN: Source elevation must be higher than highest fixture. Minimum: 35 ft (15 PSI) for basic flow. Good: 70 ft (30 PSI) for normal fixtures. Best: 115 ft (50 PSI) for good shower pressure. Pipe sizing: larger diameter = less frict", "fullNote": "GRAVITY PLUMBING DESIGN: Source elevation must be higher than highest fixture. Minimum: 35 ft (15 PSI) for basic flow. Good: 70 ft (30 PSI) for normal fixtures. Best: 115 ft (50 PSI) for good shower pressure. Pipe sizing: larger diameter = less friction loss. 1\" pipe for main line, 3/4\" branches, 1/2\" to fixtures. Slope: 1/4\" per 10 ft minimum for drainage. Air gap at tank overflow. Check valves prevent backflow. Pressure-reducing valve if elevation >150 ft (too much pressure damages fixtures)."}, {"sym": "PIPE_INSULATION", "price": 1, "range": "$0.5-2.0", "unit": "USD", "conf": "medium", "safety": false, "cat": "💧 Water", "note": "Pipe insulation per foot. Foam tube insulation for indoor/cold protection. In Panama (tropics): insulation mainly prevents condensation (sweating pipes cause mold). Hot water pipes should be insulated (reduce heat loss 50-70%). Outdoor exposed pipes:", "fullNote": "Pipe insulation per foot. Foam tube insulation for indoor/cold protection. In Panama (tropics): insulation mainly prevents condensation (sweating pipes cause mold). Hot water pipes should be insulated (reduce heat loss 50-70%). Outdoor exposed pipes: insulate AND bury or shade (UV degrades plastic). Freeze protection: not needed below 2,000m in Panama. Above 2,000m (Chiriqui highlands): insulate + heat tape for rare frost nights."}, {"sym": "RAIN_HARVEST_CALC", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "RAINWATER HARVESTING MATH: Annual collection (gal) = roof area (sq ft) × annual rainfall (inches) × 0.623 × 0.85 efficiency. Efficiency loss: 15% for evaporation, first-flush diversion, gutter splash-out. Example: 1,000 sq ft roof in Bocas (120\" rain", "fullNote": "RAINWATER HARVESTING MATH: Annual collection (gal) = roof area (sq ft) × annual rainfall (inches) × 0.623 × 0.85 efficiency. Efficiency loss: 15% for evaporation, first-flush diversion, gutter splash-out. Example: 1,000 sq ft roof in Bocas (120\" rain) = 1,000 × 120 × 0.623 × 0.85 = 63,546 gallons/year. Same roof in Azuero (50\" rain) = 1,000 × 50 × 0.623 × 0.85 = 26,478 gallons/year. Monthly collection = annual/12. Size cistern for longest dry period, not annual total."}, {"sym": "ROOF_MATERIAL_WATER", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "ROOF MATERIALS FOR RAINWATER: BEST: Metal (zinc/aluminum/galvalume) — clean, smooth, no leaching. Enameled metal is ideal. GOOD: Clay/concrete tile — clean but porous (more evaporation). OK: Asphalt shingle — acceptable for non-potable (garden, toile", "fullNote": "ROOF MATERIALS FOR RAINWATER: BEST: Metal (zinc/aluminum/galvalume) — clean, smooth, no leaching. Enameled metal is ideal. GOOD: Clay/concrete tile — clean but porous (more evaporation). OK: Asphalt shingle — acceptable for non-potable (garden, toilet). Leaches some hydrocarbons. AVOID: Treated wood shingles (preservatives toxic), lead flashing (poisonous), copper (leaches into water — toxic to plants in greywater). Paint: use non-toxic, water-based paint only. First-flush diverter essential regardless of roof type."}, {"sym": "WELL_YIELD_TEST", "price": 0, "range": "$0-0", "unit": "USD", "conf": "medium", "safety": false, "cat": "💧 Water", "note": "WELL YIELD TESTING: 1) Bailer test: remove water rapidly, measure recovery rate. 2) Pump test: run pump at known GPM for 4+ hours, measure drawdown. 3) Specific capacity: GPM ÷ drawdown (ft). Good well: specific capacity >5 GPM/ft. Adequate: 2-5. Poo", "fullNote": "WELL YIELD TESTING: 1) Bailer test: remove water rapidly, measure recovery rate. 2) Pump test: run pump at known GPM for 4+ hours, measure drawdown. 3) Specific capacity: GPM ÷ drawdown (ft). Good well: specific capacity >5 GPM/ft. Adequate: 2-5. Poor: <2. Required yield: household needs 5 GPM for 2 hours peak. Storage tank compensates for low-yield wells (pump runs longer, slower). Panama: most wells in volcanic/alluvial soils yield 5-30 GPM."}, {"sym": "WELL_SEAL_DEPTH", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": true, "cat": "💧 Water", "note": "WELL SANITARY SEAL: Minimum 20 ft of sealed casing (grout/concrete between casing and borehole) to prevent surface contamination from entering aquifer. Shallower wells (<50ft) are more vulnerable to surface runoff and septic contamination. MUST be >5", "fullNote": "WELL SANITARY SEAL: Minimum 20 ft of sealed casing (grout/concrete between casing and borehole) to prevent surface contamination from entering aquifer. Shallower wells (<50ft) are more vulnerable to surface runoff and septic contamination. MUST be >50 ft from septic systems, >100 ft from livestock areas. Panama: tropical rains + thin soils = high contamination risk for shallow wells. Annual shock chlorination recommended. Well cap must be vermin-proof."}, {"sym": "LOW_FLOW_FIXTURES", "price": 15, "range": "$5-50", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "Low-flow fixtures per unit. Aerator for sink faucet: 0.5-1.5 GPM vs standard 2.2 GPM ($5-15). Low-flow showerhead: 1.5-2.0 GPM vs standard 2.5 GPM ($10-30). Dual-flush toilet converter: 0.8/1.6 GPF vs standard 3.5 GPF ($20-50). Composting toilet: 0 G", "fullNote": "Low-flow fixtures per unit. Aerator for sink faucet: 0.5-1.5 GPM vs standard 2.2 GPM ($5-15). Low-flow showerhead: 1.5-2.0 GPM vs standard 2.5 GPM ($10-30). Dual-flush toilet converter: 0.8/1.6 GPF vs standard 3.5 GPF ($20-50). Composting toilet: 0 GPF ($800-1200 — see ch05). Savings: family of 3 saves 15,000-30,000 gallons/year with full low-flow conversion. Payback: <1 year in reduced pumping/purchasing costs."}, {"sym": "LEAK_DETECTION", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "LEAK DETECTION: A 1/16\" (1.6mm) leak wastes 900+ gallons/month. Check: read water meter, don't use water for 2 hours, re-read. Any change = leak. Common leaks: toilet flapper ($5 fix), dripping faucet (washer $2), hose bib, pressure tank bladder. In ", "fullNote": "LEAK DETECTION: A 1/16\" (1.6mm) leak wastes 900+ gallons/month. Check: read water meter, don't use water for 2 hours, re-read. Any change = leak. Common leaks: toilet flapper ($5 fix), dripping faucet (washer $2), hose bib, pressure tank bladder. In off-grid: leaks drain your stored water and run your pump unnecessarily. Fix leaks immediately — they're the cheapest 'water source' you can add. Listen for hissing at night when quiet. Use food coloring in toilet tank to test flapper."}, {"sym": "WATER_METER", "price": 40, "range": "$25-80", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "Inline water meter for off-grid system. Measures total gallons used — critical for water budgeting when you have finite storage. Digital or mechanical. Install on main line after pump/tank. Knowing your consumption = knowing your autonomy remaining. ", "fullNote": "Inline water meter for off-grid system. Measures total gallons used — critical for water budgeting when you have finite storage. Digital or mechanical. Install on main line after pump/tank. Knowing your consumption = knowing your autonomy remaining. Without a meter, you're guessing. Basic mechanical meter ~$25-40. Digital with flow rate ~$50-80. Pair with tank level indicator for complete water awareness."}, {"sym": "EMERGENCY_WATER_PLAN", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": true, "cat": "💧 Water", "note": "EMERGENCY WATER PLAN: Minimum 3 days stored drinking water per person (3 gallons total). 2-week supply ideal (14 gallons/person). Store in: sealed blue HDPE containers with bleach (8 drops unscented bleach per gallon, rotate annually). Backup purific", "fullNote": "EMERGENCY WATER PLAN: Minimum 3 days stored drinking water per person (3 gallons total). 2-week supply ideal (14 gallons/person). Store in: sealed blue HDPE containers with bleach (8 drops unscented bleach per gallon, rotate annually). Backup purification: LifeStraw/Sawyer ($20-40) or iodine tablets ($10). Know nearest surface water source. Have a way to carry water (buckets, cart). If primary pump fails: hand pump backup or generator to run pump. Panama: earthquake/landslide can disrupt water infrastructure. Be self-sufficient."}, {"sym": "BACKUP_HAND_PUMP", "price": 200, "range": "$69-700", "unit": "USD", "conf": "high", "safety": true, "cat": "💧 Water", "note": "Backup hand pump for well. Shallow (<25ft): Bison 1118-25 ($297) or Flotec FP4200 ($69). Deep (25-200ft): Simple Pump 1115 ($1,095) or Bison 1145-200 ($679). Essential redundancy — electric pump WILL fail eventually (lightning, motor burnout, control", "fullNote": "Backup hand pump for well. Shallow (<25ft): Bison 1118-25 ($297) or Flotec FP4200 ($69). Deep (25-200ft): Simple Pump 1115 ($1,095) or Bison 1145-200 ($679). Essential redundancy — electric pump WILL fail eventually (lightning, motor burnout, controller failure). Hand pump gives you water regardless. Install alongside electric pump in same well casing if possible. Test monthly. Keep spare leathers/cups for rebuild."}, {"sym": "SPRING_BOX_DESIGN", "price": 250, "range": "$150-500", "unit": "USD", "conf": "medium", "safety": false, "cat": "💧 Water", "note": "Spring box design: concrete or plastic box buried at spring source. Components: gravel pack around spring eye (filters sediment), collection chamber, overflow pipe (maintains constant level), screened outlet to delivery pipe, animal-proof lid. Size: ", "fullNote": "Spring box design: concrete or plastic box buried at spring source. Components: gravel pack around spring eye (filters sediment), collection chamber, overflow pipe (maintains constant level), screened outlet to delivery pipe, animal-proof lid. Size: 2×2×2 ft minimum for household. Must be above flood level. Fence livestock out (50 ft minimum). Clean annually (remove silt, check screens). Multiple springs can be collected into one box. Panama highlands: common and reliable water source."}, {"sym": "BACKFLOW_PREVENTER", "price": 25, "range": "$15-50", "unit": "USD", "conf": "high", "safety": true, "cat": "💧 Water", "note": "Backflow preventer (check valve). Prevents contaminated water from flowing backward into your clean water supply. Required by code for: hose bibs, irrigation connections, boiler connections. Spring-loaded check valve ~$15-25. Dual check valve ~$30-50", "fullNote": "Backflow preventer (check valve). Prevents contaminated water from flowing backward into your clean water supply. Required by code for: hose bibs, irrigation connections, boiler connections. Spring-loaded check valve ~$15-25. Dual check valve ~$30-50 for higher protection. Install on pump discharge, tank inlet, hose connections. Test annually. Panama: required where pump draws from potentially contaminated source."}, {"sym": "UV_VS_CHLORINE", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "UV vs CHLORINE DISINFECTION: UV: instant (no contact time), no chemicals, no taste, kills ALL pathogens (bacteria/virus/protozoa), needs electricity + clear water, $100-300. Chlorine: residual protection (keeps water safe in pipes), cheap ($5/month),", "fullNote": "UV vs CHLORINE DISINFECTION: UV: instant (no contact time), no chemicals, no taste, kills ALL pathogens (bacteria/virus/protozoa), needs electricity + clear water, $100-300. Chlorine: residual protection (keeps water safe in pipes), cheap ($5/month), needs 30 min contact time, taste/odor, produces disinfection byproducts, doesn't kill Crypto reliably. For off-grid: UV for daily use (instant, clean), chlorine tablets as backup (storable, no power needed)."}, {"sym": "CATCHMENT_CLEANING", "price": 0, "range": "$0-0", "unit": "USD", "conf": "medium", "safety": false, "cat": "💧 Water", "note": "CATCHMENT MAINTENANCE: Gutters: clean 2×/year (more if under trees) — leaf guards reduce frequency. Roof: sweep before rainy season (remove accumulated dust/bird droppings). First-flush diverter: empty after each rain, clean screen monthly. Tank: ins", "fullNote": "CATCHMENT MAINTENANCE: Gutters: clean 2×/year (more if under trees) — leaf guards reduce frequency. Roof: sweep before rainy season (remove accumulated dust/bird droppings). First-flush diverter: empty after each rain, clean screen monthly. Tank: inspect annually for sediment buildup, algae, cracks. Drain and scrub every 3-5 years. Inlet screen: check monthly (mosquito breeding risk!). Panama: rapid algae growth in sunlight — tanks must be opaque or shaded."}, {"sym": "WATER_RIGHTS_PANAMA", "price": 0, "range": "$0-0", "unit": "USD", "conf": "medium", "safety": false, "cat": "💧 Water", "note": "WATER RIGHTS IN PANAMA: Surface water (rivers, streams) is public domain — you can use it but cannot exclusively claim it. Groundwater (wells): you own what's under your land but may need ANAM (environmental authority) permit for large extraction (>1", "fullNote": "WATER RIGHTS IN PANAMA: Surface water (rivers, streams) is public domain — you can use it but cannot exclusively claim it. Groundwater (wells): you own what's under your land but may need ANAM (environmental authority) permit for large extraction (>10,000 L/day). Rainwater: no restrictions — collect all you want. Community water systems (acueductos rurales): common in Panama — shared spring/stream with neighbors. Check with local municipality before drilling or diverting."}, {"sym": "LIVESTOCK_WATER", "price": 100, "range": "$50-200", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "LIVESTOCK WATERING SYSTEM: Cattle: 10-20 gal/head/day. Pigs: 3-5 gal/head/day. Chickens: 0.5 gal/10 birds/day. Automatic waterers (float valve) ~$30-60 each reduce waste 50% vs open troughs. Frost-free hydrants if applicable (not Panama lowlands). Ra", "fullNote": "LIVESTOCK WATERING SYSTEM: Cattle: 10-20 gal/head/day. Pigs: 3-5 gal/head/day. Chickens: 0.5 gal/10 birds/day. Automatic waterers (float valve) ~$30-60 each reduce waste 50% vs open troughs. Frost-free hydrants if applicable (not Panama lowlands). Ram pump can lift water from stream to pasture without electricity. Solar pump + small tank at pasture = off-grid livestock water. Fence animals away from water source (50-100ft buffer) to prevent contamination."}, {"sym": "DRIP_IRRIGATION", "price": 100, "range": "$50-300", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "Drip irrigation kit for garden. 1/2\" main line + 1/4\" drip emitters. Uses 50-70% less water than sprinklers. Delivers water directly to plant roots — no evaporation. Runs on low pressure (10-30 PSI) — gravity tank works. Timer ($30-50) automates wate", "fullNote": "Drip irrigation kit for garden. 1/2\" main line + 1/4\" drip emitters. Uses 50-70% less water than sprinklers. Delivers water directly to plant roots — no evaporation. Runs on low pressure (10-30 PSI) — gravity tank works. Timer ($30-50) automates watering. Emitter spacing: 12\" for vegetables, 18-24\" for shrubs/trees. Flow rate: 0.5-2 GPH per emitter. Filter REQUIRED before drip line (emitters clog). Panama: essential for dry season gardening. Pair with greywater system."}, {"sym": "SEASONAL_ADJUST", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "SEASONAL WATER BUDGET: Rainy season (May-Nov Panama): water is abundant — fill ALL storage, run irrigation freely, recharge groundwater. Dry season (Dec-Apr): switch to conservation mode. Reduce garden watering (mulch heavily), shower shorter, laundr", "fullNote": "SEASONAL WATER BUDGET: Rainy season (May-Nov Panama): water is abundant — fill ALL storage, run irrigation freely, recharge groundwater. Dry season (Dec-Apr): switch to conservation mode. Reduce garden watering (mulch heavily), shower shorter, laundry less frequent. Monitor tank levels weekly. When storage drops to 50%: stop all irrigation. At 25%: drinking + cooking only, no showers. At 10%: emergency rationing. Install tank level gauge now — don't guess in a drought."}, {"sym": "GREYWATER", "price": 100, "range": "$50-200", "unit": "USD", "conf": "high", "safety": false, "cat": "💧 Water", "note": "Greywater diverter and basic filtration system. Routes sink/shower/laundry water (NOT toilet water = blackwater) to irrigation for trees and ornamentals. Simple diverter valve + 50ft 1-inch poly pipe + mulch basin. Use only biodegradable soaps and av", "fullNote": "Greywater diverter and basic filtration system. Routes sink/shower/laundry water (NOT toilet water = blackwater) to irrigation for trees and ornamentals. Simple diverter valve + 50ft 1-inch poly pipe + mulch basin. Use only biodegradable soaps and avoid bleach. Critical: don't store greywater (>24 hours becomes anaerobic and smelly). Direct-to-landscape is best."}, {"sym": "SOLAR_PANEL", "price": 110, "range": "$90-150", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Renogy 100W monocrystalline panel ~$110. Monocrystalline: 18-24% efficiency (most efficient residential type). Polycrystalline: 15-18% efficiency, slightly cheaper. Thin-film: 10-13% efficiency, cheaper but needs 2x the space. A single 100W panel pro", "fullNote": "Renogy 100W monocrystalline panel ~$110. Monocrystalline: 18-24% efficiency (most efficient residential type). Polycrystalline: 15-18% efficiency, slightly cheaper. Thin-film: 10-13% efficiency, cheaper but needs 2x the space. A single 100W panel produces ~300-500 Wh/day depending on sunlight ho {"sym": "PANEL_500W", "price": 375, "range": "$340-440", "unit": "USD", "conf": "medium", "safety": false, "cat": "⚡ Electricity", "note": "Canadian Solar BiHiKu CS3W-545MB-AG (545W bifacial) ~$340-400, Trina Vertex TSM-DE21 545W ~$350-410, REC REC460AA-PURE-RX ~$350-420. Large format utility/commercial. Voc~50-62V, Imp~9-13A. 75-90×40-45\", 45-62 lbs. $0.62-0.78/watt. Bifacial options av", "fullNote": "Canadian Solar BiHiKu CS3W-545MB-AG (545W bifacial) ~$340-400, Trina Vertex TSM-DE21 545W ~$350-410, REC REC460AA-PURE-RX ~$350-420. Large format utility/commercial. Voc~50-62V, Imp~9-13A. 75-90×40-45\", 45-62 lbs. $0.62-0.78/watt. Bifacial options available (+10-25% rear gain on ground mount). Pairs: 1-2 on 150V controllers. 4-5 in series on 250/100. 7-9 on RS 450. Overkill for most off-grid. Series fuse: 25-30A."}, {"sym": "PANEL_BIFACIAL", "price": 400, "range": "$330-440", "unit": "USD", "conf": "medium", "safety": false, "cat": "⚡ Electricity", "note": "Bifacial panels produce power from BOTH sides — front captures direct sunlight, rear captures reflected light (albedo). 10-25% rear-side gain depending on surface (white gravel=25%, grass=10%, dark roof=5%). Premium: +11-15% vs equivalent monofacial.", "fullNote": "Bifacial panels produce power from BOTH sides — front captures direct sunlight, rear captures reflected light (albedo). 10-25% rear-side gain depending on surface (white gravel=25%, grass=10%, dark roof=5%). Premium: +11-15% vs equivalent monofacial. Best for ground-mount on reflective surfaces (white rock, snow, light concrete). Canadian Solar BiHiKu, LONGi Hi-MO, Jinko Tiger Neo. Must be mounted with clearance behind panel for rear-side light access."}, {"sym": "PANEL_MONO_VS_POLY", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "MONOCRYSTALLINE: 18-24% efficiency, uniform black appearance, better low-light/high-heat performance, 5-10% more expensive, NOW STANDARD (>90% of new panels). POLYCRYSTALLINE: 15-18% efficiency, blue marbled appearance, cheaper but phasing out, still", "fullNote": "MONOCRYSTALLINE: 18-24% efficiency, uniform black appearance, better low-light/high-heat performance, 5-10% more expensive, NOW STANDARD (>90% of new panels). POLYCRYSTALLINE: 15-18% efficiency, blue marbled appearance, cheaper but phasing out, still found in budget/used markets. For off-grid: pay the mono premium — the space savings and better cloudy-day production pay back fast. THIN-FILM (CdTe, CIGS): 10-13% efficiency, needs 2× space, flexible options exist, niche use only."}, {"sym": "PANEL_CELL_COUNT", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "CELL COUNT VOLTAGE REFERENCE: 36-cell = '12V nominal' (Voc~22V, Vmp~18V) — standard for 50W-200W panels, pairs with PWM on 12V. 60-cell = '24V nominal' (Voc~37-40V, Vmp~30-33V) — 250W-300W residential, needs MPPT for 12V battery. 72-cell = '24V nomin", "fullNote": "CELL COUNT VOLTAGE REFERENCE: 36-cell = '12V nominal' (Voc~22V, Vmp~18V) — standard for 50W-200W panels, pairs with PWM on 12V. 60-cell = '24V nominal' (Voc~37-40V, Vmp~30-33V) — 250W-300W residential, needs MPPT for 12V battery. 72-cell = '24V nominal' large format (Voc~45-50V, Vmp~37-42V) — 300W-400W, same voltage range as 60-cell but higher current. 120 half-cell = 60-cell equivalent, better shade tolerance. 144 half-cell = 72-cell equivalent, now standard for 400W+."}, {"sym": "PANEL_TEMP_COEFF", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "TEMPERATURE COEFFICIENT (Pmax): Power loss per °C above 25°C (STC). Standard mono PERC: -0.35 to -0.37%/°C. Premium N-Type TOPCon: -0.29 to -0.30%/°C. At 45°C panel temp (common on roofs): PERC loses 7.0-7.4%, N-Type loses 5.8-6.0%. Panama relevance:", "fullNote": "TEMPERATURE COEFFICIENT (Pmax): Power loss per °C above 25°C (STC). Standard mono PERC: -0.35 to -0.37%/°C. Premium N-Type TOPCon: -0.29 to -0.30%/°C. At 45°C panel temp (common on roofs): PERC loses 7.0-7.4%, N-Type loses 5.8-6.0%. Panama relevance: tropical heat means panels run hot — N-Type's better temp coefficient saves 1-2% annually. Voc temp coefficient: -0.28 to -0.32%/°C — this is why Voc RISES in cold (must stay under controller max)."}, {"sym": "PANEL_DEGRADATION", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "PANEL DEGRADATION RATES: Year 1: 2-3% initial drop (LID — Light Induced Degradation). Years 2-25: 0.5-0.7%/year for standard mono PERC, 0.3-0.4%/year for premium N-Type. Standard warranty: 80-85% output at year 25. Premium warranty (REC, SunPower): 9", "fullNote": "PANEL DEGRADATION RATES: Year 1: 2-3% initial drop (LID — Light Induced Degradation). Years 2-25: 0.5-0.7%/year for standard mono PERC, 0.3-0.4%/year for premium N-Type. Standard warranty: 80-85% output at year 25. Premium warranty (REC, SunPower): 92% at year 25. After 25 years: typical panel still produces 80-92% of rated power — they don't suddenly die. Used panel math: 10yr-old panel at 90% output = still 90% usable, paying 30-50% of new price."}, {"sym": "PANEL_USED_GRADE_A", "price": 150, "range": "$100-200", "unit": "USD", "conf": "medium", "safety": false, "cat": "⚡ Electricity", "note": "Used Grade A: removed from residential, <5yr old, >=90% rated output. Typically 250-330W older models at $0.35-0.50/watt. Example: used Canadian Solar 300W Grade A ~$105-150. Source: SanTan Solar, local solar installers, eBay. Best value in solar — h", "fullNote": "Used Grade A: removed from residential, <5yr old, >=90% rated output. Typically 250-330W older models at $0.35-0.50/watt. Example: used Canadian Solar 300W Grade A ~$105-150. Source: SanTan Solar, local solar installers, eBay. Best value in solar — half the price of new, 90%+ the performance. Check: frame straight, glass intact, junction box sealed, no snail trails. Verify output with multimeter (Voc within 5% of label)."}, {"sym": "PANEL_USED_GRADE_B", "price": 80, "range": "$50-120", "unit": "USD", "conf": "medium", "safety": false, "cat": "⚡ Electricity", "note": "Used Grade B: minor cosmetic (scratches on frame, small glass marks), 80-90% rated output. ~$0.25-0.38/watt. Example: 250W Grade B ~$62-95. Source: SanTan Solar overstock, Craigslist, solar farm decommissions. Good for ground-mount experimental array", "fullNote": "Used Grade B: minor cosmetic (scratches on frame, small glass marks), 80-90% rated output. ~$0.25-0.38/watt. Example: 250W Grade B ~$62-95. Source: SanTan Solar overstock, Craigslist, solar farm decommissions. Good for ground-mount experimental arrays, workshop power, water pumping. Test each panel individually — performance varies more than Grade A. Don't use for roof-mount where aesthetics/longevity matter."}, {"sym": "PANEL_USED_GRADE_C", "price": 45, "range": "$30-75", "unit": "USD", "conf": "low", "safety": false, "cat": "⚡ Electricity", "note": "Used Grade C: visible wear, snail trails possible, 70-80% output. ~$0.15-0.25/watt. Example: 250W Grade C ~$37-63. Snail trails = micro-cracks visible as dark lines — indicate cell damage, performance degrades over time. High risk of hot spots. Do NO", "fullNote": "Used Grade C: visible wear, snail trails possible, 70-80% output. ~$0.15-0.25/watt. Example: 250W Grade C ~$37-63. Snail trails = micro-cracks visible as dark lines — indicate cell damage, performance degrades over time. High risk of hot spots. Do NOT use for primary system. OK for: experimental, temporary, non-critical loads (outdoor lighting, tool charging shed). Always fuse individually and check with thermal camera under load."}, {"sym": "PANEL_PORTABLE_50W", "price": 120, "range": "$90-150", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Renogy 50W Foldable briefcase ~$120. Jackery SolarSaga 50W ~$150. Voc~22V, Vmp~18V. Foldable with built-in kickstand and carrying case. 10-12 lbs. $2.
