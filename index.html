fety": false, "cat": "🌱 Food", "note": "PLANT GUILD DESIGN (permaculture companion planting). A guild is a group of plants that support each other — each fills a niche in the ecosystem. CLASSIC APPLE GUILD (temperate): Apple tree (canopy, food) + comfrey (dynamic accumulator — deep taproot mines minerals from subsoil, chop-and-drop mulch)", "fullNote": "PLANT GUILD DESIGN (permaculture companion planting). A guild is a group of plants that support each other — each fills a niche in the ecosystem. CLASSIC APPLE GUILD (temperate): Apple tree (canopy, food) + comfrey (dynamic accumulator — deep taproot mines minerals from subsoil, chop-and-drop mulch) + daffodils (gopher deterrent — toxic bulbs create barrier) + white clover (nitrogen fixer, living mulch, bee forage) + yarrow (pollinator attractor, aromatic pest confuser) + chives/garlic (pest deterrent). Each plant serves MULTIPLE FUNCTIONS — the guild is greater than sum of parts. TROPICAL GUILD EXAMPLE (Panama): Mango tree (canopy, fruit, shade) + pigeon pea/guandú (nitrogen-fixing shrub, edible peas, chop-and-drop mulch, windbreak) + sweet potato (ground cover, edible leaves + tubers, living mulch) + lemongrass (pest deterrent — citronella confuses insects, culinary, tea) + turmeric/ginger (shade-tolerant understory crop, medicinal, culinary) + Mexican sunflower/Tithonia (biomass accumulator, phosphorus-rich mulch, pollinator magnet). DESIGN PRINCIPLES: (1) Use plants that naturally associate in your climate. (2) Stack in vertical layers: canopy → understory → shrub → herbaceous → ground cover → root → vine. (3) No bare soil — every niche filled. (4) Each species serves 2+ functions. (5) Include nitrogen fixers in every guild. (6) Include dynamic accumulators (comfrey, Tithonia, yarrow — mine deep nutrients). (7) Edge effect: more diversity at boundaries between ecosystems. PLANTING: start with canopy tree, add support species around drip line. Guild matures over 3-5 years. Panama: tropical guilds establish fast due to year-round growth. No winter dormancy means constant management — prune, mulch, harvest continuously."}, {"sym": "SEASON_PLANNING", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "PANAMA PLANTING CALENDAR — two distinct seasons. RAINY SEASON (May-November): water is abundant, temperatures 75-88°F, growth is EXPLOSIVE. PLANT EVERYTHING: corn, beans, squash, cucumber, melon, okra, sweet potato, yuca, taro, greens (lettuce struggles in heavy rain — use bok choy, Malabar spinach ", "fullNote": "PANAMA PLANTING CALENDAR — two distinct seasons. RAINY SEASON (May-November): water is abundant, temperatures 75-88°F, growth is EXPLOSIVE. PLANT EVERYTHING: corn, beans, squash, cucumber, melon, okra, sweet potato, yuca, taro, greens (lettuce struggles in heavy rain — use bok choy, Malabar spinach instead), tomatoes (under cover — rain splashes soil pathogens onto leaves causing blight), peppers, eggplant. RAINFALL: Caribbean side (Bocas) — rain almost daily, no real dry season. Pacific side — distinct peaks June-July and September-October, with short dry period (veranillo) in August. DRY SEASON (December-April): little to no rain, intense sun, winds increase. PLANT DROUGHT-TOLERANT CROPS: yuca, sweet potato, pigeon pea, okra, sorghum, cowpea, watermelon, cantaloupe. IRRIGATION ESSENTIAL for vegetables — drip or ollas. MULCH HEAVILY (4-6\" to retain moisture). Wind protection for young plants (windbreak or row cover). Cool-season crops (temperate vegetables like broccoli, cauliflower, peas): plant in highlands only (Boquete, Cerro Punta — above 1,500m where nights are cool). Lowland tropics: these won't grow (bolt, rot, or get devoured by pests). ACCEPT THIS — grow tropical alternatives instead. STAGGER PLANTING: plant small amounts every 2-3 weeks for continuous harvest. Single large planting = feast then famine. PERENNIAL CROPS: fruit trees, perennial vegetables (chaya, katuk, Malabar spinach) produce year-round regardless of season — the backbone of tropical food security. COVER CROPS: during peak rainy season on unused beds — cowpea or mucuna (velvet bean) fixes nitrogen and smothers weeds. CROP ROTATION: follow legumes (beans) with heavy feeders (corn, squash), then root crops, then back to legumes. PEST PRESSURE: highest during rainy season (fungus, insects). Dry season: fewer pests but plants need irrigation. TIME PLANTING: start seeds in trays under cover during heavy rain periods, transplant when seedlings are sturdy (not during deluge). Plant corn and beans directly at start of rainy season (May) — they need rain for germination."}, {"sym": "RAISED_BED", "price": 200, "range": "$100-400", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "Raised garden bed — the foundation of productive vegetable growing. Standard: 4×8 ft (32 sq ft), 10-12\" deep. Materials: cedar (longest lasting, 10-15 years, $80-120 per bed), pressure-treated lumber (5-8 years, $40-60 — use newer copper-based treatment, NOT old CCA which leaches arsenic), pine (3-5", "fullNote": "Raised garden bed — the foundation of productive vegetable growing. Standard: 4×8 ft (32 sq ft), 10-12\" deep. Materials: cedar (longest lasting, 10-15 years, $80-120 per bed), pressure-treated lumber (5-8 years, $40-60 — use newer copper-based treatment, NOT old CCA which leaches arsenic), pine (3-5 years, $30-50 — will rot fast in Panama tropics), concrete blocks (forever, $60-100, heavy to move), corrugated metal ($50-80, modern look, heats soil). SOIL (Mel's Mix): 1/3 compost (homemade or purchased — mix 3-5 different types for nutrient diversity), 1/3 vermiculite (retains moisture, aerates), 1/3 peat moss or coco coir. Fills one 4×8 bed (10\" deep = 27 cu ft, about 1 cubic yard). Cost: $100-200 for soil to fill one bed (buying bagged). Bulk soil/compost delivery: cheaper per yard. SPACING: intensive planting (square foot gardening) — 1 tomato per sq ft, 4 lettuce per sq ft, 16 carrots per sq ft, 9 bush beans per sq ft. One 4×8 bed can produce 50-100 lbs vegetables per season. ADVANTAGES: no tilling (preserves soil structure), better drainage (critical in Panama rainy season), soil warms faster, easier to weed, no soil compaction from foot traffic, extends growing season. Panama: build beds with slight slope for drainage during torrential rains. Add hardware cloth bottom (1/2\") before filling to exclude gophers/moles. Refresh compost layer annually (2\" on top). Crop rotation: never plant same family in same bed 2 years consecutively."}, {"sym": "GREENHOUSE", "price": 500, "range": "$300-1,000", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "8x10ft hoop house kit (PVC or steel frame) + UV-stabilized polyethylene cover. Extends growing season by 4-6 weeks on each end. Protects from frost, wind, and pests. 80 sq ft can produce ~$300-500 worth of food per year. Add automatic vent openers (paraffin pistons ~$30) for temperature control. In ", "fullNote": "8x10ft hoop house kit (PVC or steel frame) + UV-stabilized polyethylene cover. Extends growing season by 4-6 weeks on each end. Protects from frost, wind, and pests. 80 sq ft can produce ~$300-500 worth of food per year. Add automatic vent openers (paraffin pistons ~$30) for temperature control. In summer: swap cover for shade cloth (40-60%) to prevent overheating."}, {"sym": "HYDROPONICS", "price": 300, "range": "$100-600", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "Hydroponic (soilless) growing system. NFT (Nutrient Film Technique): shallow stream of nutrient solution flows continuously through channels, plant roots dangle in stream. Kratky method: passive — roots dangle into static nutrient reservoir, air gap allows oxygen. Dutch bucket: individual containers", "fullNote": "Hydroponic (soilless) growing system. NFT (Nutrient Film Technique): shallow stream of nutrient solution flows continuously through channels, plant roots dangle in stream. Kratky method: passive — roots dangle into static nutrient reservoir, air gap allows oxygen. Dutch bucket: individual containers with drip irrigation, drain-to-waste or recirculating. Deep Water Culture (DWC): roots submerged in aerated nutrient solution. GROWTH: 3-5× faster than soil (roots access oxygen+nutrients directly, no energy wasted searching soil). Water: uses 90% LESS water than soil gardening (recirculating system). Monitoring: pH 5.5-6.5 (vegetables), 5.5-6.0 (lettuce/herbs). EC (electrical conductivity): 1.0-2.5 mS/cm depending on crop. Nutrients: 3-part liquid fertilizer (General Hydroponics FloraSeries, $40-60 for gallon set — lasts months). Equipment: PVC channels ($2-3/ft, 4-6\" diameter), net cups ($0.20 each), clay pebbles/grow stones ($20-30/bag), water pump ($15-30, 100-300 GPH), air pump + air stone ($15-25), timer ($10-20). Best crops: lettuce (harvest in 30 days), herbs (basil, mint, cilantro), bok choy, kale, strawberries. NOT good for: root vegetables (need soil pressure), large fruiting plants (tomatoes work but need support), corn/grains. Panama: indoor/covered hydroponics avoids pest pressure and torrential rain damage. Power outage: plants survive 2-4 hours without circulation."}, {"sym": "AQUAPONICS", "price": 500, "range": "$400-1,000", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "Aquaponics — integrated fish + plant system. HOW IT WORKS: fish produce ammonia waste → nitrifying bacteria (Nitrosomonas) convert ammonia to nitrite → different bacteria (Nitrobacter) convert nitrite to nitrate → plants absorb nitrate as fertilizer → clean water returns to fish. CLOSED LOOP: water ", "fullNote": "Aquaponics — integrated fish + plant system. HOW IT WORKS: fish produce ammonia waste → nitrifying bacteria (Nitrosomonas) convert ammonia to nitrite → different bacteria (Nitrobacter) convert nitrite to nitrate → plants absorb nitrate as fertilizer → clean water returns to fish. CLOSED LOOP: water recirculates, only lost to evaporation and plant transpiration. SYSTEM COMPONENTS: fish tank (IBC tote or stock tank, 275-300 gal), grow beds (expanded clay pebbles or floating rafts), water pump (continuous or timed), air pump (essential — fish need oxygen + bacteria need oxygen), clarifier/solids filter (removes solid waste before grow beds). CYCLING: system must cycle for 4-8 weeks BEFORE adding fish — add ammonia source (pure ammonia or fish food) to grow bacteria colony. Test: ammonia=0, nitrite=0, nitrate=10-40 ppm = cycled. FISH: tilapia (best all-around, 75-85°F, harvest 6-9 months, eat algae/duckweed/pellets), catfish (bottom feeder, hardy), ornamental (goldfish, koi — not for eating). Stocking: 1 lb fish per 5-10 gallons water. PLANTS: leafy greens (lettuce, kale, herbs) do best — fruiting plants (tomatoes, peppers) need supplemental potassium and phosphorus. Water parameters: pH 6.8-7.0 (compromise between fish, bacteria, plants), temperature species-dependent, DO (dissolved oxygen) >4 ppm. START SMALL: master a 100-gal system before scaling up. Panama: outdoor system in partial shade, bird netting over tank. Year-round growing season."}, {"sym": "TROPICAL_CROPS", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "PANAMA TROPICAL CROPS: Year-round staples: yuca (cassava), ñame (yam), otoe (taro), platano (plantain), guandú (pigeon pea). Fruit trees: mango, avocado, papaya, guanabana, maracuyá (passion fruit), citrus (lime, orange, mandarin). Quick crops: bok choy, malabar spinach, okra, yard-long beans. These", "fullNote": "PANAMA TROPICAL CROPS: Year-round staples: yuca (cassava), ñame (yam), otoe (taro), platano (plantain), guandú (pigeon pea). Fruit trees: mango, avocado, papaya, guanabana, maracuyá (passion fruit), citrus (lime, orange, mandarin). Quick crops: bok choy, malabar spinach, okra, yard-long beans. These THRIVE in Panama's climate — grow what wants to grow here, not what grows in Vermont. Perennial tropical crops need less annual labor."}, {"sym": "PERENNIAL_VEG", "price": 100, "range": "$50-200", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "Perennial vegetables: plant once, harvest for years. Asparagus (25+ year bed, $30 for 10 crowns). Artichoke (5-7 years). Rhubarb (10+ years, needs winter chill — Panama highlands only). Malanga/taro (Caribbean staple, loves wet tropics). Chaya (Mayan spinach — perennial in Panama, nutrient-dense). K", "fullNote": "Perennial vegetables: plant once, harvest for years. Asparagus (25+ year bed, $30 for 10 crowns). Artichoke (5-7 years). Rhubarb (10+ years, needs winter chill — Panama highlands only). Malanga/taro (Caribbean staple, loves wet tropics). Chaya (Mayan spinach — perennial in Panama, nutrient-dense). Katuk (Sauropus — tropical spinach, thrives in heat). Perennial kale (tree collards — 3-5 years). Culinary herbs: rosemary, thyme, oregano, sage (all perennial)."}, {"sym": "CALORIE_CROPS", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "CALORIE CROPS — staple foods that provide the bulk of daily energy. Off-grid food security requires CALORIES first, vegetables second. PANAMA TROPICAL CALORIE CROPS (ranked by calories per effort): (1) Yuca/cassava (Manihot esculenta): 10-30 lbs starchy roots per plant after 8-12 months, 1,500 cal/l", "fullNote": "CALORIE CROPS — staple foods that provide the bulk of daily energy. Off-grid food security requires CALORIES first, vegetables second. PANAMA TROPICAL CALORIE CROPS (ranked by calories per effort): (1) Yuca/cassava (Manihot esculenta): 10-30 lbs starchy roots per plant after 8-12 months, 1,500 cal/lb, drought-tolerant, poor soil OK, PROPAGATE FROM STEM CUTTINGS — free plants forever. Process: peel, boil/fry. Bitter varieties contain cyanide — must process (grate, soak, press, cook). Sweet varieties: just peel and cook. (2) Plantain/platano (Musa × paradisiaca): 50-100 lbs per bunch, 900 cal/lb (green), perennial — one planting produces for 5-10 years. Cooked green (tostones, patacones) or ripe (maduros). (3) Sweet potato/camote (Ipomoea batatas): 1-3 lbs per plant, 3-4 month growing season, 1,000 cal/lb, leaves also edible (nutritious greens!). Orange varieties: high vitamin A. Propagate from slips (sprouts from tuber). (4) Taro/otoe/malanga (Colocasia/Xanthosoma): similar to yuca, 1-3 lbs corms per plant, 1,100 cal/lb, loves wet soil (grow in swampy areas where nothing else grows). (5) Pigeon pea/guandú (Cajanus cajan): perennial legume shrub, 1,500 cal/lb dried peas, high protein (22%), nitrogen fixer, lives 3-5 years, drought-tolerant. (6) Breadfruit (Artocarpus altilis): enormous tree, 200-400 fruits/year at maturity, 1,030 cal/lb, starchy, eaten roasted/fried/boiled. TO FEED ONE PERSON: need ~730,000 cal/year. One breadfruit tree: 200 fruits × 3 lbs × 1,030 cal = 618,000 cal → nearly feeds one person! Combine 2-3 staple crops for resilience. Perennial staples > annual grains in tropics: less labor, more drought-resistant, no annual tilling/planting."}, {"sym": "GARDEN_YIELD", "price": 0, "range": "$0-0", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "GARDEN YIELD ESTIMATES: 100 sq ft intensive bed (square foot gardening): 50-100 lbs vegetables/year. 500 sq ft feeds 1 person vegetables year-round. 2,000-4,000 sq ft feeds family of 4 (vegetables + some staples). Calorie crops (per 10 sq ft): potatoes 10-15 lbs (4,500-6,750 cal), sweet potatoes 8-1", "fullNote": "GARDEN YIELD ESTIMATES: 100 sq ft intensive bed (square foot gardening): 50-100 lbs vegetables/year. 500 sq ft feeds 1 person vegetables year-round. 2,000-4,000 sq ft feeds family of 4 (vegetables + some staples). Calorie crops (per 10 sq ft): potatoes 10-15 lbs (4,500-6,750 cal), sweet potatoes 8-12 lbs + edible leaves, yuca/cassava 10-20 lbs/plant (3,000+ cal/plant — tropical staple). Fruit trees: mango 200-300 fruits/year after 5 years, avocado 150-200/year, citrus 100-200/year, papaya 30-50/year (fruits in 9 months!). Berry bushes: 5-10 lbs each. Chickens: 4 hens = 1,000-1,200 eggs/year. Rabbits: 1 buck + 2 does = 100-200 lbs meat/year from primarily garden waste + pellets. Tilapia: 275 gal IBC = 50-75 lbs fish/year. Feed 1 person: need ~730,000 calories/year from 1,000-2,000 sq ft calorie crops + vegetables + fruit + animals. Panama optimal: yuca + sweet potato + plantain + pigeon pea = highest tropical calories per effort. Perennial tropical crops (fruit trees, chaya, katuk) produce year-round with less annual labor than annual vegetables. Source: my-new-project research synthesis + cross-referenced yield data."}, {"sym": "FOOD_FOREST", "price": 350, "range": "$200-600", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "3-5 fruit trees (apple, pear, peach, plum — choose disease-resistant varieties for your zone) + berry bushes (blueberry, raspberry, currant) + perennial vegetables (asparagus, rhubarb, artichoke, sorrel). A permaculture food forest mimics natural forest layers: canopy, understory, shrub, herbaceous,", "fullNote": "3-5 fruit trees (apple, pear, peach, plum — choose disease-resistant varieties for your zone) + berry bushes (blueberry, raspberry, currant) + perennial vegetables (asparagus, rhubarb, artichoke, sorrel). A permaculture food forest mimics natural forest layers: canopy, understory, shrub, herbaceous, ground cover, root. Trees take 3-5 years to fruit but produce for decades."}, {"sym": "FRUIT_TREE_CARE", "price": 50, "range": "$20-100", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "Fruit tree maintenance for tropical homesteads. PRUNING: tropical trees don't have true dormancy — prune lightly after harvest (not in rainy season — cuts are fungal entry points). Shape young trees: open center (vase shape) for good airflow — CRITICAL in humid tropics where fungal disease is consta", "fullNote": "Fruit tree maintenance for tropical homesteads. PRUNING: tropical trees don't have true dormancy — prune lightly after harvest (not in rainy season — cuts are fungal entry points). Shape young trees: open center (vase shape) for good airflow — CRITICAL in humid tropics where fungal disease is constant pressure. Remove: dead/diseased branches, crossing branches, water sprouts (vertical shoots from trunk/branches). FERTILIZING: compost ring around drip line (where feeder roots are), 2×/year (start of rainy season and mid-rainy season). Supplemental: aged chicken manure (high nitrogen — use sparingly on fruit trees or get leaf growth, not fruit), wood ash (potassium for fruiting), bone meal (phosphorus for roots). MULCHING: 4-6\" wood chips or leaf mulch, keep 4-6\" away from trunk (prevents collar rot). PANAMA SPECIFIC: high fungal pressure — prune for max airflow, avoid overhead watering (wet leaves = fungus), copper spray (Bordeaux mixture) preventatively before rainy season. Citrus: need well-draining soil (hate wet feet), greening disease (HLB) present in Panama — buy certified disease-free stock. Mango: anthracnose (black spots on fruit) common in wet season — spray copper before flowering. Avocado: root rot (Phytophthora) in wet soils — plant on mound or slope, don't overwater. Papaya: fast grower, fruits in 9 months, short-lived (3-5 years), replant regularly."}, {"sym": "NUT_TREES", "price": 80, "range": "$40-150", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "Nut trees for long-term food security. Plant year 1, harvest year 5-10, produce for 50-100+ years. Panama tropical nuts: coconut palm (3-5 yrs to fruit, 50-100 nuts/yr), cashew (3-5 yrs), macadamia (5-7 yrs, needs some elevation/cool — Chiriqui highlands), breadnut (maya nut — native, high protein).", "fullNote": "Nut trees for long-term food security. Plant year 1, harvest year 5-10, produce for 50-100+ years. Panama tropical nuts: coconut palm (3-5 yrs to fruit, 50-100 nuts/yr), cashew (3-5 yrs), macadamia (5-7 yrs, needs some elevation/cool — Chiriqui highlands), breadnut (maya nut — native, high protein). Nuts are calorie-dense (160-200 cal/oz), store 1-2 years in shell. Plant for your children, not just yourself."}, {"sym": "CHOP_AND_DROP", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Chop-and-drop mulching: cut fast-growing support plants (pigeon pea, comfrey, Mexican sunflower) and drop as mulch around food crops. Returns nutrients to soil without composting. Builds soil organic matter continuously. Best species: leguminous (nitrogen-rich), deep-rooted (mineral accumulators), f", "fullNote": "Chop-and-drop mulching: cut fast-growing support plants (pigeon pea, comfrey, Mexican sunflower) and drop as mulch around food crops. Returns nutrients to soil without composting. Builds soil organic matter continuously. Best species: leguminous (nitrogen-rich), deep-rooted (mineral accumulators), fast-growing (biomass producers). Cut before flowering for highest nutrient content. Done monthly in growing season. Traditional practice in tropical agroforestry."}, {"sym": "EARTHWORKS", "price": 250, "range": "$100-1,000", "unit": "USD", "conf": "low", "safety": false, "cat": "🌱 Food", "note": "DIY hand-dug swales: contour ditches that capture rainwater and slowly infiltrate it into the soil. Designed on contour (use a line level or A-frame). Swales recharge groundwater, prevent erosion, and eliminate the need for irrigation in the swale zone. Plant trees/berries on the downhill berm. Heav", "fullNote": "DIY hand-dug swales: contour ditches that capture rainwater and slowly infiltrate it into the soil. Designed on contour (use a line level or A-frame). Swales recharge groundwater, prevent erosion, and eliminate the need for irrigation in the swale zone. Plant trees/berries on the downhill berm. Heavy labor (4-8 hours per 100ft of swale). Tractor excavation costs more."}, {"sym": "GARDEN_IRRIGATION", "price": 80, "range": "$50-200", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Drip irrigation system — 50-70% water savings vs overhead sprinklers. Components: 1/2\" poly main line (runs along garden edge), 1/4\" drip tape or individual emitters (run to each plant row), pressure regulator (10-25 PSI for drip), filter (120 mesh minimum — drip emitters clog easily), backflow prev", "fullNote": "Drip irrigation system — 50-70% water savings vs overhead sprinklers. Components: 1/2\" poly main line (runs along garden edge), 1/4\" drip tape or individual emitters (run to each plant row), pressure regulator (10-25 PSI for drip), filter (120 mesh minimum — drip emitters clog easily), backflow preventer, timer ($30-50 battery-operated, automates watering). Emitter spacing: 6\" for dense plantings (carrots, lettuce), 12\" for vegetables (tomatoes, peppers), 18-24\" for shrubs/trees. Flow rate: 0.5 GPH (shrubs), 1 GPH (standard vegetables), 2 GPH (thirsty plants like squash). Kits: Rain Bird drip kit ($35-50, covers 75 sq ft). DIG kit ($40-60, 150 sq ft). Orbit kit ($30-45, 100 sq ft). DIY from bulk parts: cheaper per sq ft for large gardens. GRAVITY-FED DRIP: tank elevated 10+ ft above garden provides 4-8 PSI — enough for drip emitters. No pump needed if you have elevation. Ollas (clay pot irrigation) as alternative: bury unglazed pots, fill with water, water seeps through clay directly to roots. Refill every 3-7 days. Olla DIY: two unglazed 8-10\" terra cotta pots sealed together with silicone. Panama: dry season essential. Drip + heavy mulch = minimal water usage. Run early morning (reduces evaporation). Check emitters monthly for clogs — flush lines by opening end caps. Dilute liquid fertilizer through injector ($15-25) for fertigation."}, {"sym": "OLLA_POT", "price": 25, "range": "$10-50", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Olla (unglazed clay pot) irrigation. Bury pot up to neck near plants, fill with water, cap. Water seeps through porous clay directly to roots. Refill every 3-7 days. Uses 70% less water than surface watering. Zero evaporation. 2000+ year old technology — still the most efficient irrigation method. P", "fullNote": "Olla (unglazed clay pot) irrigation. Bury pot up to neck near plants, fill with water, cap. Water seeps through porous clay directly to roots. Refill every 3-7 days. Uses 70% less water than surface watering. Zero evaporation. 2000+ year old technology — still the most efficient irrigation method. Panama: excellent for dry season vegetable beds. Multiple ollas for larger beds. DIY: use unglazed terra cotta pots sealed together with silicone."}, {"sym": "NEEM_OIL", "price": 15, "range": "$10-25", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Neem oil — organic pesticide, fungicide, miticide. Extracted from seeds of neem tree (Azadirachta indica — grows in Panama!). Active compound: azadirachtin (insect growth regulator — disrupts molting, feeding, reproduction). Controls: aphids, whiteflies, mealybugs, spider mites, scale insects, thrip", "fullNote": "Neem oil — organic pesticide, fungicide, miticide. Extracted from seeds of neem tree (Azadirachta indica — grows in Panama!). Active compound: azadirachtin (insect growth regulator — disrupts molting, feeding, reproduction). Controls: aphids, whiteflies, mealybugs, spider mites, scale insects, thrips, caterpillars (young), leaf miners. Fungal: powdery mildew, black spot, rust, anthracnose (preventative only). APPLICATION: mix 1 tsp cold-pressed neem oil + 1/2 tsp mild liquid soap (emulsifier) per quart warm water. Shake vigorously. Spray early morning or evening (NOT in direct sun — oil + sun = leaf burn). Spray undersides of leaves (where pests hide). Frequency: weekly for prevention, every 3 days for active infestation. Rain: reapply after heavy rain. Withholding period: 48 hours before harvest (breaks down in sunlight). Neem leaf mulch: spread fresh neem leaves around plants — repels soil pests as they decompose. Panama: neem trees grow easily — plant one for free pesticide source. DIY extraction: soak crushed neem seeds in water overnight, strain, use immediately. Cold-pressed oil has higher azadirachtin than heat-extracted. Store oil in cool, dark place (light degrades it). NOT toxic to: bees (when sprayed evening), beneficial insects (ladybugs, lacewings), earthworms (soil-applied). DO NOT spray on: stressed plants (drought, heat), seedlings under 2 weeks, flowers (can affect pollination)."}, {"sym": "BT_SPRAY", "price": 12, "range": "$8-20", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Bacillus thuringiensis (Bt) — organic bacterial pesticide. A naturally occurring soil bacterium that produces crystal proteins (Cry toxins) toxic to specific insect groups. Bt kurstaki: targets caterpillars (Lepidoptera) — cabbage worms, tomato hornworms, corn earworms, loopers, webworms. Bt israele", "fullNote": "Bacillus thuringiensis (Bt) — organic bacterial pesticide. A naturally occurring soil bacterium that produces crystal proteins (Cry toxins) toxic to specific insect groups. Bt kurstaki: targets caterpillars (Lepidoptera) — cabbage worms, tomato hornworms, corn earworms, loopers, webworms. Bt israelensis (Bti): targets mosquito and fungus gnat larvae in standing water. Bt tenebrionis: targets beetle larvae (Colorado potato beetle, elm leaf beetle). HOW IT WORKS: caterpillar eats leaf with Bt spores → Cry proteins bind to specific receptors in alkaline gut (humans/birds/bees have acidic guts — Bt harmless to us) → gut wall perforates → caterpillar stops eating within hours → dies in 2-3 days from septicemia. APPLICATION: spray on leaves (thorough coverage — must be eaten). Reapply every 5-7 days (UV degrades it) and after rain. Mix fresh each time (doesn't store well once mixed). Best for YOUNG caterpillars — older ones are more resistant. NOT effective on: adult moths/butterflies, eggs, pupae, sucking insects (aphids, whiteflies — use neem instead). SAFETY: one of the safest pesticides — approved for organic farming, used on food crops up to day of harvest (no withholding period). No effect on beneficial insects when they're not caterpillars. Store in cool, dry place. Panama: ESSENTIAL for brassicas (cabbage, kale, broccoli) in tropics — diamondback moth and cabbage white butterfly are relentless. Start spraying at first sign of leaf damage or adult butterflies. Bti for mosquito control: add mosquito dunks to rainwater tanks (safe for drinking water after filtration)."}, {"sym": "ROW_COVER", "price": 25, "range": "$15-50", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Floating row cover (Agribon or lightweight fabric) per bed. Physical barrier against insects (caterpillars, beetles, aphids) without chemicals. Allows 85-90% light + water through. Use hoops (PVC or wire) to keep off plants. Remove for pollinated crops (squash, cucumber) when flowering. Reusable for", "fullNote": "Floating row cover (Agribon or lightweight fabric) per bed. Physical barrier against insects (caterpillars, beetles, aphids) without chemicals. Allows 85-90% light + water through. Use hoops (PVC or wire) to keep off plants. Remove for pollinated crops (squash, cucumber) when flowering. Reusable for 3-5 seasons. Panama: also provides light shade (reduces heat stress on tender crops). Weight: AG-15 (light, for insect protection) to AG-30 (heavier, slight frost protection)."}, {"sym": "CHICKENS", "price": 350, "range": "$250-600", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "Backyard chicken setup. Coop: 2-4 sq ft per bird interior, 8-10 sq ft per bird exterior run. Prefab coops: Omlet Eglu Go ($400-500, plastic, easy clean, 2-4 hens). DIY: plywood + 2×4 frame ($150-300, 4×6 ft coop for 6-8 hens). Must have: roosting bars (2×2\" with rounded edges, 8-10\" per bird), nesti", "fullNote": "Backyard chicken setup. Coop: 2-4 sq ft per bird interior, 8-10 sq ft per bird exterior run. Prefab coops: Omlet Eglu Go ($400-500, plastic, easy clean, 2-4 hens). DIY: plywood + 2×4 frame ($150-300, 4×6 ft coop for 6-8 hens). Must have: roosting bars (2×2\" with rounded edges, 8-10\" per bird), nesting boxes (1 per 3-4 hens, 12×12×12\"), ventilation (cross-ventilation at roofline prevents ammonia buildup), predator-proof (1/2\" hardware cloth — chicken wire keeps chickens IN but does NOT keep predators OUT). Hens: buy started pullets (16-20 weeks, about to lay, $15-25 each) or day-old chicks ($3-5 each, need brooder for 6 weeks). Breeds: ISA Brown (300+ eggs/yr, friendly, best layers), Rhode Island Red (250 eggs/yr, dual-purpose meat+eggs, heat-tolerant — good for Panama), Australorp (250 eggs/yr, docile, heat-tolerant), Leghorn (280 eggs/yr, flighty, excellent foragers). Feed: layer pellets (16-18% protein), $15-25 per 50 lb bag. 4 hens eat ~25 lbs feed/month ($10-15). Supplement with: kitchen scraps (NO avocado, chocolate, raw beans, onion, garlic in large amounts — toxic), free-range foraging (bugs, seeds, grass). Water: 1 gallon per 4 hens per day, more in heat. Clean water daily. Egg production: 3-4 eggs/day from 4 hens in season, drops in winter/short days. Panama: year-round laying due to consistent day length. Heat management: shade, ventilation, frozen water bottles in waterer on hot days. Deep litter method: 6-8\" pine shavings, turn weekly, composts in place, clean out 1-2×/year."}, {"sym": "DUCKS", "price": 200, "range": "$150-400", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "Duck keeping — often better than chickens for tropical homesteads. BREEDS: Khaki Campbell (300+ eggs/year, best layers — khaki color, lightweight 4-5 lbs), Muscovy (large 8-15 lbs, meat breed, quiet — they hiss instead of quack, excellent foragers, native to Central/South America — VERY common in Pa", "fullNote": "Duck keeping — often better than chickens for tropical homesteads. BREEDS: Khaki Campbell (300+ eggs/year, best layers — khaki color, lightweight 4-5 lbs), Muscovy (large 8-15 lbs, meat breed, quiet — they hiss instead of quack, excellent foragers, native to Central/South America — VERY common in Panama), Indian Runner (upright posture, 250+ eggs/year, comical appearance, good foragers), Pekin (large 8-11 lbs, white, meat breed, 150-200 eggs/year). ADVANTAGES OVER CHICKENS: better foragers (wider diet — slugs, snails, insects, aquatic plants), more cold-hardy, less destructive to garden (don't scratch like chickens), quieter (Muscovy especially), eggs are richer (larger yolk, more omega-3, excellent for baking), more disease-resistant, longer productive life (5-8 years vs 3-4 for chickens). DISADVANTAGES: NEED WATER — drinking water 0.5 gal/day each + bathing water. Kiddie pool ($15-30) or small pond. Messy — water gets dirty fast (change every 2-3 days). Eggs are stronger-tasting (some prefer, some don't). Need more space than chickens. HOUSING: simpler than chickens — 3-sided shelter (protect from rain/wind), 4-6 sq ft per duck, straw bedding. They DON'T roost (sleep on ground). Nest boxes: low, on ground, 14×14\". Lock up at night (predator protection). FEED: waterfowl pellets (16-18% protein) OR chicken layer feed with added niacin (brewer's yeast 1 tbsp per cup of feed — ducks need more niacin than chickens, deficiency causes leg problems). Free-ranging: ducks get 50-70% of diet from foraging. WATER: must have water deep enough to submerge head (clean nostrils and eyes). Change water daily. Garden integration: ducks are excellent slug control — run them through garden before planting (they eat pests but not plants unless starving). Rice paddies: traditional Asian system — ducks in rice paddies eat pests + weeds, fertilize water. Panama: Muscovy ducks are the traditional campesino bird — hardy, self-sufficient, excellent foragers. They FLY (clip wings if you want to keep them). Roost in trees if not provided shelter — bring down at night with feed."}, {"sym": "RABBITS", "price": 250, "range": "$150-500", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "Rabbit starter: wire cage (24×36\") + 1 buck + 2 does + feeder/waterer + nesting box. Most efficient meat animal: 1 doe + offspring = 100-200 lbs meat/year from garden waste + pellets. Breed every 90 days (28-31 day gestation). Harvest at 8-12 weeks (3-5 lbs dressed). Quiet, clean, ideal for small ho", "fullNote": "Rabbit starter: wire cage (24×36\") + 1 buck + 2 does + feeder/waterer + nesting box. Most efficient meat animal: 1 doe + offspring = 100-200 lbs meat/year from garden waste + pellets. Breed every 90 days (28-31 day gestation). Harvest at 8-12 weeks (3-5 lbs dressed). Quiet, clean, ideal for small homesteads. Manure is cold (can go directly on garden). Panama: keep in shade with good ventilation (heat stress above 85°F)."}, {"sym": "BEES", "price": 300, "range": "$200-500", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "Honeybee keeping starter. EQUIPMENT: Langstroth hive (2 deep boxes for brood + 2 medium supers for honey, $150-250), frames with wax foundation, bottom board, inner cover, outer/telescoping cover. PROTECTIVE GEAR: bee suit/jacket ($40-80), veil, gloves ($15-25). TOOLS: smoker ($25-40, calms bees), h", "fullNote": "Honeybee keeping starter. EQUIPMENT: Langstroth hive (2 deep boxes for brood + 2 medium supers for honey, $150-250), frames with wax foundation, bottom board, inner cover, outer/telescoping cover. PROTECTIVE GEAR: bee suit/jacket ($40-80), veil, gloves ($15-25). TOOLS: smoker ($25-40, calms bees), hive tool ($8-15, pry frames apart), bee brush ($5-10). BEES: 3-lb package with queen ($120-180) OR 5-frame nucleus colony (nuc, $150-200, stronger start). ITALIAN BEES: gentle, productive, light color, good for beginners. CARNIOLAN: darker, better overwintering, more defensive. RUSSIAN: varroa mite resistant. AFRICANIZED BEES: present in Panama — aggressive, defensive of hive. ALWAYS buy gentle European stock from reputable breeder. Keep hives 100+ ft from living areas, behind vegetation barrier (bees fly up and over). LOCATION: morning sun, afternoon shade, windbreak, near water source (bees need water — provide shallow dish with rocks for landing), facing southeast for early sun warming. NECTAR FLOW: Panama has year-round flowering — consistent nectar. Major flows: mango (Dec-Feb), citrus (varies), wildflowers (rainy season). HONEY HARVEST: 30-60 lbs/hive/year. Extract using centrifugal extractor (borrow from bee club or crush-and-strain method). Leave 40-60 lbs honey for bees to overwinter (not needed in Panama — year-round forage, but leave some for dearth periods). PESTS: varroa mite (treatment: oxalic acid vapor or formic acid), small hive beetle (strong colonies defend themselves), wax moths (weak colonies). INSPECTION: every 2-3 weeks during active season. Check for: queen (eggs present = queen was there within 3 days), disease, pests, swarm cells (indicating colony wants to swarm — split hive to prevent). Panama: join local beekeeping association (Asociación de Apicultores de Panamá). Register hives with MIDA. Africanized genetics are present — requeen with gentle stock annually."}, {"sym": "TILAPIA", "price": 300, "range": "$200-600", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "Backyard tilapia aquaculture. Tank: IBC tote (275 gal, $50-100 used), stock tank (300 gal, $200-300), or lined pond. Stocking density: 1 fish per 5-10 gallons. A 275 gal IBC can hold 25-50 fish (harvest at 1-1.5 lbs each). Fingerlings: buy from fish farms ($0.50-1.00 each), 20-30 to start. Tilapia: ", "fullNote": "Backyard tilapia aquaculture. Tank: IBC tote (275 gal, $50-100 used), stock tank (300 gal, $200-300), or lined pond. Stocking density: 1 fish per 5-10 gallons. A 275 gal IBC can hold 25-50 fish (harvest at 1-1.5 lbs each). Fingerlings: buy from fish farms ($0.50-1.00 each), 20-30 to start. Tilapia: fastest growing aquaculture fish, harvest in 6-9 months from fingerling. Water temperature: 75-85°F (24-29°C) — PERFECT for Panama year-round. Below 55°F (13°C): tilapia die. Above 95°F (35°C): stress. Filtration: biological filter (beneficial bacteria convert ammonia → nitrite → nitrate). Mechanical filter (solids removal). Plants (aquaponics) absorb nitrate. Aeration: air pump + air stones ($30-60) — essential, tilapia need dissolved oxygen >4 ppm. Feeding: commercial tilapia pellets (32-36% protein, $1-2/lb, feed 1-3% of body weight daily). Alternative feeds: duckweed (grow in separate tank — tilapia love it), vegetable scraps, algae. Duckweed doubles biomass every 2-3 days in tropical sun — sustainable free feed. Water changes: 10-20% weekly (use for garden irrigation — it's fertilizer!). Harvest: net fish, ice bath to stun, process immediately. Yield: 50-75 lbs fish per year from 275 gal system with 30 fingerlings. Aquaponics integration: add grow beds above tank, pump water through plants, plants clean water for fish. Double harvest: fish + vegetables. Panama: outdoor IBC in partial shade works year-round. Predator protection: bird netting over tank. Morning sun, afternoon shade ideal."}, {"sym": "FEED_STORAGE", "price": 50, "range": "$30-100", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Metal garbage can with tight lid for feed storage. Keeps out rodents, raccoons, moisture. Holds 50 lbs feed. Galvanized steel ($30-50) lasts years. Plastic bins: rodents chew through. Store feed in cool, dry place. Rotate stock (first in, first out). Panama: high humidity = add desiccant packets. Bu", "fullNote": "Metal garbage can with tight lid for feed storage. Keeps out rodents, raccoons, moisture. Holds 50 lbs feed. Galvanized steel ($30-50) lasts years. Plastic bins: rodents chew through. Store feed in cool, dry place. Rotate stock (first in, first out). Panama: high humidity = add desiccant packets. Bulk feed buying saves 20-30% if you have storage."}, {"sym": "COLD_ROOM", "price": 300, "range": "$150-800", "unit": "USD", "conf": "low", "safety": false, "cat": "🌱 Food", "note": "DIY root cellar/cold storage room: insulated space below frost line or in a north-facing hillside. Passive refrigeration: earth temperature stays 50-55°F year-round at 8-12ft depth. Stores root crops (potatoes, carrots, beets, turnips) for 4-8 months. Requirements: good ventilation (intake low, exha", "fullNote": "DIY root cellar/cold storage room: insulated space below frost line or in a north-facing hillside. Passive refrigeration: earth temperature stays 50-55°F year-round at 8-12ft depth. Stores root crops (potatoes, carrots, beets, turnips) for 4-8 months. Requirements: good ventilation (intake low, exhaust high), high humidity (85-95%), darkness, rodent-proofing. Also good for canned goods and wine."}, {"sym": "ROOT_CELLAR", "price": 300, "range": "$150-800", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "Root cellar design: buried or bermed structure maintaining 50-55°F and 85-95% humidity. Stores: potatoes (4-6 months), carrots (4-5 months in damp sand), beets (3-5 months), cabbage (3-4 months), apples (2-4 months separate from vegetables — ethylene gas spoils them). Ventilation: intake low (cool a", "fullNote": "Root cellar design: buried or bermed structure maintaining 50-55°F and 85-95% humidity. Stores: potatoes (4-6 months), carrots (4-5 months in damp sand), beets (3-5 months), cabbage (3-4 months), apples (2-4 months separate from vegetables — ethylene gas spoils them). Ventilation: intake low (cool air), exhaust high (warm air out). Darkness essential. Panama: buried root cellar works if above water table. Alternative: charcoal cooler (zeer pot scaled up)."}, {"sym": "DC_FRIDGE", "price": 700, "range": "$300-1,200", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "12V DC chest fridge ~50L (e.g., Dometic, Engel, Alpicool). Compressor-based, draws 30-70W (average 15-25 Ah/day at 12V with 50°F interior). 3-5x more efficient than a household AC fridge. Uses Danfoss/Secop compressor (standard in off-grid refrigeration). Chest design: cold air stays in when opened ", "fullNote": "12V DC chest fridge ~50L (e.g., Dometic, Engel, Alpicool). Compressor-based, draws 30-70W (average 15-25 Ah/day at 12V with 50°F interior). 3-5x more efficient than a household AC fridge. Uses Danfoss/Secop compressor (standard in off-grid refrigeration). Chest design: cold air stays in when opened (unlike upright). Thermoelectric coolers (Peltier) use 3x the energy — avoid for off-grid."}, {"sym": "EVAP_FRIDGE", "price": 40, "range": "$20-80", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Evaporative cooler (zeer pot / pot-in-pot refrigerator). Ancient technology — uses evaporative cooling to keep food fresh without electricity. CONSTRUCTION: two unglazed terra cotta pots (one larger, one smaller — 2-3\" gap between). Fill gap with wet sand. Place smaller pot inside larger. Cover with", "fullNote": "Evaporative cooler (zeer pot / pot-in-pot refrigerator). Ancient technology — uses evaporative cooling to keep food fresh without electricity. CONSTRUCTION: two unglazed terra cotta pots (one larger, one smaller — 2-3\" gap between). Fill gap with wet sand. Place smaller pot inside larger. Cover with wet cloth. HOW IT WORKS: water in sand evaporates through outer pot's porous surface → evaporation absorbs heat (phase change from liquid to gas requires energy) → inner pot cools. Temperature drop: 10-15°C (18-27°F) below ambient in DRY climates. In humid climates (>60% RH): much less effective (evaporation rate depends on humidity difference). BEST FOR: arid regions (desert, savanna). Panama: lowland humid tropics — zeer pot works but don't expect dramatic cooling. In dry season (Pacific side): works better. In rainy season (everywhere): minimal effect. ALTERNATIVE for humid tropics: charcoal cooler — larger surface area for evaporation, slightly better in humidity. USES: keep vegetables crisp (carrots, beets, cabbage) for 1-3 weeks. NOT for: meat, dairy, leftovers (not cold enough for food safety — need <40°F/4°C). Zero energy, zero moving parts, zero cost to operate. Made from local materials: terra cotta pots ($5-10 each), sand (free), water (minimal). Place in shaded, breezy location (wind increases evaporation). Re-wet sand twice daily. Traditional technology used for thousands of years across Africa, Middle East, India. Modern relevance: perfect emergency backup when fridge fails."}, {"sym": "FOOD_STORAGE", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "FOOD STORAGE TIERS: 1 week (pantry basics) — rice, beans, canned goods, oil. 1 month (buffer) — adds flour, sugar, salt, dried foods. 3 months (resilience) — adds bulk grains, legumes, home-canned goods. 1 year (self-sufficiency) — full rotation system, root cellar, preserved harvest. Storage rule: ", "fullNote": "FOOD STORAGE TIERS: 1 week (pantry basics) — rice, beans, canned goods, oil. 1 month (buffer) — adds flour, sugar, salt, dried foods. 3 months (resilience) — adds bulk grains, legumes, home-canned goods. 1 year (self-sufficiency) — full rotation system, root cellar, preserved harvest. Storage rule: cool (50-70°F), dark, dry, pest-proof. Rotate: first in, first out. Label with date. Panama: moisture is enemy #1 — use airtight containers, oxygen absorbers, bay leaves (repels weevils)."}, {"sym": "PRESSURE_CANNER", "price": 120, "range": "$80-200", "unit": "USD", "conf": "high", "safety": true, "cat": "🌱 Food", "note": "Pressure canner (not just water-bath). THE ONLY safe method for low-acid foods: meat, vegetables, beans, soup, stock. Reaches 240°F at 10-15 PSI (kills botulism spores). Presto 23-quart ~$120 (fits 7 quart jars or 20 pint jars). Must have: weighted gauge or dial gauge (test accuracy annually). Follo", "fullNote": "Pressure canner (not just water-bath). THE ONLY safe method for low-acid foods: meat, vegetables, beans, soup, stock. Reaches 240°F at 10-15 PSI (kills botulism spores). Presto 23-quart ~$120 (fits 7 quart jars or 20 pint jars). Must have: weighted gauge or dial gauge (test accuracy annually). Follow tested recipes exactly — botulism is odorless, tasteless, and often fatal. Panama: pressure canning = shelf-stable meat without refrigeration."}, {"sym": "DEHYDRATOR", "price": 80, "range": "$50-200", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Electric food dehydrator (5-9 tray). ~500-800W, runs 6-12 hours for most foods. Dries: fruit leather, jerky, herbs, tomatoes, mushrooms, kale chips. 80-95% moisture removal = shelf-stable for 6-12 months. Faster and more consistent than solar drying. Temperature control: 95°F herbs, 125°F fruits, 14", "fullNote": "Electric food dehydrator (5-9 tray). ~500-800W, runs 6-12 hours for most foods. Dries: fruit leather, jerky, herbs, tomatoes, mushrooms, kale chips. 80-95% moisture removal = shelf-stable for 6-12 months. Faster and more consistent than solar drying. Temperature control: 95°F herbs, 125°F fruits, 145°F vegetables, 155°F meat/jerky. Vacuum seal after drying for longest storage. Panama: electric dehydrator avoids humidity problems of solar drying."}, {"sym": "SOLAR_DRYER", "price": 120, "range": "$50-200", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "Solar food dehydrator. DESIGN: wooden box with sloped glass/plastic top (greenhouse effect — sun enters, heats interior, glass traps heat). Dimensions: 2×3 ft, 1 ft deep at back, 6\" at front (slope for air flow and sun angle). Interior: painted black (absorbs heat). Shelves: food-grade screening (st", "fullNote": "Solar food dehydrator. DESIGN: wooden box with sloped glass/plastic top (greenhouse effect — sun enters, heats interior, glass traps heat). Dimensions: 2×3 ft, 1 ft deep at back, 6\" at front (slope for air flow and sun angle). Interior: painted black (absorbs heat). Shelves: food-grade screening (stainless steel or nylon mesh — NOT galvanized which can leach zinc into food). VENTS: screened intake at bottom, exhaust at top — natural convection draws air through (cool air enters bottom, heats up, rises past food, exits top taking moisture with it). TEMPERATURE: 120-150°F (49-66°C) in full sun. Too hot: prop lid open slightly to vent. Too cool: reposition for more sun, check vents aren't blocked. DRYING TIME: herbs 4-8 hours, sliced fruit 1-2 days, vegetable chips 1-2 days, meat jerky 2-3 days (must pre-cook to 160°F for safety). PREP: slice uniformly (1/4\" for most items — too thick = center molds before outside dries), pretreat fruit with lemon juice dip (prevents browning — ascorbic acid). FINISHED: leathery, pliable, no moisture when squeezed. Seeds rattle in dried peppers. Condition: place in jar 7-10 days, shake daily — redistributes remaining moisture. If condensation appears, dry more. VACUUM SEAL for storage. Panama: solar dryer works in dry season. In rainy season: electric dehydrator is backup (humidity is too high for solar drying). Build with rot-resistant wood (cedar, teak) or treated pine. Polycarbonate twinwall glazing is more durable than glass. Paint exterior for weather protection. Elevate on legs to deter ants."}, {"sym": "FERMENTATION", "price": 40, "range": "$20-80", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Fermentation kit: wide-mouth jars + weights + airlock lids. Lacto-fermentation: salt brine (2-3% salt by weight) allows beneficial Lactobacillus to thrive while inhibiting pathogens. Ferments: sauerkraut, kimchi, pickles, hot sauce, kvass. No electricity needed. Probiotic (gut health). Shelf-stable ", "fullNote": "Fermentation kit: wide-mouth jars + weights + airlock lids. Lacto-fermentation: salt brine (2-3% salt by weight) allows beneficial Lactobacillus to thrive while inhibiting pathogens. Ferments: sauerkraut, kimchi, pickles, hot sauce, kvass. No electricity needed. Probiotic (gut health). Shelf-stable for months in cool storage. 2-3 week fermentation time. Simple, ancient, foolproof preservation. Panama: ferment in coolest spot (70°F ideal; above 80°F may over-ferment)."}, {"sym": "VACUUM_SEALER", "price": 80, "range": "$50-150", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Vacuum sealer + bags. Extends freezer life 3-5x (prevents freezer burn). Seals dehydrated food for years. Bags cost ~$0.15-0.30 each in bulk. Can seal: meat, vegetables (blanch first), dried food, coffee, seeds. Jar attachment ($10-15) seals mason jars for dry goods. Uses ~200W for 20-30 seconds per", "fullNote": "Vacuum sealer + bags. Extends freezer life 3-5x (prevents freezer burn). Seals dehydrated food for years. Bags cost ~$0.15-0.30 each in bulk. Can seal: meat, vegetables (blanch first), dried food, coffee, seeds. Jar attachment ($10-15) seals mason jars for dry goods. Uses ~200W for 20-30 seconds per seal. Essential for off-grid food preservation — dehydrated + vacuum sealed = shelf-stable for years. FoodSaver or equivalent brand."}, {"sym": "SMOKER", "price": 150, "range": "$80-400", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "Meat smoker for preservation. Hot smoking (165-185°F): cooks + flavors, extends fridge life to 1-2 weeks. Cold smoking (<85°F): preserves (with salt cure), extends shelf life months. Electric smoker ~$150-250 (easiest). Offset smoker ~$200-400 (traditional). DIY: 55-gal drum smoker ~$50-80. Panama: ", "fullNote": "Meat smoker for preservation. Hot smoking (165-185°F): cooks + flavors, extends fridge life to 1-2 weeks. Cold smoking (<85°F): preserves (with salt cure), extends shelf life months. Electric smoker ~$150-250 (easiest). Offset smoker ~$200-400 (traditional). DIY: 55-gal drum smoker ~$50-80. Panama: smoking + vacuum sealing = shelf-stable fish/meat without refrigeration. Hardwood for smoke: fruit woods, hickory, oak (no softwoods/resinous woods — toxic)."}, {"sym": "GAS_STOVE", "price": 100, "range": "$50-300", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "Propane cooking stove. Coleman 2-burner camp stove ($70-100): portable, 20,000 BTU total, runs on 1-lb disposable cylinders or 20-lb tank with adapter hose ($15-25). Atwood/Dometic RV range ($300-500): built-in, 3-burner + oven, piezo ignition, thermocouple safety (shuts off gas if flame goes out). ", "fullNote": "Propane cooking stove. Coleman 2-burner camp stove ($70-100): portable, 20,000 BTU total, runs on 1-lb disposable cylinders or 20-lb tank with adapter hose ($15-25). Atwood/Dometic RV range ($300-500): built-in, 3-burner + oven, piezo ignition, thermocouple safety (shuts off gas if flame goes out). Full-size propane range ($500-800): 4 burners + oven, similar to natural gas stove but with propane orifices. FUEL: LPG (propane) stored in 20-lb tanks ($45-55 filled, $15-20 refill), 40-lb, or 100-lb tanks. 20-lb tank lasts 1-2 months daily cooking for family of 4. Consumption: single burner on medium ~0.1-0.2 lbs/hr, oven ~0.3-0.5 lbs/hr. TANK STORAGE: outdoors only (propane is heavier than air — leak pools in low spots, explosive). In shade (sun heats tank, pressure rises, relief valve may vent). On concrete pad (not dirt — corrosion). Secure against tipping. 10 ft minimum from ignition sources, building openings. Panama: propane widely available (tropigas, gas natural — exchange tanks at corner stores, hardware stores, gas stations). 20-lb tanks are standard BBQ size. Install: flexible stainless steel gas line from tank to stove (not rubber hose indoors), shutoff valve at tank and at stove, CO detector in kitchen (propane combustion produces CO if incomplete). Test connections annually with soap bubble test. Smell gas: evacuate, shut off tank, ventilate, DO NOT flip electrical switches (spark)."}, {"sym": "ROCKET_STOVE", "price": 250, "range": "$150-600", "unit": "USD", "conf": "low", "safety": false, "cat": "🌱 Food", "note": "Rocket mass heater — the most efficient wood-burning stove design. PRINCIPLE: J-tube combustion (horizontal feed tube → vertical insulated burn chamber/riser). Insulated riser creates intense draft → 1000°C+ (1800°F) combustion temperature → near-complete combustion (little to no smoke — only CO2 + ", "fullNote": "Rocket mass heater — the most efficient wood-burning stove design. PRINCIPLE: J-tube combustion (horizontal feed tube → vertical insulated burn chamber/riser). Insulated riser creates intense draft → 1000°C+ (1800°F) combustion temperature → near-complete combustion (little to no smoke — only CO2 + water vapor output). BURN TUBE: 4-6\" square steel tubing, horizontal feed section ~12\", vertical riser ~30-40\". INSULATION: ceramic fiber blanket or perlite-clay slip around riser (critical — uninsulated riser doesn't reach high-enough temperature for clean burn). BARREL: 30-55 gallon steel drum over riser — exhaust exits bottom of barrel after giving up heat. THERMAL MASS: cob (clay + sand + straw), brick, stone, or tile bench surrounding exhaust path. Exhaust snakes through mass → mass absorbs heat → radiates for 12-24 hours from 20-minute fire. EFFICIENCY: 80-90% vs 20-30% for open fireplace. FUEL: small sticks, prunings, scrap wood — wrist-diameter or smaller. Feed vertically into horizontal burn tube (gravity feeds into combustion zone). HEATS: living space (radiant heat from mass) + cooktop (barrel top reaches 500°F+). BUILD: requires masonry skills and ~40-80 hours labor. COST: $150-600 in materials (steel + brick/cob + barrel). Panama: cob is traditional building material — natural fit for rocket mass heater. Only needed in highlands (Boquete, Cerro Punta) where evenings are cool. In lowlands: too hot to add heat — use outdoor rocket stove for cooking only. EXHAUST: must vent outside through roof (stainless steel chimney, triple-wall where passing through combustibles). Clean flue annually (creosote buildup minimal due to clean burn, but still check)."}, {"sym": "SOLAR_OVEN", "price": 150, "range": "$80-300", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "Box solar oven: insulated box with glass lid and reflectors. Reaches 250-350°F. Bakes bread, roasts vegetables, slow-cooks stews. 3-5 hour cook time typical. No fuel, no emissions, no fire risk. Works any sunny day. Panama: excellent solar cooking conditions (4-5 PSH year-round). Good brands: Sun Ov", "fullNote": "Box solar oven: insulated box with glass lid and reflectors. Reaches 250-350°F. Bakes bread, roasts vegetables, slow-cooks stews. 3-5 hour cook time typical. No fuel, no emissions, no fire risk. Works any sunny day. Panama: excellent solar cooking conditions (4-5 PSH year-round). Good brands: Sun Oven, GoSun. DIY: cardboard + aluminum foil + glass works surprisingly well. Cook during peak sun (10am-3pm)."}, {"sym": "NORWEGIAN_POT", "price": 70, "range": "$40-120", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Insulated thermal cooker (haybox or wonderbag): bring food to boil for 5-10 minutes, then place in heavily insulated container. Retained heat continues cooking for 2-8 hours without additional energy. Reduces fuel consumption by 60-80%. Works for: soups, stews, rice, beans, pasta, and hard-boiled eg", "fullNote": "Insulated thermal cooker (haybox or wonderbag): bring food to boil for 5-10 minutes, then place in heavily insulated container. Retained heat continues cooking for 2-8 hours without additional energy. Reduces fuel consumption by 60-80%. Works for: soups, stews, rice, beans, pasta, and hard-boiled eggs. Also called retained-heat cooking. Simple DIY version: cardboard box + straw/hay + sleeping bag."}, {"sym": "BIOGAS_DIGESTER", "price": 400, "range": "$200-800", "unit": "USD", "conf": "low", "safety": false, "cat": "🌱 Food", "note": "Small biogas digester: 55-gal drum system. Input: kitchen scraps + animal manure + water. Output: methane gas for cooking (1-2 hours/day from household waste) + liquid fertilizer. Requires: anaerobic conditions, pH 6.5-7.5, temperature 80-100°F (ideal for Panama). Takes 2-4 weeks to start producing ", "fullNote": "Small biogas digester: 55-gal drum system. Input: kitchen scraps + animal manure + water. Output: methane gas for cooking (1-2 hours/day from household waste) + liquid fertilizer. Requires: anaerobic conditions, pH 6.5-7.5, temperature 80-100°F (ideal for Panama). Takes 2-4 weeks to start producing gas. Methane is flammable — follow safety protocols. Larger systems (200+ gal) can fuel daily cooking. Gas holder: inner tube or floating drum."}, {"sym": "SOLAR_COOKER", "price": 120, "range": "$50-300", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "Parabolic solar cooker (focused reflector, reaches 200-400°C) or box/funnel solar oven (reaches 120-150°C). Parabolic: fast cooking (60-90 min for beans) but needs frequent reorientation. Box oven: slow cooking (3-5 hours) but set-and-forget. Works on clear sunny days only. Can bake bread, cook rice", "fullNote": "Parabolic solar cooker (focused reflector, reaches 200-400°C) or box/funnel solar oven (reaches 120-150°C). Parabolic: fast cooking (60-90 min for beans) but needs frequent reorientation. Box oven: slow cooking (3-5 hours) but set-and-forget. Works on clear sunny days only. Can bake bread, cook rice, pasteurize water, and slow-cook stews. No fuel cost, zero emissions."}, {"sym": "CAST_IRON", "price": 40, "range": "$20-80", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Cast iron skillet (10-12\"). The ultimate off-grid cookware. Works on: propane, wood fire, rocket stove, induction, solar oven (preheated). Retains heat (forgives temperature fluctuations). Adds dietary iron. Lasts generations. Season with oil, never soap. Lodge ~$25-40 (US-made, affordable). Carbon ", "fullNote": "Cast iron skillet (10-12\"). The ultimate off-grid cookware. Works on: propane, wood fire, rocket stove, induction, solar oven (preheated). Retains heat (forgives temperature fluctuations). Adds dietary iron. Lasts generations. Season with oil, never soap. Lodge ~$25-40 (US-made, affordable). Carbon steel alternative: lighter but similar properties. One cast iron skillet replaces 3-4 specialty pans."}, {"sym": "SICKLE_MOWER", "price": 60, "range": "$30-100", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Sickle or scythe for cutting cover crops, grass, grain. No fuel, no noise, zero maintenance beyond sharpening. European scythe (lighter, more efficient) ~$80-120. Grass sickle (kama) ~$30-50. Cuts 1/4-1/2 acre per day with practice. Keeps edges sharp with whetstone. For small homesteads: more practi", "fullNote": "Sickle or scythe for cutting cover crops, grass, grain. No fuel, no noise, zero maintenance beyond sharpening. European scythe (lighter, more efficient) ~$80-120. Grass sickle (kama) ~$30-50. Cuts 1/4-1/2 acre per day with practice. Keeps edges sharp with whetstone. For small homesteads: more practical than gas-powered brush cutter."}, {"sym": "GRAIN_MILL", "price": 200, "range": "$100-400", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "Manual grain mill — essential for off-grid grain processing. COUNTRY LIVING MILL ($400-450): cast iron, lifetime warranty, adjustable from coarse (cracked corn) to fine (pastry flour), can be motorized with pulley kit ($80). Hand crank: 1 cup flour per 5-8 minutes of cranking (good workout). Corona/", "fullNote": "Manual grain mill — essential for off-grid grain processing. COUNTRY LIVING MILL ($400-450): cast iron, lifetime warranty, adjustable from coarse (cracked corn) to fine (pastry flour), can be motorized with pulley kit ($80). Hand crank: 1 cup flour per 5-8 minutes of cranking (good workout). Corona/Victoria mill ($50-80): budget option, cast iron, works fine but coarser grind and more effort. KoMo hand mill ($300-400): stone grinding wheels, quieter, finer flour, European quality. GRAINS: corn for masa/tortillas (nixtamalize first — soak in lime water to release niacin), wheat for bread/pasta, rice for flour, oats for oatmeal, coffee (coarse grind). GRINDING TIPS: adjust tightness for desired fineness, feed grain slowly (fast feeding = coarse, motor strain), clean between grain types (run dry rice through to clear). Store whole grains (shelf life years), grind as needed (fresh flour nutrients degrade in days). MOUNTING: bolt to sturdy table or counter. Panama: corn is staple grain — fresh masa for tortillas daily. Coffee grinding: coarse for French press, medium for drip, fine for espresso. Motorization: bicycle drive (connect chain from bike to mill pulley — great workout, produces flour), 12V motor conversion (DIY project). Mill capacity: feed 5-10 people if grinding daily."}, {"sym": "OIL_PRESS", "price": 250, "range": "$150-500", "unit": "USD", "conf": "low", "safety": false, "cat": "🌱 Food", "note": "Manual oil press. Presses: sunflower seeds, sesame, peanut, coconut (copra), palm kernels. Oil yield: 30-50% by weight (1 gallon oil from 8-12 lbs seeds). Cooking oil is one of the hardest things to produce off-grid. Piteba oil press ~$150-250 (hand crank). Requires: dried seeds/nuts, heat (friction", "fullNote": "Manual oil press. Presses: sunflower seeds, sesame, peanut, coconut (copra), palm kernels. Oil yield: 30-50% by weight (1 gallon oil from 8-12 lbs seeds). Cooking oil is one of the hardest things to produce off-grid. Piteba oil press ~$150-250 (hand crank). Requires: dried seeds/nuts, heat (friction warms press). Panama: coconut oil is the most practical tropical option (abundant, high yield)."}, {"sym": "KITCHEN_SCALE", "price": 20, "range": "$10-40", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Digital kitchen scale (0.1g precision). Essential for: fermentation (2-3% salt by weight), canning recipes, dehydrating (weigh before/after for moisture content), baking (weight > volume for accuracy), seed saving (count by weight). Battery-powered (AAA or rechargeable). 5kg/11lb capacity typical. M", "fullNote": "Digital kitchen scale (0.1g precision). Essential for: fermentation (2-3% salt by weight), canning recipes, dehydrating (weigh before/after for moisture content), baking (weight > volume for accuracy), seed saving (count by weight). Battery-powered (AAA or rechargeable). 5kg/11lb capacity typical. Much more accurate than measuring cups. Off-grid essential for consistent food preservation."}, {"sym": "HERB_GARDEN", "price": 30, "range": "$15-60", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Culinary + medicinal herb starter garden. 6-8 plants/seeds: basil, cilantro, oregano, thyme, rosemary, mint (contain!), aloe vera, lemongrass. Culinary herbs: elevate simple food, reduce salt/sugar need. Medicinal: aloe (burns/cuts), mint (digestion), chamomile (sleep), ginger (nausea/inflammation).", "fullNote": "Culinary + medicinal herb starter garden. 6-8 plants/seeds: basil, cilantro, oregano, thyme, rosemary, mint (contain!), aloe vera, lemongrass. Culinary herbs: elevate simple food, reduce salt/sugar need. Medicinal: aloe (burns/cuts), mint (digestion), chamomile (sleep), ginger (nausea/inflammation). Most herbs are pest-resistant (aromatic oils deter insects). Panama: lemongrass, ginger, turmeric, and aloe thrive in tropics with zero care."}, {"sym": "MEDICINAL_PLANTS", "price": 0, "range": "$0-0", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "PANAMA MEDICINAL PLANTS (traditional + science-backed): Sábila (aloe vera) — burns, wounds, skin. Jengibre (ginger) — nausea, inflammation, cold/flu. Cúrcuma (turmeric) — anti-inflammatory (curcumin). Hierba de limón (lemongrass) — calming tea, insect repellent. Moringa — nutrient-dense leaves (iron", "fullNote": "PANAMA MEDICINAL PLANTS (traditional + science-backed): Sábila (aloe vera) — burns, wounds, skin. Jengibre (ginger) — nausea, inflammation, cold/flu. Cúrcuma (turmeric) — anti-inflammatory (curcumin). Hierba de limón (lemongrass) — calming tea, insect repellent. Moringa — nutrient-dense leaves (iron, calcium, protein). Noni — traditional pain relief (fruit). Caña fistula — mild laxative. Always verify ID before using — many toxic lookalikes. Learn from local knowledge keepers."}, {"sym": "MICROGREENS", "price": 60, "range": "$30-100", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Trays (1020 standard) + potting mix/coco coir + seeds (radish, sunflower, pea, broccoli) + spray bottle or light misting. Harvest in 7-14 days. Nutrient density 5-40x higher than mature vegetables (per gram). Year-round production indoors with minimal light (window or basic LED). One tray per week p", "fullNote": "Trays (1020 standard) + potting mix/coco coir + seeds (radish, sunflower, pea, broccoli) + spray bottle or light misting. Harvest in 7-14 days. Nutrient density 5-40x higher than mature vegetables (per gram). Year-round production indoors with minimal light (window or basic LED). One tray per week provides salad greens for 2 people. Very low water usage."}, {"sym": "MUSHROOMS", "price": 120, "range": "$50-250", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Mushroom cultivation — high-value crop from waste materials. SHIITAKE on logs: hardwood logs (oak, maple, sweetgum — 4-6\" diameter, 3-4 ft length), drill 5/16\" holes in diamond pattern, insert plug spawn ($15-25 per 100 plugs), seal with melted cheese wax or beeswax. Stack logs in shady, humid locat", "fullNote": "Mushroom cultivation — high-value crop from waste materials. SHIITAKE on logs: hardwood logs (oak, maple, sweetgum — 4-6\" diameter, 3-4 ft length), drill 5/16\" holes in diamond pattern, insert plug spawn ($15-25 per 100 plugs), seal with melted cheese wax or beeswax. Stack logs in shady, humid location (crib stack or lean-to). Wait 6-12 months for colonization (mycelium spreads through log). After colonization: soak logs in water 24 hours to trigger fruiting. Each log fruits 2-4 lbs/year for 3-5 years. OYSTER MUSHROOMS on straw: pasteurize straw (hot water 160-170°F for 1 hour or cold lime soak), drain, mix with grain spawn ($10-15/lb), pack into poly tubing or 5-gal buckets with holes, hang in high humidity (80-95%). Fruits in 2-3 weeks. 2-3 flushes per batch over 6-8 weeks. Yield: 1 lb fresh mushrooms per 5 lbs dry straw. LIONS MANE on supplemented sawdust: hardwood sawdust + wheat bran (20%), sterilize in bags, inoculate, incubate 2-3 weeks, fruit. High-value medicinal mushroom ($12-20/lb fresh). GROWING CONDITIONS: high humidity (80-95%), indirect light, good air exchange (CO2 buildup causes leggy stems), temperature species-dependent (oyster 55-75°F, shiitake 50-80°F). Panama: oyster mushrooms easiest in tropical climate (warm-weather strains available). Grow in shaded outdoor area or shed with misting system. Use agricultural waste: rice straw, coffee husks, banana leaves — all abundant in Panama. Selling: $10-15/lb fresh at farmers markets. Dried: $15-25/lb. Low startup, high return crop."}, {"sym": "CANNING", "price": 120, "range": "$50-150", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Water-bath canner (large pot with rack) + 12-pint/quart mason jars + lids + rings + jar lifter + funnel. A pressure canner adds ~$80-120 more. Water-bath canning: for high-acid foods (fruit, tomatoes, pickles, jam) — boil 10-30 min. Pressure canning: for low-acid foods (meat, vegetables, beans, soup", "fullNote": "Water-bath canner (large pot with rack) + 12-pint/quart mason jars + lids + rings + jar lifter + funnel. A pressure canner adds ~$80-120 more. Water-bath canning: for high-acid foods (fruit, tomatoes, pickles, jam) — boil 10-30 min. Pressure canning: for low-acid foods (meat, vegetables, beans, soup) — requires 240°F at 10-15 PSI and is the ONLY safe method for those foods. Proper pH balance is critical for safety (botulism risk in low-acid foods)."}]</script>
