400W (350V), 8× 400W (400V — near limit), 10× 100W (220V), 6× 450W (300V). Each tracker independent — can have different string lengths and orientations. For 5kW+ systems. Wire gauge: 12 AWG sufficient for 10A at 400V over 300ft. Requires professional install — high voltage DC is lethal."}, {"sym": "WIND_TURBINE", "price": 750, "range": "$500-1,200", "unit": "USD", "conf": "medium", "safety": false, "cat": "⚡ Electricity", "note": "Primus 400W wind turbine ~$850, generic kits $500-$700. Wind turbines complement solar well (wind blows at night, winter; solar peaks midday, summer). Rated power at 28 mph; actual output is a cubic function of wind speed (1/8 at half speed). Need av", "fullNote": "Primus 400W wind turbine ~$850, generic kits $500-$700. Wind turbines complement solar well (wind blows at night, winter; solar peaks midday, summer). Rated power at 28 mph; actual output is a cubic function of wind speed (1/8 at half speed). Need average >10 mph wind speed for viability. Tower height doubles output vs. half-height (less turbulence higher up)."}, {"sym": "MICRO_HYDRO", "price": 1500, "range": "$800-2,500", "unit": "USD", "conf": "medium", "safety": false, "cat": "⚡ Electricity", "note": "WaterLily ~$400 (portable turbine, ~100W), ESandD LH1000 ~$2000 (permanent installation, ~1kW). Most efficient renewable: 50-70% conversion vs 15-24% for solar. Runs 24/7 regardless of weather. Requires: head (vertical drop) x flow (GPM) = power. For", "fullNote": "WaterLily ~$400 (portable turbine, ~100W), ESandD LH1000 ~$2000 (permanent installation, ~1kW). Most efficient renewable: 50-70% conversion vs 15-24% for solar. Runs 24/7 regardless of weather. Requires: head (vertical drop) x flow (GPM) = power. Formula: Watts = Head(ft) x Flow(GPM) / 10. Even a small stream can power a homestead."}, {"sym": "FUEL_GENERATOR", "price": 550, "range": "$400-800", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Champion 2000W inverter generator ~$550. Inverter generators produce clean sine wave power safe for electronics (unlike conventional generators). 2000W runs fridge + lights + phone charging. Burns ~0.4 gal/hr of gasoline. Essential backup for off-gri", "fullNote": "Champion 2000W inverter generator ~$550. Inverter generators produce clean sine wave power safe for electronics (unlike conventional generators). 2000W runs fridge + lights + phone charging. Burns ~0.4 gal/hr of gasoline. Essential backup for off-grid systems but don't plan on running 24/7 — fuel storage and engine maintenance are ongoing costs."}, {"sym": "GROUND_MOUNT_RACK", "price": 75, "range": "$50-140", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "IronRidge ground mount hardware per panel: rail connectors ($42/pair), module clamps ($18/4x), end clamps ($9/2x) = ~$69-80/panel excluding pipe/footings. Eco-Worthy adjustable ground rack $55-75/panel (Amazon). Wood post + unistrut DIY $30-50/panel.", "fullNote": "IronRidge ground mount hardware per panel: rail connectors ($42/pair), module clamps ($18/4x), end clamps ($9/2x) = ~$69-80/panel excluding pipe/footings. Eco-Worthy adjustable ground rack $55-75/panel (Amazon). Wood post + unistrut DIY $30-50/panel. Ground mounts allow optimal tilt and easy cleaning. Must be anchored against wind uplift — concrete footings or helical ground screws."}, {"sym": "ROOF_MOUNT_RAIL", "price": 65, "range": "$50-80", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "IronRidge XR100 rail system ~$55-80/panel. Unirac SolarMount ~$50-75/panel. Rail-based systems are the standard for composition shingle roofs. Includes rails, L-feet, flashing, and module clamps. Requires proper flashing at every roof penetration to ", "fullNote": "IronRidge XR100 rail system ~$55-80/panel. Unirac SolarMount ~$50-75/panel. Rail-based systems are the standard for composition shingle roofs. Includes rails, L-feet, flashing, and module clamps. Requires proper flashing at every roof penetration to prevent leaks. Rail-less systems (IronRidge HUG, EcoFasten) reduce weight but cost $35-55/panel."}, {"sym": "ROOF_ZBRACKET", "price": 20, "range": "$15-30", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Renogy Z-Bracket Kit ~$18-25 for 4 brackets (mounts 1 panel). Eco-Worthy Z-brackets $15-22. Simple aluminum L-brackets for flat surfaces — RV roofs, sheds, container tops. Screw directly into roof with sealant. Not adjustable for tilt. Maximum 45° re", "fullNote": "Renogy Z-Bracket Kit ~$18-25 for 4 brackets (mounts 1 panel). Eco-Worthy Z-brackets $15-22. Simple aluminum L-brackets for flat surfaces — RV roofs, sheds, container tops. Screw directly into roof with sealant. Not adjustable for tilt. Maximum 45° recommended; above that use tilt legs. Use stainless steel hardware to prevent galvanic corrosion."}, {"sym": "TILT_LEGS", "price": 45, "range": "$35-80", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Renogy Tilt Mount Kit $40-55 (adjustable 0-45°). Eco-Worthy Adjustable Tilt $35-50. Tamarack Solar fixed 15° tilt legs ~$60-80. Essential for flat roofs where panels need seasonal tilt adjustment. Summer angle = latitude - 15°, winter = latitude + 15", "fullNote": "Renogy Tilt Mount Kit $40-55 (adjustable 0-45°). Eco-Worthy Adjustable Tilt $35-50. Tamarack Solar fixed 15° tilt legs ~$60-80. Essential for flat roofs where panels need seasonal tilt adjustment. Summer angle = latitude - 15°, winter = latitude + 15°. Tilt improves self-cleaning (rain washes off dust) and increases annual yield 10-15% vs flat mount."}, {"sym": "ROOF_FLASHING", "price": 15, "range": "$12-25", "unit": "USD", "conf": "high", "safety": true, "cat": "⚡ Electricity", "note": "IronRidge FlashFoot ~$12-18 each. Quick Mount PV QBase ~$15-25 each. Aluminum flashing with EPDM/butyl seal that slides under shingles. Every roof penetration needs one — failing to flash properly is the #1 cause of roof leaks in solar installs. Mini", "fullNote": "IronRidge FlashFoot ~$12-18 each. Quick Mount PV QBase ~$15-25 each. Aluminum flashing with EPDM/butyl seal that slides under shingles. Every roof penetration needs one — failing to flash properly is the #1 cause of roof leaks in solar installs. Minimum 2 flashings per rail (4+ per panel). Replace any flashing showing corrosion immediately."}, {"sym": "GROUND_SCREW", "price": 80, "range": "$60-120", "unit": "USD", "conf": "medium", "safety": false, "cat": "⚡ Electricity", "note": "American Ground Screw Model 3 (76mm x 2000mm) helical ground screw. No concrete needed — screws directly into soil with hydraulic drive head. Faster than concrete footings (hours vs days). Removable and reusable. Requires soil without large rocks. Pe", "fullNote": "American Ground Screw Model 3 (76mm x 2000mm) helical ground screw. No concrete needed — screws directly into soil with hydraulic drive head. Faster than concrete footings (hours vs days). Removable and reusable. Requires soil without large rocks. Per-screw cost; 4-6 screws per ground mount frame. Alternative: concrete sono-tube footings ~$30-50 each."}, {"sym": "COMBINER_BOX", "price": 125, "range": "$85-250", "unit": "USD", "conf": "high", "safety": true, "cat": "⚡ Electricity", "note": "MidNite Solar MNPV6 6-circuit combiner ~$123 (NEMA 3R, 150VDC). MNPV6-250 for 250V systems ~$159. Eco-Worthy 6-string combiner w/ breaker ~$85-110. Required when 3+ parallel strings — each string gets its own fuse/breaker. Includes busbar, fuse holde", "fullNote": "MidNite Solar MNPV6 6-circuit combiner ~$123 (NEMA 3R, 150VDC). MNPV6-250 for 250V systems ~$159. Eco-Worthy 6-string combiner w/ breaker ~$85-110. Required when 3+ parallel strings — each string gets its own fuse/breaker. Includes busbar, fuse holders, and enclosure. Must be rated for the system's max DC voltage. Accessories: fuse busbar ~$21, breaker busbar ~$33."}, {"sym": "PV_FUSE", "price": 12, "range": "$8-18", "unit": "USD", "conf": "h utput and battery busbar. Sizing: 125% of controller rated output current. Also serves as battery disconnect for maintenance. Must be as close to battery as practical (within 7\" per ABYC standards). T-Tocas 250A surface-mount breaker ~$25-40 for budget option."}, {"sym": "ANL_FUSE", "price": 15, "range": "$12-22", "unit": "USD", "conf": "high", "safety": true, "cat": "⚡ Electricity", "note": "Blue Sea 5007 series ANL fuses: 100A=$12-15, 150A=$14-18, 200A=$15-20, 250A=$16-22. 32V DC rated, AIC 2,700-6,000A. Good for 12V/24V battery main protection on smaller banks. Requires ANL fuse holder ($25-30). Victron ANL fuse 5-pack ~$41. Place on p", "fullNote": "Blue Sea 5007 series ANL fuses: 100A=$12-15, 150A=$14-18, 200A=$15-20, 250A=$16-22. 32V DC rated, AIC 2,700-6,000A. Good for 12V/24V battery main protection on smaller banks. Requires ANL fuse holder ($25-30). Victron ANL fuse 5-pack ~$41. Place on positive battery cable within 7\" of battery terminal. NOT sufficient for large LiFePO4 banks — use Class-T instead."}, {"sym": "CLASS_T_FUSE", "price": 45, "range": "$35-65", "unit": "USD", "conf": "high", "safety": true, "cat": "⚡ Electricity", "note": "Littelfuse JLLN series: 200A=$35-45, 300A=$40-55, 400A=$50-65. 125V DC, AIC 20,000-50,000A. THE required fuse for LiFePO4 battery banks — LiFePO4 can dump 5,000A+ into a short circuit. Standard ANL/MEGA fuses may not interrupt these fault currents. C", "fullNote": "Littelfuse JLLN series: 200A=$35-45, 300A=$40-55, 400A=$50-65. 125V DC, AIC 20,000-50,000A. THE required fuse for LiFePO4 battery banks — LiFePO4 can dump 5,000A+ into a short circuit. Standard ANL/MEGA fuses may not interrupt these fault currents. Class-T fuse block ~$55-80. Place on positive battery cable. Fast-acting; size at 125% of max continuous inverter draw."}, {"sym": "MEGA_FUSE", "price": 12, "range": "$8-15", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Victron MEGA fuses: 100A-300A, 32V DC. Victron 6-way MEGA fuse holder ~$36. Good for branch circuit protection (charge controller output, DC-DC converter input). Lower AIC than ANL or Class-T — only use where battery fault current is limited. Littelf", "fullNote": "Victron MEGA fuses: 100A-300A, 32V DC. Victron 6-way MEGA fuse holder ~$36. Good for branch circuit protection (charge controller output, DC-DC converter input). Lower AIC than ANL or Class-T — only use where battery fault current is limited. Littelfuse 298 series ~$8-12 each from Mouser/DigiKey. Color-coded by amperage for easy identification."}, {"sym": "MRBF_FUSE", "price": 18, "range": "$12-25", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Blue Sea 5191-5194 MRBF (Marine Rated Battery Fuse): 100A=$12-16, 200A=$16-22, 300A=$20-25. 58V DC, AIC 10,000A. Mounts DIRECTLY on battery terminal — no cable between battery and fuse. Terminal fuse block ~$20-25. Best for individual battery protect", "fullNote": "Blue Sea 5191-5194 MRBF (Marine Rated Battery Fuse): 100A=$12-16, 200A=$16-22, 300A=$20-25. 58V DC, AIC 10,000A. Mounts DIRECTLY on battery terminal — no cable between battery and fuse. Terminal fuse block ~$20-25. Best for individual battery protection in parallel banks. Each parallel battery should have its own MRBF at the positive terminal. Compact and ignition-protected."}, {"sym": "SURGE_PROTECTOR", "price": 90, "range": "$55-115", "unit": "USD", "conf": "high", "safety": true, "cat": "⚡ Electricity", "note": "MidNite Solar MNSPD-300-DC Type 2 surge protector ~$83-95 (300VDC, 50kA, DIN rail). MNSPD-300-AC for inverter AC side ~$83-95. Delta LA-602DC lightning arrestor ~$55-75 (600VDC spark gap). Required in lightning-prone areas — Panama qualifies. Install", "fullNote": "MidNite Solar MNSPD-300-DC Type 2 surge protector ~$83-95 (300VDC, 50kA, DIN rail). MNSPD-300-AC for inverter AC side ~$83-95. Delta LA-602DC lightning arrestor ~$55-75 (600VDC spark gap). Required in lightning-prone areas — Panama qualifies. Install at array combiner box and at inverter AC input. Must be connected to the same ground rod as the rest of the system. Replace after any lightning event."}, {"sym": "GROUND_ROD", "price": 20, "range": "$14-65", "unit": "USD", "conf": "high", "safety": true, "cat": "⚡ Electricity", "note": "Copper-clad ground rod 5/8\" x 8' ~$18-25 (Home Depot). Solid copper $45-65. NEC requires minimum 8ft rod, driven fully into earth. If rock prevents full depth, bury horizontally at 30\" minimum. Must be at least 6ft from other ground rods. Two rods 6f", "fullNote": "Copper-clad ground rod 5/8\" x 8' ~$18-25 (Home Depot). Solid copper $45-65. NEC requires minimum 8ft rod, driven fully into earth. If rock prevents full depth, bury horizontally at 30\" minimum. Must be at least 6ft from other ground rods. Two rods 6ft+ apart recommended for off-grid systems (lower resistance). In dry/sandy soils, use chemical ground rod (copper tube with salt filling) or longer rods."}, {"sym": "GROUNDING_WIRE", "price": 1.5, "range": "$1.2-3.0", "unit": "USD", "conf": "high", "safety": true, "cat": "⚡ Electricity", "note": "Bare copper grounding wire #6 AWG ~$1.20-1.80/ft. #4 AWG ~$2.00-3.00/ft. NEC Table 250.122: equipment ground follows breaker size (100A breaker = 8 AWG min). Grounding electrode conductor per NEC 250.66: 4 AWG minimum for typical off-grid service. Al", "fullNote": "Bare copper grounding wire #6 AWG ~$1.20-1.80/ft. #4 AWG ~$2.00-3.00/ft. NEC Table 250.122: equipment ground follows breaker size (100A breaker = 8 AWG min). Grounding electrode conductor per NEC 250.66: 4 AWG minimum for typical off-grid service. All metal components (panel frames, racking, inverter chassis, battery enclosure) must be bonded to ground. Single-point grounding — ONE bond between DC negative and earth."}, {"sym": "GROUND_BUSBAR", "price": 40, "range": "$28-55", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Blue Sea 2304 20-terminal ground busbar ~$45-55. Blue Sea 2301 10-terminal ~$28-35. Central point where all equipment grounds and the grounding electrode conductor connect. Use separate busbars for DC negative and equipment ground — do NOT use the ne", "fullNote": "Blue Sea 2304 20-terminal ground busbar ~$45-55. Blue Sea 2301 10-terminal ~$28-35. Central point where all equipment grounds and the grounding electrode conductor connect. Use separate busbars for DC negative and equipment ground — do NOT use the negative busbar as the ground busbar. Mount in accessible location inside power center. Label clearly: 'EQUIPMENT GROUND — DO NOT DISCONNECT'."}, {"sym": "PANEL_GROUNDING", "price": 8, "range": "$5-10", "unit": "USD", "conf": "high", "safety": true, "cat": "⚡ Electricity", "note": "IronRidge XR-LUG-04-A1 grounding lug ~$7. PV-LUG-02-A1 ~$9. One grounding lug per panel bonds the aluminum frame to the grounding conductor. WEEB (Washer, Electrical Equipment Bond) clips also available — pierces anodized coating for electrical conti", "fullNote": "IronRidge XR-LUG-04-A1 grounding lug ~$7. PV-LUG-02-A1 ~$9. One grounding lug per panel bonds the aluminum frame to the grounding conductor. WEEB (Washer, Electrical Equipment Bond) clips also available — pierces anodized coating for electrical continuity. All panels in an array MUST be bonded together and connected to the system ground. Ungrounded arrays (common in transformerless systems) still require equipment grounding of frames."}, {"sym": "LEAD_ACID_BATTERY", "price": 130, "range": "$100-180", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Crown deep-cycle flooded lead-acid ~$130 for 100Ah. Cycle life: 300-500 cycles at 50% depth-of-discharge (DoD). Specific energy: 30-40 Wh/kg (heavy). Cheapest upfront but highest lifetime cost. Requires maintenance (topping distilled water, equalizat", "fullNote": "Crown deep-cycle flooded lead-acid ~$130 for 100Ah. Cycle life: 300-500 cycles at 50% depth-of-discharge (DoD). Specific energy: 30-40 Wh/kg (heavy). Cheapest upfront but highest lifetime cost. Requires maintenance (topping distilled water, equalization charging). Produces hydrogen gas (ventilation required). Self-discharge: 3-20%/month. Do not discharge below 50% or sulfation kills the battery."}, {"sym": "AGM_BATTERY", "price": 200, "range": "$170-260", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "UPG 100Ah AGM (Absorbent Glass Mat) ~$200. Cycle life: 400-600 cycles at 50% DoD. Sealed/valve-regulated — no watering, no gas venting. Good for indoor use, RVs, and marine. Better vibration resistance than flooded. Charges slightly faster. Lower sel", "fullNote": "UPG 100Ah AGM (Absorbent Glass Mat) ~$200. Cycle life: 400-600 cycles at 50% DoD. Sealed/valve-regulated — no watering, no gas venting. Good for indoor use, RVs, and marine. Better vibration resistance than flooded. Charges slightly faster. Lower self-discharge (1-3%/month). Still shouldn't discharge below 50%. More expensive per Ah than flooded."}, {"sym": "LIFEPO4_DIY", "price": 200, "range": "$140-240", "unit": "USD", "conf": "medium", "safety": false, "cat": "⚡ Electricity", "note": "DIY LiFePO4 battery: 4x 100Ah prismatic cells in series (12V nominal) + BMS (battery management system). Cycle life: 3,000-5,000+ cycles at 80% DoD (10x lead-acid). Specific energy: 90-120 Wh/kg (3x better than lead-acid). Weight: 12-15kg for 100Ah v", "fullNote": "DIY LiFePO4 battery: 4x 100Ah prismatic cells in series (12V nominal) + BMS (battery management system). Cycle life: 3,000-5,000+ cycles at 80% DoD (10x lead-acid). Specific energy: 90-120 Wh/kg (3x better than lead-acid). Weight: 12-15kg for 100Ah vs 25-30kg lead-acid. BMS protects against over/under-voltage, over-current, cell imbalance. Requires cell compression and balancing."}, {"sym": "LIFEPO4_DROPIN", "price": 350, "range": "$250-380", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Renogy 100Ah drop-in LiFePO4 battery ~$350 (2026 market pricing — prices have stabilized after the 2024-25 lithium glut). Pre-assembled with internal BMS. Cycle life: 2,000-5,000 cycles to 80% capacity remaining. Charge to 100% every cycle with no da", "fullNote": "Renogy 100Ah drop-in LiFePO4 battery ~$350 (2026 market pricing — prices have stabilized after the 2024-25 lithium glut). Pre-assembled with internal BMS. Cycle life: 2,000-5,000 cycles to 80% capacity remaining. Charge to 100% every cycle with no damage (lead-acid can't do this). Usable capacity: 80-100% vs 50% for lead-acid, so a 100Ah LiFePO4 effectively delivers twice the usable energy of a 100Ah lead-acid. Lighter, no maintenance, 10+ year life."}, {"sym": "SODIUM_ION", "price": 400, "range": "$300-600", "unit": "USD", "conf": "medium", "safety": false, "cat": "⚡ Electricity", "note": "Sodium-ion (Na-ion) batteries — emerging technology under $500/kWh. Uses abundant sodium instead of lithium (no cobalt supply issues). Lower energy density than LiFePO4 (100-150 Wh/kg vs 90-172 for LFP). Strong cycle life (2,000-4,000 cycles). Excell", "fullNote": "Sodium-ion (Na-ion) batteries — emerging technology under $500/kWh. Uses abundant sodium instead of lithium (no cobalt supply issues). Lower energy density than LiFePO4 (100-150 Wh/kg vs 90-172 for LFP). Strong cycle life (2,000-4,000 cycles). Excellent low-temperature performance (operates at -20°C). Not yet widely available for off-grid but promising as lithium alternative."}, {"sym": "BATTERY_ENCLOSURE", "price": 150, "range": "$40-500", "unit": "USD", "conf": "high", "safety": true, "cat": "⚡ Electricity", "note": "NOCO HM318BKS Group 31 vented battery box ~$40-55 (good for 1-2 lead-acid). NEMA 3R steel enclosure 24x24x8\" ~$250-450 for larger banks. Lithium batteries need temperature-controlled enclosure (0-40°C operating, avoid freezing during charging). Vente", "fullNote": "NOCO HM318BKS Group 31 vented battery box ~$40-55 (good for 1-2 lead-acid). NEMA 3R steel enclosure 24x24x8\" ~$250-450 for larger banks. Lithium batteries need temperature-controlled enclosure (0-40°C operating, avoid freezing during charging). Vented enclosures REQUIRED for flooded lead-acid (hydrogen gas). Outdoor enclosures must be NEMA 3R minimum; NEMA 4X for coastal salt air. Fortress Power DuraRack Max for server-rack lithium ~$1,485."}, {"sym": "BATTERY_HEATER", "price": 45, "range": "$25-120", "unit": "USD", "conf": "medium", "safety": false, "cat": "⚡ Electricity", "note": "Kat's 24150 150W silicone heating pad ~$45-60 (11x15\"). Kat's 24050 50W smaller pad ~$30-40. Facon 12V self-adhesive pad ~$25-35. CRITICAL for LiFePO4 — charging below 0°C permanently damages cells (lithium plating). Heater + temperature controller i", "fullNote": "Kat's 24150 150W silicone heating pad ~$45-60 (11x15\"). Kat's 24050 50W smaller pad ~$30-40. Facon 12V self-adhesive pad ~$25-35. CRITICAL for LiFePO4 — charging below 0°C permanently damages cells (lithium plating). Heater + temperature controller is mandatory in cold climates. Battle Born BBEBH external heater kit ~$80-120. Some premium batteries (Relion, Discover AES) have built-in heaters."}, {"sym": "TEMP_CONTROLLER", "price": 25, "range": "$10-45", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Inkbird ITC-1000 12V/24V digital thermostat ~$15-25. Bayite BTC211 12V thermostat ~$10-18. Turns battery heater on below setpoint (typically 5°C/41°F), off above (typically 10°C/50°F). Dual-output models can also control cooling fans for hot climates", "fullNote": "Inkbird ITC-1000 12V/24V digital thermostat ~$15-25. Bayite BTC211 12V thermostat ~$10-18. Turns battery heater on below setpoint (typically 5°C/41°F), off above (typically 10°C/50°F). Dual-output models can also control cooling fans for hot climates. Place temperature probe on battery case, not ambient air. Inkbird ITC-308 for 110V AC heater control ~$35-45."}, {"sym": "BMS_UNIT", "price": 80, "range": "$50-150", "unit": "USD", "conf": "medium", "safety": true, "cat": "⚡ Electricity", "note": "DALY 4S 100A LiFePO4 BMS ~$50-80. JBD Smart BMS with Bluetooth ~$80-120. Overkill Solar 4S 120A BMS ~$110-140 (US-stocked, tested). BMS protects: over-voltage (3.65V/cell), under-voltage (2.5V/cell), over-current, short circuit, and temperature limit", "fullNote": "DALY 4S 100A LiFePO4 BMS ~$50-80. JBD Smart BMS with Bluetooth ~$80-120. Overkill Solar 4S 120A BMS ~$110-140 (US-stocked, tested). BMS protects: over-voltage (3.65V/cell), under-voltage (2.5V/cell), over-current, short circuit, and temperature limits. Passive balancing (burns off excess from highest cell). Active balancing BMS (redistributes charge) costs 2-3x more. For DIY LiFePO4 builds — drop-in batteries have integrated BMS."}, {"sym": "BATTERY_SERIES_WIRING", "price": 30, "range": "$20-60", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Series jumper cables: 2 AWG custom-cut interconnects ~$15-30/pair. Wiring batteries in series: positive of battery 1 to negative of battery 2. Voltage adds (12V+12V=24V, 4x12V=48V), Ah stays same. All batteries MUST be identical: chemistry, capacity,", "fullNote": "Series jumper cables: 2 AWG custom-cut interconnects ~$15-30/pair. Wiring batteries in series: positive of battery 1 to negative of battery 2. Voltage adds (12V+12V=24V, 4x12V=48V), Ah stays same. All batteries MUST be identical: chemistry, capacity, age, brand. Tighten terminals to 6-8 Nm (50-70 in-lb). Label each battery position (B1, B2...). Torque specs: flooded lead-acid 6-8 Nm, AGM 8-10 Nm, LiFePO4 follow manufacturer spec precisely."}, {"sym": "BATTERY_PARALLEL_WIRING", "price": 50, "range": "$30-100", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Parallel cables + busbar setup. Amp-hours add, voltage stays same. Use BUS BAR topology (each battery wired independently to common busbars, equal cable lengths) — NOT daisy-chain (causes unequal current sharing, end batteries fail first). Cable size", "fullNote": "Parallel cables + busbar setup. Amp-hours add, voltage stays same. Use BUS BAR topology (each battery wired independently to common busbars, equal cable lengths) — NOT daisy-chain (causes unequal current sharing, end batteries fail first). Cable size per battery: total load amps ÷ number of batteries × 1.25 safety. Fuse each battery at positive terminal (MRBF recommended). Max 4 parallel strings recommended without active balancing."}, {"sym": "BATTERY_CABLE", "price": 8, "range": "$5-25", "unit": "USD", "conf": "high", "safety": true, "cat": "⚡ Electricity", "note": "Fine-stranded welding/battery cable per foot. 2 AWG ~$5/ft, 1/0 AWG ~$8/ft, 2/0 AWG ~$10/ft, 4/0 AWG ~$15/ft. Use Class K or M stranding for flexibility. THHN is too stiff for battery connections. Size for inverter SURGE current (3000W inverter at 24", "fullNote": "Fine-stranded welding/battery cable per foot. 2 AWG ~$5/ft, 1/0 AWG ~$8/ft, 2/0 AWG ~$10/ft, 4/0 AWG ~$15/ft. Use Class K or M stranding for flexibility. THHN is too stiff for battery connections. Size for inverter SURGE current (3000W inverter at 24V: 278A surge needs 2/0 AWG for <6ft run). Keep battery cables as short as physically possible (max 10ft one-way). Color code: red=positive, black=negative. NEVER use black for positive."}, {"sym": "PWM_CONTROLLER", "price": 25, "range": "$15-40", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Renogy Wanderer 20A PWM charge controller ~$30. Pulse-Width Modulation: simpler/cheaper than MPPT. PWM efficiency: ~70-80% — the panel voltage is pulled down to battery voltage, wasting excess voltage. Best for small systems (<200W) where panel cost ", "fullNote": "Renogy Wanderer 20A PWM charge controller ~$30. Pulse-Width Modulation: simpler/cheaper than MPPT. PWM efficiency: ~70-80% — the panel voltage is pulled down to battery voltage, wasting excess voltage. Best for small systems (<200W) where panel cost is low enough that the losses don't matter. 12/24V auto-detect. PWM is ONLY acceptable with panels whose Vmp closely matches battery voltage (\"12V nominal\" panels ≈ 18V Vmp). Using a \"24V\" panel with PWM on 12V wastes ~65% of power."}, {"sym": "MPPT_CONTROLLER", "price": 130, "range": "$100-180", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Victron SmartSolar 75/15 MPPT controller ~$120. 75V max PV input, 15A charge current. 95-99% efficiency. Built-in Bluetooth for phone monitoring. LiFePO4 preset (14.2V absorb, 13.6V float). Pairs with: 1x 100W panel on 12V (220W max at 12V, 440W at 2", "fullNote": "Victron SmartSolar 75/15 MPPT controller ~$120. 75V max PV input, 15A charge current. 95-99% efficiency. Built-in Bluetooth for phone monitoring. LiFePO4 preset (14.2V absorb, 13.6V float). Pairs with: 1x 100W panel on 12V (220W max at 12V, 440W at 24V). Minimum input: battery voltage + 5V to start. Perfect for small cabins, RVs, single-panel setups. PWM alternative costs half but wastes 20-30% of available power."}, {"sym": "MPPT_100_20", "price": 145, "range": "$120-180", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Victron SmartSolar 100/20 ~$140-160. 100V max PV input, 20A charge. Pairs: 290W at 12V, 580W at 24V, 1160W at 48V. Ideal for 2x 100W panels in series (40-44V Vmp) on 12V battery. Or 1x large 350W residential panel (40V Vmp) on 12V. 5-year warranty. V", "fullNote": "Victron SmartSolar 100/20 ~$140-160. 100V max PV input, 20A charge. Pairs: 290W at 12V, 580W at 24V, 1160W at 48V. Ideal for 2x 100W panels in series (40-44V Vmp) on 12V battery. Or 1x large 350W residential panel (40V Vmp) on 12V. 5-year warranty. VE.Smart Networking — wireless sync with other Victron devices."}, {"sym": "MPPT_100_30", "price": 255, "range": "$200-320", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Victron SmartSolar 100/30 ~$255. 100V max PV, 30A charge. Pairs: 440W at 12V, 880W at 24V, 1760W at 48V. THE most common off-grid con  false, "cat": "⚡ Electricity", "note": "Victron Orion-Tr isolated DC-DC converter ~$130. Converts one DC voltage to another (e.g., 12V to 24V, 24V to 12V, or 12V to 5V USB). Isolated models protect sensitive equipment from ground loops. Non-isolated are cheaper but less safe. Critical for ", "fullNote": "Victron Orion-Tr isolated DC-DC converter ~$130. Converts one DC voltage to another (e.g., 12V to 24V, 24V to 12V, or 12V to 5V USB). Isolated models protect sensitive equipment from ground loops. Non-isolated are cheaper but less safe. Critical for vehicle charging (alternator to house battery) — prevents overcharging and provides proper charge profile."}, {"sym": "DC_LOAD_CENTER", "price": 80, "range": "$50-150", "unit": "USD", "conf": "medium", "safety": false, "cat": "⚡ Electricity", "note": "Blue Sea 5025 ST Blade Fuse Block 6-circuit ~$40-50. Blue Sea 5026 12-circuit ~$55-70. DIN rail enclosure with DC breakers ~$100-150. Central panel for DC branch circuits. Each circuit: own fuse/breaker sized at 125% of load. Typical layout: LED ligh", "fullNote": "Blue Sea 5025 ST Blade Fuse Block 6-circuit ~$40-50. Blue Sea 5026 12-circuit ~$55-70. DIN rail enclosure with DC breakers ~$100-150. Central panel for DC branch circuits. Each circuit: own fuse/breaker sized at 125% of load. Typical layout: LED lights (15A, 14 AWG), USB outlets (20A, 12 AWG), water pump (20A, 12 AWG), DC fridge (30A, 10 AWG), fans (15A, 14 AWG). Positive busbar feeds breakers; negative returns to common negative busbar."}, {"sym": "DC_CIRCUIT_LED", "price": 30, "range": "$15-50", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "12V LED lighting circuit: 14-16 AWG wire, 15A fuse, DC-rated switch. LED lights draw minimal current (0.1-0.5A per fixture) — voltage drop is the real concern. Keep under 3% drop: 14 AWG max 23ft at 5A (24V) or 11ft (12V). Use DC-rated switches ONLY ", "fullNote": "12V LED lighting circuit: 14-16 AWG wire, 15A fuse, DC-rated switch. LED lights draw minimal current (0.1-0.5A per fixture) — voltage drop is the real concern. Keep under 3% drop: 14 AWG max 23ft at 5A (24V) or 11ft (12V). Use DC-rated switches ONLY — AC switches arc and weld on DC. PWM dimmers are DC-compatible. Wire in parallel (not series) so each light operates independently."}, {"sym": "DC_CIRCUIT_USB", "price": 25, "range": "$15-40", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "12V USB charging circuit: 12 AWG wire, 20A fuse, quality USB outlet panel ~$15-25. Internal buck converter drops 12V to 5V USB. BEWARE: cheap USB outlets draw 20-50mA constantly (vampire load = 5-12 Wh/day). Quality units (Blue Sea, Scanstrut) draw <", "fullNote": "12V USB charging circuit: 12 AWG wire, 20A fuse, quality USB outlet panel ~$15-25. Internal buck converter drops 12V to 5V USB. BEWARE: cheap USB outlets draw 20-50mA constantly (vampire load = 5-12 Wh/day). Quality units (Blue Sea, Scanstrut) draw <5mA standby. Wire each outlet location as a home run back to the DC load center. Multiple outlets can share a circuit if total load < 80% of fuse rating."}, {"sym": "DC_CIRCUIT_PUMP", "price": 35, "range": "$20-60", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "12V water pump circuit: 12 AWG minimum wire, 20-30A fuse/breaker. Pump surge current 2-3x running — size wire for surge, not running. Wire pump as close to battery/distribution as practical (shortest run). Pressure switch wiring must handle pump inru", "fullNote": "12V water pump circuit: 12 AWG minimum wire, 20-30A fuse/breaker. Pump surge current 2-3x running — size wire for surge, not running. Wire pump as close to battery/distribution as practical (shortest run). Pressure switch wiring must handle pump inrush. Example: Shurflo 12V pump draws 4-8A running, 12-20A surge — 12 AWG handles 20A up to 18ft at 12V. For longer runs, go to 10 AWG."}, {"sym": "PV_WIRE_10AWG", "price": 0.8, "range": "$0.65-0.9", "unit": "USD", "conf": "high", "safety": true, "cat": "⚡ Electricity", "note": "10 AWG PV Wire (USE-2 / Photovoltaic) ~$0.65-0.90/ft. Rated 90°C wet, 105°C dry. UV, moisture, and flame resistant XLPE insulation. REQUIRED for exposed outdoor PV array wiring — THHN is NOT rated for direct sun. Ampacity: 40A at 30°C (derate to 36A ", "fullNote": "10 AWG PV Wire (USE-2 / Photovoltaic) ~$0.65-0.90/ft. Rated 90°C wet, 105°C dry. UV, moisture, and flame resistant XLPE insulation. REQUIRED for exposed outdoor PV array wiring — THHN is NOT rated for direct sun. Ampacity: 40A at 30°C (derate to 36A at 40°C, 32A at 50°C). Use black for negative, red for positive. Available in spools or by-the-foot. For sub-30A systems, 10 AWG is the standard PV wire."}, {"sym": "PV_WIRE_8AWG", "price": 1.5, "range": "$1.2-1.8", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "8 AWG PV Wire ~$1.20-1.80/ft. For larger arrays or long combiner-to-controller runs. Ampacity: 55A at 30°C. Use when 10 AWG voltage drop exceeds 3%. Example: 30A at 100ft one-way on 10 AWG drops 6V — upgrade to 8 AWG for 3.8V drop. Also used as batte", "fullNote": "8 AWG PV Wire ~$1.20-1.80/ft. For larger arrays or long combiner-to-controller runs. Ampacity: 55A at 30°C. Use when 10 AWG voltage drop exceeds 3%. Example: 30A at 100ft one-way on 10 AWG drops 6V — upgrade to 8 AWG for 3.8V drop. Also used as battery cable for small inverters (<1000W at 12V)."}, {"sym": "THHN_WIRE", "price": 1.2, "range": "$0.8-4.5", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "THHN/THWN-2 stranded copper per foot, inside conduit only. 8 AWG ~$0.98/ft, 6 AWG ~$1.20-1.50/ft, 4 AWG ~$2.00-2.50/ft, 2 AWG THHN ~$4.50/ft. NOT rated for direct sun — must be in conduit or indoors. 90°C dry, 75°C wet. Standard for interior wiring, ", "fullNote": "THHN/THWN-2 stranded copper per foot, inside conduit only. 8 AWG ~$0.98/ft, 6 AWG ~$1.20-1.50/ft, 4 AWG ~$2.00-2.50/ft, 2 AWG THHN ~$4.50/ft. NOT rated for direct sun — must be in conduit or indoors. 90°C dry, 75°C wet. Standard for interior wiring, conduit runs, and AC circuits. Color code: black/red for hot, white for neutral (AC), green for ground. MTW (Machine Tool Wire) variant has finer stranding."}, {"sym": "MC4_CONNECTOR", "price": 2.5, "range": "$2.0-5.0", "unit": "USD", "conf": "high", "safety": true, "cat": "⚡ Electricity", "note": "Per connector (male or female). Staubli MC4 ~$2.38 at NAZ Solar Electric. BougeRV 10-pair kit ~$25-35. Rated 30A, 1000V DC (IEC). Contact resistance <0.5 mΩ when properly crimped. CRITICAL: use MC4-specific crimping tool — generic crimpers create poo", "fullNote": "Per connector (male or female). Staubli MC4 ~$2.38 at NAZ Solar Electric. BougeRV 10-pair kit ~$25-35. Rated 30A, 1000V DC (IEC). Contact resistance <0.5 mΩ when properly crimped. CRITICAL: use MC4-specific crimping tool — generic crimpers create poor connections that overheat. Never mix brands (intermateability not guaranteed). UV-stabilized housing but inspect annually for cracking. MC4 unlocking tool ~$4-5 required to disconnect."}, {"sym": "MC4_CRIMPER", "price": 45, "range": "$35-55", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "iCrimp IWS-254B MC4 crimping tool ~$35-50. BougeRV MC4 crimper kit ~$40-55. Dedicated dies for 14, 12, and 10 AWG PV wire. Professional Staubli PV-CZM-64100 ~$769 (overkill for DIY). Crimp inspection: no exposed strands, crimp centered on barrel, no ", "fullNote": "iCrimp IWS-254B MC4 crimping tool ~$35-50. BougeRV MC4 crimper kit ~$40-55. Dedicated dies for 14, 12, and 10 AWG PV wire. Professional Staubli PV-CZM-64100 ~$769 (overkill for DIY). Crimp inspection: no exposed strands, crimp centered on barrel, no insulation in crimp zone. After crimping: tug test (firm pull — shouldn't release), then insert into MC4 housing until click, tighten compression nut."}, {"sym": "CABLE_ENTRY", "price": 25, "range": "$15-55", "unit": "USD", "conf": "medium", "safety": false, "cat": "⚡ Electricity", "note": "SolaDeck 0799 roof junction box ~$35-55. Heyco Solar Junction Box ~$15-25. Waterproof cable entry point where PV wires enter the building. Must be flashed and sealed like any roof penetration. Includes strain relief for cables and terminals for trans", "fullNote": "SolaDeck 0799 roof junction box ~$35-55. Heyco Solar Junction Box ~$15-25. Waterproof cable entry point where PV wires enter the building. Must be flashed and sealed like any roof penetration. Includes strain relief for cables and terminals for transitioning from PV wire to indoor-rated wire. One per array string group. Minimum NEMA 3R rating."}, {"sym": "CONDUIT_EMT", "price": 10, "range": "$8-30", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "EMT (Electrical Metallic Tubing) per 10ft stick: 3/4\" ~$8-12, 1\" ~$12-18, 1-1/2\" ~$22-30 (Home Depot). Steel conduit for indoor and protected outdoor runs. Requires connectors, couplings, and bends. Must be properly grounded (bonded at each end). Use", "fullNote": "EMT (Electrical Metallic Tubing) per 10ft stick: 3/4\" ~$8-12, 1\" ~$12-18, 1-1/2\" ~$22-30 (Home Depot). Steel conduit for indoor and protected outdoor runs. Requires connectors, couplings, and bends. Must be properly grounded (bonded at each end). Use rain-tight fittings for outdoor EMT. Conduit fill: max 40% for 3+ wires (NEC Chapter 9). For PV circuits, transition from PV wire to THHN inside conduit at junction box."}, {"sym": "CONDUIT_PVC", "price": 8, "range": "$6-20", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "PVC Schedule 40 conduit per 10ft: 3/4\" ~$6-9, 1\" ~$8-13. Schedule 80 (thicker wall): 1\" ~$14-20. PVC is corrosion-proof — better than EMT for coastal/humid environments like Panama. Can be direct-buried (18\" minimum cover). PVC cement joins sections.", "fullNote": "PVC Schedule 40 conduit per 10ft: 3/4\" ~$6-9, 1\" ~$8-13. Schedule 80 (thicker wall): 1\" ~$14-20. PVC is corrosion-proof — better than EMT for coastal/humid environments like Panama. Can be direct-buried (18\" minimum cover). PVC cement joins sections. MUST include expansion joints on long runs (>25ft) — PVC expands 3.6mm per 10°C per 30m. Use PVC-compatible fittings only."}, {"sym": "LIQUID_TIGHT", "price": 2, "range": "$1.5-2.5", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Liquid-tight flexible conduit ~$1.50-2.50/ft. Non-metallic (LFNC) or metallic (LFMC). Used for final connections to equipment that may vibrate (inverter, generator). Not for long runs — maximum 6ft per NEC for LFNC. Waterproof with proper liquid-tigh", "fullNote": "Liquid-tight flexible conduit ~$1.50-2.50/ft. Non-metallic (LFNC) or metallic (LFMC). Used for final connections to equipment that may vibrate (inverter, generator). Not for long runs — maximum 6ft per NEC for LFNC. Waterproof with proper liquid-tight connectors. Essential for connecting fixed conduit to battery enclosures, inverter cabinets, and generators."}, {"sym": "WIRE_GAUGE_12V", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "WIRE GAUGE TABLE for 12V DC at 3% voltage drop (one-way distance in feet). 5A: 14 AWG=11ft, 12 AWG=18ft, 10 AWG=28ft, 8 AWG=45ft, 6 AWG=72ft. 10A: 14 AWG not recommended, 12 AWG=9ft, 10 AWG=14ft, 8 AWG=22ft, 6 AWG=36ft, 4 AWG=57ft. 20A: 10 AWG=7ft, 8", "fullNote": "WIRE GAUGE TABLE for 12V DC at 3% voltage drop (one-way distance in feet). 5A: 14 AWG=11ft, 12 AWG=18ft, 10 AWG=28ft, 8 AWG=45ft, 6 AWG=72ft. 10A: 14 AWG not recommended, 12 AWG=9ft, 10 AWG=14ft, 8 AWG=22ft, 6 AWG=36ft, 4 AWG=57ft. 20A: 10 AWG=7ft, 8 AWG=11ft, 6 AWG=18ft, 4 AWG=28ft, 2 AWG=45ft. 30A: 8 AWG=7ft, 6 AWG=12ft, 4 AWG=19ft, 2 AWG=30ft. 50A: 6 AWG=7ft, 4 AWG=11ft, 2 AWG=18ft, 1/0 AWG=29ft. This is why 12V systems need FAT wires. Double the distance for 24V, quadruple for 48V."}, {"sym": "WIRE_GAUGE_24V", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "WIRE GAUGE TABLE for 24V DC at 3% voltage drop (one-way distance in feet). 10A: 14 AWG=23ft, 12 AWG=36ft, 10 AWG=57ft, 8 AWG=91ft, 6 AWG=145ft. 20A: 12 AWG=18ft, 10 AWG=28ft, 8 AWG=45ft, 6 AWG=72ft, 4 AWG=115ft. 30A: 10 AWG=19ft, 8 AWG=30ft, 6 AWG=48", "fullNote": "WIRE GAUGE TABLE for 24V DC at 3% voltage drop (one-way distance in feet). 10A: 14 AWG=23ft, 12 AWG=36ft, 10 AWG=57ft, 8 AWG=91ft, 6 AWG=145ft. 20A: 12 AWG=18ft, 10 AWG=28ft, 8 AWG=45ft, 6 AWG=72ft, 4 AWG=115ft. 30A: 10 AWG=19ft, 8 AWG=30ft, 6 AWG=48ft, 4 AWG=76ft, 2 AWG=121ft. 50A: 8 AWG=18ft, 6 AWG=29ft, 4 AWG=46ft, 2 AWG=73ft, 1/0 AWG=116ft. 24V is the sweet spot: manageable wire sizes for most home-scale off-grid."}, {"sym": "WIRE_GAUGE_48V", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "WIRE GAUGE TABLE for 48V DC at 3% voltage drop (one-way distance in feet). 10A: 14 AWG=46ft, 12 AWG=73ft, 10 AWG=115ft, 8 AWG=182ft, 6 AWG=290ft. 20A: 12 AWG=36ft, 10 AWG=57ft, 8 AWG=91ft, 6 AWG=145ft, 4 AWG=230ft. 30A: 10 AWG=38ft, 8 AWG=60ft, 6 AWG", "fullNote": "WIRE GAUGE TABLE for 48V DC at 3% voltage drop (one-way distance in feet). 10A: 14 AWG=46ft, 12 AWG=73ft, 10 AWG=115ft, 8 AWG=182ft, 6 AWG=290ft. 20A: 12 AWG=36ft, 10 AWG=57ft, 8 AWG=91ft, 6 AWG=145ft, 4 AWG=230ft. 30A: 10 AWG=38ft, 8 AWG=60ft, 6 AWG=96ft, 4 AWG=153ft. 50A: 8 AWG=36ft, 6 AWG=58ft, 4 AWG=92ft, 2 AWG=146ft. 48V systems run on much thinner (cheaper) wire — the #1 cost advantage of higher voltage."}, {"sym": "WIRING_SERIES", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "SERIES PANEL WIRING: Connect positive of panel 1 to negative of panel 2. Voltage adds (N × Vmp), current stays same. Advantages: higher voltage = lower current = less I²R loss = thinner wire possible. MPPT controllers love higher voltage input (wider", "fullNote": "SERIES PANEL WIRING: Connect positive of panel 1 to negative of panel 2. Voltage adds (N × Vmp), current stays same. Advantages: higher voltage = lower current = less I²R loss = thinner wire possible. MPPT controllers love higher voltage input (wider buck range). Disadvantages: one shaded panel reduces whole string output; bypass diodes help but can't fully compensate. Cold-weather Voc rise must stay below controller max input. For MPPT controllers, series-first is generally best. For PWM, NEVER series '12V' panels."}, {"sym": "WIRING_PARALLEL", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "PARALLEL PANEL WIRING: Connect all positives together, all negatives together. Voltage stays same, current adds (N × Imp). Advantages: shading-tolerant (shaded panel doesn't drag others down), lower voltages safer to work with. Disadvantages: higher ", "fullNote": "PARALLEL PANEL WIRING: Connect all positives together, all negatives together. Voltage stays same, current adds (N × Imp). Advantages: shading-tolerant (shaded panel doesn't drag others down), lower voltages safer to work with. Disadvantages: higher current = thicker wire needed, more I²R loss. Each parallel string of 2+ panels in a parallel array needs its own fuse at the combiner. REQUIRED for PWM controllers (must match panel Vmp to battery voltage). MC4 branch connectors (1F-2M Y-adapters) simplify parallel."}, {"sym": "WIRING_SERIES_PARALLEL", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "SERIES-PARALLEL (Ns×Np): Panels in series strings, then those strings paralleled at combiner. Example 2S2P (4 panels): 2 in series creates 40V@5A string, 2 such strings paralleled = 40V@10A. Example 3S2P (6 panels): 3 in series = 90V@8.3A, 2 strings ", "fullNote": "SERIES-PARALLEL (Ns×Np): Panels in series strings, then those strings paralleled at combiner. Example 2S2P (4 panels): 2 in series creates 40V@5A string, 2 such strings paralleled = 40V@10A. Example 3S2P (6 panels): 3 in series = 90V@8.3A, 2 strings = 90V@16.6A. This balances voltage and current — the most common topology for MPPT systems. Each parallel string needs individual fuse. Design rule: max series number keeps Voc × 1.19 (cold factor) under controller limit."}, {"sym": "VOLTAGE_DROP_FORMULA", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "VOLTAGE DROP FORMULA: V_drop = 2 × R_per_1000ft × (L/1000) × I. Where R_per_1000ft at 20°C: 10 AWG=1.0Ω, 8 AWG=0.63Ω, 6 AWG=0.40Ω, 4 AWG=0.25Ω, 2 AWG=0.16Ω, 1/0 AWG=0.10Ω, 2/0 AWG=0.08Ω. Multiply by 2 for round-trip. Add 20% for 50°C conductor temp. ", "fullNote": "VOLTAGE DROP FORMULA: V_drop = 2 × R_per_1000ft × (L/1000) × I. Where R_per_1000ft at 20°C: 10 AWG=1.0Ω, 8 AWG=0.63Ω, 6 AWG=0.40Ω, 4 AWG=0.25Ω, 2 AWG=0.16Ω, 1/0 AWG=0.10Ω, 2/0 AWG=0.08Ω. Multiply by 2 for round-trip. Add 20% for 50°C conductor temp. Target: <3% voltage drop for feeders, <2% for battery-inverter. Example: 20A on 10 AWG, 50ft one-way: 2 × 1.0/1000 × 50 × 20 = 2.0V. On 12V system = 16.7% — UNACCEPTABLE. Same on 48V = 4.2% — marginal. High voltage wins."}, {"sym": "INVERTER_1500W", "price": 320, "range": "$250-450", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Samlex PST-1500-12 pure sine wave inverter ~$350. 1500W continuous, 3000W peak surge. Pure sine wave is essential for sensitive electronics (motors, pumps, computers, medical devices) — modified sine wave can cause buzzing, overheating, or damage. 15", "fullNote": "Samlex PST-1500-12 pure sine wave inverter ~$350. 1500W continuous, 3000W peak surge. Pure sine wave is essential for sensitive electronics (motors, pumps, computers, medical devices) — modified sine wave can cause buzzing, overheating, or damage. 1500W runs: fridge (600-800W surge), lights, laptop, TV, phone charging. ~90% efficiency at full load. Pair with 24V battery if possible (lower DC current)."}, {"sym": "INVERTER_3000W", "price": 600, "range": "$450-900", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Growatt 3000W pure sine inverter ~$500. Powers well pump, washer, larger tools simultaneously. 3000W handles: well pump (1500-3000W surge), fridge, lights, freezer, microwave. Requires 250-300Ah battery bank at 12V (or 125-150Ah at 24V). Low-frequenc", "fullNote": "Growatt 3000W pure sine inverter ~$500. Powers well pump, washer, larger tools simultaneously. 3000W handles: well pump (1500-3000W surge), fridge, lights, freezer, microwave. Requires 250-300Ah battery bank at 12V (or 125-150Ah at 24V). Low-frequency inverters handle motor surge better than high-frequency; they're heavier but more durable."}, {"sym": "INVERTER_CHARGER", "price": 900, "range": "$600-1,500", "unit": "USD", "conf": "medium", "safety": false, "cat": "⚡ Electricity", "note": "Victron MultiPlus 3000 inverter/charger ~$950. Combines inverter + battery charger + transfer switch in one unit. When generator or grid power is present: passes through to loads AND charges batteries. When absent: inverts DC to AC. Transfer switch t", "fullNote": "Victron MultiPlus 3000 inverter/charger ~$950. Combines inverter + battery charger + transfer switch in one unit. When generator or grid power is present: passes through to loads AND charges batteries. When absent: inverts DC to AC. Transfer switch time: ~20ms (fast enough computers don't reboot). Programmable — can limit AC input to prevent generator overload."}, {"sym": "INVERTER_12V_LIMIT", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "INVERTER CURRENT AT 12V — why you shouldn't go past 2000W on 12V. 1000W inverter draws 100A at 12V (83A with 90% eff). 2000W draws 200A. 3000W draws 300A — needs 4/0 AWG cable (thick as your thumb) and massive battery bank. The voltage drop on cables", "fullNote": "INVERTER CURRENT AT 12V — why you shouldn't go past 2000W on 12V. 1000W inverter draws 100A at 12V (83A with 90% eff). 2000W draws 200A. 3000W draws 300A — needs 4/0 AWG cable (thick as your thumb) and massive battery bank. The voltage drop on cables becomes unmanageable. Rule: inverters >2000W should use 24V battery minimum; >4000W should use 48V. This is the single most important voltage decision in system design."}, {"sym": "MANUAL_TRANSFER", "price": 60, "range": "$25-350", "unit": "USD", "conf": "high", "safety": true, "cat": "⚡ Electricity", "note": "Baomain 63A 2-pole rotary changeover switch ~$25-40 (budget off-grid). Blue Sea 9010 65A AC rotary ~$65-85 (marine-grade). Reliance Controls 310CRK 30A 10-circuit ~$280-350 (whole-house). Manual transfer switches safely isolate inverter and generator", "fullNote": "Baomain 63A 2-pole rotary changeover switch ~$25-40 (budget off-grid). Blue Sea 9010 65A AC rotary ~$65-85 (marine-grade). Reliance Controls 310CRK 30A 10-circuit ~$280-350 (whole-house). Manual transfer switches safely isolate inverter and generator/grid — prevents backfeed which can KILL line workers. Must be break-before-make. Clearly label positions: 'INVERTER' / 'OFF' / 'GENERATOR'. For simple systems, a single-load rotary switch works; for whole-house, use a multi-circuit panel."}, {"sym": "AUTO_TRANSFER", "price": 500, "range": "$120-800", "unit": "USD", "conf": "medium", "safety": true, "cat": "⚡ Electricity", "note": "Generac RXSW100A3 100A automatic transfer switch ~$400-550. Tigo TSS-200-US 200A ATS ~$1,833. Automatically switches from inverter to generator/grid when voltage drops. Includes delay timers to prevent nuisance switching. Required for unattended syst", "fullNote": "Generac RXSW100A3 100A automatic transfer switch ~$400-550. Tigo TSS-200-US 200A ATS ~$1,833. Automatically switches from inverter to generator/grid when voltage drops. Includes delay timers to prevent nuisance switching. Required for unattended systems. MOES 50A dual-power ATS ~$80-120 for smaller off-grid/RV use. Must be listed for the application. Some inverter-chargers (Victron MultiPlus) have built-in transfer — no external ATS needed."}, {"sym": "GEN_AUTOSTART", "price": 250, "range": "$200-400", "unit": "USD", "conf": "medium", "safety": false, "cat": "⚡ Electricity", "note": "Magnum ME-AGS-N Automatic Generator Start ~$257. Atkinson GSCM-Mini ~$200-260. Deep Sea DSE 7310 ~$300-400. Automatically starts generator when battery voltage drops below setpoint (and stops when charged). Requires generator with electric start and ", "fullNote": "Magnum ME-AGS-N Automatic Generator Start ~$257. Atkinson GSCM-Mini ~$200-260. Deep Sea DSE 7310 ~$300-400. Automatically starts generator when battery voltage drops below setpoint (and stops when charged). Requires generator with electric start and autochoke. Install CO detector in generator enclosure. Configure: low-voltage start (e.g., 24.0V for 24V LiFePO4), high-voltage stop (e.g., 28.0V), minimum run time (30 min), cool-down period. Monthly test recommended."}, {"sym": "BATTERY_MONITOR", "price": 110, "range": "$50-130", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Victron BMV-712 SmartShunt ~$120. Precision shunt-based battery monitor: measures voltage, current (A), power (kW), consumed Ah, state of charge (%). Essential for LiFePO4 — voltage alone is a poor indicator of SOC (flat voltage curve). Tracks energy", "fullNote": "Victron BMV-712 SmartShunt ~$120. Precision shunt-based battery monitor: measures voltage, current (A), power (kW), consumed Ah, state of charge (%). Essential for LiFePO4 — voltage alone is a poor indicator of SOC (flat voltage curve). Tracks energy in/out over time. Bluetooth to phone for real-time monitoring. Must correctly set battery Ah capacity and Peukert exponent."}, {"sym": "SMART_SHUNT", "price": 135, "range": "$110-160", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Victron SmartShunt 500A ~$130-150. Compact shunt-based monitor without display — all data via Bluetooth phone app. 500A continuous, excellent for larger systems. Also available in 1000A and 2000A versions. Tracks: state of charge, time-to-go, histori", "fullNote": "Victron SmartShunt 500A ~$130-150. Compact shunt-based monitor without display — all data via Bluetooth phone app. 500A continuous, excellent for larger systems. Also available in 1000A and 2000A versions. Tracks: state of charge, time-to-go, historical data (deepest discharge, last full charge). Optional: add temperature sensor for battery temp monitoring. Simpler than BMV-712 (no display to mount) but same accuracy."}, {"sym": "SYSTEM_MONITOR", "price": 300, "range": "$200-500", "unit": "USD", "conf": "medium", "safety": false, "cat": "⚡ Electricity", "note": "Victron Cerbo GX ~$300. Central communication hub: connects all Victron devices (MPPTs, inverters, BMV) and presents unified dashboard via VRM online portal. Touchscreen optional (GX Touch 50 ~$190). Internet-connected via WiFi or cellular — monitor ", "fullNote": "Victron Cerbo GX ~$300. Central communication hub: connects all Victron devices (MPPTs, inverters, BMV) and presents unified dashboard via VRM online portal. Touchscreen optional (GX Touch 50 ~$190). Internet-connected via WiFi or cellular — monitor your system from anywhere. Tracks: solar yield, consumption, battery SOC, generator runtime, historical graphs. Can send email alerts for low battery, overload, or fault conditions. Competitor: MidNite Solar Birmingham ~$175."}, {"sym": "AC_CHARGER", "price": 150, "range": "$100-220", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "NOCO Genius GEN5X2 dual bank charger ~$150. Charges 12V batteries from grid/generator AC. Smart charger: multi-stage (bulk, absorption, float, maintenance) prevents overcharging. Temperature compensation adjusts voltage. Can recover sulfated lead-aci", "fullNote": "NOCO Genius GEN5X2 dual bank charger ~$150. Charges 12V batteries from grid/generator AC. Smart charger: multi-stage (bulk, absorption, float, maintenance) prevents overcharging. Temperature compensation adjusts voltage. Can recover sulfated lead-acid batteries in some cases. Important to match charger type to battery chemistry — LiFePO4 needs a specific LiFePO4 profile."}, {"sym": "ALTERNATOR_CHARGER", "price": 180, "range": "$130-260", "unit": "USD", "conf": "medium", "safety": false, "cat": "⚡ Electricity", "note": "Victron Orion-Tr Smart DC-DC charger ~$200. Charges house battery from vehicle alternator while driving. Most alternators don't output proper charging voltage for house batteries (especially LiFePO4 which needs 14.2-14.6V). This unit: boosts alternat", "fullNote": "Victron Orion-Tr Smart DC-DC charger ~$200. Charges house battery from vehicle alternator while driving. Most alternators don't output proper charging voltage for house batteries (especially LiFePO4 which needs 14.2-14.6V). This unit: boosts alternator voltage, provides proper charge profile, and prevents alternator overheating (current limiting). 12V/12V or 24V/12V models."}, {"sym": "FIRE_EXTINGUISHER", "price": 50, "range": "$35-75", "unit": "USD", "conf": "medium", "safety": true, "cat": "⚡ Electricity", "note": "Automatic fire extinguisher ball (Elide Fire ball) ~$50 — activates by heat (deploys dry powder in 3 seconds). Also: standard ABC-rated 5lb extinguisher for battery area. Lithium battery fires require Class D or specific Li-ion extinguishers (water i", "fullNote": "Automatic fire extinguisher ball (Elide Fire ball) ~$50 — activates by heat (deploys dry powder in 3 seconds). Also: standard ABC-rated 5lb extinguisher for battery area. Lithium battery fires require Class D or specific Li-ion extinguishers (water is dangerous on electrical fires). Mount within arm's reach of battery bank and charge controller. Critical: lithium fires burn at >600°C and produce HF gas."}, {"sym": "GFPD", "price": 60, "range": "$40-100", "unit": "USD", "conf": "high", "safety": true, "cat": "⚡ Electricity", "note": "Ground Fault Protection Device (GFPD). Many MPPT controllers have built-in (MidNite Classic, Outback FlexMax). External unit ~$60-100 if controller lacks it. A 0.5-1A fuse connects negative busbar to earth ground. Normal: no current flows. Ground fau", "fullNote": "Ground Fault Protection Device (GFPD). Many MPPT controllers have built-in (MidNite Classic, Outback FlexMax). External unit ~$60-100 if controller lacks it. A 0.5-1A fuse connects negative busbar to earth ground. Normal: no current flows. Ground fault: current flows through fault to ground, through fuse, completing circuit — fuse blows and LED/alarm activates. Does NOT clear the fault — array may still be energized. Required by NEC 690.41(B) for roof-mounted systems. Test annually."}, {"sym": "AFCI", "price": 150, "range": "$100-250", "unit": "USD", "conf": "medium", "safety": true, "cat": "⚡ Electricity", "note": "Arc-Fault Circuit Interrupter. Required by NEC 690.11 when DC voltage >80V on/penetrating a building. Detects series arcs (loose connection) and parallel arcs (shorted conductors) by their unique frequency signatures. Built into MidNite Classic contr", "fullNote": "Arc-Fault Circuit Interrupter. Required by NEC 690.11 when DC voltage >80V on/penetrating a building. Detects series arcs (loose connection) and parallel arcs (shorted conductors) by their unique frequency signatures. Built into MidNite Classic controllers. External AFCI devices ~$150-250 for systems using controllers without integrated AFCI. Much more common in grid-tie residential; off-grid ground-mount may be exempt depending on AHJ."}, {"sym": "DISCONNECT_DC", "price": 80, "range": "$65-350", "unit": "USD", "conf": "high", "safety": true, "cat": "⚡ Electricity", "note": "IMO DC disconnect 600VDC 32A rotary switch ~$65-95. Square D HU361RB 30A 600VDC fused disconnect ~$250-350. MUST be DC-rated — AC disconnects don't extinguish DC arcs. Place: between PV array and charge controller (lockable for maintenance). Label cl", "fullNote": "IMO DC disconnect 600VDC 32A rotary switch ~$65-95. Square D HU361RB 30A 600VDC fused disconnect ~$250-350. MUST be DC-rated — AC disconnects don't extinguish DC arcs. Place: between PV array and charge controller (lockable for maintenance). Label clearly: 'PV ARRAY DISCONNECT'. Lockable in OFF position. At eye level, accessible, not obstructed. Required by NEC 690.13 for all PV systems."}, {"sym": "DISCONNECT_AC", "price": 20, "range": "$15-30", "unit": "USD", "conf": "high", "safety": true, "cat": "⚡ Electricity", "note": "Eaton DG221NGB 30A AC disconnect ~$15-25 (Home Depot). Standard pull-out or lever-type disconnect between inverter AC output and the house AC distribution panel. Required for safe inverter maintenance. Fused or non-fused. Weatherproof NEMA 3R enclosu", "fullNote": "Eaton DG221NGB 30A AC disconnect ~$15-25 (Home Depot). Standard pull-out or lever-type disconnect between inverter AC output and the house AC distribution panel. Required for safe inverter maintenance. Fused or non-fused. Weatherproof NEMA 3R enclosure for outdoor mounting. Label: 'INVERTER AC DISCONNECT'. Also serves as a rapid shutdown initiation point per NEC 690.12."}, {"sym": "PANEL_CLEANING", "price": 50, "range": "$30-120", "unit": "USD", "conf": "medium", "safety": false, "cat": "⚡ Electricity", "note": "Solar panel cleaning kit: extension pole (6-24ft) ~$40-55, soft brush head ~$15-25, squeegee ~$10-20. Use distilled water (mineral-free) to prevent spotting. Clean when panels are cool (early morning). Dirty panels lose 5-25% output — more in dusty/d", "fullNote": "Solar panel cleaning kit: extension pole (6-24ft) ~$40-55, soft brush head ~$15-25, squeegee ~$10-20. Use distilled water (mineral-free) to prevent spotting. Clean when panels are cool (early morning). Dirty panels lose 5-25% output — more in dusty/dry climates. Panama: frequent rain helps self-cleaning but algae/mold can grow on edges (tropics). Clean every 3-6 months or when output drops below expected. Do NOT use abrasive cleaners, pressure washers, or walk on panels."}, {"sym": "SNOW_REMOVAL", "price": 50, "range": "$25-65", "unit": "USD", "conf": "medium", "safety": false, "cat": "⚡ Electricity", "note": "Snow Joe SJBLZD 24' roof rake ~$40-65. SnoBrum snow rake ~$25-35. Avalanche! roof rake ~$40-55. Soft foam head won't scratch panels. Snow = zero production. At tilt angles >30°, snow slides off naturally. Heated panel de-icing cables ~$60-100 exist b", "fullNote": "Snow Joe SJBLZD 24' roof rake ~$40-65. SnoBrum snow rake ~$25-35. Avalanche! roof rake ~$40-55. Soft foam head won't scratch panels. Snow = zero production. At tilt angles >30°, snow slides off naturally. Heated panel de-icing cables ~$60-100 exist but consume energy you're trying to produce — manual removal is better. Panama relevance: low (tropics) — but applies to highland installations above 2000m."}, {"sym": "TORQUE_WRENCH", "price": 40, "range": "$25-80", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "Inch-pound torque wrench 1/4\" drive ~$25-40. Essential for proper terminal tightening. Solar electrical connections have specific torque specs: battery terminals 6-10 Nm (50-90 in-lb), busbar connections 4-6 Nm (35-50 in-lb), circuit breaker terminal", "fullNote": "Inch-pound torque wrench 1/4\" drive ~$25-40. Essential for proper terminal tightening. Solar electrical connections have specific torque specs: battery terminals 6-10 Nm (50-90 in-lb), busbar connections 4-6 Nm (35-50 in-lb), circuit breaker terminals per manufacturer. Under-torque causes arcing and heat; over-torque strips threads or crushes terminals. Re-torque all connections after 24 hours and first full charge cycle, then every 6 months."}, {"sym": "THERMAL_CAMERA", "price": 200, "range": "$150-400", "unit": "USD", "conf": "medium", "safety": false, "cat": "⚡ Electricity", "note": "FLIR ONE smartphone thermal camera ~$200-300. THE best diagnostic tool for off-grid electrical systems. Scan all connections, breakers, fuses, and MC4 connectors under load — hot spots (>few degrees above ambient) indicate loose/corroded connections.", "fullNote": "FLIR ONE smartphone thermal camera ~$200-300. THE best diagnostic tool for off-grid electrical systems. Scan all connections, breakers, fuses, and MC4 connectors under load — hot spots (>few degrees above ambient) indicate loose/corroded connections. Scan panels for hot spots (microcracks). Scan battery terminals for imbalance. Annual thermal inspection catches problems before they become fires. Budget option: infrared thermometer gun ~$25-50 (less detailed but still useful for spot checks)."}, {"sym": "DUMP_LOAD", "price": 120, "range": "$80-200", "unit": "USD", "conf": "low", "safety": false, "cat": "⚡ Electricity", "note": "Morningstar dump load controller ~$150. Prevents overcharging once batteries are full by diverting excess solar/wind energy to a 'dump' (e.g., heating element in water tank). Essential for wind/hydro (can't just disconnect them). Also makes use of ot", "fullNote": "Morningstar dump load controller ~$150. Prevents overcharging once batteries are full by diverting excess solar/wind energy to a 'dump' (e.g., heating element in water tank). Essential for wind/hydro (can't just disconnect them). Also makes use of otherwise wasted energy. Configurable voltage setpoint. Combined with: water heating element, 12V/24V resistive heater, or dummy load."}, {"sym": "PARALLEL_CONTROLLERS", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "PARALLEL CHARGE CONTROLLERS: When to use multiple controllers. (1) Array current exceeds single controller rating. (2) Multiple roof orientations — east array gets morning sun, west array gets afternoon. Each orientation gets its own MPPT for optimal", "fullNote": "PARALLEL CHARGE CONTROLLERS: When to use multiple controllers. (1) Array current exceeds single controller rating. (2) Multiple roof orientations — east array gets morning sun, west array gets afternoon. Each orientation gets its own MPPT for optimal tracking. (3) Different panel types — old panels and new panels shouldn't share MPPT. (4) Redundancy — if one controller fails, the other still charges. Victron: up to 10 controllers synced via VE.Smart. MidNite: up to 8 Classics in Follow-Me mode. Each controller has its own array; outputs parallel at battery busbar."}, {"sym": "SIZING_SOLAR_ARRAY", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "SOLAR ARRAY SIZING RULE: Daily Wh needed ÷ peak sun hours ÷ 0.7 (system losses). Example: 5000 Wh/day in Panama (4.5 PSH) = 5000 ÷ 4.5 ÷ 0.7 = 1587W array. Round up to nearest panel count. Losses: wire (3%), controller (2-5%), battery round-trip (5-1", "fullNote": "SOLAR ARRAY SIZING RULE: Daily Wh needed ÷ peak sun hours ÷ 0.7 (system losses). Example: 5000 Wh/day in Panama (4.5 PSH) = 5000 ÷ 4.5 ÷ 0.7 = 1587W array. Round up to nearest panel count. Losses: wire (3%), controller (2-5%), battery round-trip (5-10% for LiFePO4, 15-20% for lead-acid), inverter (5-10%), dirt (2-5%), temperature derating (5-15%). Total system losses typically 20-30% — the 0.7 factor accounts for this. Add 20% for rainy season autonomy."}, {"sym": "SIZING_BATTERY_BANK", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "BATTERY BANK SIZING: Daily Wh × autonomy days ÷ DoD ÷ system voltage. Example: 5000 Wh/day, 3-day autonomy, 80% DoD LiFePO4, 48V system = 5000 × 3 ÷ 0.8 ÷ 48 = 390 Ah. Round up to 400Ah at 48V = 19.2 kWh storage. Lead-acid at 50% DoD: 5000 × 3 ÷ 0.5 ", "fullNote": "BATTERY BANK SIZING: Daily Wh × autonomy days ÷ DoD ÷ system voltage. Example: 5000 Wh/day, 3-day autonomy, 80% DoD LiFePO4, 48V system = 5000 × 3 ÷ 0.8 ÷ 48 = 390 Ah. Round up to 400Ah at 48V = 19.2 kWh storage. Lead-acid at 50% DoD: 5000 × 3 ÷ 0.5 ÷ 48 = 625 Ah (50% larger). Autonomy days: 3 for grid-backup, 3-5 for off-grid with generator, 5-7 for pure off-grid no generator. Tropical location (Panama): consider rainy season duration when setting autonomy."}, {"sym": "SIZING_CHARGE_RATE", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "CHARGE RATE SIZING: Controller amps = Array watts ÷ Battery voltage × 1.25. Example: 2100W ÷ 48V × 1.25 = 55A → Victron 150/60 or larger. Minimum charge rate for battery health: lead-acid needs C/10 to C/8 (10-12.5A per 100Ah) to prevent stratificati", "fullNote": "CHARGE RATE SIZING: Controller amps = Array watts ÷ Battery voltage × 1.25. Example: 2100W ÷ 48V × 1.25 = 55A → Victron 150/60 or larger. Minimum charge rate for battery health: lead-acid needs C/10 to C/8 (10-12.5A per 100Ah) to prevent stratification. LiFePO4 can accept C/2 (50A per 100Ah) but C/5 (20A per 100Ah) is gentler. Undersized array = chronically undercharged batteries = premature failure. Oversize the array — you can always shed excess to dump load."}, {"sym": "SIZING_CABLE", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "⚡ Electricity", "note": "CABLE SIZING DECISION TREE: (1) Determine max current (Isc × 1.56 for PV, surge amps for inverter). (2) Measure one-way distance. (3) Calculate minimum AWG for ampacity (NEC 310.16, 75°C column). (4) Calculate AWG for <3% voltage drop. (5) Use the LA", "fullNote": "CABLE SIZING DECISION TREE: (1) Determine max current (Isc × 1.56 for PV, surge amps for inverter). (2) Measure one-way distance. (3) Calculate minimum AWG for ampacity (NEC 310.16, 75°C column). (4) Calculate AWG for <3% voltage drop. (5) Use the LARGER of the two. (6) Derate for temperature: above 30°C, multiply ampacity by 0.91 at 40°C, 0.82 at 50°C. (7) Derate for conduit fill: 4-6 conductors = 80%, 7-9 = 70%. (8) When in doubt, go one size larger — copper is cheaper than replacing burned insulation or lost kWh."}, {"sym": "RAISED_BED", "price": 200, "range": "$100-400", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "Cedar 4x8ft raised bed kit + soil + compost. Cedar lasts 10-15 years (vs 2-3 for untreated pine). A 4x8 bed (32 sq ft) can yield 50-100 lbs of vegetables per season. Filled with 1/3 compost, 1/3 vermiculite/peat, 1/3 topsoil (Mel's Mix). Key advantag", "fullNote": "Cedar 4x8ft raised bed kit + soil + compost. Cedar lasts 10-15 years (vs 2-3 for untreated pine). A 4x8 bed (32 sq ft) can yield 50-100 lbs of vegetables per season. Filled with 1/3 compost, 1/3 vermiculite/peat, 1/3 topsoil (Mel's Mix). Key advantages: no tilling, better drainage, extended season (soil warms earlier), easy to manage weeds and pests."}, {"sym": "FOOD_FOREST", "price": 350, "range": "$200-600", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "3-5 fruit trees (apple, pear, peach, plum — choose disease-resistant varieties for your zone) + berry bushes (blueberry, raspberry, currant) + perennial vegetables (asparagus, rhubarb, artichoke, sorrel). A permaculture food forest mimics natural for", "fullNote": "3-5 fruit trees (apple, pear, peach, plum — choose disease-resistant varieties for your zone) + berry bushes (blueberry, raspberry, currant) + perennial vegetables (asparagus, rhubarb, artichoke, sorrel). A permaculture food forest mimics natural forest layers: canopy, understory, shrub, herbaceous, ground cover, root. Trees take 3-5 years to fruit but produce for decades."}, {"sym": "EARTHWORKS", "price": 250, "range": "$100-1,000", "unit": "USD", "conf": "low", "safety": false, "cat": "🌱 Food", "note": "DIY hand-dug swales: contour ditches that capture rainwater and slowly infiltrate it into the soil. Designed on contour (use a line level or A-frame). Swales recharge groundwater, prevent erosion, and eliminate the need for irrigation in the swale zo", "fullNote": "DIY hand-dug swales: contour ditches that capture rainwater and slowly infiltrate it into the soil. Designed on contour (use a line level or A-frame). Swales recharge groundwater, prevent erosion, and eliminate the need for irrigation in the swale zone. Plant trees/berries on the downhill berm. Heavy labor (4-8 hours per 100ft of swale). Tractor excavation costs more."}, {"sym": "CHICKENS", "price": 350, "range": "$250-600", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "4-bird starter: small coop (2x4ft min, 1 sq ft per bird inside) + 4-5 pullets (young hens) + feeder + waterer + bedding + starter feed. 4 hens lay ~1000-1200 eggs/year (3-4 eggs/day in season). Egg production peaks first 2 years then declines. Breeds", "fullNote": "4-bird starter: small coop (2x4ft min, 1 sq ft per bird inside) + 4-5 pullets (young hens) + feeder + waterer + bedding + starter feed. 4 hens lay ~1000-1200 eggs/year (3-4 eggs/day in season). Egg production peaks first 2 years then declines. Breeds: Rhode Island Red (hardy, dual-purpose), Leghorn (prolific layers), Orpington (cold-hardy, friendly). Supplemental feed cost ~$15-30/month."}, {"sym": "MICROGREENS", "price": 60, "range": "$30-100", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Trays (1020 standard) + potting mix/coco coir + seeds (radish, sunflower, pea, broccoli) + spray bottle or light misting. Harvest in 7-14 days. Nutrient density 5-40x higher than mature vegetables (per gram). Year-round production indoors with minima", "fullNote": "Trays (1020 standard) + potting mix/coco coir + seeds (radish, sunflower, pea, broccoli) + spray bottle or light misting. Harvest in 7-14 days. Nutrient density 5-40x higher than mature vegetables (per gram). Year-round production indoors with minimal light (window or basic LED). One tray per week provides salad greens for 2 people. Very low water usage."}, {"sym": "GREENHOUSE", "price": 500, "range": "$300-1,000", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "8x10ft hoop house kit (PVC or steel frame) + UV-stabilized polyethylene cover. Extends growing season by 4-6 weeks on each end. Protects from frost, wind, and pests. 80 sq ft can produce ~$300-500 worth of food per year. Add automatic vent openers (p", "fullNote": "8x10ft hoop house kit (PVC or steel frame) + UV-stabilized polyethylene cover. Extends growing season by 4-6 weeks on each end. Protects from frost, wind, and pests. 80 sq ft can produce ~$300-500 worth of food per year. Add automatic vent openers (paraffin pistons ~$30) for temperature control. In summer: swap cover for shade cloth (40-60%) to prevent overheating."}, {"sym": "HYDROPONICS", "price": 300, "range": "$100-600", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "NFT (Nutrient Film Technique) or Kratky (non-circulating) hydroponic system: PVC channels + net cups + grow media (clay pebbles) + water pump (NFT) + nutrient solution. 3-5x faster growth vs soil because roots access oxygen and nutrients directly. Us", "fullNote": "NFT (Nutrient Film Technique) or Kratky (non-circulating) hydroponic system: PVC channels + net cups + grow media (clay pebbles) + water pump (NFT) + nutrient solution. 3-5x faster growth vs soil because roots access oxygen and nutrients directly. Uses 90% less water than soil gardening. Requires monitoring pH (5.5-6.5) and EC (electrical conductivity). Best for lettuce, herbs, tomatoes."}, {"sym": "AQUAPONICS", "price": 500, "range": "$400-1,000", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "Combined fish tank + grow bed system: fish waste (ammonia) -> nitrifying bacteria (nitrite -> nitrate) -> plant fertilizer -> clean water returned to fish. Needs: fish tank, grow bed (expanded clay), water pump, fish (tilapia or trout for food, goldf", "fullNote": "Combined fish tank + grow bed system: fish waste (ammonia) -> nitrifying bacteria (nitrite -> nitrate) -> plant fertilizer -> clean water returned to fish. Needs: fish tank, grow bed (expanded clay), water pump, fish (tilapia or trout for food, goldfish as easier starter), nitrifying bacteria (cycle for 4-8 weeks). More complex than hydroponics (need to balance fish feed, water parameters)."}, {"sym": "MUSHROOMS", "price": 120, "range": "$50-250", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Inoculated shiitake logs (drill holes + spawn + wax seal) or oyster mushroom kit (straw + plastic bags + humidity tent). Shiitake on hardwood logs: each log fruits 2-4 lbs/year for 3-5 years. Oyster on straw: 2-3 flushes in 6-8 weeks. Requires high h", "fullNote": "Inoculated shiitake logs (drill holes + spawn + wax seal) or oyster mushroom kit (straw + plastic bags + humidity tent). Shiitake on hardwood logs: each log fruits 2-4 lbs/year for 3-5 years. Oyster on straw: 2-3 flushes in 6-8 weeks. Requires high humidity (80-95%) and indirect light. Can grow in sheds, basements, or shady outdoor spots. High-value crop — $12-20/lb dried."}, {"sym": "COLD_ROOM", "price": 300, "range": "$150-800", "unit": "USD", "conf": "low", "safety": false, "cat": "🌱 Food", "note": "DIY root cellar/cold storage room: insulated space below frost line or in a north-facing hillside. Passive refrigeration: earth temperature stays 50-55°F year-round at 8-12ft depth. Stores root crops (potatoes, carrots, beets, turnips) for 4-8 months", "fullNote": "DIY root cellar/cold storage room: insulated space below frost line or in a north-facing hillside. Passive refrigeration: earth temperature stays 50-55°F year-round at 8-12ft depth. Stores root crops (potatoes, carrots, beets, turnips) for 4-8 months. Requirements: good ventilation (intake low, exhaust high), high humidity (85-95%), darkness, rodent-proofing. Also good for canned goods and wine."}, {"sym": "DC_FRIDGE", "price": 700, "range": "$300-1,200", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "12V DC chest fridge ~50L (e.g., Dometic, Engel, Alpicool). Compressor-based, draws 30-70W (average 15-25 Ah/day at 12V with 50°F interior). 3-5x more efficient than a household AC fridge. Uses Danfoss/Secop compressor (standard in off-grid refrigerat", "fullNote": "12V DC chest fridge ~50L (e.g., Dometic, Engel, Alpicool). Compressor-based, draws 30-70W (average 15-25 Ah/day at 12V with 50°F interior). 3-5x more efficient than a household AC fridge. Uses Danfoss/Secop compressor (standard in off-grid refrigeration). Chest design: cold air stays in when opened (unlike upright). Thermoelectric coolers (Peltier) use 3x the energy — avoid for off-grid."}, {"sym": "CANNING", "price": 120, "range": "$50-150", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Water-bath canner (large pot with rack) + 12-pint/quart mason jars + lids + rings + jar lifter + funnel. A pressure canner adds ~$80-120 more. Water-bath canning: for high-acid foods (fruit, tomatoes, pickles, jam) — boil 10-30 min. Pressure canning:", "fullNote": "Water-bath canner (large pot with rack) + 12-pint/quart mason jars + lids + rings + jar lifter + funnel. A pressure canner adds ~$80-120 more. Water-bath canning: for high-acid foods (fruit, tomatoes, pickles, jam) — boil 10-30 min. Pressure canning: for low-acid foods (meat, vegetables, beans, soup) — requires 240°F at 10-15 PSI and is the ONLY safe method for those foods. Proper pH balance is critical for safety (botulism risk in low-acid foods)."}, {"sym": "SOLAR_DRYER", "price": 120, "range": "$50-200", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "DIY solar food dryer: plywood box with black-painted interior, glass/plastic top, screened mesh trays, and top/bottom ventilation. Heats to 120-150°F in full sun. Dries fruits, vegetables, herbs, and meat (jerky) without electricity. Requires 1-3 sun", "fullNote": "DIY solar food dryer: plywood box with black-painted interior, glass/plastic top, screened mesh trays, and top/bottom ventilation. Heats to 120-150°F in full sun. Dries fruits, vegetables, herbs, and meat (jerky) without electricity. Requires 1-3 sunny days depending on moisture content. Proper storage: vacuum-seal or keep in airtight jars. No sulfuring needed for most foods if dried fast."}, {"sym": "EVAP_FRIDGE", "price": 40, "range": "$20-80", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Zeer pot (clay-in-clay evaporative cooler): two unglazed terra-cotta pots nested with wet sand between them. Evaporation from the outer pot's surface cools the inner pot to 10-15°C below ambient. Works best in dry climates (low humidity) — less effec", "fullNote": "Zeer pot (clay-in-clay evaporative cooler): two unglazed terra-cotta pots nested with wet sand between them. Evaporation from the outer pot's surface cools the inner pot to 10-15°C below ambient. Works best in dry climates (low humidity) — less effective in humid conditions. Can keep vegetables fresh for 1-3 weeks. Zero energy. Also called a pot-in-pot refrigerator or 'desert fridge'."}, {"sym": "GAS_STOVE", "price": 100, "range": "$50-300", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "Propane camp stove (Coleman 2-burner ~$70) or propane range or biogas burner attachment. Propane is the most common off-grid cooking fuel. 20lb tank lasts ~1-2 months of daily cooking. Biogas (from anaerobic digester) requires 50+ lbs/day of organic ", "fullNote": "Propane camp stove (Coleman 2-burner ~$70) or propane range or biogas burner attachment. Propane is the most common off-grid cooking fuel. 20lb tank lasts ~1-2 months of daily cooking. Biogas (from anaerobic digester) requires 50+ lbs/day of organic waste. Induction (electric) is most efficient but needs large battery/inverter. Consider an outdoor propane stove to keep heat out of the home in summer."}, {"sym": "ROCKET_STOVE", "price": 250, "range": "$150-600", "unit": "USD", "conf": "low", "safety": false, "cat": "🌱 Food", "note": "DIY rocket mass heater: J-tube combustion chamber (horizont
