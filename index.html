al feed + vertical insulated burn tube) + thermal mass (cob, brick, or stone) surrounding the exhaust pipe. Burns small sticks efficiently at 1000°C+ with near-complete combustion (little smo", "fullNote": "DIY rocket mass heater: J-tube combustion chamber (horizontal feed + vertical insulated burn tube) + thermal mass (cob, brick, or stone) surrounding the exhaust pipe. Burns small sticks efficiently at 1000°C+ with near-complete combustion (little smoke). The thermal mass absorbs heat and radiates for 12-24 hours from a 20-minute fire. 80-90% efficiency vs 20-30% for open hearth. Complex build."}, {"sym": "SOLAR_COOKER", "price": 120, "range": "$50-300", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "Parabolic solar cooker (focused reflector, reaches 200-400°C) or box/funnel solar oven (reaches 120-150°C). Parabolic: fast cooking (60-90 min for beans) but needs frequent reorientation. Box oven: slow cooking (3-5 hours) but set-and-forget. Works o", "fullNote": "Parabolic solar cooker (focused reflector, reaches 200-400°C) or box/funnel solar oven (reaches 120-150°C). Parabolic: fast cooking (60-90 min for beans) but needs frequent reorientation. Box oven: slow cooking (3-5 hours) but set-and-forget. Works on clear sunny days only. Can bake bread, cook rice, pasteurize water, and slow-cook stews. No fuel cost, zero emissions."}, {"sym": "SOIL_TEST_KIT", "price": 25, "range": "$15-50", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Soil test kit: pH, N-P-K, micronutrients. Test BEFORE planting — don't guess. Ideal vegetable soil: pH 6.0-7.0. Nitrogen (N) = leaf growth, Phosphorus (P) = roots/flowers, Potassium (K) = fruit/health. Panama soils: often acidic (volcanic) and low in", "fullNote": "Soil test kit: pH, N-P-K, micronutrients. Test BEFORE planting — don't guess. Ideal vegetable soil: pH 6.0-7.0. Nitrogen (N) = leaf growth, Phosphorus (P) = roots/flowers, Potassium (K) = fruit/health. Panama soils: often acidic (volcanic) and low in phosphorus. Send sample to IDIAP (Panama ag research) for lab analysis ~$30. Test each garden zone separately. Retest every 2-3 years."}, {"sym": "COMPOST_SYSTEM", "price": 100, "range": "$50-200", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "3-bin compost system: pallets or wire mesh. Bin 1: fresh material. Bin 2: cooking (turn weekly). Bin 3: finished compost. Recipe: 3 parts brown (leaves, straw, cardboard) to 1 part green (kitchen scraps, grass). Keep moist like wrung sponge. Thermoph", "fullNote": "3-bin compost system: pallets or wire mesh. Bin 1: fresh material. Bin 2: cooking (turn weekly). Bin 3: finished compost. Recipe: 3 parts brown (leaves, straw, cardboard) to 1 part green (kitchen scraps, grass). Keep moist like wrung sponge. Thermophilic (hot) compost reaches 130-150°F — kills weed seeds. Panama: add extra browns (rain leaches nitrogen). Avoid: meat, dairy, oils (attracts pests). Finished in 3-6 months."}, {"sym": "VERMICOMPOST", "price": 60, "range": "$30-120", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Worm bin: plastic tote + red wigglers (Eisenia fetida) + bedding (shredded paper/coco coir). Feed vegetable scraps, coffee grounds, eggshells. 1 lb worms eats 0.5 lb food/day. Produces vermicast (premium fertilizer, 5x richer than topsoil). Indoor/ou", "fullNote": "Worm bin: plastic tote + red wigglers (Eisenia fetida) + bedding (shredded paper/coco coir). Feed vegetable scraps, coffee grounds, eggshells. 1 lb worms eats 0.5 lb food/day. Produces vermicast (premium fertilizer, 5x richer than topsoil). Indoor/outdoor. No smell if managed correctly. Panama: keep in shade (worms die above 85°F). Harvest castings every 2-3 months. Worm tea (steep castings in water) = liquid gold fertilizer."}, {"sym": "COVER_CROP", "price": 20, "range": "$10-40", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Cover crop seed per garden bed. Plant in off-season or between rows. Legumes (clover, cowpea, vetch): fix nitrogen (add 50-150 lbs N/acre). Grasses (rye, oats, buckwheat): build organic matter, suppress weeds. Brassicas (mustard, radish): biofumigant", "fullNote": "Cover crop seed per garden bed. Plant in off-season or between rows. Legumes (clover, cowpea, vetch): fix nitrogen (add 50-150 lbs N/acre). Grasses (rye, oats, buckwheat): build organic matter, suppress weeds. Brassicas (mustard, radish): biofumigants (natural pest suppression). Cut and drop as green mulch OR till in as green manure 2-3 weeks before planting. Panama: cowpea (frijol de vaca) is excellent nitrogen fixer for tropical soils."}, {"sym": "MULCH", "price": 30, "range": "$15-60", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Mulch per garden bed. Straw ($8-12/bale covers 50 sq ft), wood chips (free from arborists), leaves (free), grass clippings (free, dry first). Benefits: retains soil moisture (50% less watering), suppresses weeds, moderates soil temperature, adds orga", "fullNote": "Mulch per garden bed. Straw ($8-12/bale covers 50 sq ft), wood chips (free from arborists), leaves (free), grass clippings (free, dry first). Benefits: retains soil moisture (50% less watering), suppresses weeds, moderates soil temperature, adds organic matter as it decomposes. Apply 3-4\" depth. Keep mulch 2\" away from plant stems (prevents rot). Panama: heavy mulch essential for dry season. Renew every 3-6 months."}, {"sym": "SEED_STARTER", "price": 80, "range": "$40-200", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Seed starting kit: 1020 trays, cell inserts, humidity dome, heat mat (speeds germination 30-50%), grow lights (LED shop light works), seed starting mix (sterile — not garden soil). Start seeds 6-8 weeks before transplant date. Seeds need: warmth (65-", "fullNote": "Seed starting kit: 1020 trays, cell inserts, humidity dome, heat mat (speeds germination 30-50%), grow lights (LED shop light works), seed starting mix (sterile — not garden soil). Start seeds 6-8 weeks before transplant date. Seeds need: warmth (65-75°F), moisture (not wet), light (after germination). Harden off seedlings 1 week before transplant (gradually expose to outdoor conditions). Saves 80% vs buying seedlings."}, {"sym": "SEED_SAVING", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "SEED SAVING GUIDE: Easiest: self-pollinating crops (tomatoes, beans, peas, lettuce, peppers). Save from healthiest plants only. Tomatoes: ferment seeds 2-3 days in water (removes germination inhibitors). Beans/peas: let dry fully on plant. Squash/cuc", "fullNote": "SEED SAVING GUIDE: Easiest: self-pollinating crops (tomatoes, beans, peas, lettuce, peppers). Save from healthiest plants only. Tomatoes: ferment seeds 2-3 days in water (removes germination inhibitors). Beans/peas: let dry fully on plant. Squash/cucumber: isolate varieties (cross-pollinate easily) or hand-pollinate. Biennials (carrots, beets, cabbage): need 2 seasons to produce seed. Store seeds: cool, dark, dry. Viability: 2-5 years depending on species. Panama: high humidity = store seeds with silica gel packets."}, {"sym": "PERENNIAL_VEG", "price": 100, "range": "$50-200", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "Perennial vegetables: plant once, harvest for years. Asparagus (25+ year bed, $30 for 10 crowns). Artichoke (5-7 years). Rhubarb (10+ years, needs winter chill — Panama highlands only). Malanga/taro (Caribbean staple, loves wet tropics). Chaya (Mayan", "fullNote": "Perennial vegetables: plant once, harvest for years. Asparagus (25+ year bed, $30 for 10 crowns). Artichoke (5-7 years). Rhubarb (10+ years, needs winter chill — Panama highlands only). Malanga/taro (Caribbean staple, loves wet tropics). Chaya (Mayan spinach — perennial in Panama, nutrient-dense). Katuk (Sauropus — tropical spinach, thrives in heat). Perennial kale (tree collards — 3-5 years). Culinary herbs: rosemary, thyme, oregano, sage (all perennial)."}, {"sym": "TROPICAL_CROPS", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "PANAMA TROPICAL CROPS: Year-round staples: yuca (cassava), ñame (yam), otoe (taro), platano (plantain), guandú (pigeon pea). Fruit trees: mango, avocado, papaya, guanabana, maracuyá (passion fruit), citrus (lime, orange, mandarin). Quick crops: bok c", "fullNote": "PANAMA TROPICAL CROPS: Year-round staples: yuca (cassava), ñame (yam), otoe (taro), platano (plantain), guandú (pigeon pea). Fruit trees: mango, avocado, papaya, guanabana, maracuyá (passion fruit), citrus (lime, orange, mandarin). Quick crops: bok choy, malabar spinach, okra, yard-long beans. These THRIVE in Panama's climate — grow what wants to grow here, not what grows in Vermont. Perennial tropical crops need less annual labor."}, {"sym": "CROP_ROTATION", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "CROP ROTATION — 4-year cycle: Year 1: Legumes (beans, peas → fix nitrogen). Year 2: Leaf crops (lettuce, cabbage, spinach → use nitrogen). Year 3: Fruit crops (tomatoes, peppers, squash → heavy feeders). Year 4: Root crops (carrots, beets, potatoes →", "fullNote": "CROP ROTATION — 4-year cycle: Year 1: Legumes (beans, peas → fix nitrogen). Year 2: Leaf crops (lettuce, cabbage, spinach → use nitrogen). Year 3: Fruit crops (tomatoes, peppers, squash → heavy feeders). Year 4: Root crops (carrots, beets, potatoes → break soil). Never plant same family in same spot 2 years in a row (tomatoes after potatoes = blight). Rotation breaks pest/disease cycles and balances soil nutrients. In tropics: add cover crop rotation during rainy season."}, {"sym": "GARDEN_IRRIGATION", "price": 80, "range": "$50-200", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Garden drip irrigation system. 1/2\" main line + 1/4\" drip tape or emitters. Uses 50-70% less water than overhead sprinklers. Delivers water directly to roots — minimal evaporation. Timer automates watering ($30-50). For gravity-fed: tank needs >10 ft", "fullNote": "Garden drip irrigation system. 1/2\" main line + 1/4\" drip tape or emitters. Uses 50-70% less water than overhead sprinklers. Delivers water directly to roots — minimal evaporation. Timer automates watering ($30-50). For gravity-fed: tank needs >10 ft elevation for 4-8 PSI (enough for drip). Soaker hose alternative: cheaper ($20-30) but less precise. Panama dry season: garden needs 1-2\" water/week. Mulch + drip = most efficient food production."}, {"sym": "OLLA_POT", "price": 25, "range": "$10-50", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Olla (unglazed clay pot) irrigation. Bury pot up to neck near plants, fill with water, cap. Water seeps through porous clay directly to roots. Refill every 3-7 days. Uses 70% less water than surface watering. Zero evaporation. 2000+ year old technolo", "fullNote": "Olla (unglazed clay pot) irrigation. Bury pot up to neck near plants, fill with water, cap. Water seeps through porous clay directly to roots. Refill every 3-7 days. Uses 70% less water than surface watering. Zero evaporation. 2000+ year old technology — still the most efficient irrigation method. Panama: excellent for dry season vegetable beds. Multiple ollas for larger beds. DIY: use unglazed terra cotta pots sealed together with silicone."}, {"sym": "DUCKS", "price": 200, "range": "$150-400", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "Duck starter setup: simple shelter (3-sided shed) + kiddie pool + 4-5 ducklings. Ducks: better foragers than chickens, pest control (slugs, snails, insects), quieter, more cold-hardy, eggs are richer (more omega-3). Breeds: Khaki Campbell (300+ eggs/", "fullNote": "Duck starter setup: simple shelter (3-sided shed) + kiddie pool + 4-5 ducklings. Ducks: better foragers than chickens, pest control (slugs, snails, insects), quieter, more cold-hardy, eggs are richer (more omega-3). Breeds: Khaki Campbell (300+ eggs/yr, best layers), Muscovy (meat + eggs, quiet, good foragers, common in Panama). Ducks need more water than chickens (drinking + bathing). Eggs excellent for baking."}, {"sym": "RABBITS", "price": 250, "range": "$150-500", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "Rabbit starter: wire cage (24×36\") + 1 buck + 2 does + feeder/waterer + nesting box. Most efficient meat animal: 1 doe + offspring = 100-200 lbs meat/year from garden waste + pellets. Breed every 90 days (28-31 day gestation). Harvest at 8-12 weeks (", "fullNote": "Rabbit starter: wire cage (24×36\") + 1 buck + 2 does + feeder/waterer + nesting box. Most efficient meat animal: 1 doe + offspring = 100-200 lbs meat/year from garden waste + pellets. Breed every 90 days (28-31 day gestation). Harvest at 8-12 weeks (3-5 lbs dressed). Quiet, clean, ideal for small homesteads. Manure is cold (can go directly on garden). Panama: keep in shade with good ventilation (heat stress above 85°F)."}, {"sym": "BEES", "price": 300, "range": "$200-500", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "Beekeeping starter: Langstroth hive + protective gear + smoker + tools + 1 nucleus colony (nuc). 1 hive produces 30-60 lbs honey/year + beeswax + propolis. Pollination increases garden yield 30-100%. Italian bees: gentle, productive. Carniolan: bette", "fullNote": "Beekeeping starter: Langstroth hive + protective gear + smoker + tools + 1 nucleus colony (nuc). 1 hive produces 30-60 lbs honey/year + beeswax + propolis. Pollination increases garden yield 30-100%. Italian bees: gentle, productive. Carniolan: better in variable weather. Panama: Africanized bees present — use gentle stock, keep hives 100ft+ from living areas, work bees during nectar flow when they're calm. Check legal requirements."}, {"sym": "TILAPIA", "price": 300, "range": "$200-600", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "Backyard tilapia system: IBC tote (275 gal) or stock tank + pump + biofilter + 20-30 fingerlings. Tilapia: fastest growing food fish (harvest in 6-9 months at 1-1.5 lbs). Eat algae, duckweed, vegetable scraps. Water temperature: 75-85°F (perfect for ", "fullNote": "Backyard tilapia system: IBC tote (275 gal) or stock tank + pump + biofilter + 20-30 fingerlings. Tilapia: fastest growing food fish (harvest in 6-9 months at 1-1.5 lbs). Eat algae, duckweed, vegetable scraps. Water temperature: 75-85°F (perfect for Panama). Stock at 1 fish per 5-10 gallons. Feed: commercial pellets for fast growth, or duckweed + veg scraps for low-cost. Aquaponics integration: fish waste fertilizes plants."}, {"sym": "FEED_STORAGE", "price": 50, "range": "$30-100", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Metal garbage can with tight lid for feed storage. Keeps out rodents, raccoons, moisture. Holds 50 lbs feed. Galvanized steel ($30-50) lasts years. Plastic bins: rodents chew through. Store feed in cool, dry place. Rotate stock (first in, first out).", "fullNote": "Metal garbage can with tight lid for feed storage. Keeps out rodents, raccoons, moisture. Holds 50 lbs feed. Galvanized steel ($30-50) lasts years. Plastic bins: rodents chew through. Store feed in cool, dry place. Rotate stock (first in, first out). Panama: high humidity = add desiccant packets. Bulk feed buying saves 20-30% if you have storage."}, {"sym": "GUILD_DESIGN", "price": 0, "range": "$0-0", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "PLANT GUILD DESIGN (companion planting). Classic apple guild: apple tree (canopy) + comfrey (dynamic accumulator, mulch) + daffodils (gopher deterrent) + clover (N-fixer) + yarrow (pollinator attractor). Each plant serves multiple functions: food, ni", "fullNote": "PLANT GUILD DESIGN (companion planting). Classic apple guild: apple tree (canopy) + comfrey (dynamic accumulator, mulch) + daffodils (gopher deterrent) + clover (N-fixer) + yarrow (pollinator attractor). Each plant serves multiple functions: food, nitrogen, mulch, pest control, pollinator support. Tropical guild example: mango + pigeon pea (N-fixer) + sweet potato (ground cover) + lemongrass (pest deterrent) + turmeric (shade crop). No bare soil — every niche filled."}, {"sym": "CHOP_AND_DROP", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Chop-and-drop mulching: cut fast-growing support plants (pigeon pea, comfrey, Mexican sunflower) and drop as mulch around food crops. Returns nutrients to soil without composting. Builds soil organic matter continuously. Best species: leguminous (nit", "fullNote": "Chop-and-drop mulching: cut fast-growing support plants (pigeon pea, comfrey, Mexican sunflower) and drop as mulch around food crops. Returns nutrients to soil without composting. Builds soil organic matter continuously. Best species: leguminous (nitrogen-rich), deep-rooted (mineral accumulators), fast-growing (biomass producers). Cut before flowering for highest nutrient content. Done monthly in growing season. Traditional practice in tropical agroforestry."}, {"sym": "FRUIT_TREE_CARE", "price": 50, "range": "$20-100", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "Fruit tree annual care per tree: pruning shears + organic fertilizer + mulch. Prune for: airflow (prevents fungus), sunlight penetration, size management. Tropical trees: prune lightly after harvest (not dormant season — they don't have one). Fertili", "fullNote": "Fruit tree annual care per tree: pruning shears + organic fertilizer + mulch. Prune for: airflow (prevents fungus), sunlight penetration, size management. Tropical trees: prune lightly after harvest (not dormant season — they don't have one). Fertilize: compost ring around drip line, 2×/year. Mulch: 4-6\" wood chips (keep away from trunk). Panama: fungal pressure is high — prune for airflow, don't overwater foliage, use copper spray preventatively."}, {"sym": "NEEM_OIL", "price": 15, "range": "$10-25", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Neem oil (cold-pressed). Organic insecticide + fungicide + miticide. Controls: aphids, whiteflies, mealybugs, spider mites, powdery mildew. Mix: 1 tsp neem + 1/2 tsp mild soap per quart water. Spray weekly (prevention) or every 3 days (infestation). ", "fullNote": "Neem oil (cold-pressed). Organic insecticide + fungicide + miticide. Controls: aphids, whiteflies, mealybugs, spider mites, powdery mildew. Mix: 1 tsp neem + 1/2 tsp mild soap per quart water. Spray weekly (prevention) or every 3 days (infestation). Spray early morning or evening (not in sun — burns leaves). Neem tree grows in Panama — you can make your own. 48-hour withholding period before harvest. Also: neem leaf mulch repels soil pests."}, {"sym": "BT_SPRAY", "price": 12, "range": "$8-20", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Bacillus thuringiensis (Bt) — organic caterpillar killer. Bacteria that paralyzes caterpillars' digestive system (only affects caterpillars, safe for humans/bees/birds). Target: cabbage worms, tomato hornworms, corn earworms. Spray on leaves (they ea", "fullNote": "Bacillus thuringiensis (Bt) — organic caterpillar killer. Bacteria that paralyzes caterpillars' digestive system (only affects caterpillars, safe for humans/bees/birds). Target: cabbage worms, tomato hornworms, corn earworms. Spray on leaves (they eat it and die in 2-3 days). Apply weekly during caterpillar season. Different strains: Bt kurstaki (caterpillars), Bt israelensis (mosquito larvae in standing water). Panama: essential for brassicas (cabbage family) in tropics."}, {"sym": "COMPANION_PLANTING", "price": 0, "range": "$0-0", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "COMPANION PLANTING GUIDE: Tomatoes + basil (repels hornworms, improves flavor). Corn + beans + squash (Three Sisters — corn supports beans, beans fix N, squash mulches). Carrots + onions (onions repel carrot fly). Cabbage + dill (attracts beneficial ", "fullNote": "COMPANION PLANTING GUIDE: Tomatoes + basil (repels hornworms, improves flavor). Corn + beans + squash (Three Sisters — corn supports beans, beans fix N, squash mulches). Carrots + onions (onions repel carrot fly). Cabbage + dill (attracts beneficial wasps). Marigolds everywhere (repels nematodes, attracts pollinators). Nasturtium as trap crop for aphids. Mint in containers (spreads aggressively). Panama: lemongrass around garden perimeter deters many tropical pests."}, {"sym": "ROW_COVER", "price": 25, "range": "$15-50", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Floating row cover (Agribon or lightweight fabric) per bed. Physical barrier against insects (caterpillars, beetles, aphids) without chemicals. Allows 85-90% light + water through. Use hoops (PVC or wire) to keep off plants. Remove for pollinated cro", "fullNote": "Floating row cover (Agribon or lightweight fabric) per bed. Physical barrier against insects (caterpillars, beetles, aphids) without chemicals. Allows 85-90% light + water through. Use hoops (PVC or wire) to keep off plants. Remove for pollinated crops (squash, cucumber) when flowering. Reusable for 3-5 seasons. Panama: also provides light shade (reduces heat stress on tender crops). Weight: AG-15 (light, for insect protection) to AG-30 (heavier, slight frost protection)."}, {"sym": "ROOT_CELLAR", "price": 300, "range": "$150-800", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "Root cellar design: buried or bermed structure maintaining 50-55°F and 85-95% humidity. Stores: potatoes (4-6 months), carrots (4-5 months in damp sand), beets (3-5 months), cabbage (3-4 months), apples (2-4 months separate from vegetables — ethylene", "fullNote": "Root cellar design: buried or bermed structure maintaining 50-55°F and 85-95% humidity. Stores: potatoes (4-6 months), carrots (4-5 months in damp sand), beets (3-5 months), cabbage (3-4 months), apples (2-4 months separate from vegetables — ethylene gas spoils them). Ventilation: intake low (cool air), exhaust high (warm air out). Darkness essential. Panama: buried root cellar works if above water table. Alternative: charcoal cooler (zeer pot scaled up)."}, {"sym": "DEHYDRATOR", "price": 80, "range": "$50-200", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Electric food dehydrator (5-9 tray). ~500-800W, runs 6-12 hours for most foods. Dries: fruit leather, jerky, herbs, tomatoes, mushrooms, kale chips. 80-95% moisture removal = shelf-stable for 6-12 months. Faster and more consistent than solar drying.", "fullNote": "Electric food dehydrator (5-9 tray). ~500-800W, runs 6-12 hours for most foods. Dries: fruit leather, jerky, herbs, tomatoes, mushrooms, kale chips. 80-95% moisture removal = shelf-stable for 6-12 months. Faster and more consistent than solar drying. Temperature control: 95°F herbs, 125°F fruits, 145°F vegetables, 155°F meat/jerky. Vacuum seal after drying for longest storage. Panama: electric dehydrator avoids humidity problems of solar drying."}, {"sym": "FERMENTATION", "price": 40, "range": "$20-80", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Fermentation kit: wide-mouth jars + weights + airlock lids. Lacto-fermentation: salt brine (2-3% salt by weight) allows beneficial Lactobacillus to thrive while inhibiting pathogens. Ferments: sauerkraut, kimchi, pickles, hot sauce, kvass. No electri", "fullNote": "Fermentation kit: wide-mouth jars + weights + airlock lids. Lacto-fermentation: salt brine (2-3% salt by weight) allows beneficial Lactobacillus to thrive while inhibiting pathogens. Ferments: sauerkraut, kimchi, pickles, hot sauce, kvass. No electricity needed. Probiotic (gut health). Shelf-stable for months in cool storage. 2-3 week fermentation time. Simple, ancient, foolproof preservation. Panama: ferment in coolest spot (70°F ideal; above 80°F may over-ferment)."}, {"sym": "VACUUM_SEALER", "price": 80, "range": "$50-150", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Vacuum sealer + bags. Extends freezer life 3-5x (prevents freezer burn). Seals dehydrated food for years. Bags cost ~$0.15-0.30 each in bulk. Can seal: meat, vegetables (blanch first), dried food, coffee, seeds. Jar attachment ($10-15) seals mason ja", "fullNote": "Vacuum sealer + bags. Extends freezer life 3-5x (prevents freezer burn). Seals dehydrated food for years. Bags cost ~$0.15-0.30 each in bulk. Can seal: meat, vegetables (blanch first), dried food, coffee, seeds. Jar attachment ($10-15) seals mason jars for dry goods. Uses ~200W for 20-30 seconds per seal. Essential for off-grid food preservation — dehydrated + vacuum sealed = shelf-stable for years. FoodSaver or equivalent brand."}, {"sym": "SOLAR_OVEN", "price": 150, "range": "$80-300", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "Box solar oven: insulated box with glass lid and reflectors. Reaches 250-350°F. Bakes bread, roasts vegetables, slow-cooks stews. 3-5 hour cook time typical. No fuel, no emissions, no fire risk. Works any sunny day. Panama: excellent solar cooking co", "fullNote": "Box solar oven: insulated box with glass lid and reflectors. Reaches 250-350°F. Bakes bread, roasts vegetables, slow-cooks stews. 3-5 hour cook time typical. No fuel, no emissions, no fire risk. Works any sunny day. Panama: excellent solar cooking conditions (4-5 PSH year-round). Good brands: Sun Oven, GoSun. DIY: cardboard + aluminum foil + glass works surprisingly well. Cook during peak sun (10am-3pm)."}, {"sym": "BIOGAS_DIGESTER", "price": 400, "range": "$200-800", "unit": "USD", "conf": "low", "safety": false, "cat": "🌱 Food", "note": "Small biogas digester: 55-gal drum system. Input: kitchen scraps + animal manure + water. Output: methane gas for cooking (1-2 hours/day from household waste) + liquid fertilizer. Requires: anaerobic conditions, pH 6.5-7.5, temperature 80-100°F (idea", "fullNote": "Small biogas digester: 55-gal drum system. Input: kitchen scraps + animal manure + water. Output: methane gas for cooking (1-2 hours/day from household waste) + liquid fertilizer. Requires: anaerobic conditions, pH 6.5-7.5, temperature 80-100°F (ideal for Panama). Takes 2-4 weeks to start producing gas. Methane is flammable — follow safety protocols. Larger systems (200+ gal) can fuel daily cooking. Gas holder: inner tube or floating drum."}, {"sym": "CALORIE_CROPS", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "CALORIE CROPS (most calories per sq ft): Potatoes: 10-15 lbs/10 sq ft (~4,500-6,750 cal). Sweet potatoes: 8-12 lbs/10 sq ft (leaves also edible!). Yuca/cassava: 10-20 lbs/plant (tropical staple, 3,000+ cal/plant). Corn: 1-2 lbs grain/10 sq ft (lower ", "fullNote": "CALORIE CROPS (most calories per sq ft): Potatoes: 10-15 lbs/10 sq ft (~4,500-6,750 cal). Sweet potatoes: 8-12 lbs/10 sq ft (leaves also edible!). Yuca/cassava: 10-20 lbs/plant (tropical staple, 3,000+ cal/plant). Corn: 1-2 lbs grain/10 sq ft (lower yield but staple). Dry beans: 1-2 lbs/10 sq ft (~1,500 cal/lb). To feed 1 person: ~730,000 cal/year. Need: 1,000-2,000 sq ft of calorie crops + vegetables + fruit. Panama: yuca + sweet potato + plantain = highest tropical calories per effort."}, {"sym": "GARDEN_YIELD", "price": 0, "range": "$0-0", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "GARDEN YIELD ESTIMATES: 100 sq ft intensive bed can produce 50-100 lbs vegetables/year. 500 sq ft feeds 1 person vegetables for the year. 2,000-4,000 sq ft feeds a family of 4 (vegetables + some staples). Fruit trees: mango (200-300 fruits/year after", "fullNote": "GARDEN YIELD ESTIMATES: 100 sq ft intensive bed can produce 50-100 lbs vegetables/year. 500 sq ft feeds 1 person vegetables for the year. 2,000-4,000 sq ft feeds a family of 4 (vegetables + some staples). Fruit trees: mango (200-300 fruits/year after 5 years), avocado (150-200/year), citrus (100-200/year), papaya (30-50/year but fruits in 9 months!). Berry bushes: 5-10 lbs each. Chickens: 4 hens = 1,000 eggs/year + meat. Rabbits: 1 buck + 2 does = 100-200 lbs meat/year."}, {"sym": "SEASON_PLANNING", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "PANAMA PLANTING CALENDAR: Rainy season (May-Nov): plant everything — corn, beans, squash, greens, root crops. Water is abundant, growth is explosive. Dry season (Dec-Apr): plant drought-tolerant crops (yuca, sweet potato, okra, pigeon pea) with irrig", "fullNote": "PANAMA PLANTING CALENDAR: Rainy season (May-Nov): plant everything — corn, beans, squash, greens, root crops. Water is abundant, growth is explosive. Dry season (Dec-Apr): plant drought-tolerant crops (yuca, sweet potato, okra, pigeon pea) with irrigation. Start rain-sensitive seeds (tomatoes, peppers) in trays under cover during heavy rains. Perennial crops (fruit trees, chaya, katuk) produce year-round. Stagger plantings every 2-3 weeks for continuous harvest."}, {"sym": "BROADFORK", "price": 80, "range": "$50-150", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Broadfork (U-bar digger). Manual tool for aerating soil without inverting layers (preserves soil structure and microbes). Step on crossbar, tines penetrate 8-12\", pull handles back to loosen. No-till essential tool. Prepares beds in minutes. Much les", "fullNote": "Broadfork (U-bar digger). Manual tool for aerating soil without inverting layers (preserves soil structure and microbes). Step on crossbar, tines penetrate 8-12\", pull handles back to loosen. No-till essential tool. Prepares beds in minutes. Much less labor than double-digging. 14-18\" wide. Steel tines, ash handles. Lasts decades. Alternative to rototiller (which destroys soil structure, kills worms)."}, {"sym": "SICKLE_MOWER", "price": 60, "range": "$30-100", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Sickle or scythe for cutting cover crops, grass, grain. No fuel, no noise, zero maintenance beyond sharpening. European scythe (lighter, more efficient) ~$80-120. Grass sickle (kama) ~$30-50. Cuts 1/4-1/2 acre per day with practice. Keeps edges sharp", "fullNote": "Sickle or scythe for cutting cover crops, grass, grain. No fuel, no noise, zero maintenance beyond sharpening. European scythe (lighter, more efficient) ~$80-120. Grass sickle (kama) ~$30-50. Cuts 1/4-1/2 acre per day with practice. Keeps edges sharp with whetstone. For small homesteads: more practical than gas-powered brush cutter."}, {"sym": "GRAIN_MILL", "price": 200, "range": "$100-400", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "Hand-crank grain mill. Grinds: corn (masa/tortillas), wheat (flour), rice, beans, coffee. Country Living Mill ~$400 (lifetime). Corona mill ~$50-80 (budget, works fine). Fresh-ground flour has more nutrients (germ oil goes rancid within days of grind", "fullNote": "Hand-crank grain mill. Grinds: corn (masa/tortillas), wheat (flour), rice, beans, coffee. Country Living Mill ~$400 (lifetime). Corona mill ~$50-80 (budget, works fine). Fresh-ground flour has more nutrients (germ oil goes rancid within days of grinding — store whole grains, grind as needed). Can be adapted to bicycle or motor drive. Essential for off-grid grain independence."}, {"sym": "OIL_PRESS", "price": 250, "range": "$150-500", "unit": "USD", "conf": "low", "safety": false, "cat": "🌱 Food", "note": "Manual oil press. Presses: sunflower seeds, sesame, peanut, coconut (copra), palm kernels. Oil yield: 30-50% by weight (1 gallon oil from 8-12 lbs seeds). Cooking oil is one of the hardest things to produce off-grid. Piteba oil press ~$150-250 (hand ", "fullNote": "Manual oil press. Presses: sunflower seeds, sesame, peanut, coconut (copra), palm kernels. Oil yield: 30-50% by weight (1 gallon oil from 8-12 lbs seeds). Cooking oil is one of the hardest things to produce off-grid. Piteba oil press ~$150-250 (hand crank). Requires: dried seeds/nuts, heat (friction warms press). Panama: coconut oil is the most practical tropical option (abundant, high yield)."}, {"sym": "FOOD_STORAGE", "price": 0, "range": "$0-0", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "FOOD STORAGE TIERS: 1 week (pantry basics) — rice, beans, canned goods, oil. 1 month (buffer) — adds flour, sugar, salt, dried foods. 3 months (resilience) — adds bulk grains, legumes, home-canned goods. 1 year (self-sufficiency) — full rotation syst", "fullNote": "FOOD STORAGE TIERS: 1 week (pantry basics) — rice, beans, canned goods, oil. 1 month (buffer) — adds flour, sugar, salt, dried foods. 3 months (resilience) — adds bulk grains, legumes, home-canned goods. 1 year (self-sufficiency) — full rotation system, root cellar, preserved harvest. Storage rule: cool (50-70°F), dark, dry, pest-proof. Rotate: first in, first out. Label with date. Panama: moisture is enemy #1 — use airtight containers, oxygen absorbers, bay leaves (repels weevils)."}, {"sym": "SEED_BANK", "price": 50, "range": "$30-100", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Personal seed bank: 15-20 open-pollinated (not hybrid) varieties of staple vegetables + herbs. Store: cool (refrigerator ideal), dark, dry, in sealed jars with silica gel. Rotate: plant some, save new seeds every 2-3 years (viability declines). Essen", "fullNote": "Personal seed bank: 15-20 open-pollinated (not hybrid) varieties of staple vegetables + herbs. Store: cool (refrigerator ideal), dark, dry, in sealed jars with silica gel. Rotate: plant some, save new seeds every 2-3 years (viability declines). Essential varieties: beans, tomatoes, peppers, squash, corn, lettuce, radish, cucumber, basil, cilantro. Panama: store seeds in airtight containers in coolest room — fridge is best but keep dry."}, {"sym": "KITCHEN_SCALE", "price": 20, "range": "$10-40", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Digital kitchen scale (0.1g precision). Essential for: fermentation (2-3% salt by weight), canning recipes, dehydrating (weigh before/after for moisture content), baking (weight > volume for accuracy), seed saving (count by weight). Battery-powered (", "fullNote": "Digital kitchen scale (0.1g precision). Essential for: fermentation (2-3% salt by weight), canning recipes, dehydrating (weigh before/after for moisture content), baking (weight > volume for accuracy), seed saving (count by weight). Battery-powered (AAA or rechargeable). 5kg/11lb capacity typical. Much more accurate than measuring cups. Off-grid essential for consistent food preservation."}, {"sym": "CAST_IRON", "price": 40, "range": "$20-80", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Cast iron skillet (10-12\"). The ultimate off-grid cookware. Works on: propane, wood fire, rocket stove, induction, solar oven (preheated). Retains heat (forgives temperature fluctuations). Adds dietary iron. Lasts generations. Season with oil, never ", "fullNote": "Cast iron skillet (10-12\"). The ultimate off-grid cookware. Works on: propane, wood fire, rocket stove, induction, solar oven (preheated). Retains heat (forgives temperature fluctuations). Adds dietary iron. Lasts generations. Season with oil, never soap. Lodge ~$25-40 (US-made, affordable). Carbon steel alternative: lighter but similar properties. One cast iron skillet replaces 3-4 specialty pans."}, {"sym": "PRESSURE_CANNER", "price": 120, "range": "$80-200", "unit": "USD", "conf": "high", "safety": true, "cat": "🌱 Food", "note": "Pressure canner (not just water-bath). THE ONLY safe method for low-acid foods: meat, vegetables, beans, soup, stock. Reaches 240°F at 10-15 PSI (kills botulism spores). Presto 23-quart ~$120 (fits 7 quart jars or 20 pint jars). Must have: weighted g", "fullNote": "Pressure canner (not just water-bath). THE ONLY safe method for low-acid foods: meat, vegetables, beans, soup, stock. Reaches 240°F at 10-15 PSI (kills botulism spores). Presto 23-quart ~$120 (fits 7 quart jars or 20 pint jars). Must have: weighted gauge or dial gauge (test accuracy annually). Follow tested recipes exactly — botulism is odorless, tasteless, and often fatal. Panama: pressure canning = shelf-stable meat without refrigeration."}, {"sym": "SMOKER", "price": 150, "range": "$80-400", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "Meat smoker for preservation. Hot smoking (165-185°F): cooks + flavors, extends fridge life to 1-2 weeks. Cold smoking (<85°F): preserves (with salt cure), extends shelf life months. Electric smoker ~$150-250 (easiest). Offset smoker ~$200-400 (tradi", "fullNote": "Meat smoker for preservation. Hot smoking (165-185°F): cooks + flavors, extends fridge life to 1-2 weeks. Cold smoking (<85°F): preserves (with salt cure), extends shelf life months. Electric smoker ~$150-250 (easiest). Offset smoker ~$200-400 (traditional). DIY: 55-gal drum smoker ~$50-80. Panama: smoking + vacuum sealing = shelf-stable fish/meat without refrigeration. Hardwood for smoke: fruit woods, hickory, oak (no softwoods/resinous woods — toxic)."}, {"sym": "HERB_GARDEN", "price": 30, "range": "$15-60", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Culinary + medicinal herb starter garden. 6-8 plants/seeds: basil, cilantro, oregano, thyme, rosemary, mint (contain!), aloe vera, lemongrass. Culinary herbs: elevate simple food, reduce salt/sugar need. Medicinal: aloe (burns/cuts), mint (digestion)", "fullNote": "Culinary + medicinal herb starter garden. 6-8 plants/seeds: basil, cilantro, oregano, thyme, rosemary, mint (contain!), aloe vera, lemongrass. Culinary herbs: elevate simple food, reduce salt/sugar need. Medicinal: aloe (burns/cuts), mint (digestion), chamomile (sleep), ginger (nausea/inflammation). Most herbs are pest-resistant (aromatic oils deter insects). Panama: lemongrass, ginger, turmeric, and aloe thrive in tropics with zero care."}, {"sym": "NUT_TREES", "price": 80, "range": "$40-150", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "Nut trees for long-term food security. Plant year 1, harvest year 5-10, produce for 50-100+ years. Panama tropical nuts: coconut palm (3-5 yrs to fruit, 50-100 nuts/yr), cashew (3-5 yrs), macadamia (5-7 yrs, needs some elevation/cool — Chiriqui highl", "fullNote": "Nut trees for long-term food security. Plant year 1, harvest year 5-10, produce for 50-100+ years. Panama tropical nuts: coconut palm (3-5 yrs to fruit, 50-100 nuts/yr), cashew (3-5 yrs), macadamia (5-7 yrs, needs some elevation/cool — Chiriqui highlands), breadnut (maya nut — native, high protein). Nuts are calorie-dense (160-200 cal/oz), store 1-2 years in shell. Plant for your children, not just yourself."}, {"sym": "MEDICINAL_PLANTS", "price": 0, "range": "$0-0", "unit": "USD", "conf": "medium", "safety": false, "cat": "🌱 Food", "note": "PANAMA MEDICINAL PLANTS (traditional + science-backed): Sábila (aloe vera) — burns, wounds, skin. Jengibre (ginger) — nausea, inflammation, cold/flu. Cúrcuma (turmeric) — anti-inflammatory (curcumin). Hierba de limón (lemongrass) — calming tea, insec", "fullNote": "PANAMA MEDICINAL PLANTS (traditional + science-backed): Sábila (aloe vera) — burns, wounds, skin. Jengibre (ginger) — nausea, inflammation, cold/flu. Cúrcuma (turmeric) — anti-inflammatory (curcumin). Hierba de limón (lemongrass) — calming tea, insect repellent. Moringa — nutrient-dense leaves (iron, calcium, protein). Noni — traditional pain relief (fruit). Caña fistula — mild laxative. Always verify ID before using — many toxic lookalikes. Learn from local knowledge keepers."}, {"sym": "NORWEGIAN_POT", "price": 70, "range": "$40-120", "unit": "USD", "conf": "high", "safety": false, "cat": "🌱 Food", "note": "Insulated thermal cooker (haybox or wonderbag): bring food to boil for 5-10 minutes, then place in heavily insulated container. Retained heat continues cooking for 2-8 hours without additional energy. Reduces fuel consumption by 60-80%. Works for: so", "fullNote": "Insulated thermal cooker (haybox or wonderbag): bring food to boil for 5-10 minutes, then place in heavily insulated container. Retained heat continues cooking for 2-8 hours without additional energy. Reduces fuel consumption by 60-80%. Works for: soups, stews, rice, beans, pasta, and hard-boiled eggs. Also called retained-heat cooking. Simple DIY version: cardboard box + straw/hay + sleeping bag."}]</script>
<script id="cat-data" type="application/json">{"💧 Water": {"pros": "✓ Reliable with proper source\n✓ Gravity works without power\n✓ Multiple filtration options", "cons": "✗ Source-dependent (rain/well/stream)\n✗ Storage takes space\n✗ Pumping needs energy", "info": "WATER — Panama. Tropical rainfall abundant but seasonal.\n1\" rain on 1,000 sq ft = 600 gallons. Test before drinking."}, "⚡ Electricity": {"pros": "✓ Solar = zero fuel forever\n✓ Scalable from small to large\n✓ Prices dropping yearly", "cons": "✗ Upfront cost significant\n✗ Battery replacement every 5-15yr\n✗ Weather-dependent output", "info": "ELECTRICITY — Match panel Voc to controller.\nCold raises Voc. 15-20% headroom.\nHigher voltage = thinner wire."}, "🌱 Food": {"pros": "✓ Fresh food = better nutrition\n✓ Reduces supply chain dependency\n✓ Surplus preserved/shared", "cons": "✗ Labor-intensive\n✗ Pest/disease pressure in tropics\n✗ Seasonal variability", "info": "FOOD — Panama. Grow what thrives in tropics.\nRainy=plant everything. Dry=drought-tolerant.\nPerennial crops need less labor."}}</script>
<script>
var CAT=JSON.parse(document.getElementById('cat-data').textContent);
var rules=JSON.parse(document.getElementById('rules-data').textContent);
var total=rules.length;
var queue,validated,flagged,skipped,deleted=[],history=[];

var overrides=JSON.parse(localStorage.getItem('ogx_editor_overrides')||'{}');
var deletedData=JSON.parse(localStorage.getItem('ogx_deleted')||'[]');
deleted=deletedData;

// Filter out previously deleted rules from the pool
var activeRules=rules.filter(function(r){return deleted.findIndex(function(d){return d.sym===r.sym;})===-1;});

function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}}

function restart(){
  activeRules=rules.filter(function(r){return deleted.findIndex(function(d){return d.sym===r.sym;})===-1;});
  queue=activeRules.map(function(r){return Object.assign({},r);});
  shuffle(queue);
  validated=[];flagged=[];skipped=[];history=[];
  total=rules.length;
  document.getElementById('total-count').textContent=total;
  render();}
restart();

function getCat(c){return CAT[c]||CAT["💧 Water"];}
function getOverrides(sym){
  var o=overrides[sym]||{};
  var r=rules.find(function(r){return r.sym===sym;});
  var defaults=getCat(r?r.cat:'💧 Water');
  return {note:o.note||null,pros:o.pros||defaults.pros,cons:o.cons||defaults.cons,info:o.info||defaults.info};}


var syncUrl=localStorage.getItem('ogx_sync_url')||'http://192.168.0.17:8765';
function setSyncUrl(){{var u=prompt('Sync server URL:',syncUrl);if(u){{syncUrl=u;localStorage.setItem('ogx_sync_url',u);alert('Sync URL set to: '+u);}}}}
function syncToServer(){{
  if(Object.keys(overrides).length===0&&deleted.length===0){{alert('No edits to sync. Make some changes first.');return;}}
  var payload={{overrides:overrides,deleted:deleted,source:'tablet',syncedAt:new Date().toISOString()}};
  var statusEl=document.createElement('div');statusEl.style.cssText='position:fixed;bottom:1rem;right:1rem;background:var(--card);border:1px solid var(--cyan);color:var(--cyan);padding:.5rem 1rem;border-radius:8px;font-size:.55rem;z-index:9999;';statusEl.textContent='📤 Syncing...';document.body.appendChild(statusEl);
  fetch(syncUrl+'/sync',{{method:'POST',headers:{{'Content-Type':'application/json'}},body:JSON.stringify(payload)}})
    .then(function(r){{return r.json();}})
    .then(function(data){{
      statusEl.textContent='✅ Synced! '+data.results.length+' changes applied';
      statusEl.style.borderColor='var(--emerald)';statusEl.style.color='var(--emerald)';
      setTimeout(function(){{statusEl.remove();}},3000);
    }})
    .catch(function(e){{
      statusEl.textContent='❌ Sync failed: '+e.message+'\nMake sure you are on the same WiFi as the server ('+syncUrl+')';
      statusEl.style.borderColor='var(--rose)';statusEl.style.color='var(--rose)';
      setTimeout(function(){{statusEl.remove();}},5000);
    }});}}
function render(){
  var done=validated.length+deleted.length;
  document.getElementById('done-count').textContent=done;
  document.getElementById('total-count').textContent=total;
  document.getElementById('progress').style.width=((done/total)*100)+'%';
  if(queue.length===0){
    document.getElementById('card-area').innerHTML='<div class="done-screen"><h2>🎉 All Reviewed!</h2><div class="big-num">'+total+'</div><p style="color:var(--muted);">💧77 water · ⚡142 elec · 🌱64 food</p><div class="stat-row"><div class="stat-box"><div class="num" style="color:var(--emerald);">'+validated.length+'</div><div class="label">Validated</div></div><div class="stat-box"><div class="num" style="color:var(--amber);">'+flagged.length+'</div><div class="label">Flagged</div></div><div class="stat-box"><div class="num" style="color:var(--muted);">'+skipped.length+'</div><div class="label">Skipped</div></div><div class="stat-box"><div class="num" style="color:var(--rose);">'+deleted.length+'</div><div class="label">Deleted</div></div></div>'+(flagged.length?'<details><summary>⚠ Flagged ('+flagged.length+')</summary>'+flagged.map(function(r){return '<div style="font-size:.42rem;margin:1px 0;color:var(--amber);">⚠ '+r.sym+' — $'+r.price+' — '+r.cat+'</div>';}).join('')+'</details>':'')+(deleted.length?'<details><summary>🗑️ Deleted ('+deleted.length+')</summary>'+deleted.map(function(d){return '<div style="font-size:.42rem;margin:1px 0;color:var(--rose);">🗑️ '+d.sym+' — '+d.cat+'</div>';}).join('')+'</details>':'')+'<div style="margin-top:.5rem;font-size:.42rem;color:var(--muted);">'+Object.keys(overrides).length+' custom edits saved</div><button class="btn-restart" onclick="restart()">🔄 Review Again</button> <button class="btn-export" onclick="exportData()">📥 Export All Data</button>'+(deleted.length?' <button class="btn-restore" onclick="restoreDeleted()">♻️ Restore Deleted</button>':'')+'</div>';return;}
  var r=queue[0],cd=getCat(r.cat),ov=getOverrides(r.sym);
  var priceDisplay=r.price===0?'—':'$'+r.price;
  var noteText=ov.note||r.note;
  var h='<div class="card">';
  h+='<div class="card-header"><span class="card-symbol">'+r.sym+'</span><div class="card-price-block"><div class="card-price">'+priceDisplay+'</div><div class="card-range">'+r.range+' '+r.unit+'</div></div></div>';
  h+='<div class="badges"><span class="badge badge-'+r.conf+'">'+r.conf+'</span>'+(r.safety?'<span class="badge badge-safety">SAFETY</span>':'')+'<span class="badge badge-cat">'+r.cat+'</span></div>';
  h+='<div class="note-edit editable" id="note-edit" contenteditable="true">'+noteText+'</div>';
  h+='<div class="pros-cons">';
  h+='<div class="pc-box pc-pros"><span class="pc-label">PROS ✓</span><div class="editable" id="pros-edit" contenteditable="true">'+ov.pros+'</div></div>';
  h+='<div class="pc-box pc-cons"><span class="pc-label">CONS ✗</span><div class="editable" id="cons-edit" contenteditable="true">'+ov.cons+'</div></div>';
  h+='</div>';
  h+='<div class="actions">';
  h+='<button class="btn btn-save" onclick="saveAll()">💾 Save</button>';
  h+='<button class="btn btn-grok" onclick="syncToServer()" style="background:#0a1628;color:var(--cyan);border-color:var(--cyan);" title="Send edits to server">📤 Sync</button>';
  h+='<button class="btn btn-delete" onclick="saveAll();doDelete()">🗑️ Delete</button>';
  h+='<button class="btn btn-grok" onclick="openGrok()">🔍 Grok</button>';
  h+='<button class="btn btn-flag" onclick="saveAll();doFlag()">⚠ Flag</button>';
  h+='<button class="btn btn-skip" onclick="saveAll();doSkip()">↓ Skip</button>';
  h+='<button class="btn btn-help" onclick="saveAll();showHelp()">? Info</button>';
  h+='<button class="btn btn-validate" onclick="saveAll();doValidate()">✓ Validate</button>';
  h+='</div></div>';
  document.getElementById('card-area').innerHTML=h;}

function saveAll(){
  if(queue.length===0)return;
  var sym=queue[0].sym,noteEl=document.getElementById('note-edit'),prosEl=document.getElementById('pros-edit'),consEl=document.getElementById('cons-edit');
  if(!overrides[sym])overrides[sym]={};
  if(noteEl)overrides[sym].note=noteEl.innerText;
  if(prosEl)overrides[sym].pros=prosEl.innerText;
  if(consEl)overrides[sym].cons=consEl.innerText;
  Object.keys(overrides[sym]).forEach(function(k){if(!overrides[sym][k])delete overrides[sym][k];});
  if(Object.keys(overrides[sym]).length===0)delete overrides[sym];
  localStorage.setItem('ogx_editor_overrides',JSON.stringify(overrides));}

function doDelete(){
  if(queue.length===0)return;
  var r=queue.shift();
  deleted.push(r);
  localStorage.setItem('ogx_deleted',JSON.stringify(deleted));
  history.push({action:'delete',rule:r});
  render();}

function openGrok(){
  if(queue.length===0)return;
  var r=queue[0];
  var q=encodeURIComponent('off-grid '+r.sym.replace(/_/g,' ')+' '+r.cat.replace('💧 ','water ').replace('⚡ ','electricity ').replace('🌱 ','food ')+' guide pricing specs');
  window.open('https://grok.com/?q='+q,'_blank');}

function savePopupInfo(){
  if(queue.length===0)return;
  var sym=queue[0],infoEl=document.getElementById('info-edit');
  if(infoEl){if(!overrides[sym])overrides[sym]={};overrides[sym].info=infoEl.innerText;
  if(!overrides[sym].info)delete overrides[sym].info;
  if(Object.keys(overrides[sym]).length===0)delete overrides[sym];
  localStorage.setItem('ogx_editor_overrides',JSON.stringify(overrides));}}

function showHelp(){
  if(queue.length===0)return;
  var r=queue[0],cd=getCat(r.cat),ov=getOverrides(r.sym);
  var h='<button class="close-btn" onclick="closeHelp()">✕</button><h3>'+r.sym+'</h3>';
  h+='<div class="badges" style="margin-bottom:.4rem;"><span class="badge badge-'+r.conf+'">'+r.conf+'</span><span class="badge badge-cat">'+r.cat+'</span><span style="font-size:.48rem;font-weight:bold;">'+(r.price===0?'Reference':'$'+r.price+' '+r.unit)+'</span>'+(r.safety?'<span class="badge badge-safety">SAFETY</span>':'')+'</div>';
  h+='<h4 style="color:var(--cyan);">📝 Full Note</h4><div class="note-edit editable" id="info-note-edit" contenteditable="true" style="margin-bottom:.4rem;">'+(ov.note||r.fullNote||r.note)+'</div>';
  h+='<h4 style="color:var(--emerald);">PROS</h4><div class="pc-box pc-pros editable" id="info-pros-edit" contenteditable="true">'+ov.pros+'</div>';
  h+='<h4 style="color:var(--amber);">CONS</h4><div class="pc-box pc-cons editable" id="info-cons-edit" contenteditable="true">'+ov.cons+'</div>';
  h+='<h4 style="color:var(--violet);">DETAILS / INFO</h4><div class="info-edit editable" id="info-edit" contenteditable="true">'+ov.info+'</div>';
  h+='<div style="text-align:center;margin-top:.5rem;"><button class="btn btn-save" onclick="savePopupAll();closeHelp()">💾 Save All & Close</button></div>';
  document.getElementById('popup').innerHTML=h;document.getElementById('overlay').classList.add('active');}

function savePopupAll(){
  if(queue.length===0)return;var sym=queue[0];if(!overrides[sym])overrides[sym]={};
  var n=document.getElementById('info-note-edit'),p=document.getElementById('info-pros-edit'),c=document.getElementById('info-cons-edit'),i=document.getElementById('info-edit');
  if(n&&n.innerText!==(queue[0].fullNote||queue[0].note))overrides[sym].note=n.innerText;
  if(p)overrides[sym].pros=p.innerText;if(c)overrides[sym].cons=c.innerText;if(i)overrides[sym].info=i.innerText;
  Object.keys(overrides[sym]).forEach(function(k){if(!overrides[sym][k])delete overrides[sym][k];});
  if(Object.keys(overrides[sym]).length===0)delete overrides[sym];
  localStorage.setItem('ogx_editor_overrides',JSON.stringify(overrides));}

function exportData(){
  var data={overrides:overrides,deleted:deleted,validated:validated.length,flagged:flagged.length,skipped:skipped.length,exportedAt:new Date().toISOString()};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ogx-review-export.json';a.click();}

function restoreDeleted(){
  if(!confirm('Restore all '+deleted.length+' deleted cards back to the queue?'))return;
  queue=queue.concat(deleted);deleted=[];localStorage.setItem('ogx_deleted','[]');shuffle(queue);render();}

function closeHelp(){savePopupAll();document.getElementById('overlay').classList.remove('active');}
document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeHelp();});

function doValidate(){if(queue.length===0)return;var r=queue.shift();validated.push(r);history.push({action:'validate',rule:r});render();}
function doFlag(){if(queue.length===0)return;var r=queue.shift();flagged.push(r);history.push({action:'flag',rule:r});render();}
function doSkip(){if(queue.length===0)return;var r=queue.shift();skipped.push(r);history.push({action:'skip',rule:r});render();}
function undo(){if(history.length===0)return;var last=history.pop();
  if(last.action==='delete'){var idx=deleted.findIndex(function(d){return d.sym===last.rule.sym;});if(idx!==-1){queue.unshift(deleted.splice(idx,1)[0]);localStorage.setItem('ogx_deleted',JSON.stringify(deleted));}}
  else if(last.action==='validate'){queue.unshift(validated.pop());}
  else if(last.action==='flag'){queue.unshift(flagged.pop());}
  else if(last.action==='skip'){queue.unshift(skipped.pop());}
  render();}

document.addEventListener('keydown',function(e){
  if(document.activeElement&&document.activeElement.isContentEditable)return;
  if(e.key==='ArrowRight'){e.preventDefault();doValidate();}
  else if(e.key==='ArrowLeft'){e.preventDefault();doFlag();}
  else if(e.key==='ArrowDown'){e.preventDefault();doSkip();}
  else if(e.key==='Delete'||e.key==='Backspace'){e.preventDefault();doDelete();}
  else if(e.key==='g'||e.key==='G'){e.preventDefault();openGrok();}
  else if(e.key==='?'&&!e.shiftKey){e.preventDefault();showHelp();}
  else if(e.key==='Escape'){closeHelp();}
  else if(e.key==='z'||e.key==='Z'){e.preventDefault();undo();}
  else if(e.key==='r'||e.key==='R'){e.preventDefault();restart();}
});

render();
</script></body></html>
